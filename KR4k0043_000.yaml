甥女故此李氏一家在他府中十分相得李狀元自成名之後授了東宮侍講之職深得皇太子之心自此十年有餘真宗皇帝崩了仁宗皇帝登位優禮師傅便超升李彥青為禮部尚書進階一品劉元普仗義之事情自仁宗為太子時春郎早已幾次奏知當日便進上一本懇賜還鄉祭掃並乞褒封仁宗頒下詔旨錢塘縣尹李遜追贈禮部尚書襄陽刺史裴習追復原官各賜禦祭一筵青州刺史劉弘敬以原官加升三級禮部尚書李彥青給假半年還朝復職李尚書得了聖旨便同張老夫人裴夫人鳳鳴小姐謝別了鄭樞密馳驛回洛陽來一路上車馬旌旗炫耀數裏府縣官員出郭迎接那李尚書去時尚是弱冠來時已作大臣卻又年止三十洛陽父老觀者如堵都稱歎劉公不但有德抑且能識好人當下李尚書家眷先到劉家下馬劉元普夫婦聞知忙排香案迎接聖旨山呼已畢張老夫人李尚書裴夫人俱各紅袍玉帶率領了鳳鳴小姐齊齊拜倒在地稱謝洪恩劉元普扶起李尚書王夫人扶起夫人小姐就喚兩位公子出來相見嬸嬸兄嫂衆人看見兄弟二人相貌魁悟又酷似劉元普模樣無不歡喜都稱歎道大恩人生此雙璧無非積德所招隨即排著禦祭到裴李二公墳塋焚香奠酒張氏等四人各各痛哭一場撤祭而回劉元普開筵賀喜食供三套酒行三巡劉元普起身對尚書母子説道老夫有一衷腸之話含藏十餘年矣今日不敢不説令先君與老夫生平實無一面之交當賢母子來投老夫茫然不知就裏及至拆書看時並無半字初時不解其意仔細想將起來必是聞得老夫虛名欲待托妻寄子卻是從無一面難敘衷情故把空書藏著啞謎老夫當日認假為真雖妻子跟前不敢説破其實所稱八拜為交皆虛言耳今日喜得賢侄功成名遂耀祖榮宗老夫若再不言是埋沒令先君一段苦心也言畢即將原書遞與尚書母子展看尚書母子號慟感謝衆人直至今日才曉得空函認義之事十分稱歎不止正是故舊托孤天下有虛空認義古來無世人盡效劉元普何必相交在始初當下劉元普又説起長公子求親之事張老夫人欣然允諾裴夫人起身説道奴受爹爹厚意未報萬一今舅舅鄭樞密生一表妹名曰素娟正與次弟同庚奴家願為作伐成其配偶劉元普稱謝了當日無話劉元普隨後就與天佑聘了李鳳鳴小姐李尚書一面寫表轉達朝廷奏聞空函認義之事一面修書與鄭公説合不逾時仁宗看了表章龍顔大喜驚歎劉弘敬盛德隨頒恩詔除建坊旌表外特以李彥青之官封之以彰殊典那鄭公素慕劉公高義求婚之事無有不從李尚書既做了天佑舅舅又做了天賜中表聯襟親上加親十分美滿以後天佑狀元及第天錫進士出身兄弟兩人青年同榜劉元普直看二子成婚各各生子然後忽一夜夢見裴使君來拜道某任都城隍已滿乞公早赴瓜期上帝已有旨矣次日無疾而終恰好百歲王夫人也自壽過八十李尚書夫婦痛哭倍常認作親生父母心喪六年雖然劉氏自有子孫李尚書卻自年年致祭這叫做知恩報恩唯有裴公無後也是李氏子孫世世拜掃自此世居洛陽看守先塋不回西粵裴夫人生子後來也出仕貴顯那劉天佑直做到同平章事劉天錫直做到禦史大夫劉元普屢受褒封子孫蕃衍不絶此陰德之報也這本話文出在空緘記如今依傳編成演義一回所以奉勸世人為善有詩為證陰陽總一理禍福唯自求莫道天公遠須看刺史劉初刻拍案驚奇第二部明淩濛初著卷二十一袁尚寶相術動名卿鄭舍人陰功叨世爵詩曰燕門壯士吳門豪築中注鉛魚隱刀感君恩重與君死泰山一擲若鴻毛話説唐德宗朝有個秀才南劍州人姓林名積字善甫為人聰俊廣覽詩書九經三史無不通曉更兼存心梗直在京師太學讀書給假回家侍奉母親之病母病愈不免再往學中免不得暫別母親相辭親戚鄰里教當直王吉挑著行李迤邐前進在路但見或過山林聽樵歌於雲嶺又經別浦聞漁唱于煙波或抵鄉村卻遇市井才見緑楊垂柳影迷幾處之樓臺那堪啼鳥落花知是誰家之院宇看處有無窮之景致行時有不盡之驅馳飢餐渴飲夜住曉行無路登舟不只一日至蔡州到個去處天色已晚但見十裏俄驚霧暗九天倏睹星明八方商旅卸行裝七級浮屠燃夜火六翮飛鳥爭投棲於樹杪五花畫舫盡返棹于湖邊四野牛羊皆入棧三江漁釣悉歸家兩下招商俱説此間可宿一聲畫角應知前路難行兩個投宿于旅邸小二哥接引揀了一間寬潔房子當直的安頓了擔杖善甫稍歇討了湯洗了腳隨分吃了些晚食無事間坐則個不覺早點燈交當直安排宿歇來日早行當直王吉在床前打鋪自睡且説林善甫脫了衣裳也去睡但覺有物癮其背不能睡著壁上有燈尚猶未滅遂起身揭起薦席看時見一布囊囊中有一錦囊中有大珠百顆遂收於箱篋中當夜不在話下到來朝天色已曉但見曉霧裝成野外殘霞染就荒郊耕夫隴上朦朧月色將沈織女機邊幌蕩金烏欲出牧牛兒尚睡養蠶女未興樵舍外已聞犬吠招提內尚見僧眠天色將曉起來洗漱罷系裹畢教當直的一面安排了行李林善甫出房中來問店主人前夕恁人在此房內宿店主人説道昨夕乃是一巨商林善甫見説此乃吾之故友也因俟我失期看著那店主人道此人若回尋時可使他來京師上庠貫道齋尋問林上舍名積字善甫千萬千萬不可誤事説罷還了房錢相揖作別去了王吉前面挑著行李什物林善甫後面行迤邐前進林善甫放心不下恐店主人忘了遂於沿路上令王吉於牆壁粘手榜雲某年某月某日有劍南林積假館上庠有故人元珠可相訪於貫道齋不止一日到了學中參了假仍舊歸齋讀書且説這囊珠子乃是富商張客遺下了去的及至到於市中取珠欲貨方知失去唬得魂不附體道苦也我生受數年只選得這包珠子今已失了歸家妻子孩兒如何肯信再三思量不知失於何處只得再回沿路店中尋討直尋到林上舍所歇之處問店小二時店小二道我卻不知你失去物事張客道我歇之後有恁人在此房中安歇店主人道我便忘了從你去後有個官人來歇一夜了絶早便去臨行時分付道有人來尋時可千萬使他來京師上庠貫道齋問林上舍名積張客見説言語蹺蹊口中不道心下思量莫是此人收得我之物當日只得離了店中迤邐再取京師路上來見沿路貼著手榜中有元珠之句略略放心不止一日只到上庠未去歇泊便來尋問學對門有個茶坊但見木匾高懸紙屏橫挂壁間名畫皆唐朝吳道子丹青甌內新茶盡山居玉川子佳茗張客入茶坊吃茶茶罷問茶博士道此間有個林上舍否博士道上舍姓林的極多不知是那個林上舍張客説貫道齋名積字善甫茶博士見説這個便是個好人張客見説道是好人心下又放下二三分張客説上舍多年個遠親不相見怕忘了若來時相指引則個正説不了茶博士道兀的出齋來的官人便是他在我家寄衫帽張客見了不敢造次林善甫入茶坊脫了衫帽張客方才向前看著林上舍唱個喏便拜林上舍道男兒膝下有黃金如何拜人那時林上舍不識他有甚事但見張客簌簌地淚下哽咽了説不得歇定便把這上件事一一細説一遍林善甫見説便道不要慌物事在我處我且問你則個裏面有甚麼張客道布囊中有錦囊內有大珠百顆林上舍道多説得是帶他到安歇處取物交還張客看見了道這個便是不願都得但只覓得一半歸家養膳老小感戴恩德不淺林善甫道豈有此説我若要你一半時須不沿路粘貼手榜交你來尋張客再三不肯都領情願只領一半林善甫堅執不受如此數次相推張客見林上舍再三再四不受感戴洪恩不已拜謝而去將珠子一半於市貨賣賣得銀來舍在有名佛寺齋僧就與林上舍建立生祠供養報答還珠之恩善甫後來一舉及第詩雲林積還珠古未聞利心不動道心存暗施陰德天神助一舉登科耀姓名善甫後來位至三公二子歷任顯宦古人雲積善有善報積惡有惡報積善之家必有餘慶作惡之家必有餘殃正是黑白分明造化機誰人會解劫中危分明指與長生路爭奈人心著處迷此本話文叫做積善陰騭乃是京師老郎傳留至今小子為何重宣這一遍只為世人貪財好利見了別人錢鈔昧著心就要起發了何況是失下的一發是應得的了誰肯輕還本主不知冥冥之中陰功極重所以裴令公相該餓死只因還了玉帶後來出將入相竇諫議命主絶嗣只為還了遺金後來五子登科其餘小小報應説不盡許多而今再説一個一點善念直到得脫了窮胎變成貴骨説與看官們一聽方知小子勸人做好事的説話不是沒來歷的你道這件事出在何處國朝永樂爺爺未登帝位還為燕王其時有個相士叫袁柳莊名珙在長安酒肆遇見一夥軍官打扮的在裏頭吃酒柳莊把內中一人看了一看大驚下拜道此公乃真命天子也其人搖手道休得胡説卻問了他姓名去了明日只見燕府中有懿旨召這相士相士朝見擡頭起來正是昨日酒館中所遇之人原來燕王裝作了軍官同護衛數人出來微行的就密教他仔細再相柳莊相罷稱賀從此燕王決了大計後來靖了內難乃登大寶酬他一個三品京職其子忠徹亦得蔭為尚寶司丞人多曉得柳莊神相卻不知其子忠徹傳了父術也是一個百靈百驗的京師顯貴公卿無一個不與他往來求他風鑒的其時有一個姓王的部郎家中人眷不時有病一日袁尚寶來拜見他面有憂色問道老先生尊容滯氣應主人眷不寧然不是生成的恰似有外來妨礙原可趨避部郎道如何趨避望請見教正説話間一個小廝捧了茶盤出來送茶尚寶看了一看大驚道元來如此須臾吃罷茶小廝接了茶鍾進去了尚寶密對部郎道適來送茶小童是何名字部郎道問他怎的尚寶道使宅上人眷不寧者此子也部郎道小廝姓鄭名興兒就是此間收的未上一年老實勤謹頗稱得用他如何能使家下不寧尚寶道此小廝相能妨主若留過一年之外便要損人口豈止不寧而已部郎意猶不通道怎便到此尚寶道老先生豈不聞馬有的盧能妨主手版能忤人君的故事麼部郎省悟道如此只得遣了他罷了部郎送了尚寶出門進去與夫人説了適間之言女眷們見説了這等説話極易聽信的又且袁尚寶相術有名那一個不曉得部郎是讀書之人還有些崛強未服怎當得夫人一點疑心之根再拔不出了部郎就喚興兒到跟前打發他出去興兒大驚道小的並不曾壞老爺事體如何打發小的部郎道不為你壞事只因家中不安袁尚寶爺相道都是你的緣故沒奈何打發你在外去過幾時看光景再處興兒也曉得袁尚寶相術神通如此説了畢竟難留卻又捨不得家主大哭一場拜倒在地部郎也有好些不忍沒奈何強遣了他果然興兒出去了家中人口從此平安部郎合家越信尚寶之言不為虛謬話分兩頭且説興兒含悲離了王家未曾尋得投主權在古廟棲身一日走到坑廁上屙屎只見壁上挂著一個包裹他提下來一看乃是布線密扎且是沈重解開一看乃是二十多包銀子看見了伸著舌頭縮不進來道造化造化我有此銀子不愁貧了就是家主趕了出來也不妨又想一想道我命本該窮苦投靠了人家尚且道是相法妨礙家主平白無事趕了出來怎得有福氣受用這些物事此必有人家幹甚緊事帶了來用因為登東廁挂在壁間失下了的未必不關著幾條性命我拿了去雖無人知道卻不做了陰騭事體畢竟等人來尋還他為是左思右想帶了這個包裹不敢遠離坑廁沈吟到將晚不見人來放心不下取了一條草薦竟在坑版上鋪了把包裹塞在頭底下睡了一夜明日絶早只見一個人頭蓬眼腫走到坑中來見有人在裏頭看一看壁間吃了一驚道東西已不見了如何回去得將頭去坑牆上亂撞興兒慌忙止他道不要性急有甚話且與我説個明白那個人道主人托俺將著銀子到京中做事昨日偶因登廁尋個竹釘挂在壁上已後登廁已完竟自去了忘記取了包裹而今主人的事既做不得銀子又無了怎好白手回去見他要這性命做甚興兒道老兄不必著慌銀子是小弟拾得在此自當奉璧那個人聽見了笑逐顔開道小哥若肯見還當以一半奉謝興兒道若要謝時我昨夜連包拿了去不得何苦在坑版上忍了臭氣睡這一夜不要昧了我的心把包裹一撩竟還了他那個人見是個小廝又且説話的確做事慷慨便問他道小哥高姓興兒道我姓鄭那個人道俺的主人也姓鄭河間府人是個世襲指揮只因進京來討職事做叫俺拿銀子來使用不知是昨日失了今日卻得小哥還俺俺明日做事停當了同小哥去見俺家主説小哥這等好意必然有個好處兩個歡歡喜喜同到一個飯店中殷殷勤勤買酒請他問他本身來歷他把投靠王家因相被逐一身無歸上項苦情備細説了一遍那個人道小哥患難之中見財不取一發難得而今不必別尋道路只在我下處同住了待我幹成了這事帶小哥到河間府罷了興兒就問那個人姓名那個人道俺姓張在鄭家做都管人只叫我做張都管不要説俺家主人就是俺自家也盤纏得小哥一兩個月起的興兒正無投奔聽見如此説也自喜歡從此只在飯店中安歇與張都管看守行李張都管自去兵部做事有銀子得用了自然無不停當取鄭指揮做了巡撫標下旗鼓官張都管欣然走到下處對興兒道承小哥厚德主人已得了職事這分明是小哥作成的俺與你只索同到家去報喜罷了不必在此停留即忙收拾行李雇了兩個牲口做一路回來到了家門口張都管留興兒在外邊住了先進去報與家主鄭指揮鄭指揮見有了衙門不勝之喜對張都管道這事全虧你能幹得來張都管説道這事全非小人之能一來主人福蔭二來遇個恩星得有今日若非那個恩星不要説主人官職連小人性命也不能勾回來見主人了鄭指揮道是何恩星張都管把登廁失了銀子遇著鄭興兒廁版上守了一夜原封還他從頭至尾説了一遍鄭指揮大驚道天下有這樣義氣的人而今這人在那裏張都管道小人不敢忘他之恩邀他同到此間拜見主人見在外面鄭指揮道正該如此快請進來張都管走出門外叫了興兒一同進去見鄭指揮興兒是做小廝過的見了官人不免磕個頭下去鄭指揮自家也跪將下去扶住了説道你是俺恩人如何行此禮興兒站將起來鄭指揮仔細看了一看道此非下賤之相況且氣量寬洪立心忠厚他日必有好處討坐來與他坐了興兒那裏肯坐推遜了一回只得依命坐了指揮問道足下何姓興兒道小人姓鄭指揮道忝為同姓一發妙了老夫年已望六尚無子嗣今遇大恩無可相報不是老夫要討便宜情願認義足下做個養子恩禮相待少報萬一不知足下心下如何興兒道小人是執鞭隨鐙之人怎敢當此鄭指揮道不如此説足下高誼實在古人之上今欲酬以金帛足下既輕財重義豈有重資不取反受薄物之理若便恝然無關視老夫為何等負義之徒幸叨同姓實是天緣只恐有屈了足下於心不安足下何反見外如此指揮執意既堅張都管又在旁邊一力攛掇興兒只得應承當下拜了四拜認義了此後內外人多叫他是鄭大舍人名字叫做鄭興邦連張都管也讓他做小家主了那舍人北邊出身從小曉得些弓馬今在指揮家帶了同往薊州任所廣有了得的教師日日教習一發熟嫻指揮愈加喜歡況且做人和氣又凡事老成謹慎合家之人無不相投指揮已把他名字報去做了個應襲舍人那指揮在巡撫標下甚得巡撫之心年終纍薦調入京營做了遊擊將軍連家眷進京鄭舍人也同往到了京中騎在高頭駿馬上看見街道想起舊日之事不覺淒然淚下有詩為證昔年在此拾遺金藍縷身軀乞丐心怒馬鮮衣今日過淚痕還似舊時深卻説鄭遊擊又與舍人用了些銀子得了應襲冠帶以指揮職銜聽用在京中往來拜客好不氣概他自離京中到這個地位還不上三年此時王部郎也還在京中舍人想道人不可忘本我當時雖被王家趕了出來卻是主人原待得我好的只因袁尚寶有妨礙主人之説故此聽信了他原非本意今我自到義父家中何曾見妨了誰來此乃尚寶之妄言不關舊主之事今得了這個地步還該去見他一見才是忠厚只怕義父怪道翻出舊底本人知不雅未必相許即把此事從頭至尾來與義父鄭遊擊商量遊擊稱讚道貴不忘賤新不忘舊都是人生實受用好處有何妨礙古來多少王公大人天子宰相在塵埃中屠沽下賤起的大丈夫正不可以此芥蒂舍人得了養父之言即便去穿了素衣服腰系金鑲角帶竟到王部郎寓所來手本上寫著門下走卒應襲聽用指揮鄭興邦叩見王部郎接了手本想了一回道此是何人卻來見我又且寫門下走卒是必曾在那裏相會過來心下疑惑元來京裏部官清淡見是武官來見想是有些油水的不到得作難就叫請進鄭舍人一見了王部郎連忙磕頭下去王部郎雖是舊主人今見如此冠帶換扮了一時那裏遂認得慌忙扶住道非是統屬如何行此禮舍人道主人豈不記那年的興兒麼部郎仔細一看骨格雖然不同體態還認得出吃了一驚道足下何自能致身如此舍人把認了義父討得應襲指揮今義父現在京營做遊擊的話説了一遍道因不忘昔日看待之恩敢來叩見王部郎見説罷只得看坐舍人再三不肯道分該侍立部郎道今足下已是朝廷之官如何拘得舊事舍人不得已旁坐了部郎道足下有如此後步自非家下所能留只可惜袁尚寶妄言誤我致得罪於足下以此無顔舍人道凡事有數若當時只在主人處也不能得認義父以有今日部郎道事雖如此只是袁尚寶相術可笑可見向來浪得虛名耳正要擺飯款待只見門上遞一帖進來道尚寶袁爺要來面拜部郎撫掌大笑道這個相不著的又來了正好取笑他一回便對舍人道足下且到裏面去只做舊時妝扮了停一會待我與他坐了竟出來照舊送茶看他認得出認不出舍人依言進去卸了冠帶與舊日同伴取了一件青長衣披了聽得外邊尚寶坐定討茶雙手捧了一個茶盤恭恭敬敬出來送茶袁尚寶注目一看忽地站了起來道此位何人乃在此送茶部郎道此前日所逐出童子興兒便是今無所歸仍來家下服役耳尚寶道何太欺我此人不論後日只據目下乃是一金帶武職官豈宅上服役之人哉部郎大笑道老先生不記得前日相他妨礙主人纍家下人口不安的説話了尚寶方才省起向來之言再把他端相了一回笑道怪哉怪哉前日果有此言卻是前日之言也不差今日之相也不差部郎道何解尚寶道此君滿面陰德紋起若非救人之命必是還人之物骨相已變看來有德於人人亦報之今日之貴實由於此非學生有誤也舍人不覺失聲道袁爺真神人也遂把廁中拾金還人與挈到河間認義父親應襲冠帶前後事備細説了一遍道今日念舊主人所以到此部郎起初只曉得認義之事不曉得還金之事聽得説罷肅然起敬道鄭君德行袁公神術俱足不朽快教取鄭爺冠帶來穿著了重新與尚寶施禮部郎連尚寶多留了筵席三人盡歡而散次日王部郎去拜了鄭遊擊就當答拜了舍人遂認為通家往來不絶後日鄭舍人也做到遊擊將軍而終子孫竟得世蔭只因一點善念脫胎換骨享此爵祿所以奉勸世人只宜行好事天並不曾虧了人有古風一首為證袁公相術真奇絶唐舉許負無差別片言甫出鬼神驚雙眸略展榮枯決兒童妨主運何乖流落街衢實可哀還金一舉堪誇羡善念方萌已脫胎鄭公生平原倜儻百計思酬恩誼廣螟蛉同姓是天緣冠帶加身報不爽京華重憶主人情一見袁公便起驚陰功獲福從來有始信時名不浪稱卷二十二錢多處白丁橫帶運退時刺史當艄詩雲榮枯本是無常數何必當風使盡帆東海揚塵猶有日白衣蒼狗剎那間話説人生榮華富貴眼前的多是空花不可認為實相如今人一有了時勢便自道是萬年不拔之基旁邊看的人也是一樣見識豈知轉眼之間灰飛煙滅泰山化作冰山極是不難的事俗語兩句説得好寧可無了有不可有了無專為貧賤之人一朝變泰得了富貴苦盡甜來滋味深長若是富貴之人一朝失勢落魄起來這叫做樹倒猢猻散光景著實難堪了卻是富貴的人只據目前時勢橫著膽昧著心任情做去那裏管後來有下梢沒下梢曾有一個笑話道是一個老翁有三子臨死時分付道你們倘有所願實對我説我死後求之上帝一子道我願官高一品一子道我願田連萬頃末一子道我無所願願換大眼睛一對老翁大駭道要此何干其子道等我撑開了大眼看他們富的富貴的貴此雖是一個笑話正合著古人雲常將冷眼觀螃蟹看你橫行得幾時雖然如此然那等熏天嚇地富貴人除非是遇了朝廷誅戮或是生下子孫不肖方是敗落散場再沒有一個身子上先前做了貴人以後流為下賤現世現報做人笑柄的看官而今且聽小子先説一個好笑的做個入話唐朝僖宗皇帝即位改元乾符是時閹官驕橫有個少馬坊使內官田令孜是上為晉王時有寵及即帝位使知樞密院遂擢為中尉上時年十專事遊戲政事一委令孜呼為阿父遷除官職不復關白其時京師有一流棍叫名李光專一阿諛逢迎諂事令孜令孜甚是喜歡信用薦為左軍使忽一日奏授朔方節度使豈知其人命薄沒福消受敕下之日暴病卒死遺有一子名喚德權年方二十餘歲令孜老大不忍心裏要擡舉他不論好歹署了他一個劇職時黃巢破長安中和元年陳敬蠧在成都遣兵來迎僖皇令孜遂勸僖皇幸蜀令孜扈駕就便叫了李德權同去僖皇行在住于成都令孜與敬蠧相與交結盜專國柄人皆畏威德權在兩人左右遠近仰奉凡姦豪求名求利者多賄賂德權替他兩處打關節數年之間聚賄千萬纍官至金紫光祿大夫檢校右仆射一時熏灼無比後來僖皇薨逝昭皇即位大順二年四月西川節度使王建屢表請殺令孜敬蠧朝廷懼怕二人不敢輕許建使人告敬蠧作亂令孜通鳳翔書不等朝廷旨意竟執二人殺之草奏雲開柙出虎孔宣父不責他人當路斬蛇孫叔敖蓋非利己專殺不行於閫外先機恐失於彀中于時追捕二人餘黨甚急德權脫身遁於復州平日枉有金銀財貨萬萬千千一毫卻帶不得只走得空身盤纏了幾日衣服多當來吃了單衫百結乞食通途可憐昔日榮華一旦付之春夢卻説天無絶人之路復州有個後槽健兒叫做李安當日李光未際時與他相熟偶在道上行走忽見一人藍縷丐食仔細一看認得是李光之子德權心裏惻然邀他到家裏問他道我聞得你父子在長安富貴後來破敗今日何得在此德權將官司捕田陳餘黨脫身亡命到此困窮的話説了一遍李安道我與汝父有交你便權在捨下住幾時怕有人認得你可改個名只認做我的侄兒便可無事德權依言改名彥思就認他這看馬的做叔叔不出街上乞化了未及半年李安得病將死彥思見後槽有官給的工食遂叫李安投狀道身已病廢乞將侄彥思繼充後槽不數日李安果死彥思遂得補充健兒為牧守圉人不須憂愁衣食自道是十分僥幸豈知漸漸有人曉得他曾做仆射過的此時朝政紊亂法紀廢弛也無人追究他的蹤迹但只是起他個混名叫他做看馬仆射走將出來時衆人便指手點腳當一場笑話看官你道仆射是何等樣大官後槽是何等樣賤役如今一人身上先做了仆射收場結果做得個看馬的豈不可笑卻又一件那些人依附內相原是冰山一朝失勢破敗死亡此是常理留得殘生看馬還是便宜的事不足為怪如今再説當日同時有一個官員雖是得官不正僥幸來的卻是自己所掙誰知天不幫襯有官無祿並不曾犯著一個對頭並不曾做著一件事體都是命裏所招下梢頭弄得沒出豁比此更為可笑詩曰富貴榮華何足論從來世事等浮雲登場傀儡休相赫請看當艄郭使君這本話文就是唐僖宗朝江陵有一個人叫做郭七郎父親在日做江湘大商七郎長隨著船上去走的父親死過是他當家了真個是家資巨萬産業廣延有鴉飛不過的田宅賊扛不動的金銀山乃楚城富民之首江淮河朔的賈客多是領他重本貿易往來卻是這些富人惟有一項不平心是他本等大等稱進小等稱出自家的歹爭做好別人的好爭做歹這些領他本錢的賈客沒有一個不受盡他纍的各各吞聲忍氣只得受他你道為何只為本錢是他的那江湖上走的人拚得陪些辛苦在裏頭隨你盡著欺心算帳還只是仗他資本營運畢竟有些便宜處若一下衝撞了他收拾了本錢去就沒蛇得弄了故此隨你克剝只是行得去的本錢越弄越大所以富的人只管富了那時有一個極大商客先前領了他幾萬銀子到京都做生意去了幾年久無音信直到乾符初年郭七郎在家想著這注本錢沒著落他是大商料無失所可惜沒個人往京去一討又想一想道聞得京都繁華去處花柳之鄉不若借此事由往彼一遊一來可以索債二來買笑追歡三來覷個方便覓個前程也是終身受用算計已定七郎有一個老母一弟一妹在家奴婢下人無數只是未曾娶得妻子當時分付弟妹承奉母親著一個都管看家餘人各守職業做生理自己卻帶幾個慣走長路會事的家人在身邊一面到京都來七郎從小在江湖邊生長賈客船上往來自己也會撑得篙搖得櫓手腳快便把些飢餐渴飲之路不在心上不則一日到了元來那個大商姓張名全混名張多寶在京都開幾處解典庫又有幾所綢緞鋪專一放官吏債打大頭腦的至於居間説事賣官鬻爵只要他一口擔當事無不成也有叫他做張多保的只為凡事都是他保得過所以如此稱呼滿京人無不認得他的郭七郎到京一問便著他見七郎到了是個江湘債主起初進京時節多虧他的幾萬本錢做樁才做得開成得這個大氣概一見了歡然相接敘了寒溫便擺起酒來把轎去教坊裏請了幾個有名的前來陪侍賓主盡歡酒散後就留一個絶頂的妓者叫做王賽兒相伴了七郎在一個書房裏宿了富人待富人那房舍精致帷帳華侈自不必説次日起來張多保不待七郎開口把從前連本連利一算約該有十來萬了就如數搬將出來一手交兌口裏道只因京都多事脫身不得亦且挈了重資江湖上難走又不可輕易托人所以遲了幾年今得七郎自身到此交明瞭此一宗實為兩便七郎見他如此爽利心下喜歡便道在下初入京師未有下處雖承還清本利卻未有安頓之所有煩兄長替在下尋個寓舍何如張多保道捨下空房盡多間時還要招客何況兄長通家怎到別處作寓只須在捨下安歇待要啓行時在下周置動身管取安心無慮七郎大喜就在張家間壁一所大客房住了當日取出十兩銀子送與王賽兒做昨日纏頭之費夜間七郎擺還席就央他陪酒張多保不肯要他破鈔自己也取十兩銀子來送叫還了七郎銀子七郎那裏肯推來推去大家都不肯收進去只便宜了這王賽兒落得兩家都收了兩人方才快活是夜賓主兩個與同王賽兒行令作樂飲酒愈加熟分有趣吃得酩酊而散王賽兒本是個有名的上廳行首又見七郎有的是銀子放出十分擒拿的手段來七郎一連兩宵已此著了迷魂湯自此同行同坐時刻不離左右竟不放賽兒到家裏去了賽兒又時常接了家裏的姊妹輪遞來陪酒插趣七郎賞賜無算那鴇兒又有做生日打差買物事替還債許多科分出來七郎揮金如土並無吝惜才是行徑如此便有幫間鑽懶一班兒人出來誘他去跳槽大凡富家浪子心性最是不常搭著便生根的見了一處就熱一處王賽兒之外又有陳嬌黎玉張小小鄭翩翩幾處往來都一般的撒漫使錢那夥間漢又領了好些王孫貴戚好賭博的牽來局賭做圈做套贏少輸多不知騙去了多少銀子七郎雖是風流快活終久是當家立計好利的人起初見還的利錢都在裏頭所以放鬆了些手過了三數年覺道用得多了捉捉後手看已用過了一半有多了心裏猛然想著家裏頭要回家來與張多保商量張多保道此時正是濮人王仙芝作亂劫掠郡縣道路梗塞你帶了偌多銀兩待往那裏去恐到不得家裏不如且在此盤桓幾時等路上平靜好走再去未遲七郎只得又住了幾日偶然一個間漢叫做包走空包大説起朝廷用兵緊急缺少錢糧納了些銀子就有官做官職大小只看銀多少説得郭七郎動了火問道假如納他數百萬錢可得何官包大道如今朝廷昏濁正正經經納錢就是得官也只有數不能勾十分大的若把這數百萬錢拿去私下買囑了主爵的官人好歹也有個刺史做七郎吃一驚道刺史也是錢買得的包大道而今的世界有甚麼正經有了錢百事可做豈不聞崔烈五百萬買了個司徒麼而今空名大將軍告身只換得一醉刺史也不難的只要通得關節我包你做得來便是正説時恰好張多保走出來七郎一團高興告訴了適才的説話張多保道事體是做得來的在下手中也弄過幾個了只是這件事在下不攛掇得兄長做七郎道為何多保道而今的官有好些難做他們做得興頭的都是有根基有腳力親戚滿朝黨羽四布方能勾根深蒂固有得錢賺越做越高隨你去剝削小民貪污無恥只要有使用有人情便是萬年無事的兄長不過是白身人便弄上一個顯官又無四壁倚仗到彼地方未必行得去就是行得去時朝裏如今專一討人便宜曉得你是錢換來的略略等你到任一兩個月有了些光景便道勾你了一下子就塗抹著豈不枉費了這些錢若是官好做時在下也做多時了七郎道不是這等説小弟家裏有的是錢沒的是官況且身邊現有錢財總是不便帶得到家何不於此處用了些博得個腰金衣紫也是人生一世草生一秋就是不賺得錢時小弟家裏原不希罕這錢的就是不做得興時也只是做過了一番官了登時住了手那榮耀是落得的小弟見識已定兄長不必掃興多保道既然長兄主意要如此在下當得效力當時就與包大兩個商議去打關節那個包大走跳路數極熟張多保又是個有身家幹大事慣的人有什麼弄不來的事原來唐時使用的是錢千錢為緡就用銀子準時也只是以錢算帳當時一緡錢就是今日的一兩銀子宋時卻叫做一貫了張多保同包大將了五千緡悄悄送到主爵的官人家裏那個主爵的官人是內官田令孜的收納戶百靈百驗又道是無巧不成話其時有個粵西橫州刺史郭翰方得除授患病身故告身還在銓曹主爵的受了郭七郎五千緡就把籍貫改注即將郭翰告身轉付與了郭七郎從此改名做了郭翰張多保與包大接得橫州刺史告身千歡萬喜來見七郎稱賀七郎此時頭輕腳重連身子都麻木起來包大又去喚了一部梨園子弟張多保置酒張筵是日就換了冠帶那一班間漢曉得七郎得了個刺史沒一個不來賀喜撮空大吹大擂吃了一日的酒又道是蒼蠅集穢螻蟻集膻鵓鴿子旺邊飛七郎在京都一向撒漫有名一旦得了刺史之職就有許多人來投靠他做使令的少不得官不威牙爪威做都管做大叔走頭站打驛吏欺估客詐鄉民總是這一干人了郭七郎身子如在雲霧裏一般急思衣錦榮歸擇日起身張多保又設酒餞行起初這些往來的間漢姊妹都來送行七郎此時眼孔已大各各齎發些賞賜氣色驕傲旁若無人那些人讓他是個見任刺史脅肩諂笑隨他怠慢只消略略眼梢帶去口角惹著就算是十分殷勤好意了如此攛哄了幾日行裝打疊已備齊齊整整起行好不風騷一路上想道我家裏資産既饒又在大郡做了刺史這個富貴不知到那裏才住心下喜歡不覺日逐賣弄出來那些原跟去京都家人又在新投的家人面前誇説著家裏許多富厚之處那新投的一發喜歡道是投得著好主了前路去耀武揚威自不必説無船上馬有路登舟看看到得江陵境上來七郎看時吃了一驚但見人煙稀少閭井荒涼滿前敗宇頽垣一望斷橋枯樹烏焦木柱無非放火燒殘赭白粉牆儘是殺人染就尸骸沒主烏鵲與螻蟻相爭雞犬無依鷹隼與豺狼共飽任是石人須下淚總教鐵漢也傷心元來江陵渚宮一帶地方多被王仙芝作寇殘滅裏閭人物百無一存若不是水道明白險些認不出路徑來七郎看見了這個光景心頭已自劈劈地跳個不住到了自家岸邊擡頭一看只叫得苦原來都弄做了瓦礫之場偌大的房屋一間也不見了母親弟妹家人等俱不知一個去向慌慌張張走頭無路著人四下找尋找尋了三四日撞著舊時鄰人問了詳細方知地方被盜兵抄亂弟被盜殺妹被搶去不知存亡止剩得老母與一兩個丫頭寄居在古廟旁邊兩間茅屋之內家人俱各逃竄囊橐盡已蕩空老母無以為生與兩個丫頭替人縫針補線得錢度日七郎聞言不勝痛傷急急領了從人奔至老母處來母子一見抱頭大哭老母道豈知你去後家裏遭此大難弟妹俱亡生計都無了七郎哭罷拭淚道而今事已到此痛傷無益虧得兒子已得了官還有富貴榮華日子在後面母親且請寬心母親道兒得了何官七郎道官也不小是橫州刺史母親道如何能勾得此顯爵七郎道當今內相當權廣有私路可以得官兒子向張客取債他本利俱還錢財盡多在身邊所以將錢數百萬勾幹得此官而今衣錦榮歸省看家裏隨即星夜到任去七郎叫衆人取冠帶過來穿著了請母親坐好拜了四拜又叫身邊隨從舊人及京中新投的人俱各磕頭稱太夫人母親見此光景雖然有些喜歡卻歎口氣道你在外邊榮華怎知家丁盡散分文也無了若不營勾這官多帶些錢歸來用度也好七郎道母親誠然女人家識見做了官怕少錢財而今那個做官的家裏不是千萬百萬連地皮多卷了歸家的今家業既無只索撇下此間前往赴任做得一年兩年重撑門戶改換規模有何難處兒子行囊中還剩有二三千緡盡勾使用母親不必憂慮母親方才轉憂為喜笑逐顔開道虧得兒子崢嶸有日奮發有時真是謝天謝地若不是你歸來我性命只在目下了而今何時可以動身七郎道兒子原想此一歸來娶個好媳婦同享榮華而今看這個光景等不得做這事了且待上了任再做商量今日先請母親上船安息此處既無根絆明日換過大船就做好日開了罷早到得任一日也是好的當夜請母親先搬在來船中了茅舍中破鍋破竈破碗破罐盡多撇下又分付當直的雇了一隻往西粵長行的官船次日搬過了行李下了艙口停當燒了利市神福吹打開船此時老母與七郎俱各精神榮暢志氣軒昂七郎不曾受苦是一路興頭過來的雖是對著母親覺得滿盈得意還不十分怪異那老母是曆過苦難的真是地下超升在天上不知身子幾多大了一路行去過了長沙入湘江次永州州北江漂有個佛寺名喚兜率禪院舟人打點泊船在此過夜看見岸邊有大樹一株圍合數抱遂將船纜結在樹上結得牢牢的又釘好了樁橛七郎同老母進寺隨喜從人撑起傘蓋跟後寺僧見是官員出來迎接送茶私問來歷從人答道是見任西粵橫州刺史寺僧見説是見任官愈加恭敬陪侍指引各處遊玩那老母但看見佛菩薩像只是磕頭禮拜謝他覆庇天色晚了俱各回船安息黃昏左側只聽得樹梢呼