幾十裏路越客道似此行去如何趕得明日到心焦背熱與船上人發極嚷亂船上人道這是用不得性的我們也巴不得到了討喜酒吃誰耐煩在此延挨裴越客道卻是明日是吉期這等耽擱怎了船上人道只是船重得緊所以只管擱淺若要行得快除非人上岸去等船輕了好行越客道有理有理他自家著了急的叫住了船一跳便跳上了岸招呼衆家人起來那些家人見主人已自在岸上了誰敢不上一走就走了二十多人起來那船早自輕了越客在前衆家人在後一路走去那船好轉動不比先前自在江中相傍著行行得四五裏天色將晚看見岸旁有板屋一間屋內有竹床一張越客就走進屋內叫安童把竹床上掃拂一掃拂坐了歇一歇氣再走這許多僮仆都站立左右也有站立在門外的正在歇息只聽得樹林中颼颼的風響于時一線月痕和著星光雖不甚明白也微微看得見約莫風響處有一物行走甚快將到近邊仔細看去卻是一個猛虎背負一物而來衆人驚惶連忙都躲在板屋裏來其虎看看至近衆人一齊敲著板屋呐喊也有把馬鞭子打在板上振得一片價響那虎到板屋側邊放下了背上的東西抖抖身子聽得衆人叫喊像似也有些懼怕大吼一聲飛奔入山去了衆人在屋縫裏張著看那放下的東西恰像個人一般又恰像在那裏有些動等了一會料虎去遠了一齊捏把汗出來看時卻是一個人口中還微微氣喘來對越客説了越客分付衆人救他慌忙叫放船攏岸衆人扛扶其人上了船叫快快解了纜開去恐防那虎還要尋來船開了半晌越客叫點起火來看艙中養娘們各拿蠟燭點起船中明亮看那人時卻是眉灣楊柳臉綻芙蓉喘吁吁吐氣不齊戰兢兢驚神未定頭垂發亂是個醉扶上馬的楊妃目閉唇張好似死乍還魂的杜麗面龐勾可十七八美豔從來無二三越客將這女子上下看罷大驚説道看他容顔衣服決不是等間村落人家的叫衆養娘好生看視衆養娘將軟褥鋪襯抱他睡在床上解看衣服盡被樹林荊刺抓破且喜身體毫無傷痕一個養娘替他將亂髮理清梳通了挽起一髻將一個手帕替他扎了拿些薑湯灌他他微微開口咽下去了又調些粥湯來灌他弄了三四更天氣看看蘇醒神安氣集忽然擡起頭來開目一看看見面前的人一個也不認得哭了一聲依舊眠倒了這邊養娘們問他來歷緣故及遇虎根由那女子只不則聲憑他説來説去竟不肯答應一句漸漸天色明瞭岸上有人走動這邊船上也著水夫上纖此時離州城只有三十裏了聽得前面的人紛紛講説道張尚書第二位小姐昨夜在後花園中遊賞被虎撲了去至今沒尋尸骸處有的道難道連衣服都吃盡了不成水夫聞得此言想著夜來的事有些奇怪商量道船中那話兒莫不正是就著一個下船來把路上人家的説話稟知越客越客一發驚異道依此説話被虎害的正是我定下的娘子了這船中救得的可是不是連忙叫一個知事的養娘來分付他道你去對方才救醒的小娘子説問可是張家德容小姐不是養娘依言去問只見那女子聽得叫出小名來便大哭將起來道你們是何人曉得我的名字養娘道我們正是裴官人家的船正為來赴小姐佳期船行的遲怕趕日子不疊所以官人只得上岸行走誰知卻救了小姐上船也是天緣分定那小姐方才放了心便説花園遇虎一路上如騰雲駕霧不知行了多少路自拚必死被虎放下地時已自魂不附體了後來不知如何卻在船上養娘把救他的始末説了一遍來復越客道正是這個小姐越客大喜寫了一書差一個人飛報到州裏尚書家來尚書正為女兒骸骨無尋又且女壻將到傷痛無奈忽見裴家蒼頭有書到愈加感切拆開來看上寫道趨赴嘉禮江行舟澀從陸倍道忽遇虎負愛女至驚逐之頃虎去而人不傷今完善在舟希示進止子壻裴越客百拜尚書看罷又驚又喜走進衙中説了滿門歎異尚書夫人便道從來罕聞奇事想是為吉日趕不及了神明所使今小姐既在裴郎船上了還可趕得今朝成親尚書道有理有理就叫韝一匹快馬帶了儀從不上一個時辰趕到船上來翁壻相見甚喜見了女兒又悲又喜安慰了一番尚書對裴越客道好教賢壻得知今日之事舊年間李知微已斷定了説成親畢竟要今日昨晚老夫見賢壻不能勾就到道是決趕不上今日這吉期誰想有此神奇之事把小女竟送到尊舟如今若等尊舟到州城水路難行定不能勾莫若就在尊舟結了花燭成了親事明日慢慢回衙這吉期便不挫過了裴越客見説便想道若非嶽丈之言小壻幾乎忘了舊年李知微題下六句首二句道三月三日不遲不疾若是小壻在舟行時只疑遲了而今虎送將來正應著今日中二句道水淺舟膠虎來人得小壻起初道不祥之言誰知又應著這奇事後來二句驚則大驚吉則大吉果然這一驚不小誰知反因此湊著吉期李知微真半仙了張尚書就在船邊分派人喚起儐相辦下酒席先在舟中花燭成親合巹飲宴禮畢張尚書仍舊騎馬先回等他明日舟到接取女兒女壻是夜裴越客遂同德容小姐就在舟中共入鴛幃歡聚少年夫婦極盡于飛之樂明日舟到一同上岸拜見丈母諸親尚書夫人及姑姨姊妹合衙人等看見了德容小姐恰似夢中相逢一般歡喜極了反有墮下淚來的人人説道只為好日來不及感得神明之力遣個猛虎做媒把百里之程頃刻送到從來無此奇事這話傳出去個個奇駭道是新聞民間各處立起個虎媒之祠但是有婚姻求合的虔誠祈禱無有不應至今黔峽之間香火不絶于時有六句口號仙翁知微判成定數虎是神差佳期不挫如此媒人東道難做卷六酒下酒趙尼媼迷花機中機賈秀才報怨詩曰色中餓鬼是花僧家尼扮繇來不較差況是能通閨閣內但教著手便勾叉話説三姑六婆最是人家不可與他往來出入蓋是此輩功夫又間心計又巧亦且走過千家萬戶見識又多路數又熟不要説那些不正氣的婦女十個著了九個兒就是一些針縫也沒有的他會千方百計弄出機關智賽良平辨同何賈無事誘出有事來所以宦戶人家有正經的往往大張告示不許出入其間一種最狠的又是尼姑他借著佛天為由庵院為囤可以引得內眷來燒香可以引得子弟來遊耍見男人問訊稱呼禮數毫不異僧家接對無妨到內室念佛看經體格終須是婦女交搭更便從來馬泊六撮合山十樁事到有九樁是尼姑做成尼庵私會的只説唐時有個婦人狄氏家世顯宦其夫也是個大官稱為夫人夫人生得明豔絶世名動京師京師中公侯戚裏人家婦女爭寵相罵的動不動便道你自逞標致好歹到不得狄夫人乃敢欺淩我美名一時無比卻又資性貞淑言笑不苟極是一個有正經的婦人于時西池春遊都城士女歡集王侯大家油車簾幕絡繹不絶狄夫人免不得也隨俗出遊有個少年風流在京候選官的叫做滕生同在池上看見了這個絶色模樣驚得三魂飄蕩七魄飛揚隨來隨去目不轉睛狄氏也擡起眼來看見滕生風流行動他一邊無心的卻不以為意爭奈滕生看得癡了恨不得尋口冷水連衣服都吞在他的肚裏去問了旁邊人知是有名美貌的狄夫人車馬散了滕生怏怏歸來整整想了一夜自是行忘止食忘餐卻像掉下了一件甚麼東西的無時無刻不在心上熬煎不過因到他家前後左右訪問消息曉得平日端潔無路可通滕生想道他平日豈無往來親厚的女眷若問得著時或者尋出機會來仔細探訪只見一日他門裏走出一個尼姑來滕生尾著去問路上人乃是靜樂院主慧澄慣一在狄夫人家出入的滕生便道好了好了連忙跑到下處將銀十兩封好了急急趕到靜樂院來問道院主在否慧澄出來見是一個少年官人請進奉茶稽首畢便問道尊姓大名何勞貴步滕生通罷姓名道別無他事久慕寶房清德少備香火之資特來隨喜袖中取出銀兩遞過來慧澄是個老世事的一眼瞅去覺得沈重料道有事相央口裏推託不當手中已自接了謝道承蒙厚賜必有所言滕生只推沒有別話表意而已別了回寓慧澄想道卻不奇怪這等一個美少年想我老尼什麼送此厚禮又無別話一時也委決不下只見滕生每日必來院中走走越見越加殷勤往來漸熟了慧澄一日便問道官人含糊不決必有什麼事故但有見托無不盡力滕生道説也不當料是做不得的但只是性命所關或者希冀老師父萬分之一出力救我事若不成拚個害病而死罷了慧澄見説得尷尬便道做得做不得且説來滕生把西池上遇見狄氏如何標致如何想慕若得一了夙緣萬金不惜説了一遍慧澄笑道這事卻難此人與我往來雖是標致異常卻毫無半點瑕疵如何動得手滕生想一想問道師父既與他往來曉得他平日好些什麼慧澄道也不見他好甚東西滕生又道曾托師父做些甚麼否慧澄道數日前托我尋些上好珠子説了兩三遍只有此一端滕生大笑道好也好也天生緣分我有個親戚是珠商有的是好珠我而今下在他家隨你要多少是有的即出門雇馬如飛也似去了一會帶了兩袋大珠來到院中把與慧澄看道珠值二萬貫今看他標致分上讓他一半萬貫就與他了慧澄道其夫出使北邊他是個女人在家那能湊得許多價錢滕生笑道便是四五千貫也罷再不千貫數百貫也罷若肯圓成好事一個錢沒有也罷慧澄也笑道好癡話既有此珠我與你仗蘇張之舌六出奇計好歹設法來院中走走此時再看機會弄得與你相見一面你自放出手段來成不成看你造化不關我事滕生道全伏高手救命則個慧澄笑嘻嘻地提了兩袋珠子竟望狄夫人家來與夫人見禮畢夫人便問袋中何物慧澄道是夫人前日所托尋取珠子今有兩囊上好的送來夫人看看解開囊來狄氏隨就囊中取起來看口裏嘖嘖道果然好珠看了一看愛玩不已問道要多少價錢慧澄道討價萬貫狄氏驚道此只討得一半價錢極是便宜的但我家相公不在一時湊不出許多來怎樣處慧澄扯狄氏一把道夫人且借一步説話狄氏同他到房裏來慧澄説道夫人愛此珠子不消得錢此是一個官人要做一件事的説話的難道好人家女眷面前好直説道送此珠子求做那件事一場不成看官不要性急你看那尼姑巧舌自有宛轉當時狄氏問道此官人要做何事慧澄道是一個少年官人因仇家誣枉失了官職只求一關節到吏部辨白是非求得復任情願送此珠子我想夫人兄弟及相公伯叔輩多是顯要夫人想一門路指引他這珠子便不消錢了狄氏道這等你且拿去還他待我慢慢想一想有了門路再處慧澄道他事體急了拿去他又尋了別人那裏還撈得他珠子轉來不如且留在夫人這裏對他只説有門路明日來討回音罷狄氏道這個使得慧澄別了就去對滕生一一説知滕生道今將何處慧澄道他既看上珠子收下了不管怎的明日定要設法他來看手段滕生又把十兩銀子與他了叫他明日早去那邊狄氏別了慧澄再把珠子細看越看越愛便想道我去托弟兄們討此分上不難這珠眼見得是我的了原來人心不可有欲一有欲心被人窺破便要落人圈套假如狄氏不托尼姑尋珠便無處生端就是見了珠子有錢則買無錢便罷一則一二則二隨你好漢動他分毫不得只為歡喜這珠子又湊不出錢便落在別人機彀中把一個冰清玉潔的弄得沒出豁起來卻説狄氏明日正在思量這事那慧澄也來了問道夫人思量事體可成否狄氏道我昨夜為他細想一番門路卻有管取停當慧澄道卻有一件難處萬貫事體非同小可只憑我一個貧姑稱起來肉也不多幾斤的説來説去賓主不相識便道做得事來此人如何肯信狄氏道是到也是卻待怎麼呢慧澄道依我愚見夫人只做設齋到我院中等此官人只做無心撞見兩個覿面照會這使得麼狄氏是個良人心性見説要他當面見生人耳根通紅起來搖手道這如何使得慧澄也變起臉來道有甚麼難事不過等他自説一段緣故這裏應承做得使他別無疑心方才的確若夫人道見面使不得這事便做不成只索罷了不敢相強狄氏又想了一想道既是老師父主見如此想也無妨後二日我亡兄忌日我便到院中來做齋但只叫他立談一兩句就打發去須防耳目不雅慧澄道本意原只如此説罷了正話留他何干這不須斷當得慧澄期約已定轉到院中滕生已先在把上項事一一説了滕生拜謝道儀秦之辨不過如此矣巴到那日慧澄清早起來端正齋筵先將滕生藏在一個人迹不到的靜室中桌上擺設精致酒肴把門掩上了慧澄自出來外廂支援專等狄氏正是安排撲鼻香芳餌專等鯨猊來上鈎狄氏到了這日晡時果然盛妝而來他恐怕惹人眼目連僮仆都打發了去只帶一個小丫鬟進院來見了慧澄問道其人來未慧澄道未來狄氏道最好且完了齋事慧澄替他宣揚意旨祝贊已畢叫一個小尼領了丫鬟別處頑耍對狄氏道且到小房一坐引狄氏轉了幾條暗弄至小室前搴簾而入只見一個美貌少年獨自在內滿桌都是酒肴吃了一驚便欲逃去慧澄便搗鬼道正要與夫人對面一言官人還不拜見滕生賣弄俊俏連忙趨到跟前劈面拜下去狄氏無奈只得答他慧澄道官人感夫人盛情特備一卮酒謝夫人夫人鑒其微誠萬勿推辭狄氏欲待起身擡起眼來原來是西池上曾面染過的看他生得少年萬分清秀可喜心裏先自軟了帶著半羞半喜呐出一句道有甚事但請直説慧澄挽著狄氏衣袂道夫人坐了好講如何彼此站著滕生滿斟著一杯酒笑嘻嘻的唱個肥喏雙手捧將過來安席狄氏不好卻得只得受了一飲而盡慧澄接著酒壺也斟下一杯狄氏會意只得也把一杯回敬眉來眼去狄氏把先前矜莊模樣都忘懷了又問道官人果要補何官滕生便把眼瞅慧澄一眼道師父在此不好直説慧澄道我便略回避一步跳起身來就走撲地把小門關上了説時遲那時快滕生便移了己坐挨到狄氏身邊雙手抱住道小子自池上見了夫人朝思暮想看看待死只要夫人救小子一命夫人若肯周全連身軀性命也是夫人的了甚麼得官不得官放在心上雙膝跪將下去狄氏見他模樣標致言詞可憐千夫人萬夫人的哀求真個又驚又愛欲要叫喊料是無益欲要推託怎當他兩手緊緊抱住就跪的勢裏一直抱將起來走到床前放倒在床裏便去亂扯小衣狄氏也一時動情淫興難遏沒主意了雖也左遮右掩終久不大阻拒任他舞弄起來那滕生是少年在行手段高強弄得狄氏遍體酥麻陰精早泄原來狄氏雖然有夫並不曾經著這般境界歡喜不盡雲雨既散挈其手道子姓甚名誰若非今日幾虛做了一世人自此夜夜當與子會滕生説了姓名千恩萬謝恰好慧澄開門進來狄氏羞慚不語慧澄道夫人勿怪這官人為夫人幾死貧姑慈悲為本設法夫人救他一命勝造七級浮圖狄氏道你哄得我好而今要在你身上夜夜送了他到我家來便罷慧澄道這個當得當夜散去此後每夜便開小門放滕生進來並無虛夕狄氏心裏愛得緊只怕他心上不喜歡極意奉承滕生也盡力支陪打得火塊也似熱的過得數月其夫歸家了略略蹤迹稀些然但是其夫出去了便叫人請他來會又是年餘其夫覺得有些風聲防間嚴切不能往來狄氏思想不過成病而死本等好好一個婦人卻被尼姑誘壞了身體又送了性命然此還是狄氏自己水性後來有些動情沒正經了故著了手而今還有一個正經的婦人中了尼姑毒計到底不甘與夫同心合計弄得尼姑死無葬身之地果是快心罕聞罕見正合著普門品雲咒咀諸毒藥所欲害身者念彼觀音力還著於本人話説婺州有一個秀才姓賈青年飽學才智過人有妻巫氏姿容絶世素性貞淑兩口兒如魚似水你敬我愛並無半句言語那秀才在大人家處館讀書長是半年不回來巫娘子只在家裏做生活與一個侍兒叫做春花過日那娘子一手好針線繡作曾繡一幅觀音大士繡得莊嚴色相儼然如生他自家十分得意叫秀才拿到褙裱店裏裱著見者無不讚歎裱成畫軸取回來挂在一間潔淨房裏朝夕焚香供養只因一念敬奉觀音那條街上有一個觀音庵庵中有一個趙尼姑時常到他家來走走秀才不在家時便留他在家做伴兩日趙尼姑也有時請他到庵裏坐坐那娘子本分等間也不肯出門一年也到不得庵裏一兩遭一日春間因秀才不在趙尼姑來看他間話了一會起身送他去趙尼道好天氣大娘便同到外邊望望也是合當有事信步同他出到自家門首探頭門外一看只見一個人謊子打扮的在街上擺來被他劈面撞見巫娘子連忙躲了進來掩在門邊趙尼姑卻立定著原來那人認得趙尼姑的説道趙師父我到處尋你不到你卻在此我有話和你商量則個尼姑道我別了這家大娘來和你説便走進與巫娘子作別了這邊巫娘子關著門自進來了且説那叫趙尼姑這個謊子打扮的人姓蔔名良乃是婺州城裏一個極淫蕩不長進的看見人家有些顔色的婦人便思勾搭上場不上手不休亦且淫濫之性不論美惡都要到手所以這些尼姑多有與他往來的有時做他牽頭有時趁著綽趣這趙尼姑有個徒弟法名木空年方二十餘歲盡有姿容那裏算得出家只當老尼養著一個粉頭一般陪人歇宿得人錢財但只是瞞著人做這個卜良就是趙尼姑一個主顧當日趙尼姑別了巫娘子趕上了他問道蔔官人有甚説話蔔良道你方才這家可正是賈秀才家趙尼姑道正是蔔良道久聞他家娘子生得標致適才同你出來掩在門裏的想正是他了趙尼姑道虧你聰明他家也再無第