邊見了父母奔到面前哭拜具述幽冥中苦惱之狀父母正要問他詳細説自家思念他的苦楚只見雲郎忽然變了面孔挺豎雙眉朓住父衣大呼道你陷我性命盜我金帛使我銜冤茹痛四五十年雖曾費耗過好些錢性命卻要還我今日決不饒你説罷便兩相擊搏滾入水中助教慌了喝叫僕從及船上人多跳下水去撈救那太湖邊人都是會水的救得上岸還見將仕指手畫腳揮拳相爭到夜方定助教不知甚麼緣故卻聽得適才的説話分明曉得定然有些蹊蹺的陰事來問將仕將仕蹙著眉頭道昔日壬午年間虜騎破城一個少年子弟相投寄宿所齎囊金甚多吾心貪其所有數月之後乘醉殺死盡取其資自念冤債在身從壯至老心中長懷不安此兒生於壬午定是他冤魂再世今日之報已顯然了自此憂悶不食十餘日而死這個兒子只是兩生一生被害一生討債卻就做了鬼來討命比前少了一番又直捷些再聽小子胡謅一首詩冤魂投托原財耗落得悲傷作利錢兒女死亡何用哭須知作業在生前這兩件事希奇些的説過至於那本身受害即時作鬼取命的就是年初一起説到年晚除夜也説不盡許多小子要説正話不得工夫了説話的為何還有一個正話看官小子先前説這兩個多是一世再世心裏牢牢記得前生以此報了冤仇還不希罕又有一個再世轉來並不知前生甚麼的遇著各別道路的一個人沒些意思定要殺他誰知是前世冤家做定的天理自然果報人多猜不出來報的更為直捷事兒更為奇幻聽小子表白來這本話卻在唐貞元年間有一個河朔李生從少時膂力過人恃氣好俠不拘細行常與這些輕薄少年成群作隊馳馬試劍黑夜裏往來太行山道上不知做些什麼不明不白的事後來家事忽然好了盡改前非折節讀書頗善詩歌有名于時做了好人了纍官河朔後至深州録事參軍李生美風儀善談笑通曉史事又且廉謹明幹甚為深州太守所知重至於擊鞠彈棋博奕諸戲無不曲盡其妙又飲量盡大酒德又好凡是宴會酒席沒有了他一坐多沒興太守喜歡他真是時刻少不得的其時成德軍節度使王武俊自恃曾為朝廷出力與李抱真同破朱滔功勞甚大又兼兵精馬壯強橫無比不顧法度屬下州郡太守個個懼怕他威令心膽俱驚其子士真就受武俊之節官拜副大使少年驕縱倚著父親威勢也是個殺人不眨眼的魔君一日武俊遣他巡行屬郡真個是轟天嚇地掣電奔雷喝水成冰驅山開路川嶽為之震動草木儘是披靡深林虎豹也潛形村舍犬雞都不樂別郡已過將次到深州來太守畏懼武俊正要奉承得士真歡喜好效殷勤預先打聽前邊所經過喜怒行徑詳悉聞得別郡多因陪宴的言語舉動每每觸犯忌諱不善承顔順旨以致不樂太守於是大具牛酒精治肴饌廣備聲樂妻孥手自烹庖太守躬親陳設百樣整齊只等副大使來只見前驅探馬來報副大使頭踏到了但見旌旗蔽日鼓樂喧天開山斧閃爍生光還帶殺人之血流星錘蓓蕾出色猶聞磕腦之腥鐵鏈響琅只等悔氣人沖節過銅鈴聲雜遝更無拚死漢逆前來蹂躪得地上草不生蒿惱得夢中魂也怕士真既到太守郊迎過請在極大的一所公館裏安歇了登時酒筵嗄程禮物擡將進來太守恐怕有人觸犯只是自家一人小心陪侍一應僚吏賓客一個也不召來與席士真見他酒肴豐美禮物隆重又且太守謙恭謹慎再無一個雜客敢輕到面前心中大喜道是經過的各郡再沒有到得這郡齊整謹飭了飲酒至夜士真雖是威嚴卻是年紀未多興趣頗高飲了半日酒止得一個太守在面前唯喏趨承心中雖是喜歡覺得沒些韻味對太守道幸蒙使君雅意相待如此之厚欲盡歡於今夕只是我兩人對酌覺得少些高興再得一兩個人同酌助一助酒興為妙太守道敝郡偏僻實少名流況兼懼副大使之威恐忤尊旨豈敢以他客奉陪宴席士真道飲酒作樂何所妨礙況如此名郡豈無嘉賓願得召來幫我們鼓一鼓興可以盡歡不然酒伴寂寥雖是盛筵也覺吃不暢些太守見他説得在行想道別人鹵莽不濟事難得他恁地喜歡高興不要請個人不湊趣弄出事來只有李參軍風流蘊藉且是謹慎又會言談戲藝酒量又好除非是他方可中意我也放得心下第二個就使不得了想了一回方對士真説道此間實少韻人可以佐副大使酒政止有録事參軍李某飲量頗洪興致亦好且其人善能詼諧談笑廣曉技藝或者可以賜他侍坐以助副大使雅興萬一不知可否未敢自專仰祈尊裁士真道使君所舉必是妙人召他來看太守呼喚從人速請李參軍來看官若是説話的人那時也在深州地方與李參軍一塊兒住著又有個未卜先知之法自然攔腰抱住劈胸揪住勸他不吃得這樣呂太后筵席也罷叫他不要來了只因李生聞召雖是自覺有些精神恍惚卻是副大使的鈞旨本郡太守命令召他同席明明是擡舉他怎敢不來誰知此一去卻似豬羊入屠沽之家一步步來尋死路説話的你差了無非他同去吃杯酒兒是個在行的人難道有甚麼言語衝撞了他闖出禍來不成看官你聽若是衝撞了他惹出禍來這是本等的事何足為奇只為不曾説一句白白地就送了性命所以可笑且待我接上前因便見分曉那時李參軍隨命而來登了堂望著士真就拜拜罷擡起頭來士真一看便勃然大怒既召了來免不得賜他坐了李參軍勉強坐下心中悚懼狀貌益加恭謹士真越看越不快活起來看他揎拳裸袖兩眼睜得銅鈴也似一些笑顔也沒有一句間話也不説卻象個怒氣填胸尋事發作的一般比先前竟似換了一個人了太守慌得無所措手足且又不知所謂只得偷眼來看李參軍但見李參軍面如土色冷汗淋漓身體顫抖的坐不住連手裏拿的杯盤也只是戰幾乎掉下地來太守恨不得身子替了李參軍説著句把話發個甚麼喜歡出來便好爭奈一個似鬼使神差一個似失魂落魄李參軍平日枉自許多風流俏倬談笑科分竟不知撩在爪哇國那裏去了比那泥塑木雕的多得一味抖連滿堂伏侍的人都慌得來沒頭沒腦不敢説一句話只冷眼瞧他兩個光景只見不多幾時士真象個忍耐不住的模樣忽地叫一聲左右那裏左右一夥人暴雷也似答應了一聲喏士真分付把李參軍拿下左右就在席上如鷹拿雁雀揪了下來聽令士真道且收郡獄左右即牽了李參軍衣袂付在獄中來回話了士真冷笑了兩聲仍舊歡喜起來照前發興吃酒他也不説什麼緣故來太守也不敢輕問戰戰兢兢陪他酒散早已天曉了太守只這一出被他驚壞又恐怕因此惹惱了他連自己身子立不勾卻又不見得李參軍觸惱他一些處正是不知一個頭腦叫著左右伏侍的人逐個盤問道你們旁觀仔細曾看出甚麼破綻麼左右道李參軍自不曾開一句口在那裏觸犯了來因是衆人多疑心這個緣故卻又不知李參軍如何便這般驚恐連身子多主張不住只是個顫抖抖的太守道既是這等除非去問李參軍他自家或者曉得甚麼衝撞他處故此先慌了也不見得太守説罷密地叫個心腹的祗候人去到獄中傳太守的説話問李參軍道昨日的事參軍貌甚恭謹且不曾出一句話原沒處觸犯了副大使副大使為何如此發怒又且系參軍在獄參軍自家可曉得甚麼緣故麼李參軍只是哭泣把頭搖了又搖只不肯説甚麼出來祗候人又道是奇怪只得去告訴太守道李參軍不肯説話只一味哭太守一發疑心了道他平日何等一個精細爽利的人今日為何卻失張失智到此地位真是難解只得自己走進獄中來問他他見了太守想著平日知重之恩越哭得悲切起來太守忙問其故李參軍沈吟了半響歎了一口氣才拭眼淚説道多感君侯垂問某有心事今不敢隱曾聞釋家有現世果報向道是惑人的説話今日方知此話不虛了太守道怎見得李參軍道君侯不要驚怪某敢盡情相告某自少貧無以自資衣食因侍有幾分膂力好與俠士劍客往來每每掠奪裏人的財帛以充己用時常馳馬腰弓往還太行道上每日走過百來裏路遇著單身客人便劫了財物歸家一日遇著一個少年手持皮鞭趕著一個駿騾騾背負了兩個大袋某見他沈重隨了他一路走去到一山坳之處左右岩崖萬仞彼時日色將晚前無行人就把他盡力一推推落崖下不知死活因急趕了他這頭駿騾到了下處解開囊來一看內有繒縑百餘匹自此家事得以稍贍自念所行非誼因折弓棄矢閉門讀書再不敢為非遂出仕至此官位從那時算至今歲凡二十七年了昨蒙君侯台旨召侍王公之宴初召時就有些心驚肉顫不知其由自料道決無他事不敢推辭及到席間燈下一見王公之貌正是我向時推在崖下的少年相貌一毫不異一拜之後心中悚惕魂魄俱無曉得冤孽見在面前了自然死在目下只消延頸待刃還有甚別的説話來幸得君侯知我甚深不敢自諱而今再無可逃敢以身後為托不使吾暴露尸骸足矣言畢大哭太守也不覺慘然欲要救解又無門路又想道既是有此冤業恐怕到底難逃似信不信的且看怎麼太守叫人悄地打聽副大使起身了來報再伺候有什麼動靜快來回話太守懷著一肚子鬼胎正不知葫蘆裏賣出甚麼藥來還替李參軍希冀道或者酒醒起來忘記了便好須臾之間報説副大使睡醒了即叫了左右進去不知有何分付太守叫再去探聽只見士真剛起身來便問道昨夜李某今在何處左右道蒙副大使發在郡獄士真便怒道這賊還在快梟他首來左右不敢稽遲來稟太守早已有探事的人飛報過了太守大驚失色歎道雖是他冤業卻是我昨日不合舉薦出來害了他也好生不忍沒計奈何只得任憑左右到獄中斬了李參軍之首正是閻王注定三更死定不留人到四更眼見得李參軍做了一世名流今日死於非命左右取了李參軍這頭來士真跟前獻上取驗士真反復把他的頭看了又看哈哈大笑喝叫拿了去士真梳洗已畢太守進來參見心裏雖有此事恍惚卻裝做不以為意的坦然模樣又請他到自家郡齋赴宴逢迎之禮一發小心了士真大喜比昨日之情更加款洽太守幾番要問他囁嚅數次不敢輕易開口直到見他歡喜頭上太守先起請罪道有句説話斗膽要請教副大使副大使恕某之罪不嫌唐突方敢啓口士真道使君相待甚厚我與使君相與甚歡有話盡情直説不必拘忌太守道某本不才幸得備員叨轄一郡副大使車駕枉臨下察弊政寬不加罪恩同天地了昨日副大使酒間命某召他客助飲某屬郡僻小實無佳賓可以奉歡宴者某愚不揣事私道李某善能飲酒故請命召之不想李某愚戇不習禮法觸忤了副大使實系某之大罪今副大使既已誅了李某李某已伏其罪不必説了但某心愚鄙竊有所未曉敢此上問不知李某罪起於何處願得副大使明白數他的過誤使某心下洞然且用誡將來之人曉得奉上的禮法不致舛錯實為萬幸士真笑道李某也無罪過但吾一見了他便忿然激動吾心就有殺之之意今既殺了心方釋然連吾也不知所以然的緣故使君但放心吃酒罷再不必提起他了宴罷士真歡然致謝而行又到別郡去了來這一番單單只結果得一個李參軍太守得他去了如釋重負背上也輕鬆了好些只可惜無端害了李參軍沒處説得苦太守記著獄中之言密地訪問王士真的年紀恰恰正是二十七歲方知太行山少年被殺之年士真已生於王家了真是冤家路窄今日一命討了一命那心上事只有李參軍知道連討命的做了事也不省得不要説旁看的人那裏得知這些緣故太守嗟歎怪異坐臥不安了幾日因念他平日交契的分上又是舉他陪客致害了他只得自出家財厚葬了李參軍常把此段因果勸人教人不可行不義之事有詩為證冤債原從隔世深相逢便起殺人心改頭換面猶相報何況容顔儼在今卷三十一何道士因術成姦周經歷因姦破賊詩雲天命從來自有真豈容姦術恣紛紜黃巾張角徒生亂大寶何曾到彼人話説唐乾符年間上黨銅縣山村有個樵夫姓侯名元家道貧窮靠著賣柴為業己亥歲在縣西北山中采樵回來歇力在一個穀口旁有一大石巍然象幾間屋大侯元對了大石自言自語道我命中直如此辛苦歎息聲未絶忽見大石砉然豁開如洞中有一老叟羽衣烏帽髯發如霜拄杖而出侯元驚愕急起前拜老叟道吾神君也你為何如此自苦學吾法自能取富可隨我來老叟復走入洞侯元隨他走去走得數十步廓然清朗一路奇花異草修竹喬松又有碧檻朱門重樓復榭老叟引了侯元到別院小亭子坐了兩個童子請他進食食畢復請他到便室具湯沐浴進新衣一襲又命他冠戴了復引至亭上老叟命僮設席於地令侯元跪了老叟授以祕訣數萬言多是變化隱祕之術侯元素性蠢戇到此一聽不忘老叟誡他道你有些小福分該在我至法中進身卻是面有敗氣未除也要謹慎若圖謀不軌禍必喪生今且歸去習法如欲見吾但至心叩石自當有人應門與你相見元因拜謝而去老叟仍命一童送出洞門既出來了不見了洞穴依舊是塊大石連采樵家火多不見了到得家裏父母兄弟多驚喜道去了一年多道是死於虎狼了幸喜得還在其實侯元只在洞中得一日家裏又見服裝華潔神氣飛揚只管盤問他他曉得瞞不得一一説了遂入靜室中把老叟所傳術法盡行習熟不上一月其術已成變化百物役召鬼魅遇著草木土石念念有詞便多是步騎甲兵神通既已廣大傳將出去便自有人來扶從於是收好些鄉里少年勇悍的為將卒出入陳旌旗鳴鼓吹宛然象個小國諸侯自稱曰賢聖設立官爵有三老左右弼左右將軍等號每到初一十五即盛飾往謁神君神君每見必戒道切勿稱兵若必欲舉事須待天應侯元唯唯到庚子歲聚兵已有數千人了縣中恐有妖術生變乃申文到上黨節度使高公處説他行徑高公令潞州郡將以兵討之侯元已知其事即到神君處問事宜神君道吾向已説過但當偃旗息鼓以應之彼見我不與他敵必不亂攻切記不可交戰侯元口雖應著心裏不伏想道出我奇術制之有餘且此是頭一番小敵若不能當抵後有大敵來將若之何且衆人見吾怯弱必不伏我何以立威歸來不用其言戒令黨與勒兵以待是夜潞兵離元所三十裏據險扎營侯元用了術法潞兵望來步騎戈甲蔽滿山澤盡有些膽怯明日潞兵結了方陳前來侯元領了千餘人直突其陳鋭不可當潞兵少卻侯元自恃法術以為無敵且叫拿酒來吃以壯軍威誰知手下之人多是不習戰陳烏合之人毫無紀律侯元一個吃酒大家多亂攛起來潞兵乘亂大隊趕來多四散落荒而走剛剩得侯元一個帶了酒性急念不出咒語被擒住了送至上黨發在潞州府獄重枷枷著團團嚴兵衛守天明看枷中只有燈檯一個已不見了侯元卻連夜遁到銅徑到大石邊見神君謝罪神君大怒罵道庸奴不聽吾言今日雖然幸免到底難逃刑戮非吾徒也拂衣而入洞門已閉上是塊大石侯元悔之無及虔心再叩竟不開了自此侯元心中所曉符咒漸漸遺忘就記得的做來也不十分靈了卻是先前相從這些黨羽不知緣故聚著不散還推他為主自恃其衆是秋率領了人在並州大谷地方劫掠也是數該滅了恰好並州將校偶然領了兵馬經過知道了圍之數重侯元極了施符念咒一毫不靈被斬於陳黨羽遂散不聽神君説話果然沒個收場可見悖叛之事天道所忌若是得了道術輔佐朝廷如張留侯陸信州之類自然建功立業傳名後世若是萌了私意打點起兵謀反不曾見有妖術成功的從來張角徵側徵二孫恩盧循等非不也是天賜的兵書法術畢竟敗亡所以平妖傳上也説道白猿洞天書後邊深戒著謀反一事的話就如侯元若依得神君分付後來必定有好處都是自家弄殺了事體本如此明白不知這些無主意的愚人住此清平世界還要從著白蓮教到處哨聚倡亂死而無怨卻是為何而今説一個得了妖書倡亂被殺的與看官聽一聽有詩為證蚤通武藝殺親夫反獲天書起異圖擾亂青州旋被戮福兮禍伏理難誣話説國朝永樂中山東青州府萊陽縣有個婦人姓唐名賽兒其母少時夢神人捧一金盒盒內有靈藥一顆令母吞之遂有娠生賽兒自幼乖覺伶俐頗識字有姿色常剪紙人馬廝殺為兒戲年長嫁本鎮石麟街王元椿這王元椿弓馬熟嫻武藝精通家道豐裕自從娶了賽兒貪戀女色每日飲酒取樂時時與賽兒説些弓箭刀法賽兒又肯自去演習戲耍光陰撚指不覺賠費五六年家道蕭索衣食不足賽兒一日與丈夫説我們枉自在此忍飢受餓不若將後面梨園賣了買匹好馬幹些本分求財的勾當卻不快活王元椿聽得説道賢妻何不早説今日天晚了不必説明日王元椿早起來寫個出帳央李媒為中賣與本地財主賈包得銀二十餘兩王元椿就去青州鎮上買一匹快走的好馬回來弓箭腰刀自有揀個好日子元椿打扮做馬快手的模樣與賽兒相別説我去便回賽兒説保重保重元椿叫聲慚愧飛身上馬打一鞭那馬一道煙去了來到酸棗林是琅琊後山只有中間一條路若是阻住了不怕飛上天去王元椿只曉得這條路上好打劫人不想著來這條路上走的人只貪近都不是依良本分的人不便道白白的等你拿了財物去也是元椿合當悔氣卻好撞著這一起客人望見褡連頗有些油水元椿自道造化了把馬一拍攢風的一般前後左右都跑過了見沒人王元椿就扯開弓搭上箭颯的一箭射將來那客人夥裏有個叫做孟德看見元椿跑馬時早防備拿起弓梢撥過這箭落在地下