body:
  text: 初刻拍案驚奇第一部明淩濛初著目録序拍案驚奇凡例計五則卷一轉運漢遇巧洞庭紅波斯胡指破鼉龍殼卷二姚滴珠避羞惹羞鄭月娥將錯就錯卷三劉東山誇技順城門十八兄奇蹤村酒肆卷四程元玉店肆代償錢十一娘雲岡縱談俠卷五感神媒張德容遇虎湊吉日裴越客乘龍卷六酒下酒趙尼媼迷花機中機賈秀才報怨卷七唐明皇好道集奇人武惠妃崇禪鬥異法卷八烏將軍一飯必酬陳大郎三人重會卷九宣徽院仕女秋千會清安寺夫婦笑啼緣卷十韓秀才乘亂聘嬌妻吳太守憐才主姻簿卷十一惡船家計賺假尸銀狠僕人誤投真命狀卷十二陶家翁大雨留賓蔣震卿片言得婦卷十三趙六老舐犢喪殘生張知縣誅梟成鐵案卷十四酒謀財於郊肆惡鬼對案楊化借尸卷十五衛朝奉狠心盤貴産陳秀才巧計賺原房卷十六張溜兒熟布迷魂局陸蕙娘立決到頭緣卷十七西山觀設籙度亡魂開封府備棺追活命卷十八丹客半黍九還富翁千金一笑卷十九李公佐巧解夢中言謝小娥智擒船上盜卷二十李克讓竟達空函劉元普雙生貴子卷二十一袁尚寶相術動名卿鄭舍人陰功叨世爵卷二十二錢多處白丁橫帶運退時刺史當艄卷二十三大姊魂遊完宿願小妹病起續前緣卷二十四鹽官邑老魔魅色會骸山大士誅邪卷二十五趙司戶千里遺音蘇小娟一詩正果卷二十六奪風情村婦捐軀假天語幕僚斷獄卷二十七顧阿秀喜舍檀那物崔俊臣巧會芙蓉屏卷二十八金光洞主談舊迹玉虛尊者悟前身卷二十九通閨闥堅心燈火鬧囹圄捷報旗鈴卷三十王大使威行部下李參軍冤報生前卷三十一何道士因術成姦周經歷因姦破賊卷三十二喬兌換鬍子宣淫顯報施臥師入定卷三十三張員外義撫螟蛉子包龍圖智賺合同文卷三十四聞人生野戰翠浮庵靜觀尼晝錦黃沙弄卷三十五訴窮漢暫掌別人錢看財奴刁買冤家主卷三十六東廊僧怠招魔黑衣盜姦生殺卷三十七屈突仲任酷殺衆生鄆州司馬冥全內侄卷三十八占家財狠壻妒侄延親脈孝女藏兒卷三十九喬勢天師禳旱魃秉誠縣令召甘霖卷四十華陰道獨逢異客江陵郡三拆仙書序語有之少所見多所怪今之人但知耳目之外牛鬼蛇神之為奇而不知耳目之內日用起居其為譎詭幻怪非可以常理測者固多也昔華人至異域異域吒以牛糞金隨詰華之異者則曰有蟲蠕蠕而吐為彩繒錦綺衣被天下彼舌嬌而不信乃華人未之或奇也則所謂必向耳目之外索譎詭幻怪以為奇贅矣宋元時有小説家一種多采閭巷新事為宮闈承應談資語多俚近意存勸諷雖非博雅之派要亦小道可觀近世承平日久民佚志淫一二輕薄惡少初學拈筆便思污蔑世界廣托誣造非荒誕不足信則褻穢不忍聞得罪名教種業來生莫此為甚而且紙為之貴無翼飛不脛走有識者為世道憂之以功令厲禁宜其然也獨龍子猶氏所輯喻世等諸言頗存雅道時著良規一破今時陋習而宋元舊種亦被搜括殆盡肆中人見其行世頗捷意餘當別有祕本圖出而衡之不知一二遺者皆其溝中之斷蕪略不足陳已因取古今來雜碎事可新聽睹佐談諧者演而暢之得若干卷其事之真與飾名之實與贋各參半文不足征意殊有屬凡耳目前怪怪奇奇當亦無所不有總以言之者無罪聞之者足以為戒則可謂雲爾已矣若謂此非今小史家所奇則是舍吐絲蠶而問糞金牛吾惡乎從罔象索之即空觀主人題于浮樽拍案驚奇凡例計五則一每回有題舊小説造句皆妙故元人即以之為劇今太和正音譜所載劇名半猶小説句也近來必欲取兩回之不侔者比而偶之遂不免竄削舊題亦是點金成鐵今每回用二句自相對偶仿水滸西遊舊例一是編矢不為風雅罪人故回中非無語涉風情然止存其事之有者蘊藉數語人自了了絶不作肉麻穢口傷風化損元氣此自筆墨雅道當然非迂腐道學態也一小説中詩詞等類謂之蒜酪強半出自新構間有采用舊者取一時切景而及之亦小説家舊例勿嫌剽竊一事類多近人情日用不甚及鬼怪虛誕正以畫犬馬難畫鬼魅易不欲為其易而不足征耳亦有一二涉於神鬼幽冥要是切近可信與一味駕空説謊必無是事者不同一是編主於勸戒故每回之中三致意焉觀者自得之不能一一標出崇禎戊辰初冬即空觀主人識卷一轉運漢遇巧洞庭紅波斯胡指破鼉龍殼詞雲日日深杯酒滿朝朝小圃花開自歌自舞自開懷且喜無拘無礙青史幾番春夢紅塵多少奇才不須計較與安排領取而今見在這首詞乃宋朱希真所作詞寄西江月單道著人生功名富貴總有天數不如圖一個見前快活試看往古來今一部十七史中多少英雄豪傑該富的不得富該貴的不得貴能文的倚馬千言用不著時幾張紙蓋不完醬瓿能武的穿楊百步用不著時幾竿箭煮不熟飯鍋極至那癡呆懵董生來有福分的隨他文字低淺也會發科發甲隨他武藝庸常也會大請大受真所謂時也運也命也俗語有兩句道得好命若窮掘得黃金化作銅命若富拾著白紙變成布總來隻聽掌命司顛之倒之所以吳彥高又有詞雲造化小兒無定據翻來覆去倒橫直豎眼見都如許僧晦庵亦有詞雲誰不願黃金屋誰不願千鍾粟算五行不是這般題目枉使心機間計較兒孫自有兒孫福蘇東坡亦有詞雲蝸角虛名蠅頭微利算來著甚幹忙事皆前定誰弱又誰強這幾位名人説來説去都是一個意思總不如古語雲萬事分已定浮生空自忙説話的依你説來不須能文善武懶惰的也只消天掉下前程不須經商立業敗壞的也只消天掙與家緣卻不把人間向上的心都冷了看官有所不知假如人家出了懶惰的人也就是命中該賤出了敗壞的人也就是命中該窮此是常理卻又自有轉眼貧富出人意外把眼前事分毫算不得準的哩且聽説一人乃宋朝汴京人氏姓金雙名維厚乃是經紀行中人少不得朝晨起早晚夕眠遲睡醒來千思想萬算計揀有便宜的才做後來家事掙得從容了他便思想一個久遠方法手頭用來用去的只是那散碎銀子若是上兩塊頭好銀便存著不動約得百兩便熔成一大錠把一綜紅線結成一縧系在錠腰放在枕邊夜來摩弄一番方才睡下積了一生整整熔成八錠以後也就隨來隨去再積不成百兩他也罷了金老生有四子一日是他七十壽旦四子置酒上壽金老見了四子躋躋蹌蹌心中喜歡便對四子説道我靠皇天覆庇雖則勞碌一生家事盡可度日況我平日留心有熔成八大錠銀子永不動用的在我枕邊見將絨線做對兒結著今將揀個好日子分與爾等每人一對做個鎮家之寶四子喜謝盡歡而散是夜金老帶些酒意點燈上床醉眼模糊望去八個大錠白晃晃排在枕邊摸了幾摸哈哈地笑了一聲睡下去了睡未安穩只聽得床前有人行走腳步響心疑有賊又細聽著恰像欲前不前相讓一般床前燈火微明揭帳一看只見八個大漢身穿白衣腰系紅帶曲躬而前日某等兄弟天數派定宜在君家聽令今蒙我翁過愛擡舉成人不煩役使珍重多年冥數將滿待翁歸天後再覓去向今聞我翁目下將以我等分役諸郎君我等與諸郎君輩原無前緣故此前來告別往某縣某村王姓某者投托後緣未盡還可一面語畢回身便走金老不知何事吃了一驚翻身下床不及穿鞋赤腳趕去遠遠見八人出了房門金老趕得性急絆了房檻撲的跌倒颯然驚醒乃是南柯一夢急起挑燈明亮點照枕邊已不見了八個大錠細思夢中所言句句是實歎了一口氣哽咽了一會道不信我苦積一世卻沒分與兒子每受用倒是別人家的明明説有地方姓名且慢慢跟尋下落則個一夜不睡次早起來與兒子每説知兒子中也有驚駭的也有疑惑的驚駭的道不該是我們手裏東西眼見得作怪疑惑的道老人家歡喜中説話先許了我們回想轉來一時間就不割捨得分散了造此鬼話也不見得金老見兒子們疑信不等急急要驗個實話遂訪至某縣某村果有王姓某者叩門進去只見堂前燈燭熒煌三牲福物正在那裏獻神金老便開口問道宅上有何事如此家人報知請主人出來主人王老見金老揖坐了問其來因金老道老漢有一疑事特造上宅來問消息今見上宅正在此獻神必有所謂敢乞明示王老道老拙偶因寒荊小恙買卜先生道移床即好昨寒荊病中恍惚見八個白衣大漢腰系紅束對寒荊道我等本在金家今在彼緣盡來投身宅上言畢俱鑽入床下寒荊驚出了一身冷汗身體爽快了及至移床灰塵中得銀八大錠多用紅絨系腰不知是那裏來的此皆神天福佑故此買福物酬謝今我丈來問莫非曉得些來歷麼金老跌跌腳道此老漢一生所積因前日也做了一夢就不見了夢中也道出老丈姓名居址的確故得訪尋到此可見天數已定老漢也無怨處但只求取出一看也完了老漢心事王老道容易笑嘻嘻走進去叫安童四人托出四個盤來每盤兩錠多是紅絨系束正是金家之物金老看了眼睜睜無計所奈不覺撲簌簌吊下淚來撫摩一番道老漢直如此命薄消受不得王老雖然叫安童仍舊拿了進去心裏見金老如此老大不忍另取三兩零銀封了送與金老作別金老道自家的東西尚無福何須尊惠再三謙讓必不肯受王老強納在金老袖中金老欲待摸出還了一時摸個不著面兒通紅又被王老央不過只得作揖別了直至家中對兒子們一一把前事説了大家歎息了一回因言王老好處臨行送銀三兩滿袖摸遍並不見有只説路中掉了卻元來金老推遜時王老往袖裏亂塞落在著外面一層袖中袖有斷線處在王老家摸時已在脫線處落出在門檻邊了客去掃門仍舊是王老拾得可見一飲一啄莫非前定不該是他的東西不要説八百兩就是三兩也得不去該是他的東西不要説八百兩就是三兩也推不出原有的倒無了原無的倒有了並不由人計較而今説一個人在實地上行步步不著極貧極苦的卻在渺渺茫茫做夢不到的去處得了一主沒頭沒腦錢財變成巨富從來稀有亙古新聞有詩為證詩曰分內功名匣裏財不關聰慧不關呆果然命是財官格海外猶能送寶來話説國朝成化年間蘇州府長洲縣閶門外有一人姓文名實字若虛生來心思慧巧做著便能學著便會琴棋書畫吹彈歌舞件件粗通幼年間曾有人相他有巨萬之富他亦自恃才能不十分去營求生産坐吃山空將祖上遺下千金家事看看消下來以後曉得家業有限看見別人經商圖利的時常獲利幾倍便也思量做些生意卻又百做百不著一日見人説北京扇子好賣他便合了一個夥計置辦扇子起來上等金面精巧的先將禮物求了名人詩畫免不得是沈石田文衡山祝枝山拓了幾筆便值上兩數銀子中等的自有一樣喬人一隻手學寫了這幾家字畫也就哄得人過將假當真的買了他自家也兀自做得來的下等的無金無字畫將就買幾十錢也有對合利錢是看得見的揀個日子裝了箱兒到了北京豈知北京那年自交夏來日日淋雨不晴並無一毫暑氣發市甚遲交秋早涼雖不見及時幸喜天色卻晴有妝晃子弟要買把蘇做的扇子袖中籠著搖擺來買時開箱一看只叫得苦元來北京曆卻在七八月更加日前雨濕之氣鬥著扇上膠墨之性弄做了個合而言之揭不開了用力揭開東粘一層西缺一片但是有字有畫值價錢者一毫無用止剩下等沒字白扇是不壞的能值幾何將就賣了做盤費回家本錢一空頻年做事大概如此不但自己折本但是搭他作伴連夥計也弄壞了故此人起他一個混名叫做倒運漢不數年把個家事幹圓潔淨了連妻子也不曾娶得終日間靠著些東塗西沫東挨西撞也濟不得甚事但只是嘴頭子謅得來會説會笑朋友家喜歡他有趣遊耍去處少他不得也只好趁口不是做家的況且他是大模大樣過來的幫間行裏又不十分入得隊有憐他的要薦他坐館教學又有誠實人家嫌他是個雜板令高不湊低不就打從幫間的處館的兩項人見了他也就做鬼臉把倒運兩字笑他不在話下一日有幾個走海泛貨的鄰近做頭的無非是張大李二趙甲錢乙一班人共四十餘人合了夥將行他曉得了自家思忖道一身落魄生計皆無便附了他們航海看看海外風光也不枉人生一世況且他們定是不卻我的省得在家憂柴憂米也是快活正計較間恰好張大踱將來元來這個張大名喚張乘運專一做海外生意眼裏認得奇珍異寶又且秉性爽慨肯扶持好人所以鄉里起他一個混名叫張識貨文若虛見了便把此意一一與他説了張大道好好我們在海船裏頭不耐煩寂寞若得兄去在船中説説笑笑有甚難過的日子我們衆兄弟料想多是喜歡的只是一件我們多有貨物將去兄並無所有覺得空了一番往返也可惜了待我們大家計較多少湊些出來助你將就置些東西去也好文若虛便道多謝厚情只怕沒人如兄肯周全小弟張大道且説説看一竟自去了恰遇一個瞽目先生敲著報君知走將來文若虛伸手順袋裏摸了一個錢扯他一卦問問財氣看先生道此卦非凡有百十分財氣不是小可文若虛自想道我只要搭去海外耍耍混過日子罷了那裏是我做得著的生意要甚麼齎助就齎助得來能有多少便直恁地財爻動這先生也是混帳只見張大氣忿忿走來説道説著錢便無緣這些人好笑説道你去無不喜歡説到助銀沒一個則聲今我同兩個好的弟兄拼湊得一兩銀子在此也辦不成甚貨憑你買些果子船裏吃罷口食之類是在我們身上若虛稱謝不盡接了銀子張大先行道快些收拾就要開船了若虛道我沒甚收拾隨後就來手中拿了銀子看了又笑笑了又看道置得甚貨麼信步走去只見滿街上篋籃內盛著賣的紅如噴火巨若懸星皮未皸尚有餘酸霜未降不可多得元殊蘇井諸家樹亦非李氏千頭奴較廣似曰難兄比福亦雲具體乃是太湖中有一洞庭山地暖土肥與閩廣無異所以廣橘福橘播名天下洞庭有一樣橘樹絶與他相似顔色正同香氣亦同止是初出時味略少酸後來熟了卻也甜美比福橘之價十分之一名曰洞庭紅若虛看見了便思想道我一兩銀子買得百斤有餘在船可以解渴又可分送一二答衆人助我之意買成裝上竹簍雇一間的並行李挑了下船衆人都拍手笑道文先生寶貨來也文若虛羞慚無地只得吞聲上船再也不敢提起買橘的事開得船來漸漸出了海口只見銀濤卷雪雪浪翻銀湍轉則日月似驚浪動則星河如覆三五日間隨風漂去也不覺過了多少路程忽至一個地方舟中望去人煙湊聚城郭巍峨曉得是到了甚麼國都了舟人把船撑入藏風避浪的小港內釘了樁橛下了鐵錨纜好了船中人多上岸打一看原來是來過的所在名曰吉零國原來這邊中國貨物拿到那邊一倍就有三倍價換了那邊貨物帶到中國也是如此一往一回卻不便有八九倍利息所以人都拚死走這條路衆人多是做過交易的各有熟識經紀歇家通事人等各自上岸找尋發貨去了只留文若虛在船中看船路徑不熟也無走處正悶坐間猛可想起道我那一簍紅橘自從至船中不曾開看莫不人氣蒸爛了趁著衆人不在看看則個叫那水手在艙板底下翻將起來打開簍看時面上多是好好的放心不下索性搬將出來都擺在踖板上面也是合該發迹時來福湊擺得滿船紅焰焰的遠遠望來就是萬點火光一天星斗岸上走的人都攏將來問道是甚麼好東西呀文若虛只不答應看見中間有個把一點頭的揀了出來掐破就吃岸上看的一發多了驚笑道元來是吃得的就中有個好事的便來問價多少一個文若虛不省得他們説話船上人卻曉得就扯個謊哄他豎起一個指頭説要一錢一顆那問的人揭開長衣露出兜羅錦紅裹肚來一手摸出銀錢一個來道買一個嘗嘗文若虛接了銀錢手中等等看約有兩把重心下想道不知這些銀子要買多少也不見稱稱且先把一個與他看樣揀個大些的紅得可愛的遞一個上去只見那個人接上手濕了一濕道好東西呀撲地就劈開來香氣撲鼻連旁邊聞著的許多人大家喝一聲采那買的不知好歹看見船上吃法也學他去了皮卻不分囊一塊塞在口裏甘水滿咽喉連核都不吐吞下去了哈哈大笑道妙哉妙哉又伸手到裹肚裏摸出十個銀錢來説我要買十個進奉去文若虛喜出望外揀十個與他去了那看的人見那人如此買去了也有買一個的也有買兩個三個的都是一般銀錢買了的都千歡萬喜去了元來彼國以銀為錢上有文采有等龍鳳文的最貴重其次人物又次禽獸又次樹木最下通用的是水草卻都是銀鑄的分兩不異適才買橘的都是一樣水草紋的他道是把下等錢買了好東西去了所以歡喜也只是要小便宜心腸與中國人一樣須臾之間三停裏賣了二停有的不帶錢在身邊的老大懊悔急忙取了錢轉來文若虛已此剩不多了拿一個班道而今要留著自家用不賣了其人情願再增一個錢四個錢買了二顆口中嘵嘵説悔氣來得遲了旁邊人見他增了價就埋怨道我每還要買個如何把價錢增長了他的買的人道你不聽得他方才説兀自不賣了正在議論間只見首先買十個的那一個人騎了一匹青驄馬飛也似奔到船邊下了馬分開人叢對船上大喝道不要零賣不要零賣是有的俺多要買俺家頭目要買去進克汗哩看的人聽見這話便遠遠走開站住了看文若虛是伶俐的人看見來勢已此瞧科在眼裏曉得是個好主顧了連忙把簍裏盡數傾出來止剩五十餘顆數了一數又拿起班來説道適間講過要留著自用不得賣了今肯加些價錢再讓幾顆去罷適間已賣出兩個錢一顆了其人在馬背上拖下一大囊摸出錢來另是一樣樹木紋的説道如此錢一個罷了文若虛道不情願只照前樣罷了那人笑了一笑又把手去摸出一個龍鳳紋的來道這樣的一個如何文若虛又道不情願只要前樣的那人又笑道此錢一個抵百個料也沒得與你只是與你耍你不要俺這一個卻要那等的是個傻子你那東西肯都與俺了俺再加你一個那等的也不打緊文若虛數了一數有五十二顆準準的要了他一百五十六個水草銀錢那人連竹簍都要了又丟了一個錢把簍拴在馬上笑吟吟地一鞭去了看的人見沒得賣了一哄而散文若虛見人散了到艙裏把一個錢稱一稱有八錢七分多重稱過數個都是一般總數一數共有一千個差不多把兩個賞了船家其餘收拾在包裏了笑一聲道那盲子好靈卦也歡喜不盡只等同船人來對他説笑則個説話的你説錯了那國裏銀子這樣不值錢如此做買賣那久慣漂洋的帶去多是綾羅緞匹何不多賣了些銀錢回來一發百倍了看官有所不知那國裏見了綾羅等物都是以貨交兌我這裏人也只是要他貨物才有利錢若是賣他銀錢時他都把龍鳳人物的來交易作了好價錢分兩也只得如此反不便宜如今是買吃口東西他只認做把低錢交易我卻只管分兩所以得利了説話的你又説錯了依你説來那航海的何不只買吃口東西只換他低錢豈不有利反著重本錢置他貨物怎地看官又不是這話也是此人偶然有些橫財帶去著了手若是有心第二遭再帶去三五日不遇巧等得希爛那文若虛運未通時賣扇子就是榜樣扇子還是放得起的尚且如此何況果品是這樣執一論不得的間話休題且説衆人領了經紀主人到船發貨文若虛把上頭事説了一遍衆人都驚喜道造化造化我們同來到是你沒本錢的先得了手也張大便拍手道人都道他倒運而今想是運轉了便對文若虛道你這些銀錢此間置貨作價不多除是轉發在夥伴中回他幾百兩中國貨物上去打換些土産珍奇帶轉去有大利錢也強如虛藏此銀錢在身邊無個用處文若虛道我是倒運的將本求財從無一遭不連本送的今承諸公挈帶做此無本生意偶然僥幸一番真是天大造化了如何還要生利錢妄想甚麼萬一如前再做折了難道再有洞庭紅這樣好賣不成衆人多道我們用得著的是銀子有的是貨物彼此通融大家有利有何不可文若虛道一年吃蛇咬三年怕草索説到貨物我就沒膽氣了只是守了這些銀錢回去罷衆人齊拍手道放著幾倍利錢不取可惜可惜隨同衆人一齊上去到了店家交貨明白彼此兌換約有半月光景文若虛眼中看過了若干好東好西他已自志得意滿不放在心上衆人事體完了一齊上船燒了神福吃了酒開洋行了數日忽然間天變起來但見烏雲蔽日黑浪掀天蛇龍戲舞起長空魚鱉驚惶潛水底艨艟泛泛只如棲不定的數點寒鴉島嶼浮浮便似沒不煞的幾雙水鵜舟中是方揚的米簸舷外是正熟的飯鍋總因風伯太無情以致篙師多失色那船上人見風起了扯起半帆不問東西南北隨風勢漂去隱隱望見一島便帶住篷腳只看著島邊使來看看漸近恰是一個無人的空島但見樹木參天草萊遍地荒涼徑界無非些兔迹狐蹤坦迤土壤料不是龍潭虎窟混茫內未識應歸何國轄開闢來不知曾否有人登船上人把船後拋了鐵錨將樁橛泥犁上岸去釘停當了對艙裏道且安心坐一坐候風勢則個那文若虛身邊有了銀子恨不得插翅飛到家裏巴不得行路卻如此守風呆坐心裏焦燥對衆人道我且上岸去島上望望則個衆人道一個荒島有何好看文若虛道總是間著何礙衆人都被風顛得頭暈個個是呵欠連天不肯同去文若虛便自一個抖擻精神跳上岸來只因此一去有分交千年敗殼精靈顯一介窮神富貴來若是説話的同年生並時長有個未卜先知的法兒便雙腳走不動也拄個拐兒隨他同去一番也不枉的卻説文若虛見衆人不去偏要發個狠扳藤附葛直走到島上絶頂那島也苦不甚高不費甚大力只是荒草蔓延無好路徑到得上邊打一看時四望漫漫身如一葉不覺淒然吊下淚來心裏道想我如此聰明一生命蹇家業消亡剩得隻身直到海外雖然僥幸有得千來個銀錢在囊內知他命裏是我的不是我的今在絶島中間未到實地性命也還是與海龍王合著的哩正在感愴只見望去遠遠草叢中一物突高移步往前一看卻是床大一個敗龜殼大驚道不信天下有如此大龜世上人那裏曾看見説也不信的我自到海外一番不曾置得一件海外物事今我帶了此物去也是一件希罕的東西與人看看省得空口説著道是蘇州人會調謊又且一件鋸將開來一蓋一板各置四足便是兩張床卻不奇怪遂脫下兩隻裹腳接了穿在龜殼中間打個扣兒拖了便走走至船邊船上人見他這等模樣都笑道文先生那裏又跎了纖來文若虛道好教列位得知這就是我海外的貨了衆人擡頭一看卻便似一張無柱有底的硬腳床吃驚道好大龜殼你拖來何干文若虛道也是罕見的帶了他去衆人笑道好貨不置一件要此何用有的道也有用處有甚麼天大的疑心事灼他一卦只沒有這樣大龜藥又有的道醫家要煎龜膏拿去打碎了煎起來也當得幾百個小龜殼文若虛道不要管有用沒用只是希罕又不費本錢便帶了回去當時叫個船上水手一擡擡下艙來初時山下空闊還只如此艙中看來一發大了若不是海船也著不得這樣狼秅東西衆人大家笑了一回説道到家時有人問只説文先生做了偌大的烏龜買賣來了文若虛道不要笑我好歹有一個用處決不是棄物隨他衆人取笑文若虛只是得意取些水來內外洗一洗淨抹幹了卻把自己錢包行李都塞在龜殼裏面兩頭把繩一絆卻當了一個大皮箱了自笑道兀的不眼前就有用起了衆人都笑將起來道好算計好算計文先生到底是個聰明人當夜無詞次日風息了開船一走不數日又到了一個去處卻是福建地方了才住定了船就有一夥慣伺候接海客的小經紀牙人攢將攏來你説張家好我説李家好拉的拉扯的扯嚷個不住船上衆人揀一個一向熟識的跟了去其餘的也就住了衆人到了一個波斯胡人店中坐定裏面主人見説海客到了連忙先發銀子喚廚戶包辦酒席幾十桌分付停當然後踱將出來這主人是個波斯國裏人姓個古怪姓是瑪瑙的瑪字叫名瑪寶哈專一與海客兌換珍寶貨物不知有多少萬數本錢衆人走海過的都是熟主熟客只是文若虛不曾認得擡眼看時元來波斯胡住得在中華久了衣服言動都與中華不大分別只是剃眉剪須深眼高鼻有些古怪出來見了衆人行賓主禮坐定了兩杯茶罷站起身來請到一個大廳上只見酒筵多完備了且是擺得濟楚元來舊規海船一到主人家先折過這一番款待然後發貨講價的主人家手執著一付法浪菊花盤盞拱一拱手道請列位貨單一看好定坐席看官你道這是何意元來波斯胡以利為重只看貨單上有奇珍異寶值得上萬者就送在先席餘者看貨輕重挨次坐去不論年紀不論尊卑一向做下的規矩船上衆人貨物是貴的賤的多的少的你知我知各自心照差不多領了酒杯各自坐了單單剩得文若虛一個呆呆站在那裏主人道這位老客長不曾會面想是新出海外的置貨不多了衆人大家説道這是我們好朋友到海外耍去的身邊有銀子卻不曾肯置貨今日沒奈何只得屈他在末席坐了文若虛滿面羞慚坐了末位主人坐在橫頭飲酒中間這一個説道我有貓兒眼多少那一個説我有祖母緑多少你誇我逞文若虛一發默默無言自心裏也微微有些懊悔道我前日該聽他們勸置些貨物來的是今枉有幾百銀子在囊中説不得一句説話又自歎了口氣道我原是一些本錢沒有的今已大幸不可不知足自思自忖無心發興吃酒衆人猜拳行令吃得狼藉主人是個積年看出文若虛不快活的意思不好説破虛勸了他幾杯酒衆人都起身道酒勾了天晚了趁早上船去明日發貨罷別了主人去了主人撤了酒席收拾睡了明日起個清早先走到海岸船邊來拜這夥客人主人登舟一眼瞅去那艙裏狼狼秅秅這件東西早先看見了吃了一驚道這是那一位客人的寶貨昨日席上並不曾見説起莫不是不要賣的衆人都笑指道此敝友文兄的寶貨中有一人襯道又是滯貨主人看了文若虛一看滿面掙得通紅帶了怒色埋怨衆人道我與諸公相處多年如何恁地作弄我教我得罪於新客把一個末座屈了他是何道理一把扯住文若虛對衆客道且慢發貨容我上岸謝過罪著衆人不知其故有幾個與文若虛相知些的又有幾個喜事的覺得有些古怪共十餘人趕了上來重到店中看是如何只見主人拉了文若虛把交椅整一整不管衆人好歹納他頭一位坐下了道適間得罪得罪且請坐一坐文若虛也心中鑊鐸忖道不信此物是寶貝這等造化不成主人走了進去須臾出來又拱衆人到先前吃酒去處又早擺下幾桌酒為首一桌比先更齊整把盞向文若虛一揖就對衆人道此公正該坐頭一席你每枉自一船的貨也還趕他不來先前失敬失敬衆人看見又好笑又好怪半信不信的一帶兒坐了酒過三杯主人就開口道敢問客長適間此寶可肯賣否文若虛是個乖人趁口答應道只要有好價錢為甚不賣那主人聽得肯賣不覺喜從天降笑逐顔開起身道果然肯賣但憑分付價錢不敢吝惜文若虛其實不知值多少討少了怕不在行討多了怕吃笑忖了一忖面紅耳熱顛倒討不出價錢來張大便與文若虛丟個眼色將手放在椅子背上豎著三個指頭再把第二個指空中一撇道索性討他這些文若虛搖頭豎一指道這些我還討不出口在這裏卻被主人看見道果是多少價錢張大搗一個鬼道依文先生手勢敢像要一萬哩主人呵呵大笑道這是不要賣哄我而已此等寶物豈止此價錢衆人見説大家目睜口呆都立起了身來扯文若虛去商議道造化造化想是值得多哩我們實實不知如何定價文先生不如開個大口憑他還罷文若虛終是礙口識羞待説又止衆人道不要不老氣主人又催道實説説何妨文若虛只得討了五萬兩主人還搖頭道罪過罪過沒有此話扯著張大私問他道老客長們海外往來不是一番了人都叫你張識貨豈有不知此物就裏的必是無心賣他奚落小肆罷了張大道實不瞞你説這個是我的好朋友同了海外玩耍的故此不曾置貨適間此物乃是避風海島偶然得來不是出價置辦的故此不識得價錢若果有這五萬與他勾他富貴一生他也心滿意足了主人道如此説要你做個大大保人當有重謝萬萬不可翻悔遂叫店小二拿出文房四寶來主人家將一張供單綿料紙折了一折拿筆遞與張大道有煩老客長做主寫個合同文書好成交易張大指著同來一人道此位客人褚中穎寫得好把紙筆讓與他褚客磨得墨濃展好紙提起筆來寫道立合同議單張乘運等今有蘇州客人文實海外帶來大龜殼一個投至波斯瑪寶哈店願出銀五萬兩買成議定立契之後一家交貨一家交銀各無翻悔有翻悔者罰契上加一合同為照一樣兩紙後邊寫了年月日下寫張乘運為頭一連把在坐客人十來個寫去褚中穎因自己執筆寫了落末年月前邊空行中間將兩紙湊著寫了騎縫一行兩邊各半乃是合同議約四字下寫客人文實主人瑪寶哈各押了花押單上有名的從後頭寫起寫到張乘運道我們押字錢重些這買賣才弄得成主人笑道不敢輕不敢輕寫畢主人進內先將銀一箱擡出來道我先交明白了用錢還有説話衆人攢將攏來主人開箱卻是五十兩一包共總二十包整整一千兩雙手交與張乘運道憑老客長收明分與衆客罷衆人初然吃酒寫合同大家攛哄鳥亂心下還有些不信的意思如今見他拿出精晃晃白銀來做用錢方知是實文若虛恰像夢裏醉裏話都説不出來呆呆地看張大扯他一把道這用錢如何分散也要文兄主張文若虛方説一句道且完了正事慢處只見主人笑嘻嘻的對文若虛説道有一事要與客長商議價銀現在裏面閣兒上都是向來兌過的一毫不少只消請客長一兩位進去將一包過一過目兌一兌為準其餘多不消兌得卻又一説此銀數不少搬動也不是一時功夫況且文客官是個單身如何好將下船去又要泛海回還有許多不便處文若虛想了一想道見教得極是而今卻待怎樣主人道依著愚見文客官目下回去未得小弟此間有一個緞匹鋪有本三千兩在內其前後大小廳屋樓房共百餘間也是個大所在價值二千兩離此半裏之地愚見就把本店貨物及房屋文契作了五千兩盡行交與文客官就留文客官在此住下了做此生意其銀也做幾遭搬了過去不知不覺日後文客官要回去這裏可以托心腹夥計看守便可輕身往來不然小店交出不難文客官收貯卻難也愚意如此説了一遍説得文若虛與張大跌足道果然是客綱客紀句句有理文若虛道我家裏原無家小況且家業已盡了就帶了許多銀子回去沒處安頓依了此説我就在這裏立起個家緣來有何不可此番造化一緣一會都是上天作成的只索隨緣做去便是貨物房産價錢必有五千總是落得的便對主人説適間所言誠是萬全之算小弟無不從命主人便領文若虛時去閣上看叫張褚二人一同來看看其餘列位不必了請略坐一坐他四人進去衆人不進去的個個伸頭縮頸你三我四説道有此異事有此造化早知這樣懊悔島邊泊船時節也不去走走或者還有寶貝也不見得有的道這是天大的福氣撞將來的如何強得正欣羡間文若虛已同張褚二客出來了衆人都問進去如何了張大道裏邊高閣是個土庫放銀兩的所在都是桶子存著適間進去看了十個大桶每桶四千又五個小匣每個一千共是四萬五千已將文兄的封皮記號封好了只等交了貨就是文兄的了主人出來道房屋文書緞匹帳目俱已在此湊足五萬之數了且到船上取貨去一擁都到海船來文若虛于路對衆人説船上人多切勿明言小弟自有厚報衆人也只怕船上人知道要分了用錢去各各心照文若虛到了船上先向龜殼中把自己包裹被囊取出了手摸一摸殼口裏暗道僥幸僥幸主人便叫店內後生二人來擡此殼分付道好生擡進去不要放在外邊船上人見擡了此殼去便道這個滯貨也脫手了不知賣多少文若虛只不做聲一手提了包裹往岸上就走這起初同上來的幾個又趕到岸上將龜殼從頭至尾細看了一遍又向殼內張了一張撈了一撈面面相覷道好處在那裏主人仍拉了這十來個一同上去到店裏説道而今且同文客官看了房屋鋪面來衆人與主人一同走到一處正是鬧市中間一所好大房子門前正中是個鋪子旁有一弄走進轉個灣是兩扇大石板門門內大天井上面一所大廳廳上有一匾題曰來琛堂堂旁有兩楹側屋屋內三面有櫥櫥內都是綾羅各色緞匹以後內房樓房甚多文若虛暗道得此為住居王侯之家不過如此矣況又有緞鋪營生利息無盡便做了這裏客人罷了還思想家裏做甚就對主人道好卻好只是小弟是個孤身畢竟還要尋幾房使喚的人才住得主人道這個不難都在小店身上文若虛滿心歡喜同衆人走歸本店來主人討茶來吃了説道文客官今晚不消船裏去就在鋪中住下了使喚的人鋪中現有逐漸再討便是衆客人多道交易事已成不必説了只是我們畢竟有些疑心此殼有何好處值價如此還要主人見教一個明白文若虛道正是正是主人笑道諸公枉了海上走了多遭這些也不識得列位豈不聞説龍有九子乎內有一種是鼉龍其皮可以幔鼓聲聞百里所以謂之鼉鼓鼉龍萬歲到底蛻下此殼成龍此殼有二十四肋按天上二十四氣每肋中間節內有大珠一顆若是肋未完全時節成不得龍蛻不得殼也有生捉得他來只好將皮幔鼓其肋中也未有東西直待二十四肋肋肋完全節節珠滿然後蛻了此殼變龍而去故此是天然蛻下氣候俱到肋節俱完的與生擒活捉壽數未滿的不同所以有如此之大這個東西我們肚中雖曉得知他幾時蛻下又在何處地方守得他著殼不值錢其珠皆有夜光乃無價之寶也今天幸遇巧得之無心耳衆人聽罷似信不信只見主人走將進去了一會笑嘻嘻的走出來袖中取出一西洋布的包來説道請諸公看看解開來只見一團綿裹著寸許大一顆夜明珠光彩奪目討個黑漆的盤放在暗處其珠滾一個不定閃閃爍爍約有尺餘亮處衆人看了驚得目睜口呆伸了舌頭收不進來主人回身轉來對衆客逐個致謝道多蒙列位作成了只這一顆拿到咱國中就值方才的價錢了其餘多是尊惠人個個心驚卻是説過的話又不好翻悔得主人見衆人有些變色取了珠子急急走到裏邊又叫擡出一個緞箱來除了文若虛每人送與緞子二端説道煩勞了列位做兩件道袍穿也見小肆中薄意袖中又摸出細珠十數串每送一串道輕鮮輕鮮備歸途一茶罷了文若虛處另是粗些的珠子四串緞子八匹道是權且做幾件衣服文若虛同衆人歡喜作謝了主人就同衆人送了文若虛到緞鋪中叫鋪裏夥計後生們都來相見説道今番是此位主人了主人自別了去道再到小店中去去來只見須臾間數十個腳夫扛了好些扛來把先前文若虛封記的十桶五匣都發來了文若虛搬在一個深密謹慎的臥房裏頭去處出來對衆人道多承列位挈帶有此一套意外富貴感謝不盡走進去把自家包裹內所賣洞庭紅的銀錢倒將出來每人送他十個止有張大與先前出銀助他的兩三個分外又是十個道聊表謝意此時文若虛把這些銀錢看得不在眼裏了衆人卻是快活稱謝不盡文若虛又拿出幾十個來對張大説有煩老兄將此分與船上同行的人每位一個聊當一茶小弟住在此間有了頭緒慢慢到本鄉來此時不得同行就此為別了張大道還有一千兩用錢未曾分得卻是如何須得文兄分開方沒得説文若虛道這倒忘了就與衆人商議將一百兩散與船上衆人餘九百兩照現在人數另外添出兩股派了股數各得一股張大為頭的褚中穎執筆的多分一股衆人千歡萬喜沒有説話內中一人道只是便宜了這回回文先生還該起個風要他些不敷才是文若虛道不要不知足看我一個倒運漢做著便折本的造化到來平空地有此一主財爻可見人生分定不必強求我們若非這主人識貨也只當得廢物罷了還虧他指點曉得如何還好昧心爭論衆人都道文先生説得是存心忠厚所以該有此富貴大家千恩萬謝各各齎了所得東西自到船上發貨從此文若虛做了閩中一個富商就在那裏取了妻小立起家業數年之間才到蘇州走一遭會會舊相識依舊去了至今子孫繁衍家道殷富不絶正是運退黃金失色時來頑鐵生輝莫與癡人説夢思量海外尋龜卷二姚滴珠避羞惹羞鄭月娥將錯就錯詩雲自古人心不同盡道有如其面假饒容貌無差畢竟心腸難變話説人生只有面貌最是不同蓋因各父母所生千支萬派那能勾一模一樣的就是同父合母的兄弟同胞雙生的兒子道是相像得緊畢竟仔細看來自有些少不同去處卻又作怪盡有途路各別毫無干涉的人驀地有人生得一般無二假充得真的從來正書上面説孔子貌似陽虎以致匡人之圍是惡人像了聖人傳奇上邊説周堅死替趙朔以解下宮之難是賤人像了貴人是個解不得的道理按西湖志餘上面宋時有一事也為面貌相像騙一時富貴享用十餘年後來事敗了的卻是靖康年間金人圍困汴梁徽欽二帝蒙塵北狩一時後妃公主被虜去的甚多內中有一公主名曰柔福乃是欽宗之女當時也被虜去後來高宗南渡稱帝改號建炎四年忽有一女子詣闕自陳稱是柔福公主自虜中逃歸特來見駕高宗心疑道許多隨駕去的臣宰尚不能逃公主鞋弓襪小如何脫離得歸來頒詔令舊時宮人看驗個個説道是真的一些不差及問他宮中舊事對答來皆合幾個舊時的人他都叫得姓名出來只是衆人看見一雙足卻大得不像樣都道公主當時何等小足今卻這等止有此不同處以此回復聖旨高宗臨軒親認卻也認得詰問他道你為何恁般一雙腳了女子聽得啼哭起來道這些臊羯奴聚逐便如牛馬一般今乘間脫逃赤腳奔走到此將有萬里豈能尚保得一雙纖足如舊時模樣耶高宗聽得甚是慘然頒詔特加號福國長公主下降高世綮做了駙馬都尉其時汪龍溪草制詞曰彭城方急魯元嘗困於面馳江左既興益壽宜充於禁臠那魯元是漢高帝的公主在彭城失散後來復還的益壽是晉附馬謝混的小名江左中興元帝公主下降的故把來比他兩人甚為切當自後夫榮妻貴恩賚無算其時高宗為母韋賢妃在虜中年年費盡金珠求贖遙尊為顯仁太后和議既成直到紹興十二年自虜中回鑾聽見説道柔福公主進來相見太后大驚道那有此話柔福在虜中受不得苦楚死已多年是我親看見的那得又有一個柔福是何人假出來的發下旨意著法司嚴刑究問法司奉旨提到人犯用起刑來那女子熬不得只得將真情招出道小的每本是汴梁一個女巫靖康之亂有宮中女婢逃出民間見了小的每誤認做了柔福娘娘口中廝喚小的每驚問他便説小的每實與娘娘面貌一般無二因此小的每有了心日逐將宮中舊事問他他日日衍説得心下習熟了故大膽冒名自陳貪享這幾時富貴道是永無對證的了誰知太后回鑾也是小的每福盡災生一死也不枉了問成罪名高宗見了招伏大罵欺君賊婢立時押付市曹處決抄沒家私入官總計前後錫賚之數也有四十七萬緡錢雖然沒結果卻是十餘年間也受用得勾了只為一個容顔廝像一時骨肉舊人都認不出來若非太后復還到底被他瞞過那個再有疑心的就是死在太后未還之先也是他便宜多了天理不容自然敗露今日再説一個容貌廝像弄出好些姦巧希奇的一場官司來正是自古唯傳伯仲偕誰知異地巧安排試看一樣滴珠面惟有人心再不諧話説國朝萬曆年間徽州府休寧縣蓀田鄉姚氏有一女名喚滴珠年方十六生得如花似玉美冠一方父母俱在家道殷富寶惜異常嬌養過度憑媒説合嫁與屯溪潘甲為妻看來世間聽不得的最是媒人的口他要説了窮石崇也無立錐之地他要説了富範丹也有萬頃之財正是富貴隨口定美醜趁心生再無一句實話的那屯溪潘氏雖是個舊姓人家卻是個破落戶家道艱難外靠男子出外營生內要女人親操井臼吃不得間飯過日的了這個潘甲雖是人物也有幾分像樣已自棄儒為商況且公婆甚是狠戾動不動出口罵詈毫沒些好歹滴珠父母誤聽媒人之言道他是好人家把一塊心頭的肉嫁了過來少年夫妻卻也過的恩愛只是看了許多光景心下好生不然如常偷掩淚眼潘甲曉得意思把些好話偎他過日子卻早成親兩月潘父就發作兒子道如此你貪我愛夫妻相對白白過世不成如何不想去做生意潘甲無奈與妻滴珠説了兩人哭一個不住説了一夜話次日潘父就逼兒子出外去了滴珠獨自一個越發悽惶有情無緒況且是個嬌養的女兒新來的媳婦摸頭路不著沒個是處終日悶悶過了潘父潘母看見媳婦這般模樣時常急聒罵道這婆娘想甚情人害相思病了滴珠生來在父母身邊如珠似玉何曾聽得這般聲氣不敢回言只得忍著氣背地哽哽咽咽哭了一會罷了一日因滴珠起得遲了些個公婆朝飯要緊猝地簽應不疊潘公開口罵道這樣好吃懶做的淫婦睡到這等日高才起來看這自由自在模樣除非去做娼妓倚門賣俏攛哄子弟方得這樣快活像意若要做人家是這等不得滴珠聽了便道我是好人家兒女便做道有些不是直得如此作賤説我大哭一場沒分訴處到得夜裏睡不著越思量越惱著老無知這樣説話須是公道上去不得我忍耐不過且跑回家去告訴爹娘明明與他執論看這話是該説的不該説的亦且借此為名賴在家多住幾時也省了好些氣惱算計定了侵晨未及梳洗將一個羅帕兜頭扎了一口氣跑到渡口來説話的若是同時生並年長曉得他這去不尷尬攔腰抱住劈胸扯回也不見得後邊若干事件來只因此去天氣卻早雖是已有行動的了人蹤尚稀渡口悄然這地方有一個專一做不好事的光棍名喚汪錫綽號雪裏蛆是個凍餓不怕的意思也是滴珠合當悔氣撞著他獨自個溪中乘了竹筏來到渡口望見了個花朵般後生婦人獨立岸邊又見頭不梳裹滿面淚痕曉得有些古怪在筏上問道娘子要渡溪麼滴珠道正要過去汪錫道這等上我筏來一口叫放仔細些一手去接他下來上得筏一篙撑開撑到一個僻靜去處問道娘子你是何等人家獨自一個要到那裏去滴珠道我自要到蓀田娘家去你只送我到溪口上岸我自認得路管我別事做甚汪錫道我看娘子頭不梳面不洗淚眼汪汪獨身自走必有蹺蹊作怪的事説得明白才好渡你滴珠在個水中央了又且心裏急要回去只得把丈夫不在家了如何受氣的上項事一頭説一頭哭告訴了一遍汪錫聽了便心下一想轉身道這等説卻渡你去不得你起得沒好意了放你上岸你或是逃去或是尋死或是被別人拐了去後來查出是我渡你的我卻替你吃沒頭官司滴珠道胡説我自是娘家去如何是逃去若我尋死路何不投水卻過了渡去自盡不成我又認得娘家路沒得怕人拐我汪錫道卻是信你不過既要娘家去我捨下甚近你且上去這家中坐了等我走去對你家説了叫人來接你去卻不兩邊放心得下滴珠道如此也好正是女流之輩無大見識亦且一時無奈拗他不過還只道好心隨了他來上得岸時轉灣抹角到了一個去處引進幾重門戶裏頭房室甚是幽靜清雅但見明窗靜幾錦帳文茵庭前有數種盆花坐內有幾張素椅壁間紙畫周之冕桌上砂壺時大彬窄小蝸居雖非富貴王侯宅清間螺徑也異尋常百姓家原來這個所在是這汪錫一個囤子專一設法良家婦女到此認作親戚拐那一等浮浪子弟好撲花行徑的引他到此勾搭上了或是片時取樂或是迷了的便做個外宅居住賺他銀子無數若是這婦女無根蒂的他等有販水客人到肯出一主大錢就賣了去為娼已非一日今見滴珠行徑就起了個不良之心騙他到此那滴珠是個好人家兒女心裏盡愛清間只因公婆凶悍不要説日逐做燒火煮飯熬鍋打水的事只是油鹽醬醋他也拌得頭疼了見了這個乾淨精致所在不知一個好歹心下到有幾分喜歡那汪錫見他無有慌意反添喜狀偶覺動火走到跟前雙膝跪下求歡滴珠就變了臉起來這如何使得我是好人家兒女你原説留我到此坐著報我家中青天白日怎地拐人來家要行局騙若逼得我緊我如今真要自盡了説罷看見桌上有點燈鐵簽捉起來望喉間就刺汪錫慌了手腳道再從容説話小人不敢了元來汪錫只是拐人騙財利心為重色上也不十分要緊恐怕真個做出事來沒了一場好買賣吃這一驚把那一點勃勃的春興丟在爪哇國去了他走到後頭去好些時叫出一個老婆子來道王嬤嬤你陪這裏娘子坐坐我到他家去報一聲就來滴珠叫他轉來説明了地方及父母名姓叮囑道千萬早些叫來我自有重謝汪錫去了那老嬤嬤去掇盆臉水拿些梳頭家火出來叫滴珠梳洗立在旁邊呆看插口問道娘子何家宅眷因何到此滴珠把上項事是長是短説了一遍那婆子就故意跌跌腳道這樣老殺才不識人有這樣好標致娘子做了媳婦折殺了你不羞還捨得出毒口罵他也是個沒人氣的如何與他一日相處滴珠説著心事眼中滴淚婆子便問道今欲何往滴珠道今要到家裏告訴爹娘一番就在家裏權避幾時待丈夫回家再處婆子就道官人幾時回家滴珠又垂淚道做親兩月就罵著逼出去了知他幾時回來沒個定期婆子道好沒天理花枝般一個娘子叫他獨守又要罵他娘子你莫怪我説你而今就回得幾時少不得要到公婆家去的你難道躲得在娘家一世不成這醃硂煩惱是日長歲久的如何是了滴珠道命該如此也沒奈何了婆子道依老身愚見只教娘子快活享福終身受用滴珠道有何高見婆子道老身往來的是富家大戶公子王孫有的是斯文俊俏少年子弟娘子你不消問得的只是看得中意的揀上一個等我對他説成了他把你像珍玉一般看待十分愛惜吃自在食著自在衣纖手不動呼奴使婢也不枉了這一個花枝模樣強如守空房做粗作淘間氣萬萬倍了那滴珠是受苦不過的人況且小小年紀婦人水性又想了夫家許多不好處聽了這一片話心裏動了便道使不得有人知道了怎好婆子道這個所在外人不敢上門神不知鬼不覺是個極密的所在你住兩日起來天上也不要去了滴珠道適間已叫那撑筏的報家裏去了婆子道那是我的幹兒恁地不曉事去報這個冷信正説之間只見一個人在外走進來一手揪住王婆道好好青天白日要哄人養漢我出首去滴珠吃了一驚仔細看來卻就是撑筏的那一個汪錫滴珠見了道曾到我家