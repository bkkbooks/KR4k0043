前後的話一一告訴出來虞縣令歎以為奇留俸錢助寫而去各處把此話傳示於人故此人多知道後來仲任得善果而終所謂放下屠刀立地成佛者也偈曰物命在世間微分此靈蠢一切有知覺皆已具佛性取彼痛苦身供我口食用我飽已覺膻彼死痛猶在一點嗔恨心豈能盡消滅所以六道中轉轉相殘殺願葆此慈心觸處可施用起意便多刑減味即省命無過轉念間生死已各判及到償業時還恨種福少何不當生日隨意作方便度他即自度應作如是觀卷三十八占家財狠壻妒侄延親脈孝女藏兒詩曰子息從來天數原非人力能為最是無中生有堪令耳目新奇話説元朝時都下有個李總管官居三品家業巨富年過五十不曾有子聞得樞密院東有個算命的開個鋪面談人禍福無不奇中總管試往一算于時衣冠滿座多在那裏候他挨次推講總管對他道我之祿壽已不必言最要緊的只看我有子無子算命的推了一回笑道公已有子了如何哄我總管道我實不曾有子所以求算豈有哄汝之理算命的把手掐了一掐道公年四十即已有子今年五十六了尚説無子豈非哄我一個爭道實不曾有一個爭道決已有過遞相爭執同座的人多驚訝起來道這怎麼説算命的道在下不會差待此公自去想只見總管沈吟了好一會拍手道是了是了我年四十時一婢有娠我以職事赴上都到得歸家我妻已把來賣了今不知他去向若説四十上該有子除非這個緣故算命的道我説不差公命不孤此子仍當歸公總管把錢相謝了作別而出只見適間同在座上問命的一個千戶也姓李邀總管入茶坊坐下説道適間聞公與算命的所説之話小子有一件疑心敢問個明白總管道有何見教千戶道小可是南陽人十五年前也不曾有子因到都下買得一婢卻已先有孕的帶得到家吾妻適也有孕前後一兩月間各生一男今皆十五六歲了適間聽公所言莫非是公的令嗣麼總管就把婢子容貌年齒之類兩相質問無一不合因而兩邊各通了姓名住址大家説個容拜各散去了總管歸來對妻説知其事妻當日悍妒做了這事而今見夫無嗣也有些慚悔哀憐巴不得是真次日邀千戶到家敘了同姓認為宗譜盛設款待約定日期到他家裏去認看千戶先歸南陽總管給假前往帶了許多東西去饋送著千戶並他妻子仆妾多有禮物坐定了千戶道小可歸家問明此婢果是宅上出來的因命二子出拜只見兩個十五六的小官人一齊走出來一樣打扮氣度也差不多總管看了不知那一個是他兒子請問千戶求説明白千戶笑道公自認看何必我説總管仔細相了一回天性感通自然識認前抱著一個道此吾子也千戶點頭笑道果然不差於是父子相持而哭旁觀之人無不墮淚千戶設宴與總管賀喜大醉而散次日總管答席就借設在千戶廳上酒間千戶對總管道小可既還公令郎了豈可使令郎母子分離並令其母奉公同還何如總管喜出望外稱謝不已就攜了母子同回都下後來通籍承蔭官也至三品與千戶家往來不絶可見人有子無子多是命裏做定的李總管自己已通道無兒了豈知被算命的看出有子到底得以團圓可知是逃那命裏不過小子為何説此一段話只因一個富翁也犯著無兒的病症豈知也系有兒被人藏過後來一旦識認喜出非常關著許多骨肉親疏的關目在裏頭聽小子從容表白出來正是越親越熱不親不熱附葛攀藤總非枝葉奠酒澆漿終須骨血如何妒婦忍將嗣絶必是前生非常冤業話説婦人心性最是妒忌情願看丈夫無子絶後説著買妾置婢抵死也不肯的就有個把被人勸化勉強依從到底心中只是有些嫌忌不甘伏的就是生下了兒子是親丈夫一點骨血又本等他做大娘還道是隔重肚皮隔重山不肯便認做親兒一般更有一等狠毒的偏要算計了絶得方快活的及至女兒嫁得個女壻分明是個異性無關宗支的他偏要認做嫡親是件偏心為他倒勝如丈夫親子侄豈知女生外向雖系吾所生到底是別家的人至於女壻當時就有二心轉得背便另搭架子了自然親一支熱一支女壻不如侄兒侄兒又不如兒子縱是前妻晚後偏生庶養歸根結果嫡親瓜葛終久是一派好似別人多哩不知這些婦人們為何再不明白這個道理話説元朝東平府有個富人姓劉名從善年六十歲人皆以員外呼之媽媽李氏年五十八歲他有潑天也似家私不曾生得兒子止有一個女兒小名叫做引姐入贅一個女壻姓張叫張郎其時張郎有三十歲引姐二十七歲了那個張郎極是貪小好利刻剝之人只因劉員外家富無子他起心央媒入舍為壻便道這家私久後多是他的了好不誇張得意卻是劉員外自掌把定家私在手沒有得放寬與他元來劉員外另有一個肚腸一來他有個兄弟劉從道同妻寧氏亡逝已過遺下一個侄兒小名叫做引孫年二十五歲讀書知事只是自小父母雙亡家私蕩敗靠著伯父度日劉員外道是自家骨肉另眼覷他怎當得李氏媽媽一心只護著女兒女壻又且念他母親存日妯娌不和到底結怨在他身上見了一似眼中之釘虧得劉員外暗地保全卻是畢竟礙著媽媽女壻不能十分周濟他心中長懷不忍二來員外有個丫頭叫做小梅媽媽見他精細叫他近身伏侍員外就收拾來做了偏房已有了身孕指望生出兒子來有此兩件心事員外心中不肯輕易把家私與了女壻怎當得張郎憊賴專一使心用搬是造非挑撥得丈母與引孫舅子日逐吵鬧引孫當不起激聒劉員外也怕淘氣私下周給些錢鈔叫引孫自尋個住處做營生去引孫是個讀書之人雖是尋得間破房子住下不曉得別做生理只靠伯父把得這些東西且逐漸用去度日眼見得一個是張郎趕去了張郎心裏懷著鬼胎只怕小梅生下兒女來若生個小姨也還只分得一半若生個小舅這家私