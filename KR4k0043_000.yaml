是何等之人小尼敢怠慢他小庵雖則貧寒靠著施主們看覷身衣口食不致淡泊媽媽不必挂心媽媽道恁地待選個日子送到庵便了媽媽一頭看曆日一頭不覺簌簌的掉淚尼姑又勸慰了一番媽媽揀定日子留尼姑在家住了兩日雇只船叫女兒隨了尼姑出家母子兩個抱頭大哭一番女兒拜別了母親同尼姑來到庵裏與衆尼相見了拜了師父擇日與他剃發取法名叫做靜觀自此楊家女兒便在翠浮庵做了尼姑這多是楊媽媽沒主意有詩為證弱質雖然為病磨無常何必便來拖等間送上空門路卻使他年自擇窩你道尼姑為甚攛掇楊媽媽叫女兒出家元來他日常要做些不公不法的事全要那幾個後生標致徒弟做個牽頭引得人動他見楊家女兒十分顔色又且媽媽只要保扶他長成有甚事不依了他所以他將機就計以推命做個入話唆他把女兒送入空門收他做了徒弟那時楊家女兒十二歲上情竇未開卻也不以為意若是再大幾年的也抵死不從了自做了尼姑之後每常或同了師父或自己一身到家來看母親一年也往來幾次媽媽本是愛惜女兒的在身邊時節身子略略有些不爽利一分便認做十分所以動不動憂愁思慮離了身伴便有些小病卻不在眼前倒省了許多煩惱又且常見女兒到家身子健旺女兒怕娘記挂口裏只説舊病一些不發為此那媽媽一發通道該是出家的人也倒不十分懸念了話分兩頭卻説湖州黃沙弄裏有一個秀才復姓聞人單名一個嘉字乃是祖貫紹興因公公在烏程處館超籍過來的面似潘安才同子建年十七歲堂上有四十歲的母親家貧未有妻室為他少年英俊又且氣質間雅風流瀟灑十分在行朋友中沒一個不愛他敬他的所以時常有人齎助他至於邀遊宴飲一發罷他不得但是朋友們相聚多以聞人生不在為歉一日正是正月中旬天氣梅花盛發一個後生朋友喚了一隻遊船拉了聞人生往杭州耍子就便往西溪看梅花聞人生稟過了母親同去一日夜到了杭州那朋友道我們且先往西溪看了梅花明日進去便叫船家把船撑往西溪不上個把時辰到了泊船在岸聞人生與那朋友步行上岸叫僕人們挑了酒盒相挈而行約有半裏多路只見一個松林多是合抱不交的樹林中隱隱一座庵觀周圍一帶粉牆包裹向陽兩扇八字牆門門前一道溪水甚是僻靜兩人走到庵門前間看那庵門掩著裏面卻象有人窺覷那朋友道好個清幽庵院我們扣門進去討杯茶吃了去何如聞人生道還是趁早去看梅花要緊轉來進去不遲那朋友道有理有理拽開腳步便去頃刻間走到兩人看梅花時但見爛銀一片碎玉千重幽馥襲和風賈午異香還較遜素光映麗日西子靚妝應不如綽約幹龍傲冰霜參差影偏宜風月騷人題詠安能盡韻客杯盤何日休兩人看了間玩了一回便叫將酒盒來開懷暢飲天色看看晚來酒已將盡兩人吃個半酣取路回舟中來那時天色昏黑只要走路也不及進庵中觀看急急下船過了一夜次早松木場上岸不題且説那個庵正是翠浮庵便是楊家女兒出家之處哪時靜觀已是十六歲了更長得儀容絶世且是性格幽間日常有這些俗客往來也有注目看他的也有言三語四挑撥他的衆尼便嘻笑趨陪殷勤款送他只淡淡相看分毫不放在心上間常見衆尼每幹此勾當只做不知閉門靜坐看些古書寫些詩句再不輕易出來走動也是機緣湊泊適才聞人生庵前間看時恰好靜觀偶然出來間步在門縫裏窺看只見那聞人生逸致翩翩有出塵之態靜觀注目而視看得仔細見聞人生去遠了恨不得趕上去飽看一回無聊無賴的只得進房心下想道世間有這般美少年莫非天仙下降人生一世但得恁地一個便把終身許他豈不是一對好姻緣奈我已墮入此中這事休題了歎口氣噙著眼淚正是啞子漫嘗黃柏味難將苦口向人言看官聽説但凡出家人必須四大俱空自己發得念盡死心塌地做個佛門弟子早夜修持凡心一點不動卻才算得有功行若如今世上小時憑著父母蠻做動不動許在空門那曉得起頭易到底難到得大來得知了這些情欲滋味就是強制得來原非他本心所願為此就有那不守分的污穢了禪堂佛殿正叫做作福不如避罪奉勸世人再休把自己兒女送上這條路來間話休題卻説聞人生自杭州歸來荏苒間又過了四個多月那年正是大比之年聞人生已從道間取得頭名此時正是六月天氣卻不甚熱打點束裝上杭他有個姑娘在杭州關內黃主事家做孤孀要去他莊上尋間清涼房舍靜坐幾時看了出行的日子已得朋友們資助了些盤纏安頓了母親雇了只航船帶了家僮阿四攜了書囊前往才出東門正行之際岸上一個小和尚説著湖州話叫道船是上杭州去的麼船家道正是送一位科舉相公上去的和尚道如此可帶小僧一帶舟金依例奉上船家道師父杭州去做甚麼和尚道我出家在靈隱寺今到俗家探親卻要回去船家道要問艙裏相公我們不敢自主只見那阿四便鑽出船頭上來嚷道這不識時務小禿驢我家官人正去鄉試要討采頭撞將你這一件禿光光不利市的物事來去便去不去時我把水兜豁上一頓水替你洗潔淨了那個亂代頭你道怎是叫做亂代頭昔人有嘲誚和尚説話道此非治世之頭乃亂代之頭也蓋為亂卵二字音相近阿四見家主與朋友們戲謔曾説過故此學得這句話罵那和尚和尚道載不載問一聲也不衝撞了甚麼何消得如此嚷聞人生在艙裏聽見推窗看那和尚且是生得清秀嬌嫩甚覺可愛又見説是靈隱寺的和尚便想道靈隱寺去處山水最勝我便帶了這和尚去與他做個相知往來到那裏做下處也好慌忙出來喝住道小廝不要無理鄉里間的師父既要上杭時便下船來做伴同去何妨也是緣分該如此船家得了此話便把船攏岸那和尚一見了聞人生吃了一驚一頭下船一頭瞅著聞人生只顧看聞人生想道我眼裏也從不見這般一個美麗長老容色絶似女人若使是女身豈非天姿國色可惜是個和尚了和他施禮罷進艙裏坐定卻值風順拽起片帆船去如飛兩個在艙中各問姓名了畢知是同鄉只説著一樣的鄉語一發投機聞人生見那和尚談吐雅致想道不是個庸僧只見他一雙媚眼不住的把聞人生上下只顧看天氣暴暑聞人生請他寬了上身單衣和尚道小僧生性不十分畏暑相公請自便看看天晚吃了些夜飯聞人生便讓和尚洗澡和尚只推是不消聞人生洗了澡已自困倦倒頭只尋睡了阿四也往梢上去自睡那和尚見人睡靜方滅了火解衣與聞人生同睡卻自翻來復去睡不安穩只自歎氣見聞人生已睡熟悄悄坐起來伸只手把他身上摸著不想正摸著他一件蹺尖尖硬篤篤的東西捏了一把那時聞人生正醒來伸了腰那和尚流水放手輕輕的睡了倒去聞人生卻已知覺想道這和尚倒來惹騷恁般一個標致的想是師父也不饒他倒是慣家了我便與他來男風一度也使得如何肉在口邊不吃聞人生正是少年高興的時節便爬將過來與和尚做了一頭伸將手去摸時和尚做一團兒睡著只不做聲聞人生又摸去只見軟團團兩隻奶兒聞人生想道這小長老又不肥胖如何有恁般一對好奶再去摸他後庭時那和尚卻象驚怕的流水翻轉身來仰臥著聞人生卻待從前面抄將過去才下手卻摸著前面高聳聳似饅頭般一團肉卻無陽物聞人生倒吃了一驚道這是怎麼説問他道你實説是甚麼人和尚道相公不要則聲我身實是女尼因怕路上不便假稱男僧聞人生道這等一發有緣放你不過了不問事由跳上身去那女尼道相公可憐小尼還是個女身不曾破肉的從容些則個聞人生此時欲火正高那裏還管挨開兩股徑將陽物直搗無奈那尼姑含花未慣風和雨怎當聞人生興發忙施雨與風遷延再四方沒其身那女尼只得蹙眉齧齒忍耐霎時雲收雨散聞人生道小生無故得遇仙姑知是睡裏夢裏須道住止詳細好圖後會女尼便道小尼非是別處人氏就是湖州東門外楊家之女為母親所誤將我送入空門今在西溪翠浮庵出家法名靜觀那裏庵中也有來往的都是些俗子村夫沒一個看得上眼今年正月間正在門首間步看見相公在門首站立儀錶非常便覺神思不定相慕已久不想今日不期而會得諧魚水正合夙願所以不敢推拒非小尼之淫賤也願相公勿認做萍水相逢須為我圖個終身便好聞人生道尊翁尊堂還在否靜觀道父親楊某亡故已久家中還有母親與兄弟昨日看母親來不想遇著相公相公曾娶妻未聞人生道小生也未有室今幸遇仙姑年貌相當正堪作配況是同郡儒門之女豈可埋沒於此須商量個長久見識出來靜觀道我身已托於君必無二心但今日事體匆忙一時未有良計小庵離城不遠且是僻靜清涼相公可到我庵中作寓早晚可以攻書自有道者在外打齋不煩薪水之費亦且可以相聚日後相個機會再作區處相公意下何如聞人生道如此甚好只恐同伴不容靜觀道庵中止有一個師父是四十以內的人色上且是要緊兩個同伴多不上二十來年紀他們多不是清白之人平日與人來往盡在我眼裏那有及得你這樣儀錶若見了你定然相愛你便結識了他們以便就中取事只怕你不肯留那有不留你之事聞人生聽罷歡喜無限道仙姑高見極明既恁地來早到松木場連我家小廝打發他隨船回去小生與仙姑同往便了説了一回兩人摟抱有興再講那歡娛起來正是平生未解到花關倏到花關骨盡寒此際不知真與夢幾回暗裏抱頭看事畢只聽得晨雞亂唱靜觀恐怕被人知覺連忙披衣起身船家忙起來就行船阿四也起來伏侍梳洗吃早飯罷趕早過了關阿四問道那裏歇船好到黃家去問下處聞人生道不消得下處了這小師父寺中有空房我們竟到松木場上岸罷船到松木場只説要到靈隱寺雇了一個腳夫將行李一擔挑了聞人生分付阿四道你可隨船回去對安人説聲不消記念我只在這師父寺裏看書場畢我自回來也不須教人來討信得打發了看他開了船聞人生才與靜觀雇了兩乘轎擡到翠浮庵去另與腳夫説過叫他跟來霎時到了還了轎錢腳錢靜觀引了聞人生進庵道這位相公要在此做下處過科舉的衆尼看見笑臉相迎把聞人生看了又看愈加歡愛殷殷勤勤的陪過了茶收拾一間潔淨房子安頓了行李吃過夜飯洗了浴少不得先是庵主起手快樂一宵此後這兩個你爭我奪輪番伴宿靜觀恬然不來兜攬讓他們歡暢衆尼無不感激靜觀混了月余聞人生也自支援不過他們又將人參湯香薷飲蓮心圓眼之類調漿聞人生無所不至聞人生倒好受用不覺已是穿針過期又值七月半盂蘭盆大齋時節杭州年例人家做功果點放河燈那日還是七月十二日有一大戶人家差人來庵裏請師父們念經做功果庵主應承了衆尼進來商議道我們大衆去做道場十三至十五有三日停留聞官人在此須留一個相陪便好只是忒便宜了他只見兩尼你也要住我也要住靜觀只不做聲庵主道人家去做功果我自然推不得不消説聞官人原是靜觀引來的你兩個討他便宜多了今日只該著靜觀在此相陪也是公道衆人道師父處得有理靜觀暗地歡喜衆尼自去收拾法器經箱連老道者多往那家去了靜觀送了出門進來對聞人生道此非久戀之所怎生作個計較便好今試期日近若但迷戀於此不惟攀桂無分亦且身軀難保聞人生道我豈不知只為難舍著你故此強與衆歡非吾願也靜觀道前日初會你時非不欲即從你作脫身之計因為我在家中來中途不見了庵主必到我家裏要人所以不便今既在此多時了我乘此無人在庵與你逃去他們多是與你有染的心頭病怕露出來料不好追得你聞人生道不如此説我是個秀才家家中況有老母若同你逃至我家不但老母驚異未必相容亦且你庵中追尋得著驚動官府我前程也難保何況你身子不知作何著落此事行不得我意欲待赴試之後如得一第娶你不難靜觀道就是中了個舉人也沒有就娶個尼姑的理況且萬一不中又卻如何亦非長算我自出家來與人寫經寫疏得人襯兒積有百來金我撇了這裏將了這些東西做盤纏尋一個寄迹所在等待你名成了再從容家去可不好聞人生想一想道此言有理我有姑娘嫁在這裏關內黃鄉宦家今已守寡極是奉佛家裏莊上造得有小庵晨昏不斷香火那庵中管燒香點燭的老道姑就是我的乳母我如今不免把你此情告知姑娘領你去放在他家家庵中托我奶娘相伴著你他是衙院人家誰敢來盤問你好一面留頭長髮待我得意之後以禮成婚豈不妙哉倘若不中也等那時發長便到處無礙了靜觀道這個卻好事不宜遲作急就去若三日之後便做不成了當下聞人生就奔至姑娘家去見了姑娘姑娘道罷寒溫問道我久在此望你該科舉了如何今日才來有下處也未曾聞人生道好叫姑娘得知小侄因為尋下處做出一件事頭來特求姑娘周全則個姑娘道何事聞人生造個謊道小侄那裏有一個業師楊某亡故多時他只有一女幼年間就與小侄相認後來被個尼姑拐了去不知所向今小侄貪靜尋下處在這裏西溪地方卻在翠浮庵裏撞著了他且是生得人物十全了他心不願出家情願跟著小侄去也是前世姻緣又是故人之女推卻不得但小侄在此科舉怕惹出事來若帶他家去又是個光頭不便欲待當官告理場前沒間工夫亦且沒有間使用我想姑娘此處有個家庵是小侄奶子在裏頭管香火小侄意欲送他來到姑娘庵裏頭暫住就是萬一他那裏曉得了不過在女眷人家香火庵裏不為大害若是到底無人跟尋小侄待鄉試已畢意欲與他完成這段姻緣望姑娘作成則個姑娘笑道你尋著了個陳妙常也來求我姑娘了既是你師長之女怪你不得你既有意要成就也不好叫他在庵裏住你與他多是少年心性若要往來恐怕玷汙了我佛地我莊中自有靜室我收拾與他住下叫他長起發來我自叫丫鬟伏侍你亦可以長來相處若是晚來無人叫你奶子伴宿此為兩便聞人生道若得如此姑娘再造之恩小侄就去領他來拜見姑娘了別了出門就在門外叫了一乘轎竟到翠浮庵裏進庵與靜觀説了適才姑娘的話靜觀大喜連忙收拾將自己所有盡皆檢了出來聞人生道我只把你藏過了等他們來家我不妨仍舊再來走走使他們不疑心著我我的行李且未要帶去靜觀道敢是你與他們業根未斷麼聞人生道我專心為你豈復有他戀只要做得沒個痕迹如金蟬脫殼方妙若他坐定道是我無得可疑了正是科場前利害頭上萬一被他們官司絆住不得入試怎好靜觀道我平時常獨自一個家去的他們問時你只推偶然不在不知我那裏去了支吾著他他定然疑心我是到娘家去未必追尋到得後來曉得不在娘家你場事已畢了我與你別作計較離了此地你是隔府人他那裏來尋你尋著也只索白賴計議已定靜觀就上了轎聞人生把庵門掩上隨著步行竟到姑娘家來姑娘一見靜觀青頭白臉桃花般的兩頰吹彈得破的皮肉心裏也十分喜歡笑道怪道我家侄兒看上了你你只在莊上內房裏住此處再無外人敢上門的只管放心對著聞人生道我莊上房中亦可同住但你若竟住在此恐怕有人跟尋得出反為不美況且要進場還須別尋下處聞人生道姑娘見得極是小侄只可暫來從此靜觀只在姑娘莊裏住聞人生是夜也就同房宿了明日別了去另尋下處不題卻説翠浮庵三個尼姑作了三日功果回來到得庵前只見庵門虛掩的走將進去靜悄悄的不見一人驚疑道多在何處去了他們心上要緊的是聞人生靜觀倒是第二著急到聞人生房裏去看行李書箱都在心裏又放下好些只不見了靜觀房裏又收拾的乾乾淨淨不知甚麼緣故正委決不下只見聞人生踱將進來衆尼笑逐顔開道來了來了庵主一把抱住且不及問靜觀的説話笑道隔別三日心癢難熬今且到房中一樂也不顧這兩口小尼口饞徑自去做事了聞人生只得勉強奉承酣暢一度才問道你同靜觀在此他那裏去了聞人生道昨日我到城中去了一日天晚了來不及在朋友家宿了直到今日來不知他那裏去了衆尼道想是見你去了獨自一個沒情緒自回湖州去了他在此獨受用了兩日也該讓讓我們等他去去再處因貪著聞人生快樂把靜觀的事丟在一邊了誰知聞人生的心卻不在此處鬼混了兩三日推道要到場前尋下處衆尼不好阻得把行李挑了去衆尼千約萬約道得空原到這裏來住聞人生滿口應承自去了庵主過了幾日不見靜觀消耗放心不下叫人到楊媽媽家問問説是不曾回家吃了一驚恐怕楊媽媽來著急倒不敢聲張只好密密探聽又見聞人生一去不來心裏方才有些疑惑待要去尋他盤問卻不曾問得下處明白只得忍耐著指望他場後還來只見三場已畢又等了幾日聞人生腳影也不見來元來聞人生場中甚是得意出場來竟到姑娘莊上與靜觀一處了那裏還想著翠浮庵中庵主與二尼望不見到恨道天下有這樣薄情的人靜觀未必不是他拐去了不然便是這樣不來也沒解説思量要把拐騙來告他有礙著自家多洗不清怕惹出禍來正商量到場前尋他或是問到他湖州家裏去吵他終是女人輩未有定見卻又撞出一場巧事來説話間忽然門外有人敲門得緊衆尼多心裏疑道敢是聞人生來也齊走出來開了門看只見一乘大轎三四乘小轎多在門首歇著敲門的家人報道安人到此庵主卻