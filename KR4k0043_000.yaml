堂前燈下坐著等候時再不見一個來了肚裏又飢心下疑惑兩個兒子走進竈下看時清灰冷火全不像個做親的人家出來對父親説了拿了堂前之燈到裏面一照房裏空蕩蕩並無一些箱籠衣衾之類止有幾張椅桌空著在那裏心裏大驚道卻熱地上螻蟻鑽出鑽入亂到天明才問得個鄰舍道他每一班何處去了鄰人多説不知又問這房子可是他家的鄰人道是城中楊衙裏的五六月前有這一家子來租他的住不知做些甚麼你們是親眷來往了多番怎麼倒不曉得細底卻來問我們問了幾家一般説話有個把有見識的道定是一夥大拐子你們著了他道兒把媳婦騙的去了父子三人見説忙忙若喪家之狗踉踉蹌蹌跑回家去分頭去尋那裏有個去向只得告了一紙狀子出個廣捕卻是渺渺茫茫的事了那扈老兒要討晚婆他道是白得的十分便宜誰知到為這婆子白白裏送了兩個後生媳婦這叫做貪小失大所以為人切不可做那討便宜苟且之事正是莫信直中直須防仁不仁貪看天上月失卻世間珍這話丟過一邊如今且説一個拐兒拐了一世的人倒後邊反著了一個道兒這本話卻是在浙江嘉興府桐鄉縣內有一秀才姓沈名燦若年可二十歲是嘉興有名才子容貌魁峨胸襟曠達娶妻王氏姿色非凡頗稱當對家私富裕多虧那王氏守把兩個自道佳人才子一雙兩好端的是如魚似水如膠似漆價相得只是王氏生來嬌怯厭厭弱病嘗不離身的燦若十二歲上進學十五歲超增補廩少年英鋭自恃才高一世視一第何啻拾芥平時與一班好朋友或以詩酒娛心或以山水縱目放蕩不羈其中獨有四個秀才情好更篤自古道惺惺惜惺惺才子惜才子卻是嘉善黃平之秀水何澄海鹽樂爾嘉同邑方昌都一般兒你羡我愛這多是同郡朋友那他州外府與燦若往來的不計其數大約不過是並時的才人那本縣知縣姓嵇單諱一個清字常州江陰縣人平日敬重斯文喜歡才士也道燦若是個青雲決科之器與他認了師生往來相好是年正是大比之年有了科舉燦若歸來打疊衣裝上杭應試與王氏話別王氏挨著病軀整頓了行李眼中流淚道官人前程遠大早去早回奴未知有福分能勾與你同享富貴與否燦若道娘子説那裏話你有病在身我去後須十分保重也不覺掉下淚來二人執手分別王氏送出門望燦若不見掩淚自進去了燦若一路行程心下覺得不快不一日到了杭州尋客店安下匆匆的進過了三場頗稱得意一日燦若與好朋友遊了一日湖大醉回來睡了半夜忽聽得有人扣門披衣而起只見一人高冠敞袖似是道家妝扮燦若道先生夤夜至此何以教我那人道貧道頗能望氣亦能斷人陰陽禍福偶從東南來此暮夜無處投宿因扣尊扃多有驚動燦若道既先生投宿便同榻何妨先生既精推算目下榜期在邇幸將賤造推算未知功名有分與否願決一言那人道不必推命只須望氣觀君豐格功名不患無緣但必須待尊閫天年之後便得如意我有二句詩是君終身遭際君切記之鵬翼摶時歌六憶鸞膠續處舞雙鳧燦若不解其意方欲再問外面貓兒捕鼠撲地一響燦若吃了一跳卻是南柯一夢燦若道此夢甚是詫異那道人分明説待我荊妻亡故功名方始稱心我情願青襟沒世也罷割恩愛而博功名非吾願也兩句詩又明明記得翻來覆去睡不安穩又道夢中言語信他則甚明日倘若榜上無名作速回去了便是正想之際只聽得外面叫喊連天鑼聲不絶扯住討賞報燦若中了第三名經魁燦若寫了票衆人散訖慌忙梳洗上轎見座主會同年去了那座師卻正是本縣嵇清知縣那時解元何澄又是極相知的朋友黃平之樂爾嘉方昌多已高録俱各歡喜燦若理了正事天色傍晚乘轎回寓只見那店主趕著轎慌慌的叫道沈相公宅上有人到來有緊急家信報知候相公半日了燦若聽了緊急家信四字一個沖心忽思量著夢中言語卻似十五個吊桶打水七上八落正是青龍白虎同行吉凶全然未保到得店中下轎見了家人沈文穿一身素淨衣服便問道娘子在家安否誰著你來寄信沈文道不好説得是管家李公著寄信來官人看書便是燦若接過書來見書封筒逆封心裏有如刀割拆開看罷方知是王氏於二十六日身故燦若驚得呆了卻似分開八片頂陽骨傾下半桶雪水來半晌做聲不得驀然倒地衆人喚醒扶將起來燦若咽住喉嚨千妻萬妻的哭哭得一店人無不流淚道早知如此就不來應試也罷誰知便如此永訣了問沈文道娘子病重緣何不早來對我説沈文道官人來後娘子只是舊病懨懨不為甚重不想二十六日忽然暈倒不醒為此星夜趕來報知燦若又哽咽了一回疾忙叫沈文雇船回家去也顧不得他事了暗思一夢之奇二十七日放榜王氏卻於二十六日間亡故正應著那鵬翼摶時歌六憶這句詩了當時整備離店行不多路卻遇著黃平之擡將來二人又是同門相見罷黃平之道觀兄容貌十分悲慘未知何故燦若噙著眼淚將那得夢情由與那放榜報喪今趕回家之事説了一遍平之嗟歎不已道尊兄且自寧耐毋得過傷待小弟見座師與衆同袍為兄代言其事兄自回去不妨兩人別了燦若急急回來進到裏面撫尸慟哭幾次哭得發昏擇時入殮已畢停柩在堂夜間燦若只在靈前相伴不多時過了三四七衆朋友多來吊唁就中便有説著會試一事的燦若漠然不顧道我多因這蝸角虛名賺得我連理枝分同心結解如今就把一個會元撇在地下我也無心去拾他了這是王氏初喪時的説話轉眼間又過斷七衆親友又相勸道尊閫既已夭逝料無起死回生之理兄枉自灰其志竟亦何益況在家無聊未免有孤棲之歎同到京師一則可以觀景舒懷二則衆同袍劇談竟日可以解慍豈可為無益之悲誤了終身大事燦若吃勸不過道既承列位佳意只得同走一遭那時就別了王氏之靈囑付李主管照管羹飯香火同了黃何方樂四友登程正是那十一月中旬光景五人夜住曉行不則一日來到京師終日成群挈隊詩歌嘯傲不時往花街柳陌間行遣興只有燦若沒一人看得在眼裏韶華迅速不覺的換了一個年頭又早上元節過漸漸的桃香浪暖那時黃榜動選場開五人進過了三場人人得意個個誇強沈燦若始終心下不快草草完事過不多時揭曉單單奚落了燦若他也不在心上黃何方樂四人自去傳臚何澄是二甲選了兵部主事帶了家眷在京黃平之到是庶吉士樂爾嘉選了太常博士方昌選了行人嵇清知縣也行取做刑科給事中各守其職不題燦若又遊樂了多時回家到了桐鄉燦若進得門來在王氏靈前拜了兩拜哭了一場備羹飯澆奠了又隔了兩月請個地理先生擇地殯葬了王氏已訖那時便漸漸有人來議親燦若自道是第一流人品王氏恁地一個嬌妻兀自無緣消受再那裏尋得一個廝對的出來必須是我目中親見果然像意方才可議此事以此多不著緊光陰似箭日月如梭有話即長無話即短卻又過了三個年頭燦若又要上京應試只恨著家裏無人照顧又道是家無主屋倒豎燦若自王氏亡後日間用度箸長碗短十分不像意也思量道須是續弦一個掌家娘子方好只恨無其配偶心中悶悶不已仍把家事且付與李主管照顧收拾起程那時正是八月間天道金風乍轉時氣新涼正好行路夜來皓魄當空澄波萬里上下一碧燦若獨酌無聊觸景傷懷遂爾口占一曲露滴野塘秋下簾籠不上鈎徒勞明月穿窗牖鴛衾遠丟孤身遠遊浮槎怎得到陽臺右漫凝眸空臨皓魄人不在月中留詞寄黃鶯兒吟罷痛飲一醉舟中獨寢話休絮煩燦若行了二十餘日來到京中在舉廠東邊租了一個下處安頓行李已好一日同幾個朋友到齊化門外飲酒只見一個婦人穿身縞素衣服乘著蹇驢一個間的挑了食阰隨著恰像那裏去上墳回來的燦若看那婦人生得敷粉太白施朱太赤加一分太長減一分太短十相具足是風流占盡無餘一味溫柔差絲毫便不廝稱巧笑倩兮笑得人魂靈顛倒美目盼兮盼得你心意癡迷假使當時逢妒婦也言我見且猶憐燦若見了此婦卻似頂門上喪了三魂腳底下蕩了七魄他就撇了這些朋友也雇了一個驢一步步趕將去呆呆的尾著那婦人只顧看那婦人在驢背上又只顧轉一對秋波過來看那燦若走上了裏把路到一個僻靜去處那婦人走進一家人家去了燦若也下了驢心下不舍釘住腳在門首呆看看了一晌不見那婦人出來正沒理會處只見內裏走出一個人來道相公只望門內觀看卻是為何燦若道適才同路來見個白衣小娘子走進此門去不知這家是甚等人家那娘子是何人無個人來問問那人道此婦非別乃舍表妹陸蕙娘新近寡居在此方才出去辭了夫墓要來嫁人小人正來與他作伐燦若道足下高姓大名那人道小人姓張因為做事是件順溜為此人起一個混名只叫小人張溜兒燦若道令表妹要嫁何等樣人肯嫁在外方去否溜兒道只要讀書人後生些的便好了地方不論遠近燦若道實不相瞞小生是前科舉人來此會試適見令表妹丰姿絶世實切想慕足下肯與作媒必當重謝溜兒道這事不難料我表妹見官人這一表人才也決不推辭的包辦在小人身上完成此舉燦若大喜道既如此就煩足下往彼一通此情在袖中摸出一錠銀子遞與溜兒道些小薄物聊表寸心事成之後再容重謝溜兒推遜一回隨即接了見他出錢爽快料他囊底充饒道相公明日來討回話燦若歡天喜地回下處去了次日又到郊外那家門首來探消息只見溜兒笑嘻嘻的走將來道相公喜事上頭恁地出門的早哩昨日承相公分付即便對表妹説知俺妹子已自看上了相公不須三回五次只説著便成了相公只去打點納聘做親便了表妹是自家做主的禮金不計論但憑相公出得手罷了燦若依言取三十兩銀子折了衣飾送將過去那家也不爭多爭少就許定來日過門燦若看見事體容易心裏到有些疑惑起來又想是北方再婚説是鬼妻所以如此相應至日鼓吹打轎到門迎接陸蕙娘蕙娘上轎到燦若下處來做親燦若燈下一看正是前日相逢之人不覺大喜過望方才放下了心拜了天地吃了喜酒衆人俱各散訖兩人進房蕙娘只去椅上坐著約莫一更時分夜闌人靜燦若久曠之後欲火燔灼便開言道娘子請睡了罷蕙娘囀鶯聲吐燕語道你自先睡燦若只道蕙娘害羞不去強他且自先上了床那裏睡得著又歇了半個更次蕙娘兀自坐著燦若只得又央及道娘子日來困倦何不將息將息只管獨坐是甚意思蕙娘又道你自睡口裏一頭説眼睛卻不轉的看那燦若燦若怕新來的逆了他意依言又自睡了一會又起來款款問道娘子為何不睡蕙娘又將燦若上上下下仔細看了一會開口問道你京中有甚勢要相識否燦若道小生交遊最廣同袍同年無數在京何論相識蕙娘道既如此我而今當真嫁了你罷燦若道娘子又説得好笑小生千里相遇央媒納聘得與娘子成親如何到此際還説個當真當假蕙娘道官人有所不知你卻不曉得此處張溜兒是有名的拐故意叫妾賺人到門他卻只説是表妹寡居要嫁人就是他做媒多有那慕色的情願聘娶妾身他卻不受重禮只要哄得成交就便送你做親叫妾身只做害羞不肯與人同睡因不受人點汙到了次日卻合了一夥棍徒圖賴你姦騙良家女子連人和箱籠盡搶將去那些被賺之人客中怕吃官司只得忍氣吞聲明受火囤如此也不止一個了前日妾身哭母墓而歸原非新寡天殺的撞見官人又把此計來使妾每每自思此豈終身道理有朝一日惹出事來並妾此身付之烏有況以清白之身暗地迎新送舊雖無所染情何以堪幾次勸取丈夫他只不聽以此妾之私意只要將計就計倘然遇著知音願將此身許他隨他私奔了罷今見官人態度非凡抑且志誠軟款心實欣羡但恐相從奔走或被他找著無人護衛反受其纍今君既交遊滿京邸願以微軀托之官人官人只可連夜便搬往別處好朋友家謹密所在去了方才娶得妾安穩此是妾身自媒以從官人官人異日弗忘此情燦若聽罷呆了半晌道多虧娘子不棄見教小生不然幾受其禍連忙開出門來叫起家人打疊行李把自己餵養的一個蹇驢馱了蕙娘家人挑箱籠自己步行臨出門叫應主人道我們有急事回去了曉得何澄帶家眷在京連夜敲開他門細將此事説與把蕙娘與行李都寄在何澄寓所那何澄房盡空闊燦若也就一宅兩院做了下處不題卻説張溜兒次日果然糾合了一夥破落戶前來搶人只見空房開著人影也無忙問下處主人道昨日成親的舉人那裏去了主人道相公連夜回去了衆人各各呆了一回大家嚷道我們隨路追去一哄的望張家灣亂奔去了卻是偌大所在何處找尋元來北京房子慣是見租與人住來來往往主人不來管他東西去向所以但是搬過了再無處跟尋的燦若在何澄處看了兩月書又早是春榜動選場開燦若三場滿志正是專聽春雷第一聲果然金榜題名傳臚三甲燦若選了江陰知縣卻是嵇清的父母不一日領了憑帶了陸蕙娘起程赴任卻值方昌出差蘇州竟坐了他一隻官船到任陸蕙娘平白地做了知縣夫人這正是鸞膠續處舞雙鳧之驗也燦若後來做到開府而止蕙娘生下一子後亦登第至今其族繁盛有詩為證女俠堪誇陸蕙娘能從萍水識檀郎巧機反借機來用畢竟強中手更強卷十七西山觀設度亡魂開封府備棺追活命詩曰三教從來有道門一般鼎足在乾坤只因裝飾無殊異容易埋名與俗渾説這道家一教乃是李老君青牛出關關尹文始真人懇請留下道德真經五千言傳流至今這道教門最上者沖虛清淨出有入無超塵俗而上升同天地而不老其次者修真煉性吐故納新築坎離以延年煮鉛汞以濟物最下者行持符役使鬼神設章醮以通上界建考召以達冥途這家學問卻是後漢時張角能作五里霧人欲學他的先要五鬥米為贄見禮故叫得五鬥米道後來其教盛行那學了與民間祛妖祛害的便是正法若是去為非作歹的只叫得妖術雖是邪正不同卻也是極靈驗難得的流傳至今以前兩項高人絶世不能得有只是符這家時時有人學習頗有高妙的在內卻有一件作怪學了這家術法一些也胡亂做事不得了盡有奉持不謹反取其禍的宋時乾道年間福建福州有個太常少卿任文薦的長子叫做任道元少年慕道從個師父是歐陽文彬傳授五雷天心正法建壇在家與人行持甚著效驗他有個妻侄姓梁名鯤也好學這法術一日有永福柯氏之子因病發心投壇請問尚未來到任家那任道元其日與梁鯤同宿齋舍兩人同見神將來報道如有來投求報應者可書香字與之叫他速速歸家任道元聽見走將起來點起燈燭寫好了封押停當依然睡覺明早柯子已至道元就把夜間所封的遞與他叫他急急歸家去柯子還家十八日而死蓋香字乃是一十八日也由此遠近聞名都稱他做法師後來少卿已沒道元襲了父任出仕在外官府事體煩多把那奉真香火之敬漸漸疏懶每日清晨在神堂前過只在門外略略瞻禮叫小童進去炷香完事自己竟不入門家人每説道老爺一向奉道虔誠而今有些懈怠恐怕神天嗔怪道元體貴心驕全不在意由家人每自議論日逐只是如此淳熙十三年正月十五日上元之夜北城居民相約糾衆在于張道者閹內啓建黃大醮一壇禮請任道元為高功主持壇事那日觀看的人何止挨山塞海內中有兩個女子雙鬟高髻並戶而立豐神綽約宛然並蒂芙蓉任道元擡頭起來看見驚得目眩心花魂不附體那裏還顧什麼醮壇不醮壇齋戒不齋戒便開口道兩位小娘子請穩便到裏面來看一看兩女道多謝法師正輕移蓮步走進門來道元目不轉睛看上看下口裏謅道小娘子提起了梅裙蓋是福建人叫女子抹胸做騪裙提起了是要摸他雙乳的意思乃彼處鄉談討便宜的説話內中一個女子正色道法師做醮如何卻説恁地話拉同伴轉身便走道元又笑道既來看法事便與高功法師結個緣何妨兩女耳根通紅口裏喃喃微罵而去到得醮事已畢道元便覺左耳後邊有些作癢又帶些疼痛叫家人看看只見一個紅蓓蕾如粟粒大將指頭按去痛不可忍次日歸家情緒不樂隔數日對妻侄梁鯤道夜來神將見責得夢甚惡我大數已定密書於紙待請商日宣法師考照商日宣法師到了看了一看説道此非我所能辨須聖童至乃可決少頃門外一村童到來即跳升梁間作神語道任道元諸神保護汝許久汝乃不謹香火貪淫邪行罪在不赦道元深悼前非磕頭謝罪神語道汝十五夜的説話説得好道元百拜乞命願從今改過自新神語道如今還講甚麼吾亦不欠汝一個奉事當以爾為不法弟子之戒且看你日前分上寬汝二十日日期説罷童子墜地醒來懵然一毫不知梁鯤拆開道元所封之書與商日宣看內中也是二十日三個字道元是夜夢見神將手持鐵鞭來追逐道元驚惶奔走神將趕來環繞所居九仙山下一匝被他趕著一鞭打在腦後猛然驚覺自此瘡越加大了頭脹如栲栳每夜二鼓叫呼宛若被鞭之狀到得二十日將滿梁鯤在家夢見神將對他道汝到五更初急到任家看吾撲道元鯤驚起忙到任家來道元一見哭道相見只有此一會了披衣要下床來忽然跌倒七八個家人共扶將起來暗中恰像一雙大手拽出撲在地上仔細看看已此無氣了梁鯤送了他的終看見利害自此再不敢行法看官你道任道元奉的是正法行持半世只為一時間心中懈怠口內褻瀆又不曾實做了甚麼汙褻法門之事便受顯報如此何況而今道流專一做邪淫不法之事的神天豈能容恕所以幽有神譴明有王法不到得被你瞞過了最是邪淫不法之事偏是道流容易做只因和尚服飾異樣先是光著一個頭好些不便道流打扮起來簪冠著袍方才認得是個道士若是卸下裝束仍舊巾帽長衣分毫與俗人沒有兩樣性急看不出破綻來況且又有一種火居道士原是有妻小的一發與俗人無異了所以做那姦淫之事比和尚十分便當而今再説一個道流借設符醮壇為由拐上一個婦人弄得死於非命説來與奉道的人做個鑒戒有詩為證坎離交垢育嬰兒只在身中相配宜生我之門死我戶請無誤讀守其雌這本話文乃是宋時河南開封府有個女人吳氏十五歲嫁與本處劉家所生一子名喚劉達生達生年一十二歲上父親得病身亡母親吳氏年紀不滿三十且是生得聰俊飄逸早已做了個寡婦上無公姑下無族黨是他一個主持門戶守著兒子度日因念亡夫恩義思量做些齋醮功果超度他本處有個西山觀乃是道流修真之所內中有個道士叫做黃妙修符高妙儀容俊雅衆人推他為知觀是日正在觀中與人家書寫文疏忽見一個年小的婦人穿著一身縞素領了十一二歲的孩子走進觀來俗語説得好若要俏帶三分孝那婦人本等生得姿容美麗更兼這白衣白髻越顯得態度瀟灑早是在道觀中若是僧寺裏就要認做白衣送子觀音出現了走到黃知觀面前插燭也似拜了兩拜知觀一眼瞅去早已魂不附體連忙答拜道何家宅眷甚事來投婦人道小妾是劉門吳氏因是丈夫新亡欲求渡拔故率領親兒劉達生母子虔誠特求法師廣施妙法利濟冥途黃知觀聽罷便懷著一點不良之心答道既是賢夫新亡求薦家中必然設立孝堂此須在孝堂內設行持方有專功實際若只在觀中大概附醮未必十分得益憑娘子心下如何吳氏道若得法師降臨茅舍此乃萬千之幸小妾母子不勝感激回家收拾孝堂專等法師則個知觀道幾時可到宅上吳氏道再過八日就是亡夫百日之期意要設建七日道場須得明日起頭恰好至期為滿得法師侵早下降便好知觀道一言已定必不失期明日準造宅上吳氏袖中取出銀一兩先奉做紙劄之費別了回家一面收拾打掃專等來做法事元來吳氏請醮薦夫本是一點誠心原無邪意誰知黃知觀是個色中餓鬼觀中一見吳氏姿容與他説話時節恨不得就與他做起光來吳氏雖未就想到邪路上去卻見這知觀丰姿出衆語言爽朗也暗暗地喝采道好個齊整人物如何卻出了家且喜他不裝模樣見説做醮便肯輕身出觀來到我家也是個出熱的人心裏也就有幾分歡喜了次日清早黃知觀領了兩個年少道童一個火工道人挑了經箱卷軸之類一徑到吳氏家來吳氏只為兒子達生年紀尚小一切事務都是自家支援與知觀拜見了接進孝堂知觀與同兩個道童火工道人張挂三清衆靈鋪設齊備動起法器免不得宣揚大概啓請攝召放赦招魂鬧了一回吳氏出來上香朝聖那知觀一眼估定越發賣弄精神同兩個道童齊聲朗誦經典畢起身執著意旨跪在聖像面前毯上宣白叫吳氏也一同跪著通誠跪的所在與吳氏差不得半寸多路吳氏聞得知觀身上衣服撲鼻薰香不覺偷眼瞧他知觀有些覺得一頭念著一頭也把眼回看你覷我我觀你恨不得就移將攏來攪作一團念畢各起吳氏又到各神將面前上香稽首帶眼看著道場只見兩個道童黑髮披肩頭戴著小冠且是生得唇紅齒白清秀嬌嫩吳氏心裏想道這些出家人到如此受用這兩個大起來不知怎生標致哩自此動了一點欲火按捺不住只在堂中孝簾內頻頻偷看外邊元來人生最怕的是眼裏火一動了眼裏火隨你左看右看無不中心像意的真是長有長妙短有短強壯的豐美瘦的俊俏無有不妙況且婦人家陰性專一看上了一個人再心裏打撇不下的那吳氏在堂中把知觀看了看只覺得風流可喜他少年新寡春心正盛轉一個念頭把個臉兒紅了又白白了又紅只在孝簾前踅來踅去或露半面或露全身恰像要道士曉得他的意思一般那黃知觀本是有心的豈有不覺礙著是頭一日來到不敢就造次只好眉梢眼角做些功夫未能勾入港那兒子劉達生未知事體正好去看神看佛弄鍾弄鼓那裏曉得母親這些關節看看點上了燈吃了晚齋吳氏收拾了一間潔淨廊房與他師徒安歇那知觀打發了火工道人回觀自家同兩個道童一床兒宿了打點早晨起來朝真不題卻説吳氏自同兒子達生房裏睡了上得床來心裏想道此時那道士畢竟摟著兩個標致小童幹那話兒了我卻獨自個宿想了又想陰中火發著實難熬噤了一噤把牙齒咬得格格的響出了一身汗剛剛朦朧睡去忽聽床前腳步響擡頭起看只見一個人揭開帳子颼的鑽上床來吳氏聽得聲音卻是日裏的知觀輕輕道蒙娘子秋波示意小道敢不留心趁此夜深人靜娘子作成好事則個就將黃瓜般一條玉莖塞將進去吳氏並不推辭慨然承受正到酣暢之處只見一個小道童也揭開帳來尋師父見師父幹事興頭喊道好內眷如何偷出家人做得好事同我捉個頭便不聲張就伸只手去吳氏腰裏亂摸知觀喝道我在此不得無禮吳氏被道士弄得爽快正待要丟了吃此一驚颯然覺來卻是南柯一夢把手摸摸陰門邊只見兩腿俱濕連上多有了陰水忙把手帕抹淨歎了一口氣道好個夢怎能勾如此僥幸一夜睡不安穩天明起來外邊鐘鼓響叫丫鬟擔湯運水出去伏侍道士那兩個道童倚著年小也進孝堂來討東討西看看熟分了吳氏正在孝堂中坐著只見一個道童進來討茶吃吳氏叫住問他道你叫甚麼名字道童道小道叫做太清吳氏道那一位大些的道童道叫做太素吳氏道你兩個昨夜那一個與師父做一頭睡道童道一頭睡便怎麼吳氏道只怕師父有些不老成道童嘻嘻的笑道這大娘到會取笑説罷走了出去把適間所言私下對師父一一説了不由這知觀不動了心想道説這般話的定是有風情的只是雖在孝堂中相離咫尺卻分個內外如何好大大撩撥他撩撥以心問心忽然道有計了須臾吳氏出來上香知觀一手拿著鈴杵一手執笏急急走去並立著口中唱著浪淘沙詞雲稽首大羅天法眷姻緣如花玉貌正當年帳冷帷空孤枕畔枉自熬煎為此建齋筵追薦心虔亡魂超度意無牽急到藍橋來解渴同做神仙這知觀把此詞朗誦分明是打動他自薦之意那吳氏聽得也解其意微微笑道師父説話如何夾七夾八知觀道都是正經法門當初前輩神仙遺下美話做吾等榜樣的吳氏老大明白曉得知觀有意於他了進去剝了半碗細果燒了一壺好清茶叫丫鬟送出來與知觀吃分付丫鬟對知觀説大娘送來與師父解渴的把這句話與知觀詞中之語暗地照應只當是寫個肯字知觀聽得不勝之喜不覺手之舞之足之蹈之那裏還管甚麼靈寶道經紫霄祕一心只念的是風月機關洞房春意密叫道童打聽吳氏臥房見説與兒子同房歇宿有丫鬟相伴思量不好竟自闖得進去到晚來與兩個道童上床宿了一心想著吳氏日裏光景且把道童太清出出火氣弄得床板格格價響摟著背脊口裏説道我的乖我與你兩個商量件事體我看主人娘子十分有意於我若是弄得到手連你們也帶挈得些甜頭不見得只是內外隔絶他房中有兒子有丫鬟我這裏須有你兩個不便如何是好太清介面道我們須不妨事知觀道他初起頭也要避生人眼目太素道我見孝堂中有張魂床且是帳褥鋪設得齊整此處非內非外正做偷情之所知觀道我的乖説得有理我明日有計了對他兩個耳畔説道須是如此如此太清太素齊拍手道妙妙説得動火知觀便與太清完了事弄得兩個小夥子興發難遏各放了一個手銃一夜無詞次日天早起來與吳氏相見了對吳氏道今日是齋壇第三日了小道有法術攝召可以致得尊夫亡魂來與娘子相會一番娘子心下如何吳氏道若得如此可知好哩只不知法師要如何作用知觀道須用白絹作一條橋在教堂中小道攝召亡魂渡橋來相會卻只好留一個親人守著人多了陽氣盛便不得來又須關著孝堂勿令人窺視泄了天機吳氏道親人只有我與小兒兩人兒子小不曉得甚麼就會他父親也無干奴家須是要會丈夫一面待奴家在孝堂守著看法師作用罷知觀道如此最妙吳氏到裏邊箱子裏取出白絹二匹與知觀知觀接絹在手叫吳氏扯了一頭他扯了一頭量來量去東折西折只管與吳氏調眼色交著手時便輕輕把指頭彈著手腕吳氏也不做聲知觀又指撥把台桌搭成一橋恰好把孝堂路徑塞住外邊就看簾裏邊不著了知觀出來分付兩道童道我閉著孝堂召請亡魂你兩個須守著門不可使外人窺看破了法術兩人心照應聲曉得了吳氏也分付兒子與丫鬟道法師召請亡魂與我相會要祕密寂靜你們只在房裏不可出來羅唕那兒子達生見説召得父親魂口裏嚷道我也要見見爹爹吳氏道我的兒法師説生人多了陽氣盛召請不來故此只好你母親一個守靈你要看不打緊萬一為此召不來空成畫餅且等這番果然召得爹爹來以後卻教你相見便是吳氏心裏也曉得知觀必定是托故有此蹊蹺把甜言美語穩住兒子又尋了些果子與了他把丫鬟同他反關在房裏了出來進孝堂內坐著知觀撲地把兩扇門拴上了假意把權杖在桌上敲了兩敲口裏不知念了些甚麼笑嘻嘻對吳氏道請娘子魂床上坐著只有一件亡魂雖召得來卻不過依稀影響似夢裏一般與娘子無益吳氏道但願亡魂會面一敘苦情論甚有益無益知觀道只好會面不能勾與娘子重敘平日被窩的歡樂所以説道無益吳氏道法師又來了一個亡魂只指望見見也勾了如何説到此話知觀道我有本事弄得來與娘子同歡同樂吳氏失驚道那有這事知觀道魂是空虛的攝來附在小道身上便好與娘子同歡樂了吳氏道亡魂是亡魂法師是法師這事如何替得知觀道從來我們有這家法術多少亡魂來附體相會的吳氏道卻怎生好幹這事知觀道若有一些不像尊夫憑娘子以後不信罷了吳氏罵道好巧言的賊道到會脫騙人知觀便走去一把抱定攙倒在魂床上笑道我且權做尊夫一做吳氏此時已被引動了興兩個就在魂床上面弄將起來一個玄門聰俊少嘗閨閣家風一個空室嬌姿近曠衾綢事業風雷號令變做了握雨攜雲冰蘖貞操翻成了殘花破蕊滿堂聖像本屬虛無一脈亡魂還歸冥漠噙著的呼吸元精而不疲耨著的出入玄牝以無休寂寂朝真獨烏來時丹路滑殷殷慕道百花深處一僧歸個中味真誇羡玄之又玄色裏身不耐煩寡之又寡兩個雲雨才罷真正弄得心滿意足知觀對吳氏道比尊夫手段有差池否吳氏啐了一口道賊禽獸羞答答的只管提起這話做甚知觀才謝道多承娘子不棄小道粉身難報吳氏道我既被你哄了如今只要相處得情長則個知觀道我和你須認了姑舅兄妹才好兩下往來瞞得衆人過吳氏道這也有理知觀道娘子今年尊庚吳氏道二十六歲了知觀道小道長一歲叨認做你的哥哥罷我有道理爬起來又把權杖敲了兩敲把門開了對著兩個道童道方才召請亡魂來元來主人娘子是我的表妹一向不曉得到是亡魂明白説出來的問了詳細果然是而今是至親了道童笑嘻嘻道自然是至親了吳氏也叫兒子出來把適才道士搗鬼的説話也如此學與兒子聽了道這是你父親説的你可過來認了舅舅那兒子小曉得甚麼好歹此後依話只叫舅舅從此日日推説召魂就弄這事晚間吳氏出來道士進來只把孝堂魂床為交歡之處一發親密了那兒子但聽説召魂便道要見爹爹只哄他道你是陽人見不得的兒子只得也罷了心裏卻未免有些疑心道如何只卻了我了七晝夜壇事已完百日孝滿吳氏謝了他師徒三衆收了道場暗地約了相會之期且瞞生眼到觀去了吳氏就把兒子送在義學堂中先生處仍舊去讀書早晨出去晚上回來吳氏日裏自有兩個道童常來通信或是知觀自來只等晚間兒子睡了便開門放進來恣行淫樂只有丫鬟曉得風聲已自買囑定了如此三年竟無間阻不題且説劉達生年紀漸漸大了情竇已開這事情也有些落在眼裏了他少年聰慧知書達禮曉得母親有了些手腳心中常是憂悶不敢説破一日在書房裏有同伴裏頭戲謔稱他是小道士他臉兒通紅走回家來對母親道有句話對娘説這個舅舅不要他上門罷有人叫我是個小道士須是被人笑話吳氏見説罷兩點紅直從耳根背後透到滿臉把兒子鑿了兩個栗暴道小孩子不知事舅舅須是為娘的哥哥就往來誰人管得那個天殺的對你講這話等娘尋著他罵他一個不歇達生道前年未做道場時不曾見説有這個舅舅就果是舅舅娘只是與他兄妹相處外人如何有得説話吳氏見道著真話大怒道好兒子幾口氣養得你這等大你聽了外人的説話嘲撥母親養這忤逆的做甚反敲台拍凳哭將起來達生慌了跪在娘面前道是兒子不是了娘饒恕則個吳氏見他討饒便住了哭道今後切不可聽人亂話達生忍氣吞聲不敢再説心裏想道我娘如此口強須是捉破他方得杜絶我且冷眼張他則個一夜人靜後達生在娘房睡了一覺醒來只聽得房門響似有人走了出去的模樣他是有心的輕輕披了衣裳走起來張看只見房門開了料道是娘又去做那歹勾當了轉身到娘床裏一摸果然不見了娘他也不出來尋心生一計就把房門閂好又掇張桌子頂住了自上床去睡覺元來是夜吳氏約了知觀黃昏後來堂中靈座已除專為要做這勾當床仍鋪著這所在反加些圍屏圍得緊簇知觀先在裏頭睡好了吳氏卻開了門出來就他兩個顛鸞倒鳳弄這一夜到得天色將明起來放了他出去回進房來每常如此放肆慣了不以為意誰知這夜走到房前卻見房門關好推動不開曉得是兒子知風老大沒趣呆呆坐著等他天亮默默的咬牙切齒的恨氣卻無説處直到天大明瞭達生起來開了門見了娘故意失驚娘如何反在房門外坐著吳氏只得説個謊道昨夜外邊腳步響恐怕有賊所以開門出來看看你卻如何把門關了達生道我也見門開了恐怕有賊所以把門關好了又頂得牢牢的只道娘在床中睡著如何反在門外既然娘在外邊如何不叫開了門卻坐在這裏這一夜是甚意思吳氏見他説了自想一想無言可答只得罷了心裏想道這個業種須留他在房裏不得了忽然一日對他説道你年紀長成與娘同房睡有些不雅相堂中這張床鋪得好好的你今夜在堂中睡罷吳氏意思打發他出來此後知觀來隻須留在房裏一發安穩像意了誰知這兒子是個乖覺的點頭會意就曉得其中就裏一面應承日裏仍到書房中去晚來自在堂中睡了越加留心察聽其日道童來到吳氏叫他回去説前夜被兒子關在門外的事又説因此打發兒子另睡今夜來只須小門進來竟到房中到夜知觀來了達生雖在堂中卻不去睡各處挨著看動靜只聽得小門響達生躲在黑影裏頭看得明白曉得是知觀進門了隨後丫鬟關好了門竟進吳氏房中掩上了門睡了達生心裏想道娘的姦事我做兒子的不好捉得只去炒他個不安靜罷了過了一會聽得房裏已靜連忙尋一條大索把那房門扣得緊緊的心裏想道眼見得這門拽不開賊道出去不得了必在窗裏跳出我且蒿惱他則個走到庭前去掇一個尿桶一個半破了的屎缸量著跳下的所在擺著自卻去堂裏睡了那知觀淫蕩了一夜聽見雞啼了兩番恐怕天明披衣走出把房門拽了又拽再拽不開不免叫與吳氏知道吳氏自家也來幫拽只拽得門響門外似有甚麼縛住的吳氏道卻又作怪莫不是這小業畜又來弄手腳既然拽不開且開窗出去了明早再處而今看看天亮遲不得了知觀朦朧著兩眼走來開了窗撲的跳下來只聽得撲通的一響一隻右腳早踹在尿桶裏了這一隻左腳做不得力頭輕腳重又踏在屎缸裏忙抽起右腳待走尿桶卻深那時著了慌連尿桶拌倒了一交跌去尿屎汙了半身嘴唇也磕綻了卻不敢高聲忍著痛掩著鼻急急走去開了小門一道煙走了吳氏看見拽門不開已自著惱及至開窗出去了又聽得這劈撲之響有些疑心自家走到窗前看時此時天色尚黑但只滿鼻聞得些臭氣正不知是甚麼緣故別著一肚悶氣又上床睡去了達生直等天大明瞭起來到房門前仍把繩索解去看那窗前時滿地尿屎桶也倒了肚裏又氣又忍不住好笑趁著娘未醒他不顧污穢輕輕把屎缸尿桶多搬過了又一會吳氏起來開門卻又一開就是反疑心夜裏為何開不得想是性急了些及至走到窗前只見滿地多是尿屎一路到門是濕印的鞋迹叫兒子達生來問道這窗前尿屎是那裏來的達生道不知道但看這一路濕印多是男人鞋迹想必是個人急出這些尿屎來的吳氏閉口無言臉兒紅了又白不好回得一句著實忿恨自此怪煞了這兒子一似眼中之釘恨不得即時拔去了卻説那夜黃知觀吃了這一場虧香噴噴一身衣服沒一件不污穢了悶悶在觀中洗淨整治又是嘴唇跌壞有好幾日不到劉家來走吳氏一肚子惱恨正要見他分訴商量卻不見到來又想又氣一日知觀叫道童太素來問信吳氏對他道你師父想是著了惱不來太素道怕你家小官人利害故此躲避幾日吳氏道他日裏在學堂中到不如日間請你師父過來商量句話那太素是個十八九歲的人曉得吳氏這些行徑也自丟眉眼來挑吳氏道十分師父不得工夫小道童權替遭兒也使得吳氏道小奴才你也來調戲我我對你師父説了打你下截太素笑道我的下截須與大娘下截一般師父要用的料不捨得打吳氏道沒廉恥小奴才虧你説吳氏一見他標致動火久了只是還嫌他小些而今卻長得好了見他説風話不覺有意便一手勾他攏來做一個嘴但手去摸太素此物翹然卻待要扯到床上幹那話兒不匡黃知觀見太素不來又叫太清來尋他到堂中叫喚太素聽聲音恐怕師父知道嗔怪慌忙住了手沖散了好事兩個同到觀中回了師父次日果然知觀日間到劉家來吳氏關了大門接進堂中坐了問道如何那一夜去了再無消息直到昨日才著道童過來知觀道你家兒子刁鑽異常他日漸漸長大好不利害我和你往來不便這件事弄不成了吳氏正貪著與道士往來連那兩個標致小道童一鼓而擒之卻見説了這話心裏怫然便道我無尊人拘管只礙得這個小業畜不問怎的結果了他等我自由自在這幾番我也忍不過他的氣了知觀道是你親生兒子怎捨得結果他吳氏道親生的正在乎知疼著熱才是兒子卻如此拗別攪炒何如沒有他到乾淨知觀道這須是你自家發得心盡我們不好攛掇得恐有後悔吳氏道我且再忍他一兩日你今夜且放心前來快活就是他有些知覺也顧不得他隨他罷了他須沒本事奈何得我你一句我一句説了大半日話知觀方去等夜間再來這日達生那館中先生要歸去散學得早路上撞見知觀走來料是在他家裏出來早上了心卻當面勉強叫聲舅舅作了個揖知觀見了一個沖心還了一禮不講話竟去了達生心裏想道是前日這番好兩夜沒動靜今日又到我家今夜必然有事我不好屢次捉破只好防他罷了一路回到家裏吳氏問道今日如何歸得恁早達生道先生回家了我須有好幾日不消館中去得吳氏心裏暗暗不悅勉強問道你可要些點心吃達生道我正要點心吃了睡覺去連日先生要去積趲讀書辛若今夜圖早睡些個吳氏見説此句便有些像意了叫他去吃了點心果然達生到堂中床裏一覺睡了吳氏暗暗地放了心安排晚飯自吃了收拾停當暫且歇息叫丫鬟半掩了門專等知觀來誰知達生假意推睡聽見人靜了卻輕輕走起來前後門邊一看只見門鎖著腰門從內關著他撬開了走到後邊小門一看只見門半掩著不關他就輕輕把栓拴了掇張凳子緊緊在旁邊坐地坐了更餘只聽得外邊推門響又不敢重用力或時把指頭彈兩彈達生只不做聲看他怎地忽對門縫裏低言道我來了如何卻關著可開開達生聽得明白假意插著口氣道今夜來不得了回去罷莫惹是非從此不聽見外邊聲息了吳氏在房裏懸懸盼望偷期欲心如火見更餘無動靜只得叫丫鬟到小門邊看看丫鬟走來黑處一把摸著達生嚇了一跳達生厲聲道好賊婦此時走到門邊來做甚勾當驚得丫鬟失聲而走進去對吳氏道法師不見來到是小官人坐在那裏幾乎驚殺吳氏道這小業畜一發可恨了他如何又使此心機來攪破我事磨拳擦掌的氣卻待發作又是自家理短只得忍耐著又恐怕失了知觀期約使他空返徨不寧那裏得睡達生見半晌無聲息曉得去已久了方才自上床去睡了吳氏再叫丫鬟打聽説小官人已不在門口了寂地開出外邊走到街上東張西望那裏得有個人回復了吳氏吳氏倍加掃興忿忿不已眼不交睫直至天明見了達生不覺發話道小孩子家晚間不睡坐在後門口做甚達生道又不做甚歹事坐坐何妨吳氏脹得面皮通紅罵道小殺才難道我又做甚歹事不成達生道誰説娘做歹事只是夜深無事兒子便關上了門坐著看看不為大錯吳氏只好肚裏恨卻説他不過只得強口道娘不到得逃走了誰要你如此監守含著一把眼淚進房去了再待等個道童來問這夜的消息卻是這日達生不到學堂中去只在堂前攤本書兒看著又或時前後行走看見道童太清走進來就攔住道有何事到此太清道要見大娘子達生道有話替你傳説吳氏裏頭聽得聲音知是道童連忙叫丫鬟喚進怎當得達生一同跟了進去不走開一步太清不好説得一句私語只大略道師父問大娘子小官人的安達生介面道都是安的不勞記念請回罷了太清無奈四目相覷怏怏走出去了吳氏越加恨毒從此一連十來日沒處通音耗又一日同窗伴夥傳言來道先生已到館達生辭了母親又到書堂中去了吳氏只當接得九重天上赦書元來太清太素兩個道童不但為師父傳情自家也指望些滋味時常穿梭也似在門首往來探聽的前日吃了達生這場淡打聽他在家便不進來這日達生出去吳氏正要傳信太清也來了吳氏經過兒子幾番道兒也該曉得謹慎些只是色膽迷天又欺他年小全不照顧又約他叫知觀今夜到來反要在大門裏來他不防備的只是要夜深些期約已定達生回家已此晚了同娘吃了夜飯吳氏領了丫鬟故意點火把前後門關鎖好了叫達生去睡他自進房去了達生心疑道今日我不在家今夜必有勾當如何反肯把門關鎖也只是要我不疑心我且不要睡著必有緣故坐到夜深悄自走去看看腰門掩著不拴後門原自關好上鎖的達生想道今夜必在前邊來了閃出堂前黑影裏蹲著看時星光微亮只見母親同丫鬟走將出來母親立住中堂門首意是防著達生丫鬟走去門邊聽聽只聽得彈指響輕輕將鎖開了拽開半邊門一個人早閃將入來丫鬟隨關好了門三個人做一塊侮手侮腳的走了進去達生連忙開了大門就把挂在門內警夜的鑼撈在手裏篩得一片價響口中大喊有賊元來開封地方系是京都曠遠廣有偷賊所以官司立令每家門內各置一鑼但一家有賊篩得鑼響十家俱起救護如有失事連坐賠償最是嚴緊的這裏知觀正待進房只聽得本家門首