久當使他夫妻團圓但只是慧圓還是個削髮尼僧他日如何相見好去做孺人你須慢慢勸他長髮改妝才好夫人道這是正理只是他心裏不知道丈夫還在如何肯長髮改妝高公道你自去勸他或者肯依固好畢竟不肯時節我另自有説話夫人依言來對王氏道吾已把你所言盡與相公説知相公道捕盜的事多在他身上管取與你報冤王氏稽首稱謝夫人道只有一件相公道你是名門出身仁宦之妻豈可留在空門沒個下落叫我勸你長髮改妝你若依得一力與你擒盜便是王氏道小尼是個未亡之人長髮改妝何用只為冤恨未伸故此上求相公做主若得強盜殲滅只此空門靜守便了終身還要甚麼下落夫人道你如此妝飾在我府中也不為便不若你留了發認義我夫婦兩個做個孀居寡女相伴終身未為不可王氏道承蒙相公夫人擡舉人非木石豈不知感但重整雲鬟再施鉛粉丈夫已亡有何心緒況老尼相救深恩一旦棄之亦非厚道所以不敢從命夫人見他説話堅決一一回報了高公高公稱歎道難得這樣立志的女人又叫夫人對他説道不是相公苦苦要你留頭其間有緣故前日因去查問此事有平江路官吏相見説舊年曾有人告理也説是永嘉縣尉只怕崔生還未必死若是不長得發他日一時擒住此盜查得崔生出來此時僧俗各異不得團圓悔之何及何不權且留了頭髮等事體盡完崔生終無下落那時任憑再淨了發還歸尼院有何妨礙王氏見是有人還在此告狀心裏也疑道丈夫從小會沒水是夜眼見得囫圇拋在水中的或者天幸留得性命也不可知遂依了夫人的話雖不就改妝卻從此不剃發權扮作道姑模樣了又過了半年朝廷差個進士薛溥化為監察禦史來按平江路這個薛禦史乃是高公舊日屬官他吏才精敏是個有手段的到了任所先來拜謁高公高公把這件事密密托他連顧阿秀姓名住址去處都細細説明白了薛禦史謹記在心自去行事不在話下且説顧阿秀兄弟自從那年八月十五夜一覺直睡到天明醒來不見了王氏明知逃去恐怕形迹敗露不敢明明追尋雖在左近打聽兩番並無蹤影這是不好告訴人的事只得隱忍罷了此後一年之中也曾做個十來番道路雖不能如崔家之多僥幸再不敗露甚是得意一日正在家歡呼飲酒間只見平江路捕盜官帶著一哨官兵將宅居圍住拿出監察禦史發下的訪單來顧阿秀是頭一名強盜其餘許多名字逐名查去不曾走了一個又拿出崔縣尉告的贓單來連他家裏箱籠悉行搜卷並盜船一隻即停泊門外港內盡數起到了官解送禦史衙門薛禦史當堂一問初時抵賴及查物件見了永嘉縣尉的敕牒尚在箱中贓物一一對款薛禦史把崔縣尉舊日所告失盜狀念與他聽方各俯首無詞薛禦史問道當日還有孺人王氏今在何處顧阿秀等相顧不出一語禦史喝令嚴刑拷訊顧阿秀招道初意實要留他配小的次男故此不殺因他一口應承願做新婦所以再不防備不期當年八月中秋乘睡熟逃去不知所向只此是實情禦史録了口詞取了供案凡是在船之人無分首從盡問成梟斬死罪決不待時原贓照單給還失主禦史差人回復高公就把贓物送到高公家來交與崔縣尉俊臣出來一一收了曉得敕牒還在家物猶存只有妻子沒查下落處連強盜肚裏也不知去向了真個是渺茫的事俊臣感新思舊不覺慟哭起來有詩為證堪笑聰明崔俊臣也應落難一時渾既然因畫能追盜何不尋他題畫人元來高公有心只將畫是顧阿秀施在尼院的説與俊臣知道並不曾提起題畫的人就在院中為尼所以俊臣但得知盜情因畫敗露妻子卻無查處竟不知只在畫上可以跟尋得出來的當時俊臣慟哭已罷想道既有敕牒還可赴任若再稽遲便恐另補有人到不得地方了妻子既不見留連於此無益請高公出來拜謝了他就把要去赴任的意思説了高公道赴任是美事但足下青年無偶豈可獨去待老夫與足下做個媒人娶了一房孺人然後夫妻同往也未為遲俊臣含淚答道糟粳之妻同居貧賤多時今遭此大難流落他方存亡未卜然據著芙蓉屏上尚及題詞料然還在此方今欲留此尋訪恐事體渺茫稽遲歲月到任不得了愚意且單身到彼差人來高揭榜文四處追探拙婦是認得字的傳將開去他聞得了必能自出除非憂疑驚恐不在世上了萬一天地垂憐尚然留在還指望伉儷重諧英感明公恩德雖死不忘若別娶之言非所願聞高公聽他説得可憐曉得他別無異心也自淒然道足下高誼如此天意必然相佑終有完全之日吾安敢強逼只是相與這幾時容老夫少盡薄設奉餞然後起程次日開宴餞行邀請郡中門生故吏各官與一時名士畢集俱來奉陪崔縣尉酒過數巡高公舉杯告衆人道老夫今日為崔縣尉了今生緣衆人都不曉其意連崔俊臣也一時未解只見高公命傳呼後堂請夫人打發慧圓出來俊臣驚得目呆只道高公要把甚麼女人強他納娶故設此宴説此話也有些著急了夢裏也不曉得他妻子叫得甚麼慧圓當時夫人已知高公意思把崔縣尉在館內多時已獲了強盜問了罪名追出敕牒今日餞行赴任特請你到堂廝認團圓逐項逐節的事情説了一遍王氏如夢方醒不勝感激先謝了夫人走出堂前來此時王氏發已半長照舊妝飾崔縣尉一見乃是自家妻子驚得如醉裏夢裏高公笑道老夫原説道與足下為媒這可做得著麼崔縣尉與王氏相持大慟説道自料今生死別了誰知在此卻得相見座客見此光景盡不曉得詳悉的向高公請問根由高公便叫書僮去書房裏取出芙蓉屏來對衆人道列位要知此事須看此屏衆人爭先來看卻是一畫一題看的看念的念卻不明白這個緣故高公道好教列位得知只這幅畫便是崔縣尉夫妻一段大姻緣這畫即是崔縣尉所畫這詞即是崔孺人所題他夫妻赴任到此為船上所劫崔孺人脫逃於尼院出家遇人來施此畫認出是船中之物故題此詞後來此畫卻入老夫之手遇著崔縣尉到來又認出是孺人之筆老夫暗地著人細細問出根由乃知孺人在尼院叫老妻接將家來住著密行訪緝備得大盜蹤迹托了薛禦史究出此事強盜俱已伏罪崔縣尉與孺人在家下各有半年多只道失散在那裏竟不知同在一處多時了老夫一向隱忍不通他兩人知道只為崔孺人頭髮未長崔縣尉敕牒未獲不知事體如何兩人心事如何不欲造次漏泄今罪人既得試他義夫節婦兩下心堅今日特地與他團圓這段因緣故此方才説替他了今生緣即是崔孺人詞中之句方才説請慧圓乃是崔孺人尼院中所改之字特地使崔君與諸公不解為今日酒間一笑耳崔俊臣與王氏聽罷兩個哭拜高公連在坐之人無不下淚稱歎高公盛德古今罕有王氏自到裏面去拜謝夫人了高公重入座席與衆客盡歡而散是夜特開別院叫兩個養娘伏侍王氏與崔縣尉在內安歇明日高公曉得崔俊臣沒人伏侍贈他一奴一婢又贈他好些盤纏當日就道他夫妻兩個感念厚恩不忍分別大哭而行王氏又同丈夫到尼院中來院主及一院之人見他許久不來忽又改妝個個驚異王氏備細説了遇合緣故並謝院主看待厚恩院主方才曉得顧阿秀劫掠是真前日王氏所言妻妾不相容乃是一時掩飾之詞院中人個個與他相好的多不捨得他去事出無奈各各含淚而別夫妻兩個同到永嘉去了待永嘉任滿回來重過蘇州差人問候高公要進來拜謁誰知高公與夫人俱已薨逝殯葬已畢了崔俊臣同王氏大哭如喪了親生父母一般問到他墓下拜奠了就請舊日尼院中各衆在墓前建起水陸道場三晝夜以報大恩王氏還不忘經典自家在裏頭持誦事畢同衆尼再到院中崔俊臣出宦資厚贈了院主王氏又念昔日朝夜禱祈觀世音暗中保佑幸得如願夫婦重諧出白金十兩留在院主處為燒香點燭之費不忍忘院中光景立心自此長齋念觀音不輟以終其身當下別過衆尼自到真州寧家另日赴京補官這是後事不必再題此本話文高公之德崔尉之誼王氏之節皆是難得的事各人存了好心所以天意周全好人相逢畢竟冤仇盡報夫婦重完此可為世人之勸詩雲王氏藏身有遠圖間關到底得逢夫舟人妄想能同志一月空將新婦呼又詩雲芙蓉本似美人妝何意飄零在路旁畫筆詞鋒能巧合相逢猶自墨痕香又有一首讚歎禦史大夫高公雲高公德誼薄雲天能結今生未了緣不使初時輕逗漏致令到底得團圓芙蓉畫出原雙蒂萍藻浮來亦共聯可惜白楊堪作柱空教灑淚及黃泉卷二十八金光洞主談舊迹玉虛尊者悟前身詩雲近有人從海上回海山深處見樓臺中有仙童開一室皆言此待樂天來又雲吾學空門不學仙恐君此語是虛傳海山不是吾歸處歸即應歸兜率天這兩首絶句乃是唐朝侍郎白香山白樂天所作答浙東觀察使李公的樂天一生精究內典勤修上乘之業一心超脫輪回往生淨土彼時李公師稷觀察浙東有一個商客在他治內明州同衆下海遭風飄蕩不知所止一月有餘才到一個大山瑞雲奇花白鶴異樹盡不是人間所見的山側有人出來迎問道是何等人來得到此商客具言隨風飄到岸上人道既到此地且系定了船上岸來見天師同舟中膽小不知上去有何光景個個退避只有這一個商客跟將上去岸上人領他到一個所在就象大寺觀一般商客隨了這人依路而進見一個道士鬚眉皆白兩旁侍衛數十人坐大殿上對商客道你本是中國人此地有緣方得一到此即世傳所稱蓬萊山也你既到此地可要各處看看去麼商客口稱要看道士即命左右領他宮內遊觀玉台翠樹光采奪目有數十處院宇多有名號只有一院關鎖得緊緊的在門縫裏窺進去只見滿庭都是奇花堂中設一虛座座中有蘞褥階下香煙撲鼻商客問道此是何處卻如此空鎖著那人答道此是白樂天前生所駐之院樂天今在中國未來故關閉在此商客心中原曉得白樂天是白侍郎的號便把這些處光景一一記著別了那邊人走下船來隨風使帆不上十日已到越中海岸商客將所見之景備細來稟知李觀察李觀察盡録其所言書報白公白公看罷笑道我修淨業多年西方是我世界豈復往海外山中去做神仙耶故此把這兩首絶句回答李公見得他修的是佛門上乘要到兜率天宮不希罕蓬萊仙島意思後人評論道是白公脫屣煙埃投棄軒冕一種非凡光景豈不是個謫仙人海上之説未為無據但今生更復勤修精進直當超脫玄門上證大覺後來果位當勝前生這是正理要知從來名人達士巨卿偉公再沒一個不是有宿根再來的人若非仙官謫降便是古德轉生所以聰明正直在世間做許多好事如東方朔是歲星馬周是華山素靈宮仙官王方平是琅琊寺僧真西山是草閹和尚蘇東坡是五戒禪師就是死後或原歸故處或另補仙曹如卜子夏為修文郎郭璞為水仙伯陶弘景為蓬萊都水監李長吉召撰白玉樓記皆歷歷可考不能盡數至如姦臣叛賊必是藥叉羅剎鬼王之類決非善根乃有小説中説李林甫遇道士盧杞遇仙女説他本是仙種特來度他他兩個都不願做仙人願做宰相以至墮落此多是其家門生故吏一黨之人撰造出來以掩其平生過惡的若依他説不過遲做得仙人五六百年為何陰間有李林甫十世為牛九世倡之説就是説道業報盡了還歸本處五六百年後便不可知為何我朝萬曆年間河南某縣雷擊死娼婦背上還有唐朝李林甫五字此卻六百年不止了可見説惡人也是仙種其説荒唐不足憑信小子如今引白樂天的故事説這一番話只要有好根器的人不可在火坑欲海戀著塵緣忘了本來面目待小子説一個宋朝大臣在當生世裏看見本來面目的一個故事與看官聽一聽詩曰昔為東掖垣中客今作西方社裏人手把楊枝臨水坐尋思往事是前身卻説西方雙摩訶池邊有幾個洞天內中有兩個洞一個叫作金光洞一個叫做玉虛洞凡是洞中各有一個尊者在內做洞主住居極樂勝境同修無上菩提忽一日玉虛洞中尊者來對金光洞中尊者道吾佛以救度衆生為本吾每靜修洞中固是正果但只獨善其身便是辟支小乘吾意欲往震旦地方打一轉輪回遊戲他七八十年做些濟人利物的事然後回來復居於此可不好麼金光洞尊者道塵世紛囂有何好處雖然可以濟人利物只怕為欲火所燒迷戀起來沒人指引回頭忘卻本來面目便要墮落輪回道中不知幾劫才得重修圓滿怎麼説得復居此地這樣容易話玉虛洞尊者見他説罷自悔錯了念頭金光洞尊者道此念一起吾佛已知伽藍韋馱即有密報豈可復悔須索向閻浮界中去走一遭受享些榮華富貴就中做些好事切不可迷了本性倘若恐怕濁界汩沒一時記不起到得五十年後我來指你個境頭等你心下洞徹罷了玉虛洞尊者當下別了金光洞尊者自到洞中分付行僮看守著洞中原自早夜焚香誦經我到人間走一遭去也一靈真性自去揀那善男信女有德有福的人家好處投生不題卻説宋朝鄂州江夏有個官人官拜左侍禁姓馮名式乃是個好善積德的人夫人一日夢一金身羅漢下降産下一子産時異香滿室看那小廝時生得天庭高聳地角方圓兩耳垂珠是個不凡之相兩三歲時就穎悟非凡看見經卷上字恰象原是認得的一見不忘送入學中取名馮京表字當世過目成誦萬言立就雖讀儒書卻又酷好佛典敬重釋門時常瞑目打坐學那禪和子的模樣不上二十歲連中了三元説話的你錯了據著三元記戲本上你父親叫做馮商是個做客的人如今為何説是做官的連名字多不是了看官聽説那戲文本子多是胡諏豈可憑信只如南北戲文極頂好的多説琵琶西廂那蔡伯喈漢時人未做官時父母雙亡廬墓致瑞公府舉他孝廉何曾為做官不歸父母餓死且是漢時不曾有狀元之名漢朝當時正是董卓專權也沒有個牛丞相鄭恆是唐朝大官夫人崔氏皆有封號何曾有失身張生的事後人雖也有曉得是元微之不遂其欲託名醜詆的卻是戲文倒説崔張做夫妻到底鄭恆是個花臉衙內撞階死了卻不是顛倒得沒道理只這兩本出色的就好笑起來何況別本可以準信得的所以小子要説馮當世的故事先據正史把父親名字説明白了免得看官每信著戲文上説話千古不決間話休題且説那馮公自中三元以後任官纍典名藩到處興利除害流播美政護持佛教不可盡述後來入遷政府做了丞相忽一日體中不快遂告個朝假在寓靜養調理其時英宗皇帝聖眷方隆連命內臣問安不絶于道路又詔令翰院有名醫人數個到寓診視聖諭盡心用藥期在必愈服藥十來日馮相病已好了卻是羸瘦了好些拄了杖才能行步久病新愈氣虛多驚倦視綺羅厭聞弦管思欲靜坐養神乃策杖徐步入後園中來後園中花木幽深之處有一所茅庵名曰容膝庵乃是取陶淵明歸去來辭中語見得庵小只可容著兩膝的話馮相到此心意欣然便叫侍妾每都各散去自家取龍涎香焚些在博山爐中疊膝瞑目坐在禪床中蒲團上默坐移時覺神清氣和肢體舒暢徐徐開目忽見一個青衣小童神貌清奇冰姿瀟灑拱立在禪床之右馮相問小童道婢仆皆去你是何人獨立在此小童道相公久病新愈心神欣悅恐有所遊小童願為參從不敢擅離公伏枕日久沈疾既愈心中正要間遊忽聞小童之言意思甚快乘興離榻覺得體力輕健與平日無病時節無異步至庵外小童稟道路徑不平恐勞尊重請登羊車緩遊園圃馮相喜小童如此慧黠笑道使得使得説話之間小童挽羊車一乘來到面前但見簾垂斑竹輪斫香檀同心結帶系鮫綃盤角曲欄雕美玉坐蘞鋪錦褥蓋頂覆青氈馮相也不問羊車來歷欣然升車而坐小童揮鞭在前馭著車去甚速勢若飄風馮相驚怪道無非是羊為何如此行得速低頭前視見駕車的全不似羊也不是牛馬之類憑軾仔細再看只見背尾皆不辨首尾足上毛五色光采射人奔走挽車穩如磐石馮相公大驚方欲詢問小童車行已出京都北門漸漸路入青霄行去多是翠雲深處下視塵寰直在底下虛空之中過了好些城郭將有一飯時候車才著地住了小童前稟道此地勝絶請相公下觀馮相下得車來小童不知所向連羊車也不見了舉頭四顧身在萬山之中但見山川秀麗林麓清佳出沒萬壑煙霞高下千峰花木靜中有韻細流石眼水涓涓相逐無心間出嶺頭雲片片溪深緑草茸茸茂石老蒼苔點點斑馮相身處朝市向為塵俗所役乍見山光水色洗滌心胸正如酷暑中行遇著清泉百道多時病滯一旦消釋馮相心中喜樂不覺拊腹而歎道使我得頂笠披蓑攜鋤趁犢躬耕數畝之田歸老於此地每到秋苗熟後稼穡登場旋煮黃雞新芻白酒與鄰叟相邀瓦盆磁甌量晴較雨此樂雖微據我所見雖玉印如霜金印如鬥不足比之所恨者君恩未報不敢歸田他日必欲遂吾所志方欲縱步玩賞忽聞清磬一聲響于林杪馮相舉目仰視向松陰竹影疏處隱隱見山林間有飛簷碧瓦棟宇軒窗馮相道適才磬聲必自此出想必有幽人居止何不前去尋訪遂穿雲踏石曆險登危尋徑而走過往處但聞流水松風聲喧於步履之下漸漸林麓兩分峰巒四合行至一處溪深水漫風軟雲間下枕清流有千門萬戶但見嵬嵬宮殿虯松鎮碧瓦朱扉寂寂回廊鳳竹映雕欄玉砌玲瓏樓閣幹霄覆雲工巧非人世之有岩畔洞門開處挂一白玉牌牌上金書金光第一洞馮相見了洞門知非人世惕然不敢進步入洞因是走得路多了覺得肢體倦怠暫歇在門閫石上坐著坐還未定忽聞大聲起於洞中如天摧地塌嶽撼山崩大聲方住狂風復起松竹低偃瓦礫飛揚雄氣如奔頃刻而至馮相驚駭急回頭看時一巨獸自洞門奔出外來你道怎生模樣但見目光閃爍毛色斑爛剪尾岩穀風生移步郊園草偃山前一吼攝將百獸潛形林下獨行威使群毛震悚滿口利牙排劍戟四蹄鋼爪利鋒奔走如飛將至坐側馮相愴惶欲避無計忽聞金錫之聲震地那個猛獸恰象有人趕逐他的竄伏亭下斂足瞑目猶如待罪一般馮相驚異未定見一個胡僧自洞內走出來你道怎生模樣但見修眉垂雪碧眼橫波衣披烈火七幅鮫綃杖拄降魔九環金錫若非圓寂光中客定是楞迦峰頂人將至洞門將錫杖橫了稽首馮相道小獸無知驚恐丞相馮相答禮道吾師何來得救殘喘胡僧道貧僧即此間金光洞主也相公別來無恙粗茶相邀丈室間話則個馮相見他説別來無恙的話舉目細視胡僧面貌果然如舊相識但倉卒中不能記憶遂相隨而去到方丈室中啜茶已罷正要款問仔細金光洞主起身對馮相道敝洞荒涼無以看玩若欲遊賞煙霞遍觀雲水還要邀相公再遊別洞遂相隨出洞而去但覺天清景麗日暖風和與世俗溪山迥然有異須臾到一處飛泉千丈注入清溪白石為橋斑竹夾徑於巔峰之下見一洞門門用玻璃為牌牌上金書玉虛尊者之洞馮相對金光洞主道洞中景物料想不凡若得一觀此心足矣金光洞主道所以相邀相公遠來者正要相公遊此間耳遂排扉而入馮相本意只道洞中景物可賞既到了裏面塵埃滿地門戶寂寥似若無人之境但見金爐斷燼玉馨無聲絳燭光消仙扃晝掩蛛網遍生虛室寶鈎低壓重簾壁間紋幕空垂架上金經生蠹間庭悄悄芊綿碧草侵階幽檻沈沈散漫緑苔生砌松陰滿院鶴相對山色當空人未歸馮相猶豫不決逐步走至後院忽見一個行童憑案誦經馮相問道此洞何獨無僧行童聞言掩經離榻拱揖而答道玉虛尊者遊戲人間今五十六年更三十年方回此洞緣主者未歸是故無人相接金光洞主道相公不必問後當自知此洞有個空寂樓臺迥出群峰下視千里請相公登樓款歇而歸遂與登樓看那樓上時碧瓦地金獸守扃飾異寶於虛簷纏玉虯於巨棟犀軸仙書堆積架上馮相正要取卷書來看看那金光洞主指樓外雲山對馮相道此處盡堪寓目何不憑欄一看馮相就不去看書且憑欄凝望遙見一個去處翠煙掩映絳霧氤氳美木交枝清陰接影瓊樓碧瓦玲瓏玉樹翠柯搖曳波光拍岸銀濤映天翠色逼人冷光射目其時日影下照如萬頃琉璃馮相注目細視良久問金光洞主道此是何處其美如此金光洞主愕然而驚對馮相道此地即雙摩訶池了此處溪山相公多曾遊賞怎麼就不記得了馮相聞得此語低頭仔細回想自兒童時直至目下一一追算來並不曾記到此卻又有些依稀認得正不知甚麼緣故乃對金光洞主道京心為事奪壯歲舊遊悉皆不記不知幾時曾到此處隱隱已如夢寐人生勞役至於如此對景思之令人傷感金光洞主道相公儒者當達大道何必浪自傷感人生寄身於太虛之中其間榮瘁悲歡得失聚散彼死此生投形換殼如夢一場方在夢中原不足問及到覺後又何足悲豈不聞金剛經雲一切有為法如夢幻泡影如露亦如電應作如是觀自古皆以浮生比夢相公只要夢中得覺回頭即是何用傷感此盡正理願相公無輕老僧之言馮相聞語貼然敬伏方欲就坐款話忽見虛簷日轉晚色將催馮相意要告歸作別金光洞主道承挈遊觀今盡興而返此別之後未知何日再會金光洞主道相公是何言也不久當與相公同為道友相從于林下日子正長豈無相見之期馮相道京病既愈旦夕朝參職事相索自無暇日安能再到林下與吾師遊樂哉金光洞主笑道浮世光陰迅速三十年只同瞬息老僧在此轉眼間伺候相公來再居此洞便了馮相道京雖不才位居一品他日若荷君恩放歸田野苟不就宮祠微祿亦當為田舍翁躬耕自樂以終天年況自此再三十年京巳壽登耄耋豈更削發披緇坐此洞中為衲僧耶金光洞主但笑而不答馮相道吾師相笑豈京之言有誤也金光洞主道相公久羈濁界認殺了現前身子竟不知身外有身耳馮相道豈非除此色身之外別有身耶金光洞主道色身之外元有前身今日相公到此相公的色身又是前身了若非身外有身相公前日何以離此今日怎得到此馮相道吾師何術使京得見身外之身金光洞主道欲見何難就把手指向壁間畫一圓圈以氣吹之對馮相道請相公觀此景界馮相遂近壁視之圓圈之內瑩潔明朗如挂明鏡注目細看其中見有風軒水榭月塢花莊小橋跨曲水橫塘垂柳籠緑窗朱戶遍看池亭皆似曾到但不知是何處園圃在此壁間馮相疑心是障眼之法正色責金光洞主道我佛以正法度人吾師何故將幻術變現惑人心目金光洞主大笑而起手指園圃中東南隅道如此景物豈是幻也請相公細看真偽可見馮相走近前邊注目再看見園圃中有粉牆小徑曲檻雕欄向花木深處有茅庵一所半開竹牖低下疏簾間階日影三竿古鼎香煙一縷茅庵內有一人疊足瞑目靠蒲團坐禪床上馮相見此心下躊躇金光洞主將手拍著馮相背上道容膝庵中爾是何人大喝一偈道五十六年之前各占一所洞天容膝庵中莫誤玉虛洞裏相延向馮相耳畔叫一聲咄馮相於是頓省遊玉虛洞者乃前身坐容膝庵者乃色身不覺失聲道當時不曉身外身今日方知夢中夢因此頓悟無上菩提喜不自勝方欲參問心源印證禪覺回顧金光洞主已失所在遍視精舍迦藍但只見如雲藏寶殿似霧隱回廊審聽不聞鍾磬之清音仰視已失峰岩之險勢玉虛洞府想卻在海上瀛洲空寂樓臺料復歸極樂國土只疑看罷僧繇畫卷起丹青十二圖一時廊殿洞府溪山撚指皆無蹤迹單單剩得一身儼然端坐後園容膝庵中禪床之上覺茶味猶甘松風在耳鼎內香煙尚嫋座前花影未移入定一晌之間身遊萬里之處馮相想著境界了然語話分明全然不象夢境曉得是禪靜之中顯見宿本況且自算其壽正是五十六歲合著行童説尊者遊戲人間之年數分明己身是金光洞主的道友玉虛尊者的轉世自此每與客對常常自稱老僧後三十年一日無疾而終自然仍歸玉虛洞中去矣詩曰玉虛洞裏本前身一夢回頭八十春要識古今賢達者阿誰不是再來人卷二十九通閨闥堅心燈火鬧囹圄捷報旗鈴詩雲世間何物是良圖惟有科名救急符試看人情翻手變窗前可不下功夫話説自漢以前人才只是舉薦征辟故有賢良方正茂才異等之名其高尚不出又有不求聞達之科所以野無遺賢人無匿才天下盡得其用自唐宋以來俱重科名雖是別途進身盡能致位權要卻是惟以此為華美往往有只為不得一第情願老死京華的到我國朝初時三途並用多有名公大臣不同科甲出身一般也替朝廷幹功立業青史標名不朽那見得只是進士才做得事直到近來把這件事越重了不是科甲的人不得當權當權所用的不是科甲的人不與他好衙門好地方多是一帆布置見了以下出身的就不是異途也必揀個憊懶所在打發他不上幾時就勾銷了總是不把這幾項人看得在心上所以別項人內便盡有英雄豪傑在裏頭也無處展布曉得沒甚長筵廣席要做好官也沒幹都把那志氣灰了怎能勾有做得出頭的及至是個進士出身便貪如柳盜跖酷如周興來俊臣公道説不去沒奈何考察壞了或是參論壞了畢竟替他留些根又道是百足之蟲至死不僵跌撲不多時轉眼就高官大祿仍舊貴顯豈似科貢的人一勾了帳只為世道如此重他所以一登科第便象升天卻又一件好笑就是科第的人總是那窮酸秀才做的並無第二樣人做得及至肉眼愚眉見了窮酸秀才誰肯把眼稍來管顧他還有一等豪富親眷放出倚富欺貧的手段做盡了惡薄腔子待他到得忽一日榜上有名掇將轉來呵脬捧卵偏是平日做腔欺負的頭名就是他上前出力真個世間惟有這件事賤的可以立貴貧的可以立富難分難解的冤仇可以立消極險極危的道路可以立平遮莫做了沒脊梁惹羞恥的事一床錦被可以遮蓋了説話的怎見得如此看官你不信且先聽在下説一件勢利好笑的事唐時有個舉子叫做趙琮纍隨計吏赴南宮春試屢次不第他的妻父是個鍾陵大將趙琮貧窮只得靠著妻父度日那妻家武職官員宗族興旺見趙琮是個多年不利市的寒酸秀才沒一個不輕薄他的妻父母看見別人不放他在心上也自覺得沒趣道女壻不爭氣沒長進雖然是自家骨肉未免一科厭一科弄做個老厭物了況且有心嫌鄙了他越看越覺得寒酸不足敬重起來只是不好打發得他開去心中好些不耐煩趙琮夫妻兩個不要説看了別人許多眉高眼低只是父母身邊也受多少兩般三樣的怠慢沒奈何爭氣不來只得怨命忍耐一日趙琮又到長安赴試去了家裏撞著迎春日子軍中高會百戲施呈唐時名為春設傾城仕女沒一個不出來看大戶人家搭了棚廠設了酒席在內邀請親戚共看大將闔門多到棚上去女眷們各各盛妝鬥富惟有趙娘子衣衫藍褸雖是自心裏覺得不入隊卻是大家多去又不好獨自一個推掉不去得只得含羞忍恥隨衆人之後一同上棚衆女眷們憎嫌他妝飾弊陋恐怕一同坐著外觀不雅將一個帳屏遮著他叫他獨坐在一處不與他同席他是受憎嫌慣的也自揣己只得憑人主張默默坐下了正在擺設酣暢時節忽然一個吏典走到大將面前説道觀察相公特請將軍立等説話大將吃了一驚道此與民同樂之時料無政務相關為何觀察相公見召莫非有甚不測事體心中好生害怕捏了兩把汗到得觀察相公廳前只見觀察手持一卷書笑容可掬當廳問道有一個趙琮是公子壻否大將笑道正是觀察道恭喜恭喜適才京中探馬來報令壻已及第了大將還謙遜道恐怕未能有此地步觀察即將手中所持之書遞與大將道此是京中來的金榜令壻名在其上請公自拿去看大將雙手接著一眼瞟去趙琮名字朗朗在上不覺驚喜謝別了觀察連忙走回遠望見棚內家人多在那裏注目看外邊大將舉著榜對著家人大呼道趙郎及第了趙郎及第了衆人聽見大家都吃一驚掇轉頭來看那趙娘子時兀自寂寂寞寞沒些意思在帷屏外坐在那裏卻是耳朵裏已聽見了心下暗暗地叫道慚愧誰知也有這日衆親眷急把帷屏撤開到他跟前稱喜道而今就是夫人縣君了一齊來拉他去同席趙娘回言道衣衫藍褸玷辱諸親不敢來混只是自坐了看看罷衆人見他説嘔氣的話一發不安一個個強賠笑臉道夫人説那裏話就有獻勤的把帶來包裏的替換衣服拿出來與他穿了一個起頭個個爭先也有除下簪的也有除下叉的也有除下花鈿的耳鐺的霎時間把一個趙娘子打扮的花一團錦一簇還恐怕他不喜歡是日那裏還有心想看春會只個個攛哄趙娘子看他眉頭眼後罷了本是一個冷落的貨只為丈夫及第一時一霎更變起來人也原是這個人親也原是這些親世情冷暖至於如此在下為何説這個做了引頭只因有一個人為些風情事做了出來正在難分難解之際忽然登第不但免了罪過反得團圓了夫妻正應著在下先前所言做了沒脊梁惹羞恥的事一床錦被可以遮蓋了的説話看官每試聽著有詩為證同年同學同林宿鳥好事多磨受人顛倒私情敗露官非難了一紙捷書真同月老這個故事在宋朝端平年間浙東有一個飽學秀才姓張字忠父是衣冠宦族只是家道不足靠著人家聘出去隨任做書記館谷為生鄰居有個羅仁卿是崛起白屋人家家事盡富厚兩家同日生産張