意不可有違王氏父母遂把女兒招了劉氏子為壻後來偕老可見天意有定如此作合倘若這夜不是暴死大雷王氏女已是別家媳婦了又非劉氏子試膽作戲就是因雷失尸也有何涉只因是夙世前緣故此奇奇怪怪顛之倒之有此等異事這是個父母不肯許的又有一個父母許了又悔的也弄得死了活轉來一念堅貞終成夫婦留下一段佳話名曰秋千會記正是精誠所至金石為開貞心不寐死後重諧這本話乃是元朝大德年間的事那朝有個宣徽院使叫做孛羅是個色目人乃故相齊國公之子生自相門窮極富貴第宅宏麗莫與為比卻又讀書能文敬禮賢士一時公卿間多稱誦他好處他家住在海子橋西與僉判奄都剌經歷東平王榮甫三家相聯通家往來宣徽私居後有花園一所名曰杏園取春色滿園關不住一枝紅杏出牆來之意那杏園中花卉之奇亭榭之好諸貴人家所不能仰望每年春宣徽諸妹諸女邀院判經歷兩家宅眷於園中設秋千之戲盛陳飲宴歡笑竟日各家亦隔一日設宴還答自二月末至清明後方罷謂之秋千會于時有個樞密院同僉帖木兒不花的公子叫做拜住騎馬在花園牆外走過只聞得牆內笑聲在馬上欠身一望正見牆內秋千競蹴歡哄方濃遙望諸女都是絶色拜住勒住了馬潛身在柳陰中恣意偷覷不覺多時那管門的老院公聽見牆外有馬鈴響走出來看只見這一個騎馬郎君呆呆地對牆裏覷著園公認得是同僉公子走報宣徽宣徽急叫人趕出來那拜住才撞見園公時曉得有人知覺恐怕不雅已自打上了一鞭去得遠了拜住歸家來對著母誇説此事盛道宣徽諸女個個絶色母親解意便道你我正是門當戶對只消遣媒來説親自然應允何必望空羡慕就央個媒婆到宣徽家來説親宣徽笑道莫非是前日騎馬看秋千的吾正要擇壻教他到吾家來看看才貌若果好便當許親媒婆歸報同僉同僉大喜便叫拜住盛飾儀服到宣徽家來宣微相見已畢看他豐神俊美心裏已有幾分喜歡但未知內蘊才學如何思量試他遂對拜住道足下喜看秋千何不以此為題賦菩薩蠻一調老夫要請教則個拜住請筆硯出來一揮而就詞曰紅繩畫板柔荑指東風燕子雙雙起誇俊要爭高更將裙系牢牙床和困睡一任金叉墜推起枕來遲紗窗月上時宣徽見他才思敏捷韻句鏗鏘心下大喜分付安排盛席款待筵席完備待拜住以子侄之禮送了側首坐下自己坐了主席飲酒中間宣徽想道適間詠秋千詞雖是流麗或者是那日看過秋千便已有些題詠今日偶合著題目的不然如何恁般來得快真是七步之才也不過如此待我再試他一試看恰好聽得樹上黃鶯巧囀就對拜住道老夫再欲求教將滿江紅調賦鶯一首望不吝珠玉意下如何拜住領命即席賦成拂拭剡藤揮灑晉字呈上宣徽詞曰嫩日舒晴韶光豔碧天新霽正桃肋半吐鶯聲初試孤枕乍聞弦索悄曲屏時聽笙簧細愛綿蠻柔舌韻東風愈嬌媚幽夢醒間愁泥殘杏褪重門閉巧音芳韻十分流麗入柳穿花來又去欲求好友真無計望上林何日得雙棲心迢遞宣徽看見詞翰兩工心下已喜及讀到末句曉得是見景生情暗藏著求婚之意不覺拍案大叫道好佳作真吾壻也老夫第三夫人有個小女名喚速哥失裏堪配君子待老夫喚出相見則個就傳雲板請三夫人與小姐上堂當下拜住拜見了嶽母又與小姐速哥失裏相見了正是秋千會裏女伴中最絶色者拜住不敢十分擡頭已自看得較切不比前日牆外影響心中喜樂不可名狀相見罷夫人同小姐回步卻説內宅女眷聞得堂上請夫人小姐時曉得是看中了女壻別位小姐都在門背後縫裏張著看見拜住一表非俗個個稱羡見速哥失裏進來私下與他稱喜道可謂門闌多喜氣女壻近乘龍也合家讚美不置拜住辭謝了宣徽回到家中與父母説知就擇吉日行聘禮物之多詞翰之雅喧傳都下以為盛事誰知好事多磨風雲不測台諫官員看見同僉富貴豪宕上本參論他贓私奉聖旨發下西台禦史勘問免不得收下監中那同僉是個受用的人怎吃得牢獄之苦不多幾日生起病來元來元朝大臣在獄有病例許題請釋放同僉幸得脫獄歸家調治卻病得重了百藥無效不上十日嗚呼哀哉舉家號痛誰知這病是惹的牢瘟同僉既死闔門染了此症沒幾日就斷送了一個一月之內弄個盡絶止剩得拜住一個不死卻又被西台追贓入官家業不勾賠償真個轉眼間冰消瓦解家破人亡宣徽好生不忍心裏要收留拜住回家成親教他讀書以圖出身與三夫人商議那三夫人是個女流之輩只曉得炎涼世態那裏管甚麼大道理心裏怫然不悅元來宣徽別房雖多惟有三夫人是他最寵愛的家裏事務都是他主持所以前日看上拜住就只把他的女兒許了也是好勝處今日見別人的女兒多與了富貴之家反是他女壻家裏凋弊了好生不伏氣一心要悔這頭親事便與女兒速哥失裏説知速哥失裏不肯哭諫母親道結親結義一言訂盟終不可改兒見諸姊妹家榮盛心裏豈不羡慕但寸絲為定鬼神難欺豈可因他貧賤便想悔賴前言非人所為兒誓死不敢從命宣微雖也道女兒之言有理怎當得三夫人撒嬌撒癡把宣徽的耳朵掇了轉來那裏管女兒肯不肯別許了平章闊闊出之子僧家奴拜住雖然聞得這事心中懊惱自知失勢不敢相爭那平章家擇日下聘比前番同僉之禮更覺隆盛三夫人道爭得氣來心下方才快活只見平章家揀下吉期花轎到門速哥失裏不肯上轎衆夫人衆姊妹各來相勸速哥失裏大哭一場含著眼淚勉強上轎到得平章家裏儐相念了詩賦啓請新人出轎伴娘開簾等待再三不見擡身攢頭轎內看時叫聲苦也元來速哥失裏在轎中偷解纏腳紗帶縊頸而死已此絶氣了慌忙報與平章連平章沒做道理處叫人去報宣徽那三夫人見説兒天兒地哭將起來急忙叫人追轎回來急解腳纏將薑湯灌下去牙關緊閉眼見得不醒三夫人哭得昏暈了數次無可奈何只得買了一副重價的棺木盡將平日房奩首飾珠玉及兩番夫家聘物盡情納在棺內入殮將棺木暫寄清安寺中且説拜住在家聞得此變情知小姐為彼而死曉得柩寄清安寺中要去哭他一番是夜來到寺中見了棺柩不覺傷心撫膺大慟真是哭得三生諸佛都垂淚滿房禪侶盡長籲哭罷將雙手扣棺道小姐陰靈不遠拜住在此只聽得棺內低低應道快開了棺我已活了拜住聽得明白欲要開時將棺木四圍一看漆釘牢固難以動手乃對本房主僧説道棺中小姐原是我妻屈死今棺中説道已活我欲開棺獨自一人難以著力須求師父們幫助僧道此宣徽院小姐之棺誰敢私開開棺者須有罪拜住道開棺之罪我一力當之不致相纍況且暮夜無人知覺若小姐果活了放了出來棺中所有當與師輩共分若是不活也等我見他一面仍舊蓋上誰人知道那些僧人見説共分所有他曉得棺中隨殮之物甚厚也起了利心亦且拜住興頭時與這些僧人也是門徒施主不好違拗便將一把斧頭把棺蓋撬將開來只見劃然一聲棺蓋開處速哥失裏便在棺內坐了起來見了拜住彼此喜極拜住便説道小姐再生之慶真是冥數也虧得寺僧助力開棺小姐便脫下手上金釧一對及頭上首飾一半送與僧人剩下的還直數萬兩拜住與小姐商議道本該報宣徽得知只是恐怕有變而今身邊有財物不如瞞著遠去只央寺僧買些漆來把棺木仍舊漆好不説出來神不知鬼不覺此為上策寺僧受了重賄無有不依照舊把棺木漆得光淨牢固並不露一些風聲拜住遂挈了速哥失裏走到上都尋房居住那時身邊豐厚拜住又尋了一館教著蒙古生數人復有月俸家道從容盡可過日夫妻兩個你恩我愛不覺已過一年也無人曉得他的事也無人曉得甚麼宣徽之女同僉之子卻説宣徽自喪女後心下不快也不去問拜住下落好些時不見了他只説是流離顛沛連存亡不可保了一日旨意下來拜宣微做開平尹宣徽帶了家眷赴任那府中事體煩雜宣徽要請一個館客做記室代筆劄之勞爭奈上都是個極北夷方那裏尋得個儒生出來訪有多日有人對宣徽道有一個士人自大都挈家寓此也是個色目人設帳民間極有學問府君若要覓西賓只有此人可以充得宣微大喜差個人拿帖去快請了來拜住看見了名帖心知正是宣徽忙對小姐説知了穿著整齊前來相見宣徽看見認得是拜住吃了一驚想道我幾時不見了他道是流落死亡了如何得衣服濟楚容色充盛如此不覺追念女兒有些傷感起來便對拜住道昔年有負足下反纍愛女身亡慚恨無極今足下何因在此曾有親事未曾拜住道重蒙垂念足見厚情小壻不敢相瞞令愛不亡見同在此宣微大驚道那有此話小女當日自縊今尸棺見寄清安寺中那得有個活的在此間拜住道令愛小姐與小壻實是夙緣未絶得以重生今見在寓所可以即來相見豈敢有誑宣徽忙走進去與三夫人説了大家不信拜住又叫人去對小姐説了一乘轎竟擡入府衙裏來驚得合家人都上前來爭看果然是速哥失裏那宣徽與三夫人不管是人是鬼且抱著頭哭做了一團哭罷定睛再看看去身上穿戴的還是殮時之物行步有影衣衫有縫言語有聲料想真是個人了那三夫人道我的兒就是鬼我也捨不得放你了只有宣徽是個讀書人見識終是不信疑心道此是屈死之鬼所以假託人形幻惑年少口裏雖不説破卻暗地使人到大都清安寺問僧家的緣故僧家初時抵賴後見來人説道已自相逢廝認了才把真心話一一説知來人不肯便信僧家把棺木撬開與他看只見是個空棺一無所有回來報知宣徽道此情是實宣徽道此乃宿世前緣也難得小姐一念不移所以有此異事早知如此只該當初依我説收養了女壻怎見得有此多般三夫人見説自覺沒趣懊悔無極把女壻越看待得親熱竟贅他在家中終身後來速哥失裏與拜住生了三子長子教化仕至遼陽等處行中省左丞次子忙古歹幼子黑廝俱為內怯薛帶禦器械教化與忙古歹先死黑廝直做到樞密院使天兵至燕元順帝禦清寧殿集三宮皇后太子同議避兵黑廝與丞相失列門哭諫道天下者世祖之天下也當以死守順帝不聽夜半開建德門遁去黑廝隨入沙漠不知所終平章府轎擡死女清安寺漆整空棺若不是生前分定幾曾有死後重歡卷十韓秀才乘亂聘嬌妻吳太守憐才主姻簿詩曰嫁女須求女壻賢貧窮富貴總由天姻緣本是前生定莫為炎涼輕變遷話説人生一世滄海變為桑田目下的賤貴窮通都做不得準的如今世人一肚皮勢利念頭見一個人新中了舉人進士生得女兒便有人搶來定他為媳生得男兒便有人捱來許他為壻萬一官卑祿薄一旦夭亡仍舊是個空公子窮小姐此時懊悔已自遲了盡有貧苦的書生向富貴人家求婚便笑他陰溝洞裏思量天鵝肉吃忽然青年高第然後大家懊悔起來不怨悵自己沒有眼睛便嗟歎女兒無福消受所以古人會擇壻的偏揀著富貴人家不肯應允卻把一個如花似玉的愛女嫁與那酸黃齏爛豆腐的秀才沒有一人不笑他呆癡道是好一塊羊肉可惜落在狗口裏了一朝天子招賢連登雲路五花誥七香車盡著他女兒受用然後服他先見之明這正是凡人不可貌相海水不可鬥量只在論女壻的賢愚不在論家勢的貧富當初韋臯呂蒙正多是樣子卻説春秋時鄭國有一個大夫叫做徐吾犯父母已亡止有一同胞妹子那小姐年方十六生得肌如白雪臉似櫻桃鬢若堆鴉眉橫丹鳳吟得詩作得賦琴棋書畫女工針指無不精通還有一件好處那一雙嬌滴滴的秋波最會相人大凡做官的與他哥哥往來他常在簾中偷看便識得那人貴賤窮通終身結果分毫沒有差錯所以一發名重當時卻有大夫公孫楚聘他為婦尚未成婚那公孫楚有個從兄叫做公孫黑官居上大夫之職聞得那小姐貌美便央人到徐家求婚徐大夫回他已受聘了公孫黑原是不良之徒便倚著勢力不管他肯與不肯備著花紅酒禮笙簫鼓樂送上門來徐大夫無計可施次日備了酒筵請他兄弟二人來聽妹子自擇公孫黑曉得要看女壻便濃妝豔服而來又自賣弄富貴將那金銀彩緞排列一廳公孫楚只是常服也沒有甚禮儀旁人觀看的都贊那公孫黑暗猜道一定看中他了酒散二人謝別而去小姐房中看過便對哥哥説道公孫黑官職又高面貌又美只是帶些殺氣他年決不善終不如嫁了公孫楚雖然小小有些折挫久後可以長保富貴大夫依允便辭了公孫黑許了公孫楚擇日成婚已畢那公孫黑懷恨在心姦謀又起忽一日穿了甲胄外裏用便服遮著到公孫楚家裏來欲要殺他奪其妻子已有人通風與公孫楚知道疾忙執著長戈趕出公孫黑措手不及著了一戈負痛飛奔出門便到宰相公孫僑處告訴此時大夫都聚商議此事公孫楚也來了爭辨了多時公孫僑道公孫黑要殺族弟其情未知虛實卻是論官職也該讓他論長幼也該讓他公孫楚卑幼擅動干戈律當遠竄當時定了罪名貶在吳國安置公孫楚回家與徐小姐抱頭痛哭而行公孫黑得意越發耀武揚威了外人看見都懊悵徐小姐不嫁得他就是徐大夫也未免世俗之見小姐全然不以為意安心等守卻説鄭國有個上卿遊吉該是公孫僑之後輪著他為相公孫黑思想奪他權位日夜蓄謀不時就要作起反來公孫僑得知便疾忙乘其未發差官數了他的罪惡逼他自縊而死這正合著徐小姐不善終的話了那公孫楚在吳國住了三載赦罪還朝就代了那上大夫職位富貴已極遂與徐小姐偕老假如當日小姐貪了上大夫的聲勢嫁著公孫黑後來做了叛臣之妻不免守幾十年之寡即此可見目前貴賤都是論不得的説話的你又差了天下好人也有窮到底的難道一個個為官不成俗語道得好賒得不如現得何如把女兒嫁了一個富翁且享此目前的快活看官有所不知就是會擇壻的也都要跟著命走一飲一啄莫非前定卻畢竟不如嫁了個讀書人到底不是個沒望頭的如今再説一個生女的富人只為倚富欺貧思負前約虧得太守廉明成其姻事後來夫貴妻榮遂成佳話有詩一首為證當年紅拂困閨中有意相隨李衛公日後榮華誰可及只緣雙目識英雄話説國朝正德年間浙江台州府天臺縣有一秀才姓韓名師愈表字子文父母雙亡也無兄弟只是一身他年十二歲上就遊庠的養成一肚皮的學問真個是才過子建貌賽潘安胸中博覽五車腹內廣羅千古他日必為攀桂客目前尚作采芹人那韓子文雖是滿腹文章卻當不過家道消乏在人家處館勉強糊口所以年過二九尚未有親一日遇著端陽節近別了主人家回來住在家裏了數日忽然心中想道我如今也好議親事了據我胸中的學問就是富貴人家把女兒匹配也不冤屈了他卻是如今世人誰肯又想了一會道説便是這樣説難道與我一樣的儒家我也還對他的女兒不過當下開了拜匣稱出束銀五錢做個卦筒封了放在匣內教書僮拿了隨著信步走到王媒婆家裏來那王媒婆接著見他是個窮鬼也不十分動火他的吃過了一盞茶便開口問道秀才官人幾時回家的甚風吹得到此子文道來家五日了今日到此有些事體相央便在家僮手中接過封筒雙手遞與王婆道薄意伏乞笑納事成再有重謝王婆推辭一番便接了道秀才官人敢是要説親麼子文道正是家下貧窮不敢仰攀富戶但得一樣儒家女兒可備中饋延子嗣足矣積下數年束四五十金聘禮也好勉強出得乞媽媽與我訪個相應的人家王婆曉得窮秀才説親自然高來不成低來不就的卻難推拒他只得回復道既承官人厚惠且請回家待老婢子慢慢的尋覓有了話頭便來回報那子文自回家去了一住數日只見王婆走進門來叫道官人在家麼子文接著問道姻事如何王婆道為著秀才官人鞋子都走破了方才問得一家乃是縣前許秀才的女兒年紀十七歲那秀才前年身死娘子寡居在家裏家事雖不甚富卻也過得説起秀才官人到也有些肯了只是説道我女兒嫁個讀書人盡也使得但我們婦人家又不曉得文字目今提學要到台州歲考待官人考了優等就出吉帖便是子文自恃才高思忖此事十有八九對王婆道既如此説便待考過議親不遲當下買幾杯白酒請了王婆自別去了子文又到館中靜坐了一月余宗師起馬牌已到那宗師姓梁名士范江西人不一日到了台州那韓子文頭上戴了紫菜的巾身上穿了腐皮的衫腰間系了芋艿的縧腳下穿了木耳的靴同衆生員迎接入城行香講書已過便張告示先考府學及天臺臨海兩縣到期子文一筆寫完甚是得意出場來將考卷謄寫出來請教了幾個先達幾個朋友無不歎賞又自己玩了幾遍拍著桌子道好文字好文字就做個案元幫補也不為過何況優等又把文字來鼻頭邊聞一聞道果然有些老婆香卻説那梁宗師是個不識文字的人又且極貪又且極要奉承鄉官及上司前日考過杭嘉湖無一人不罵他的幾乎吃秀才們打了曾編著幾句口號道道前梁鋪中人姓富出賣生儒不誤主顧又有一個對道公子笑欣欣喜弟喜兄都入學童生愁慘慘恨祖恨父不登科又把四書成語做著幾股道君子學道公則悅小人學道盡信書不學詩不學禮有父兄在如之何其廢之誦其詩讀其書雖善不尊如之何其可也那韓子文是個窮儒那有銀子鑽刺十日發出案來只見公子富翁都占前列了你道那韓師愈的名字卻在那裏正是似王無一豎如川卻又眠曾有一首黃鶯兒詞單道那三