精靈現出幫襯的湖廣鄉試日某公在場閲卷倦了朦朧打盹只聽得耳畔歎息道窮死窮死救窮救窮驚醒來想一想道此必是有士子要中的作怪了仔細聽聽聲在一箱中出伸手取卷每拾起一卷耳邊低低道不是如此屢屢落後一卷聽得耳邊道正是某公看看文字果好取中之其聲就止出榜後本生來見某公問道場後有何異境本生道沒有某公道場中甚有影響生平好講什麼話本生道門生家寒不堪在窗下每作一文成只呼窮死救窮以此為常別無他話某公乃言閲卷時耳中所聞如此説了共相歎異連本生也不知道怎地起的這不是自己一念堅切精靈活現麼精誠所至金石為開果然勇猛自有神來有個該中了人與鬼神兩相湊巧幫襯的浙場有個士子原是少年飽學走過了好幾科多不得中落後一科年紀已長也不做指望了幸得有了科舉圖進場完故事而已進場之夜忽夢見有人對他道你今年必中但不可寫一個字在卷上若寫了就不中了只可交白卷士子醒來道這樣夢也做得奇天下有這事麼不以為意進場領卷正要構思下筆只聽得耳邊廂又如此説道決寫不得的他心裏疑道好不作怪把題目想了一想頭紅面熱一字也忖不來就暴躁起來道多管是又不該中了所以如此悶悶睡去只見祖父俱來分付道你萬萬不可寫一字包你得中便了醒來歎道這怎麼解如此夢魂纏擾料無佳思吃苦做什麼落得不做投了白卷出去罷出了場來自道頭一個就是他貼出不許進二場了只見試院開門貼出許多不合式的來有不完篇的有脫了稿的有差寫題目的紛紛不計其數正揀他一字沒有的不在其內到哈哈大笑道這些彌封對讀的多失了魂了隔了兩日不見動靜隨衆又進二場也只是見不貼出瞞生人眼進去戲耍罷了才捏得筆耳邊又如此説他自笑道不勞分付頭場白卷二場寫他則甚世間也沒這樣呆子遊衍了半日交卷而出道這番決難逃了只見第二場又貼出許多仍復沒有己名自家也好生吒異又隨衆進了三場又交了白卷自不必説朋友們見他進過三場多來請教文字他只好背地暗笑不好説得到得榜發公然榜上有名高中了他只當是個夢全不知是那裏起的隨著赴鹿鳴宴風騷真是十分僥幸領出卷來看三場俱完好且是錦繡滿紙驚得目睜口呆不知其故原來彌封所兩個進士知縣多是少年科第有意思的道是不進得內簾心中不伏氣見了題目有些技癢要做一卷試試手段看還中得與否只苦沒個用印卷子雖有個把不完卷的遞將上來卻也有一篇半篇先寫在上了用不著的已後得了此白卷心中大喜他兩個記著姓名便你一篇我一篇共相斟酌改訂湊成好卷彌封了發去謄録三場皆如此果然中了出來兩個進士暗地得意道是這人有天生造化反著人尋將他來問其白卷之故此生把夢寐叮囑之事場中耳畔之言一一説了兩個進士道我兩人偶然之興皆是天教代足下執筆的此生感激無盡認做了相知門生張公吃酒李公卻醉命若該時一字不費這多是該中的話若是不該中也會千奇萬怪起來有一個不該中鬼神反來耍他的萬曆癸未年有個舉人管九臯赴會試場前夢見神人傳示七個題目醒來個個記得第二日尋坊間文揀好的熟記了入場七題皆合喜不自勝信筆將所熟文字寫完不勞思索自道是得了神助必中無疑誰知是年主考厭薄時文盡搜括坊間同題文字入內磨對有試卷相同的便塗壞了管君為此竟不得中只得選了官去若非先夢七題自家出手去做還未見得不好這不是鬼神明明耍他夢是先機番成悔氣鬼善揶揄直同兒戲有一個不該中強中了鬼神來擺布他的浙江山陰士人諸葛一鳴在本處山中發憤讀書不回過歲隆慶庚午年元旦未曉起身梳洗將往神祠中禱祈途間遇一群人喝道而來心裏疑道山中安得有此佇立在旁細看只見鼓吹前導馬上簇擁著一件東西落後貴人到乃一金甲神也一鳴明知是陰間神道迎上前來拜問道尊神前驅所迎何物神道今科舉子榜一鳴道小生某人正是秀才榜上有名否神道沒有君名在下科榜上一鳴道小生家貧等不得尊神可移早一科否神道事甚難然與君相遇亦有緣試為君圖之若得中須多焚楮錢我要去使用才安穩不然我亦有罪犯一鳴許諾及後邊榜發一鳴名在末行上有丹印緣是數已填滿一個教官將著一鳴卷竭力來薦至見諸聲色主者不得已割去榜末一名將一鳴填補此是鬼神在暗中作用一鳴得中甚喜匆匆忘了燒楮錢赴宴歸寓見一鬼披發在馬前哭道我為你受禍了一鳴認看正是先前金甲神甚不過意道不知還可焚錢相救否鬼道事已遲了還可相助一鳴買些楮錢燒了及到會試鬼復來道我能助公登第預報七題一鳴打點了進去果然不差一鳴大喜到第二場將到進去了鬼才來報題一鳴道來不及了鬼道將文字放在頭巾內帶了進去我遮護你便了一鳴依了他到得監試面前不消搜得巾中文早已墜下算個懷挾作弊當時打了枷號示衆前程削奪此乃鬼來報前怨作弄他的可見命未該中只早一科也是強不得的躁於求售並喪厥有人耶鬼耶各任其咎看官只看小子説這幾端可見功名定數毫不可強所以道窗下莫言命場中不論文世間人總在這定數內被他哄得昏頭昏腦的小子而今説一段指破功名定數的故事來完這回正話唐時有個江陵副使李君他少年未第時自洛陽赴長安進士舉經過華陰道中下店歇宿只見先有一個白衣人在店雖然渾身布素卻是骨秀神清豐格出衆店中人甚多也不把他放在心上李君是聰明有才思的人便瞧在眼裏道此人決然非凡就把坐來移近了把兩句話來請問他只見談吐如流百叩百應李君愈加敬重與他圍爐同飲款洽倍常明日一路同行至昭應李君道小弟慕足下塵外高蹤意欲結為兄弟倘蒙不棄伏乞見教姓名年歲以便稱呼白衣人道我無姓名亦無年歲你以兄稱我以兄禮事我可也李君依言當下結拜為兄至晚對李君道我隱居西嶽偶出遊行甚荷郎君相厚之意我有事故明旦先要往城不得奉陪如何李君道邂逅幸與高賢結契今遽相別不識有甚言語指教小弟否白衣人道郎君莫不要知後來事否李君再拜懇請道若得預知後來事足可趨避省得在黑暗中行不勝至願白衣人道仙機不可泄漏吾當緘封三書與郎君日後自有應驗李君道所以奉懇專貴在先知後事若直待事後有驗要曉得他怎的白衣人道不如此説凡人功名富貴雖自有定數但吾能前知便可為郎君指引若到其間開他自有用處可以周全郎君富貴李君見説欣然請教白衣人乃取紙筆在月下不知寫些什麼摺做三個柬外用三個封封了拿來交與李君道此三封郎君一生要緊事體在內封有次第內中有祕語直到至急時方可依次而開開後自有應驗依著做去當得便宜若無急事漫自開他一毫無益的切記切記李君再拜領受珍藏篋中次日各相別去李君到了長安應過進士舉不得中第李君父親在時是松滋令家事頗饒只因帶了宦囊到京營求升遷病死客邸宦囊一空李君痛父淪喪門戶蕭條意欲中第才歸重整門閥家中多帶盤纏拚住京師不中不休自恃才高道是舉手可得如拾芥之易怎知命運不對連應過五六舉只是下第盤纏多用盡了欲待歸去無有路費欲待住下以俟再舉沒了賃房之資求容足之地也無左難右難沒個是處正在焦急頭上猛然想道仙兄有書分付道有急方開今日已是窮極無聊此不為急還要急到那裏去不免開他頭一封看是如何然是仙書不可造次是夜沐浴齋素到第二日清旦焚香一爐再拜禱告道弟子只因窮困敢開仙兄第一封書只望明指迷途則個告罷拆開外封裏面又有一小封面上寫著道某年月日以困迫無資用開第一封李君大驚道真神仙也如何就曉得今日目前光景且開封的月日俱不差一毫可見正該開的內中必有奇處就拆開小封來看封內另一紙寫著不多幾個字可青龍寺門前坐看罷曉得有些奇怪怎敢不依只是疑心道到那裏去何干問問青龍寺遠近原來離住處有五十多裏路李君只得騎了一頭蹇驢走到寺前日色已將晚了果然依著書中言語在門檻上呆呆地坐了一回不見什麼動靜天昏黑下來心裏有些著急又想了仙書自家好笑道好癡子這裏坐可是有得錢來的麼不指望錢今夜且沒討宿處了怎麼處正遲疑間只見寺中有人行走響看看至近卻是寺中主僧和個行童來關前門見了李君問道客是何人坐在此間李君道驢弱居遠天色已晚前去不得將寄宿於此主僧道門外風寒豈是宿處且請到院中來李君推託道造次不敢驚動主僧再三邀進只得牽了蹇驢隨著進來主僧見是士人具饌烹茶不敢怠慢飲間主僧熟視李君上上下下估著看了一回就轉頭去與行童説一番笑一番李君不解其意又不好問得只見主僧耐了一回突然問道郎君何姓李君道姓李主僧驚問道果然姓李李君道見説賤姓如此著驚何故主僧道松滋李長官是郎君盛族相識否李君站起身顰蹙道正是某先人也主僧不覺垂淚不已説道老僧與令先翁長官久托故舊往還不薄適見郎君豐儀酷似長官所以驚疑不料果是老僧奉求已多日今日得遇實為萬幸李君見説著父親心下感傷涕流被面道不曉得老師與先人舊識頃間造次失禮然適聞相求弟子已久不解何故主僧道長官昔年將錢物到此求官得疾狼狽有錢二千貫寄在老僧常住庫中後來一病不起此錢無處發付老僧自是以來心中常如有重負不能釋然今得郎君到此完此公案老僧此生無事矣李君道向來但知先人客死宦囊無蹤不知卻寄在老師這裏然此事無個證見非老師高誼在古人之上怎肯不昧其事反加意尋訪重勞記念此德難忘主僧道老僧世外之人要錢何用何況他人之財豈可沒為己有自增罪業老僧只怕受託不終致負夙債貽纍來生今幸得了此心事魂夢皆安老僧看郎君行況蕭條明日但留下文書一紙做個執照盡數輦去為旅邸之資盡可營生尊翁長官之目也瞑了李君悲喜交集悲則悲著父親遺念喜則喜著頓得多錢稱謝主僧不盡又自念仙書之驗如此真希有事也青龍寺主古人徒受託錢財誼不誣貧子衣珠雖故在若非仙訣可能符是晚主僧留住安宿殷勤相待次日盡將原鏹二千貫發出交明與李君李君寫個收領文字遂雇騾馱載珍重而別李君從此買宅長安頓成富家李君一向門閥清貴只因生計無定連妻子也不娶得今長安中大家見他富盛起來又是舊家門望就有媒人來説親與他他娶下成婚作久住之計又應過兩次舉只是不第年紀看看長了親戚朋友僕從等多勸他且圖一官以為終身之計如何被科名騙老了李君自恃才高且家有餘資不愁衣食自道只爭得此一步差好多光景怎肯甘心就住讓那才不如我的得意了做盡天氣且索再守他次把做處本年又應一舉仍復不第連前卻滿十次了心裏雖是不伏氣卻是遞年打蟖銄也覺得不耐煩了説話的如何叫得打蟖銄看官聽説唐時榜發後與不第的舉子吃解悶酒渾名打蟖銄此樣酒席可是吃得十來番起的李君要住手又割捨不得要寬心再等不但攛掇的人多自家也覺爭氣不出了況且妻子又未免圖他一官半職榮貴耳邊日常把些不入機的話來激聒一發不知怎地好竟自沒了主意含著一眶眼淚道一歇了手終身是個不第舉子就僥幸官職高貴也説不響了躊躇不定幾時猛然想道我仙兄有書道急時可開此時雖無非常急事卻是住與不住是我一生了當的事關頭所差不小何不開他第二封一看以為行止主意定了又齋戒沐浴次日清旦啓開外封只見裏面寫道某年月日以將罷舉開第二封李君大喜道元來原該是今日開的既然開得不差裏面必有決斷吾終身可定了忙又開了小封看時也不多幾個字寫著可西市轡行頭坐李君看了道這又怎麼解我只道明明説個還該應舉不應舉卻又是啞謎當日青龍寺須有個寺僧欠錢這個西市轡行頭難道有人欠我及第的債不成但是仙兄説話不曾差了一些只索依他走去看是什麼緣故卻其實有些好笑自言自語了一回只得依言一直走去走到那裏自想道可在那處坐好一眼望去一個去處但見望子高挑埕頭廣架門前對子強斯文帶醉歪題壁上詩篇村過客乘忙謅下入門一陳腥膻氣案上原少佳肴到坐幾番吆喝聲面前未來供饌謾説聞香須下馬枉誇知味且停驂無非行路救飢或是邀人議事元來是一個大酒店李君獨坐無聊想道我且沽一壺吃著坐看步進店來店主人見是個士人便拱道樓上有潔淨坐頭請官人上樓去李君上樓坐定看那樓上的東首盡處有間潔淨小閣子門兒掩著象有人在裏邊坐下的寂寂默默在裏頭李君這付座底下卻是店主人的房樓板上有個穿眼眼裏偷窺下去是直見的李君一個在樓上還未見小二送酒菜上來獨坐著間不過聽得腳底下房裏頭低低説話他卻在地板眼裏張看只見一個人將要走動身一個拍著肩叮囑聽得落尾兩句説道交他家郎君明日平明必要到此相會若是苦沒有錢即説元是且未要錢的不要挫過遲一日就無及了去的那人道他還疑心不的確未肯就來怎好李君聽得這幾句話有些古怪便想道仙兄之言莫非應著此間人的事體麼即忙奔下樓來卻好與那兩個人撞個劈面乃是店主人與一個驀生人李君扯住店主人問道你們適才講的是什麼話店主人道侍郎的郎君有件緊要事幹要一千貫錢來用托某等尋覓故此商量尋個頭主李君道一千貫錢不是小事那裏來這個大財主好借用店主道不是借用説得事成時竟要了他這一千貫錢也還算是相應的李君再三要問其事備細店主人道與你何干何必定要説破只見那要去的人立定了腳看他問得急切回身來道何不把實話對他説總是那邊未見得成或者另絆得頭主大家商量商量也好店主人方才附著李君耳朵説道是營謀來歲及第的事李君正鬥著肚子裏事又合著仙兄之機吃了一驚忙問道此事虛實如何店主人道侍郎郎君見在樓上房內怎的不實李君道方才聽見你們説話還是要去尋那個的是店主人道有個舉人要做此事約定昨日來成的直等到晚竟不見來不知為湊錢不起不知為疑心不真卻是郎君元未要錢直等及第了才交足只怕他為無錢不來故此又要這位做事的朋友去約他若明日不來郎君便自去了只可惜了這好機會李君道好教兩位得知某也是舉人要錢時某也有便就等某見一見郎君做了此事可使得否店主人道官人是實話麼李君道怎麼不實店主人道這事原不揀人的若實實要做有何不可那個人道從古道有奶便為娘我們見鍾不打倒去斂銅官人若果要做我也不到那邊去再走壞這樣間步了店主人道既如此可就請上樓與郎君相見面議何如兩個人拉了李君一同走到樓上來那個人走去東首閣子裏説了一會話只見一個人踱將出來看他怎生模樣白胖面龐癡肥身體行動許多珍重周旋頗少謙恭擡眼看人常帶幾分蒙昧出言對衆時牽數位含糊頂著祖爺現成家享這兒孫自在福這人走出閣來店主人忙引李君上前指與李君道此侍郎郎君也可小心拜見李君施禮已畢敘坐了郎君舉手道公是舉子麼李君通了姓名道適才店主人所説來歲之事萬望扶持郎君點頭未答且目視店主人與那個人做個手勢道此話如何店主人道數目已經講過昨有個人約著不來推道無錢今此間李官人有錢情願成約故此特地引他謁見郎君郎君道咱要錢不多如何今日才有主店主人道舉子多貧一時間鬥不著郎君道揀那富的拉一個來罷了店主人道富的要是要又撞不見這樣方便郎君又拱著李君問店主人道此間如何李君不等店主人回話便道某寄籍長安家業多在此只求事成千貫易處不敢相負郎君道甚妙甚妙明年主司侍郎乃吾親叔父也必不誤先輩之事今日也未就要交錢只立一約待及第之後即命這邊主人走領料也不怕少了的李君見説得有根因又且是應著仙書曉得其事必成放膽做著再無疑慮即袖中取出兩貫錢來央店主人備酒來吃一面飲酒一面立約只等來年成事交銀當下李君又將兩貫錢謝了店主人與那一個人各各歡喜而別到明年應舉李君果得這個關節之力榜下及第及第後將著一千貫完那前約自不必説眼見得仙兄第二封書指點成了他一生之事真才屢挫誤前程不若黃金立可成今看仙書能指引方知銅臭亦天生李君得第授官自念富貴功名皆出仙兄祕授謎訣之力思欲會見一面以謝恩德又要細問終身之事差人到了華陰西嶽各處探訪並無一個曉得這白衣人的下落只得罷了以後仕宦得意並無什麼急事可問這第三封書無因得開官至江陵副使在任時有一日忽患心痛少頃之間暈絶了數次危迫特甚方轉念起第三封書來對妻子道今日性命俄頃可謂至急仙兄第三封書可以開看必然有救法在內了自己起床不得就叫妻子灌洗了虔誠代開開了外封也是與前兩番一樣的家數寫在裏面道某年月日江陵副使忽患心痛開第三封妻子也喜道不要説時日相合連病多曉得在先了畢竟有解救之法連忙開了小封急急看時只叫得苦元來比先前兩封的字越少了剛剛止得五字道可處置家事妻子看罷曉得不濟事了放聲大哭李君笑道仙兄數已定矣哭他何干吾貧仙兄能指點富吾吾賤仙兄能指點貴吾今吾死仙兄豈不能指點活吾蓋因是數去不得了就是當初富吾貴吾也元是吾命中所有之物前數分明止是仙兄前知費得一番引路我今思之一生應舉真才卻不能一第直待時節到來還要遇巧假手于人方得成名可不是數已前定天下事大約強求不得的而今官位至此仙兄判斷已決我豈復不知止足尚懷遺恨哉遂將家事一面處置了當隔兩日含笑而卒這回書叫做三拆仙書奉勸世人看取數皆前定如此不必多生妄想那有才不遇時之人也只索引命自安不必抑鬱不快了人生自合有窮時縱是仙家詎得私富貴只緣乘巧湊應知難改蓋棺期
