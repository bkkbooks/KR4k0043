原來人生最不可使性況且這小人買賣不過爭得一二個錢有何大事常見大人家強梁僮仆每每借著勢力動不動欺打小民到得做出事來又是家主失了體面所以有正經的必然嚴行懲戒只因王生不該自己使性動手打他所以到底為此受纍這是後話卻説王生當日見客人悶倒吃了一大驚把酒意都驚散了連忙喝叫扶進廳來眠了將茶湯灌將下去不逾時蘇醒轉來王生對客人謝了個不是討些酒飯與他吃了又拿出白絹一匹與他權為調理之資那客人回嗔作喜稱謝一聲望著渡口去了若是王生有未卜先知的法術慌忙向前攔腰抱住扯將轉來就養他在家半年兩個月也是情願不到得惹出飛來橫禍只因這一去有分教雙手撒開金線網從中釣出是非來那王生見客人已去心頭尚自跳一個不住走進房中與妻子説了道幾乎做出一場大事來僥幸僥幸此時天已晚了劉氏便叫丫鬟擺上幾樣菜蔬燙熱酒與王生壓驚飲過數杯只聞得外邊叩門聲甚急王生又吃一驚掌燈出來看時卻是渡頭船家周四手中拿了白絹竹籃倉倉皇皇對王生説道相公你的禍事到了如何做出這人命來唬得王生面如土色只得再問緣由周四道相公可認得白絹竹籃麼王生看了道今日有個湖州的賣薑客人到我家來這白絹是我送他的這竹籃正是他盛薑之物如何卻在你處周四道下晝時節是有一個湖州姓呂的客人叫我的船過渡到得船中痰火病大發將次危了告訴我道被相公打壞了他就把白絹竹籃交付與我做個證據要我替他告官又要我到湖州去報他家屬前來伸冤討命説罷瞑目死了如今尸骸尚在船中船已撑在門首河頭了且請相公自到船中看看憑相公如何區處王生聽了驚得目睜口呆手麻腳軟心頭恰像有個小鹿兒撞來撞去的口裏還只得硬著膽道那有此話背裏教人走到船裏看時果然有一個死尸骸王生是虛心病的慌了手腳跑進房中與劉氏説知劉氏道如何是好王生道如今事到頭來説不得了只是買求船家要他乘此暮夜將尸首設法過了方可無事王生便將碎銀一包約有二十多兩袖在手中出來對船家説道家長不要聲張我與你從長計議事體是我自做得不是了卻是出於無心的你我同是溫州人也須有些鄉里之情何苦到為著別處人報仇況且報得仇來與你何益不如不要提起待我出些謝禮與你求你把此尸載到別處拋棄了黑夜裏誰人知道船家道拋棄在那裏倘若明日有人認出來根究根原連我也不得乾淨王生道離此不數裏就是我先父的墳塋極是僻靜你也是認得的乘此暮夜無人就煩你船載到那裏悄悄地埋了人不知鬼不覺周四道相公的説話甚是有理卻怎麼樣謝我王生將手中之物出來與他船家嫌少道一條人命難道只值得這些些銀子今日湊巧死在我船中也是天與我的一場小富貴一百兩銀子是少不得的王生只要完事不敢違拗點點頭進去了一會將那些現銀及衣裳首飾之類取出遞與周四道這些東西約莫有六十金了家下貧寒望你將就包容罷了周四見有許多東西便自口軟了道罷了罷了相公是讀書之人只要時常看覷我就是不敢計較王生此時是情急的正是得他心肯日是我運通時心中已自放下幾分又擺出酒飯與船家吃了隨即叫過兩個家人分付他尋了鋤頭鐵耙之類內中一個家人姓胡因他為人凶狠有些力氣都稱他做胡阿虎當下一一都完備了一同下船到墳上來揀一塊空地掘開泥土將尸首埋藏已畢又一同上船回家裏來整整弄了一夜漸漸東方已發動了隨即又請船家吃了早飯作別而去王生教家人關了大門各自散訖王生獨自回進房來對劉氏説道我也是個故家子弟好模好樣的不想遭這一場反被那小人逼勒説罷淚如雨下劉氏勸道官人這也是命裏所招應得受些驚恐破此財物不須煩惱今幸得靠天太平無事便是十分僥幸了辛苦了一夜且自將息將息當時又討些茶飯與王生吃了各各安息不題過了數日王生見事體平靜又買些三牲福物之類拜獻了神明祖宗那周四不時的來假做探望王生殷殷勤勤待他不敢衝撞些小借掇勉強應承周四已自從容了賣了渡船開著一個店鋪自此無話看官聽説王生到底是個書生沒甚見識當日既然買囑船家將尸首載到船上只該聚起乾柴一把火焚了無影無蹤卻不乾淨只為一時沒有主意將來埋在地中這便是斬草不除根萌芽春再發又過了一年光景真個濃霜只打無根草禍來隻奔福輕人那三歲的女兒出起極重的痘子來求神問蔔請醫調治百無一靈王生只有這個女兒夫妻歡愛十分不舍終日守在床邊啼哭一日有個親眷辦著盒禮來望痘客王生接見茶罷訴説患病的十分沈重不久當危那親眷道本縣有個小兒科姓馮真有起死回生手段離此有三十裏路何不接他來看覷看覷王生道領命當時天色已黑就留親眷吃了晚飯自別去了王生便與劉氏説知寫下請帖連夜喚將胡阿虎來分付道你可五鼓動身拿此請帖去請馮先生早來看痘我家裏一面擺著午飯立等立等胡阿虎應諾去了當夜無話次日王生果然整備了午飯直等至未申時杳不見來不覺的又過了一日到床前看女兒時只是有增無減挨至三更時分那女兒只有出的氣沒有入的氣告辭父母往閻家裏去了正是金風吹柳蟬先覺暗送無常死不知王生夫妻就如失了活寶一般各各哭得發昏當時盛殮已畢就焚化了天明以後到得午牌時分只見胡阿虎轉來回復道馮先生不在家裏又守了大半日故此到今日方回王生垂淚道可見我女兒命該如此如今再也不消説了直到數日之後同伴中説出實話來卻是胡阿虎一路飲酒沈醉失去請帖故此直挨至次日方回造此一場大謊王生聞知思念女兒勃然大怒即時喚進胡阿虎取出竹片要打胡阿虎道我又不曾打殺了人何須如此王生聞得此話一發怒從心上起惡向膽邊生連忙教家僮扯將下去一氣打了五十多板方才住手裏自進去了胡阿虎打得皮開肉綻拐呀拐的走到自己房裏來恨恨的道為甚的受這般鳥氣你女兒痘子本是沒救的了難道是我不接得郎中絶送了他不值得將這般毒打可恨可恨又想了一回道不妨事大頭在我手裏且待我將息棒瘡好了也教他看我的手段不知還是井落在吊桶裏吊桶落在井裏如今且不要露風聲等他先做了整備正是勢敗奴欺主時衰鬼弄人不説胡阿虎暗生姦計再説王生自女兒死後不覺一月有余親眷朋友每每備了酒肴與他釋淚他也漸不在心上了忽一日正在廳前間步只見一班應捕擁將進來帶了麻繩鐵索不管三七二十一望王生頸上便套王生吃了一驚問道我是個儒家子弟怎把我這樣淩辱卻是為何應捕呸了一呸道好個殺人害命的儒家子弟官差吏差來人不差你自到太爺面前去講當時劉氏與家僮婦女聽得正不知甚麼事頭髮了只好立著呆著不敢向前此時不由王生做主那一夥如狼似虎的人前拖後扯帶進永嘉縣來跪在堂下右邊卻有個原告跪在左邊王生擡頭看時不是別人正是家人胡阿虎已曉得是他懷恨在心出首的了那知縣明時佐開口問道今有胡虎首你打死湖州客人姓呂的這怎麼説王生道青天老父不要聽他説謊念王傑弱怯怯的書生如何會得打死人那胡虎原是小的家人只為前日有過將家法痛治一番為此懷恨構此大難之端望爺台照察胡阿虎叩頭道青天爺爺不要聽這一面之詞家主打人自是常事如何懷得許多恨如今尸首現在墳塋左側萬乞老爺差人前去掘取只看有尸是真無尸是假若無尸時小人情願認個誣告的罪知縣依言即便差人押去起尸胡阿虎又指點了地尺方寸不逾時果然擡個尸首到縣裏來知縣親自起身相驗説道有尸是真再有何説正要將王生用刑王生道老爺聽我分訴那尸骸已是腐爛的了須不是目前打死的若是打死多時何不當時就來首告直待今日分明是胡虎那裏尋這尸首霹空誣陷小人的知縣道也説得是胡阿虎道這尸首實是一年前打死的因為主仆之情有所不忍況且以仆首主先有一款罪名故此含藏不發如今不想家主行凶不改小的恐怕再做出事來以致受纍只得重將前情首告老爺若不信時只須喚那四鄰八舍到來問去年某月日間果然曾打死人否即此便知真偽了知縣又依言不多時鄰舍喚到知縣逐一動問果然説去年某月日間有個薑客被王家打死暫時救醒以後不知何如王生此時被衆人指實顔色都變了把言語來左支右吾知縣道情真罪當再有何言這廝不打如何肯招疾忙抽出簽來喝一聲打兩邊皂隸吆喝一聲將王生拖翻著力打了二十板可憐瘦弱書生受此痛棒拷掠王生受苦不過只得一一招成知縣録了口詞説道這人雖是他打死的只是沒有尸親執命未可成獄且一面收監待有了認尸的定罪發落隨即將王生監禁獄中尸首依舊擡出埋藏不得輕易燒毀聽後檢償發放衆人散訖退堂回衙那胡阿虎道是私恨已泄甚是得意不敢回王家見主母自搬在別處住了卻説王家家僮們在縣裏打聽消息得知家主已在監中唬得兩耳雪白奔回來報與主母劉氏一聞此信便如失去了三魂大叫一聲望後便倒未知性命如何先見四肢不動丫鬟們慌了手腳急急叫喚那劉氏漸漸醒轉來叫聲官人放聲大哭足有兩個時辰方才歇了疾忙收拾些零碎銀子帶在身邊換了一身青衣教一個丫鬟隨了分付家僮在前引路徑投永嘉縣獄門首來夫妻相見痛哭失聲王生又哭道卻是阿虎這奴才害得我至此劉氏咬牙切齒恨恨的罵了一番便在身邊取出碎銀付與王生道可將此散與牢頭獄卒好好看覷免致受苦王生接了天色昏黑劉氏只得相別一頭啼哭取路回家胡亂用些晚飯悶悶上床思量昨夜與官人同宿不想今日遭此禍事兩地分離不覺又哭一場淒淒慘慘睡了不題卻説王生自從到獄之後雖則牢頭禁子受了錢財不受鞭捶之苦卻是相與的都是那些蓬頭垢面的囚徒心中有何快活況且大獄未決不知死活如何雖是有人殷勤送衣送飯到底不免受些飢寒之苦身體日漸羸瘠了劉氏又將銀來買上買下思量保他出去又道是人命重事不易輕放只得在監中耐守光陰似箭日月如梭王生在獄中又早懨懨的挨過了半年光景勞苦憂愁染成大病劉氏求醫送藥百般無效看看待死一日家僮來送早飯王生望著監門分付道可回去對你主母説我病勢沈重不好旦夕必要死了教主母可作急來一看我從此要永訣了家僮回家説知劉氏心慌膽戰不敢遲延疾忙顧了一乘轎飛也似擡到縣前來離了數步下了轎走到獄門首與王生相見了淚如湧泉自不必説王生道愚夫不肖誤傷人命以致身陷縲絏辱我賢妻今病勢有增無減了得見賢妻一面死也甘心但只是胡阿虎這個逆奴我就到陰司地府決不饒過他的劉氏含淚道官人不要説這不祥的話且請寬心調養人命既是誤傷又無苦主奴家匡得賣盡田産救取官人出來夫妻完聚阿虎逆奴天理不容到底有個報仇日子也不要在心王生道若得賢妻如此用心使我重見天日我病體也就減幾分了但恐弱質懨懨不能久待劉氏又勸慰了一番哭別回家坐在房中納悶僮仆們自在廳前鬥牌耍子只見一個半老的人挑了兩個盒子竟進王家裏來放下扁擔對家僮問道相公在家麼只因這個人來有分教負屈寒儒得遇秦庭朗鏡行凶詭計難逃蕭相明條有詩為證湖商自是隔天涯舟子無端起禍胎指日王生冤可白災星換做福星來那些家僮見了那人仔細看了一看大叫道有鬼有鬼東逃西竄你道那人是誰正是一年前來賣薑的湖州呂客人那客人忙扯住一個家僮問道我來拜你家主如何説我是鬼劉氏聽得廳前喧鬧走將出來呂客人上前唱了個喏説道大娘聽稟老漢湖州薑客呂大是也前日承相公酒飯又贈我白絹感激不盡別後到了湖州這一年半裏邊又到別處做些生意如今重到貴府走走特地辦些土宜來拜望你家相公不知你家大官們如何説我是鬼旁邊一個家僮嚷道大娘不要聽他一定得知道大娘要救官人故此出來現形索命劉氏喝退了對客人説道這等説起來你真不是鬼了你害得我家丈夫好苦呂客人吃了一驚道你家相公在那裏怎的是我害了他劉氏便將周四如何撑尸到門説留絹籃為證丈夫如何買囑船家將尸首埋藏胡阿虎如何告丈夫招承下獄的情由細細説了一遍呂客人聽罷捶著胸膛道可憐可憐天下有這等冤屈的事去年別去下得渡船那船家見我的白絹問及來由我不合將相公打我垂危留酒贈絹的事情備細説了一番他就要買我白絹我見價錢相應即時賣了他又要我的竹籃兒我就與他作了渡錢不想他賺得我這兩件東西下這般狠毒之計老漢不早到溫州以致相公受苦果然是老漢之罪了劉氏道今日不是老客人來連我也不知丈夫是冤枉的那絹兒籃兒是他騙去的了這死尸卻是那裏來的呂客人想了半回道是了是了前日正在船中説這事時節只見水面上一個尸骸浮在岸邊我見他注目而視也只道出於無心誰知因尸就生姦計了好狠好狠如今事不宜遲請大娘收進了土宜與老漢同到永嘉縣訴冤救相公出獄此為上著劉氏依言收進盤盒擺飯請了呂客人他本是儒家之女精通文墨不必假借訟師就自己寫了一紙訴狀顧乘女轎同呂客人及僮仆等取路投永嘉縣來等了一會知縣升晚堂了劉氏與呂大大聲叫屈遞上訴詞知縣接上從頭看過先叫劉氏起來問劉氏便將丈夫爭價誤毆船家撑尸得財家人懷恨出首的事從頭至尾一一分剖又説直至今日薑客重來才知受枉知縣又叫呂大起來問呂大也將被毆始末賣絹根由一一説了知縣道莫非你是劉氏買出來的呂大叩頭道爺爺小的雖是湖州人在此為客多年也多有相識的在這裏如何瞞得老爺過當時若果然將死何不央船家尋個相識來見一見托他報信復仇卻將來托與一個船家這也還道是臨危時節無暇及此了身死之後難道湖州再沒有個骨肉親戚見是久出不歸也該有人來問個消息若查出被毆傷命就該到府縣告理如何直待一年之後反是王家家人首告小人今日才到此地見有此一場屈事那王傑雖不是小人陷他其禍都因小人而起實是不忍他含冤負屈故此來到台前控訴乞老爺筆下超生知縣道你既有相識在此可報名來呂大屈指説出十數個知縣一一提筆記了卻把後邊的點出四名喚兩個應捕上來分付道你可悄悄地喚他同做證見的鄰舍來應捕隨應命去了不逾時兩夥人齊喚了來只見那相識的四人遠遠的望見呂大便一齊道這是湖州呂大哥如何在這裏一定前日原不曾死知縣又教鄰舍人近前細認都駭然道我們莫非眼花了這分明是被王家打死的薑官不知還是到底救了還是面龐廝像的內中一個道天下那有這般相像的理我的眼睛一看過再不忘記委實是他沒有差錯此時知縣心裏已有幾分明白了即便批準訴狀叫起這一干人分付道你們出去切不可張揚若違我言拿來重責衆人唯唯而退知縣隨即喚幾個應捕分付道你們可密訪著船家周四用甘言美語哄他到此不可説出實情那原首人胡虎自有保家俱到明日午後帶齊聽審應捕應諾分頭而去知縣又發付劉氏呂大回去到次日晚堂伺侯二人叩頭同出劉氏引呂大到監門前見了王生把上項事情盡説了王生聞得滿心歡喜卻似醍醐灌頂甘露灑心病體已減去六七分了説道我初時只怪阿虎卻不知船家如此狠毒今日不是老客人來連我也不知自己是冤枉的正是雪隱鷺鷥飛始見柳藏鸚鵡語方知劉氏別了王生出得縣門乘著小轎呂大與僮仆隨了一同徑到家中劉氏自進房裏教家僮們陪客人吃了晚食自在廳上歇宿次日過午又一同的到縣裏來知縣已升堂了不多時只見兩個應捕將周四帶到原來那周四自得了王生銀子在本縣開個布店應捕得了知縣的令對他説本縣大爺要買布即時哄到縣堂上來也是天理合當敗露不意之中猛擡頭見了呂大不覺兩耳通紅呂大叫道家長哥自從買我白絹竹籃一別直到今日這幾時生意好麼周四頓口無言面如稿木少頃胡阿虎也取到了原來胡阿虎搬在他方近日偶回縣中探親不期應捕正遇著他便上前搗個鬼道你家家主人命事已有苦主了只待原首人來即便審決我們那一處不尋得到胡阿虎認真歡歡喜喜隨著公人直到縣堂跪下知縣指著呂大問道你可認得那人胡阿虎仔細一看吃了一驚心下好生躊躇委決不下一時不能回答知縣將兩人光景一一看在肚裏了指著胡虎大罵道你這個狼心狗行的奴才家主有何負你直得便與船家同謀覓這假尸誣陷人命胡阿虎道其實是家主打死的小人並無虛謬知縣怒道還要口強呂大既是死了那堂下跪的是什麼人喝叫左右夾將起來快快招出姦謀便罷胡阿虎被夾大喊道爺爺若説小人不該懷恨在心首告家主小人情願認罪若要小人招做同謀便死也不甘的當時家主不合打倒了呂大即刻將湯救醒與了酒飯贈了白絹自往渡口去了是夜二更天氣只見周四撑尸到門又有白絹竹籃為證合家人都信了家主卻將錢財買住了船家與小人同載至墳塋埋訖以後因家主毒打小人挾了私仇到爺爺台下首告委實不知這尸真假今日不是呂客人來連小人也不知是家主冤枉的那死尸根由都在船家身上知縣録了口語喝退胡阿虎便叫周四上前來問初時也將言語支吾卻被呂大在旁邊面對知縣又用起刑來只得一一招承道去年某月某日呂大懷著白絹下船偶然問起緣由始知被毆詳細恰好渡口原有這個死尸在岸邊浮著小的因此生心要詐騙王家特地買他白絹又哄他竹籃就把水裏尸首撈在船上了前到王家誰想他一説便信以後得了王生銀子將來埋在墳頭只此是真並無虛話知縣道是便是了其中也還有些含糊那裏水面上恰好有個流尸又恰好與呂大廝像畢竟又從別處謀害來詐騙王生的周四大叫道爺爺冤枉小人若要謀害別人何不就謀害了呂大前日因見流尸故此生出買絹籃的計策心中也道面龐不像未必哄得信小人欺得王生一來是虛心病的二來與呂大只見得一面況且當日天色昏了燈光之下一般的死尸誰能細辨明白三來白絹竹籃又是王生及薑客的東西定然不疑故此大膽哄他一哄不想果被小人瞞過並無一個人認得出真假那尸首的來歷想是失腳落水的小人委實不知呂大跪上前稟道小人前日過渡時節果然有個流尸這話實是真情了知縣也録了口語周四道小人本意只要詐取王生財物不曾有心害他乞老爺從輕擬罪知縣大喝道你這沒天理的狠賊你自己貪他銀子便幾乎害得他家破人亡似此詭計凶謀不知陷過多少人了我今日也為永嘉縣中除了一害那胡阿虎身為家奴拿著影響之事背恩賣主情實可恨合當重行責罰當時喝教把兩人扯下胡阿虎重打四十周四不計其數以氣絶為止不想那阿虎近日傷寒病未痊受刑不起也只為奴才背主天理難容打不上四十死於堂前周四直至七十板後方才昏絶可憐二惡凶殘今日斃於杖下知縣見二人死了責令尸親前來領尸監中取出王生當堂釋放又抄取周四店中布匹估價一百金原是王生被詐之物例該入官因王生是個書生屈陷多時憐他無端改贓物做了給主也是知縣好處墳旁尸首掘起驗時手爪有沙是個失水的無有尸親責令仵作埋之義冢王生等三人謝了知縣出來到得家中與劉氏相持痛哭了一場又到廳前與呂客人重新見禮那呂大見王生為他受屈王生見呂大為他辨誣俱各致個不安互相感激這教不打不成相識以後遂不絶往來王生自此戒了好些氣性就是遇著乞兒也只是一團和氣感憤前情思想榮身雪恥閉戶讀書不交賓客十年之中遂成進士所以説為官做吏的人千萬不要草菅人命視同兒戲假如王生這一樁公案惟有船家心裏明白不是薑客重到溫州家人也不知家主受屈妻子也不知道丈夫受屈本人也不知自己受屈何況公庭之上豈能盡照覆盆慈祥君子須當以此為鑒囹圄刑措號仁君結網羅鉗最枉人寄語昏汙諸酷吏遠在兒孫近在身卷十二陶家翁大雨留賓蔣震卿片言得婦詩曰一飲一啄莫非前定一時戲語終身話柄話説人生萬事前數已定盡有一時間偶然戲耍之事取笑之話後邊照應將來卻像是個讖語響蔔一毫不差乃知當他戲笑之時暗中已有鬼神做主非偶然也只如宋朝崇寧年間有一個姓王的公子本貫浙西人少年發科到都下會試一日將晚到延利坊人家赴席在一個小宅子前經過見一女子生得十分美貌獨立在門內徘徊凝望卻像等候甚麼人的一般王生正注目看他只見前面一夥騎馬的人喝擁而來那女子避了進去王生匆匆也行了不曾問得這家姓張姓李赴了席吃得半醉歸家已是初更天氣復經過這家門首望門內一看只見門已緊閉寂然無人聲王生嗤嗤傍左邊牆腳下一帶走去意思要看他有後門沒有只見數十步外有空地丈餘小小一扇便門也關著在那裏王生想道日間美人只在此中怎能勾再得一見看了他後門正在戀戀不捨忽然隔牆丟出一片東西來掉在地下一響王生幾乎被他打著拾起來看卻是一塊瓦片此時皓月初升光同白晝看那瓦片時有六個字在上面寫得夜間在此相候王生曉得有些蹊蹺又帶著幾分酒意笑道不知是何等人約人做事的待我耍他一耍就在牆上剝下些石灰粉來寫在瓦背上道三更後可出來仍舊望牆裏丟了進去走開十來步遠遠地站著看他有何動靜等了一會只見一個後生走到牆邊低著頭卻像找尋甚麼東西的尋來尋去尋了一回不見甚麼對著牆裏歎了一口氣有一步沒一步的佯佯走了去王生在黑影裏看得明白便道想來此人便是所約之人了只不知裏邊是甚麼人好歹有個人出來必要等著他等到三更月色已高煙霧四合王生酒意已醒看看渴睡上來伸伸腰打個呵欠自笑道睡到不去睡管別人這樣間事正要舉步歸寓忽聽得牆邊小門呀的一響軋然開了一個女子閃將出來月光之下望去看時且是娉婷隨後一個老媽背了一隻大竹箱跟著望外就走王生迎將上去看得仔細正是日間獨立門首這女子那女子看見人來一些不避直到當面一看吃了一驚道不是不是回轉頭來看老媽老媽上前擦擦眼把王生一認也道不是不是快進去那王生倒將身攔在後門邊了一把扯住道還思量進去你是人家閨中女子約人夜間在此相會可是該的我今聲張起來拿你見官醜聲傳揚叫你合家做人不成我偶然在此遇著也是我與你的前緣你不如就隨了我去我是在此會試的舉人也不辱沒了你那女子聽罷戰抖抖的淚如雨下沒做道理處老媽説道若是聲張果是利害既然這位官人是個舉人小娘子權且隨他到下處再處而今沒奈何了一會兒天明了有人看見卻了不得那女子一頭哭王生一頭扯扯拉拉只得軟軟地跟他走到了下處放他在一個小樓上面連那老媽也就留了他伏侍女子性定王生問他備細女子道奴家姓曹父親早喪母親只生得我一人甚