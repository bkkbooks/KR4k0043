走來回復張幼謙説三日不得機會説話準期在今夜點燭後了幼謙等到其時踱到牆外去看果然有一條竹梯倚在牆邊幼謙喜不自禁躡了梯子一步一步走上去到得牆頭上只見山茶樹枝上有個黑影吃了一驚卻是蜚英在此等候咳嗽一聲大家心照了攀著樹枝多挂了下去蜚英引他到閣底下惜惜也在了就一同挽了手登閣上來燈下一看俱覺長成得各別了大家歡極齊聲道也有這日相會也也不顧蜚英在面前大家摟抱定了蜚英會意移燈到閣外來了于時月光入室兩人廝偎廝抱竟到臥床上雲雨起來一別四年相逢半霎回想幼時滋味渾如夢境歡娛當時小陳爭鋒今日全軍對壘含苞微破大創元有餘紅玉莖頓雄驟當不無半怯只因爾我心中愛拚卻爺娘眼後身雲雨既散各訴衷曲幼謙道我與你歡樂只是暫時他日終須讓別人受用惜惜道哥哥兀自不知奴心事奴自受聘之後常拚一死只為未到得嫁期且貪圖與哥哥落得歡會若他日再把此身伴別人犬豕不如矣直到臨時便見兩人唧唧噥噥講了一夜的話將到天明惜惜叫幼謙起來穿衣出去幼謙問晚間事如何惜惜道我家中時常有事未必夜夜方便我把個暗號與你我閣之西樓牆外遠望可見此後樓上若點起三個燈來便將竹梯來度你進來若望來只是一燈就是來不得的了不可在外邊癡等似前番的樣子枉吃了辛苦如此約定而別幼謙仍舊上山茶樹躡竹梯而下隨後蜚英就登牆抽了竹梯起來真個神鬼不覺以後幼謙只去遠望但見樓西點了三個燈就步至牆外來只見竹梯早已安下了即便進去歡會如此每每四五夜連宵行樂若遇著不便不過隔得夜把兒往來一月有多正在快暢之際真是好事多磨有個湖北大帥慕張忠父之名禮聘他為書記忠父辭了越州太守館回家收拾去赴約就要帶了幼謙到彼鄉試幼謙得了這個消息心中捨不得惜惜甚是煩惱卻違拗不得只得將情告知惜惜就與哭別惜惜拿出好些金帛來贈他做盤纏哭對他道若是幸得未嫁還好等你歸來再會倘若你未歸之前有了日子逼我嫁人我只是死在閣前井中與你再結來世姻緣今世無及只當永別了哽哽咽咽兩個哭了半夜雖是交歡終帶慘淒不得如常盡興臨別惜惜執了幼謙的手叮嚀道你勿忘恩情覷個空便只是早歸來得一日也是好的幼謙道此不必分付我若不為鄉試定尋個別話推著不去了今卻有此便須推不得豈是我的心願歸得便歸早見得你一日也是快活相抱著多時不忍分開各含眼淚而別幼謙自隨父親到湖北去一路上觸景傷心自不必説到了那邊正值試期幼謙癡心自想若奪得魁名或者親事還可挽回得轉也未可料盡著平生才學做了文賦出場來就對父親説道掉母親家裏不下算計要回家忠父道怎不看了榜去幼謙道揭榜不中有何顔面況且母親家裏孤寂早晚懸望此處離家須是路遠比不得越州時節資訊常通的做兒的怎放心得下那功名是外事有分無分已前定了看那榜何用纏了幾日忠父方才允了放回家來不則一日到了家裏元來辛家已揀定是年冬裏的日子來娶羅惜惜了惜惜心裏著急日望幼謙到家真是眼睛多望穿了時時叫蜚英尋了頭由到幼謙家裏打聽此日蜚英打聽得幼謙已回忙來對惜惜説了惜惜道你快去約了他今夜必要相會原仍前番的法兒進來的就是又寫一首詞封好了一同拿去與他看蜚英領命走到張家門首正撞見了張幼謙幼謙道好了好了我正走出來要央楊老媽來通信恰好你來了蜚英道我家姐姐盼官人不來時常啼哭日日叫我打聽今得知官人到了登時遣我來約官人今夜照舊竹梯上進來相會有一個柬帖在此幼謙拆開來乃是一首蔔運算元詞詞雲幸得那人歸怎便教來也一日相思十二時直是情難舍本是好姻緣又怕姻緣假若是教隨別個人相見黃泉下幼謙讀罷詞回他説曉得了蜚英自去幼謙把詞來珍藏過了到得晚間遠望樓西已有三燈明亮急急走去牆外看竹梯也在了進去見了惜惜惜惜如獲珍寶雙手抱了口裏埋怨道虧你下得直到這時節才歸來而今已定下日子我與你就是無夜不會也只得兩月多有限的了當與你極盡歡娛而死無所遺恨你少年才俊前程未可量奴不敢把世俗兒女態強你同死但日後對了新人切勿忘我説罷大哭幼謙也哭道死則俱死怎説這話我一從別去那日不想你所以試畢不等揭曉就回只為不好違拗得父親故遲了幾日我認個不是罷了不要怪我蒙寄新詞我當依韻和一首以見我的心事取過惜惜的紙筆寫道去時不由人歸怎由人也羅帶同心結到成底事教拚舍心是十分真情沒些兒假若道歸遲打掉篦甘受三千下惜惜看了詞中之意曉得他是出於無奈也不怨他同到羅幃之中極其繾綣俗語道新婚不如遠歸況且曉得會期有數又是一刻千金之價你貪我愛盡著心性做事不顧死活如是半月幼謙有些膽怯了對惜惜道我此番無夜不來你又早睡晚起覺得忒膽大了些萬一有些風聲被人知覺怎麼了惜惜道我此身早晚拚是死的且盡著快活就敗露了也只是一死怕他甚麼果然惜惜忒放潑了些羅媽媽見他日間做事有氣無力長打呵欠又有時早晨起來眼睛紅腫的心裏疑惑起來道這丫頭有些改常了莫不做下甚麼事來就留了心到人靜後悄悄到女兒房前察聽動靜只聽得女兒在閣上低低微微與人説話羅媽媽道可不作怪這早晚難道還與蜚英這丫頭講甚麼話不成就講話何消如此輕的聽不出落句來再仔細聽了一回又聽得閣底下房裏打鼾響一發驚異道上邊有人講話下邊又有人睡下可不是三個人了睡的若是蜚英丫頭女兒卻與那個説話這事必然蹺蹊急走去對老兒説了這些緣故羅仁卿大驚道吉期近了不要做將出來對媽媽道不必遲疑竟闖上閣去一看好歹立見那閣上沒處去的媽媽去叫起兩個養娘拿了燈火同媽媽前走仁卿執著杆棒押後一徑到女兒房前來見房門關得緊緊的媽媽出聲叫蜚英丫頭蜚英還睡著不應閣上先聽見了惜惜道娘來叫必有甚家事幼謙慌張起來惜惜道你不要慌悄悄住著待我迎將下去夜晚間他不走上來的忙起來穿了衣服一面走下樓來張幼謙有些心虛怕不尷尬也把衣服穿起卻是沒個走路只得將就閃在暗處靜聽惜惜只認做母親一個來問甚麼話的道是迎住就罷了豈知一開了門兩燈火照得通紅連父親也在吃了一驚正説不及話出來只見母親抓了養娘手裏的火父親帶著杆棒望閣上直奔惜惜見不是頭情知事發便走向閣外來望井要跳一個養娘見他走急帶了火來照一個養娘是空手的見他做勢連忙抱住道為何如此便喊道姐姐在此投井蜚英驚醒走起來看只見姐姐正在那裏苦掙兩個養娘盡力抱住蜚英走去伏在井欄上了口裏哼道姐姐使不得不説下邊鳥亂且説羅仁卿夫妻走到閣上暗處搜出一個人來仁卿舉起杆棒正待要打媽媽將燈上前一照仁卿卻認得是張忠父的兒子幼謙且歇了手罵道小畜生賊禽獸你是我通家子侄怎幹出這等沒道理的勾當來玷辱我家幼謙只得跪下道望伯伯恕小侄之罪聽小侄告訴小侄自小與令愛只為同日同窗心中相契前年曾著人相求為婚伯伯口許道等登第方可小侄為此發奮讀書指望完成好事豈知宅上忽然另許了人家故此令愛不忿相招私合原約同死同生今日事已敗露令愛必死小侄不願獨生憑伯伯打死罷仁卿道前日此話固有你幾時又曾登第了來卻怪我家另許人你如此無行的禽獸料也無功名之分你罪非輕自有官法我也不私下打你一把扭住媽媽聽見閣前嚷得慌也恐怕女兒短見忙忙催下了閣仁卿拖幼謙到外邊堂屋把條索子捆住關好在書房裏叫家人看守著他只等天明送官自家復身進來看女兒時只見顛得頭蓬發亂媽媽與養娘們還攪做了一團在那裏嚷仁卿怒道這樣不成器等他死了罷攔他何用舉起杆棒要打卻得媽媽與養娘們攙的攙馱的馱擁上閣去了剩得仁卿一個在底下擡頭一看只見蜚英還在井欄邊仁卿一肚子惱怒正無發泄處一手揪住頭髮拖將過來便打道多是你做了牽頭牽出事來的還不實説是怎麼樣起頭的蜚英起初還推一向在閣下睡不知就裏被打不過只得把來蹤去迹細細招了又説道姐姐與張官人時常哭泣只求同死的仁卿見説了這話喝退了蜚英心裏也有些懊悔道前日便許了他不見得如此而今卻有辛家在那裏其事難處不得不經官了鬧嚷了大半夜早已天明元來但是人家有事覺得天也容易亮些媽媽自和養娘窩伴住了女兒不容他尋死路仁卿卻押了幼謙一路到縣裏來縣宰升堂收了狀詞看是姦情事乃當下捉獲的知是有據又見狀中告他是秀才就叫張幼謙上來問道你讀書知禮如何做此敗壞風化之事幼謙道不敢瞞大人這事有個委曲非孟浪男女宣淫也縣宰道有何委曲幼謙道小生與羅氏女同年月日所生自幼羅家即送在家下讀書又系同窗情孚意洽私立盟書誓同偕老後來曾央媒求聘羅家回道必待登第方許成婚小生隨父遊學兩年歸家誰知羅家不記前言竟自另許了辛家羅氏女道難負前誓只待臨嫁之日拚著一死以謝小生所以約小生去覿面永訣蹤迹不密卻被擒獲羅女強嫁必死小生義不獨生事情敗露不敢逃罪縣宰見他人材俊雅言詞慷慨有心要周全他問羅仁卿道他説的是實否仁卿道話多實的這事卻是不該做縣宰要試他才思取過紙筆來與他道你情既如此口説無憑可將前後事寫一供狀來看看幼謙當堂提筆一揮而就供雲竊惟情之所鍾正在吾輩義之不歉何恤人言羅女生同月日曾與共孰而作書生幼謙契合金蘭匪僅逾牆而摟處子長卿之悅不為挑琴宋玉之招寧關好色原許乘龍須及第未曾經打蟖銄卻教跨鳳別吹簫忍使頓成怨曠臨嫁而期永訣何異十年不字之貞赴約而願捐生無忝千里相思之誼既藩籬之已觸總桎梏而自甘伏望憫此緣慳巧賜續貂奇遇憐其情至曲施解網深仁寒穀逢乍轉之春死灰有復燃之色施同種玉報擬銜環上供縣宰看了供詞大加歎賞對羅仁卿道如此才人足為快壻爾女已是覆水難收何不宛轉成就了他羅仁卿道已受過辛氏之聘小人如今也不得自由縣宰道辛氏知此風聲也未必情願了縣宰正待勸化羅仁卿不想辛家知道也來補狀要追究姦情那辛家是大富之家與縣宰平日原有往來的這事是他理直不好曲拗得又恐怕張幼謙出去被他兩家氣頭上蠻打壞了只得準了辛家狀詞把張幼謙權且收監還要提到羅氏再審虛實卻説張媽媽在家早晨不見兒子來吃早飯到書房裏尋他卻又不見正不知那裏去了只見楊老媽走來慌張道孺人知道麼小官人被羅家捉姦送在牢中去了張媽媽大驚道怪道他連日有些失張失智果然做出來楊老媽道羅辛兩家都是富豪只怕官府處難為了小官人怎生救他便好張媽媽道除非著人去對他父親説知討個商量我是婦人家幹不得甚麼事只好管他牢中送飯罷了張媽媽叫著一個走使的家人寫了備細書一封打發他到湖北去通張忠父知道商量尋個方便家人星夜去了這邊幼謙在牢中自想縣宰十分好意或當保全但不知那晚惜惜死活如何只怕今生不能再會了正在思念流淚那牢中人來索常例錢油火錢虧得縣宰曾分付過不許難為他不致動手動腳卻也言三語四絮聒得不好聽幼謙是個書生又兼心事不快時節怎耐煩得這些模樣分解不開之際忽聽得牢門外一片鑼聲篩著一夥人從門上直打進來滿牢中