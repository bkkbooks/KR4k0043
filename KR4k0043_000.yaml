折了的今番有幸遇著真本事的人是必要求他去替我煉一煉則個遂問客人道這藥是如何煉成的客人道這叫做母銀生子先將銀子為母不拘多少用藥鍛煉養在鼎中須要九轉火候足了先生了黃芽又結成白雪啓爐時就掃下這些丹頭來只消一黍米大便點成黃金白銀那母銀仍舊分毫不虧的富翁道須得多少母銀客人道母銀越多丹頭越精若煉得有半合許丹頭富可敵國矣富翁道學生家事雖寒數千之物還盡可辦若肯不吝大教拜迎到家下點化一點化便是生平願足客人道我術不易傳人亦不輕與人燒煉今觀吾丈虔心又且骨格有些道氣難得在此聯寓也是前緣不妨為吾丈做一做但見教高居何處異日好來相訪富翁道學生家居松江離此處只有兩三日路程老丈若肯光臨即此收拾同到寒家便是若此間別去萬一後會不偶豈不當面錯過了客人道在下是中州人家有老母在堂因慕武林山水佳勝攜小妾到此一遊空身出來遊賞所需只在爐火所以樂而忘返今遇吾丈知音不敢自祕但直須帶了小妾回家安頓兼就看看老母再赴吾丈之期未為遲也富翁道寒舍有別館園亭可貯尊眷何不就同攜到彼住下一邊做事豈不兩便家下雖是看待不周決不至有慢尊客使尊眷有不安之理只求慨然俯臨深感厚情客人方才點頭道既承吾丈如此真切容與小妾説過商量收拾起行富翁不勝之喜當日就寫了請帖請他次日下湖飲酒到了明日殷殷勤勤接到船上備將胸中學問你誇我逞談得津津不倦只恨相見之晚賓主盡歡而散又送著一桌精潔酒肴到隔壁園亭上去請那小娘子來日客人答席分外豐盛酒器傢夥都是金銀自不必説兩人説得好著遊興既闌約定同到松江在關前雇了兩個大船盡數搬了行李下去一路相傍同行那小娘子在對船艙中隔簾時露半面富翁偷眼看去果然生得丰姿美豔體態輕盈只是盈盈一水間脈脈不得語又裴航贈同舟樊夫人詩雲同舟吳越猶懷想況遇天仙隔錦屏但得玉京相會去願隨鸞鶴入青冥此時富翁在隔船望著美人正同此景所恨無一人通音問耳話休絮煩兩隻船不一日至松江富翁已到家門首便請丹客上岸登堂獻茶已畢便道此是學生家中往來人雜不便離此一望之地便是學生莊舍就請尊眷同老丈至彼安頓學生也到彼外廂書房中宿歇一則清淨可以省煩雜二則謹密可以動爐火尊意如何丹客道爐火之事最忌俗囂又怕外人觸犯況又小妾在身伴一發宜遠外人若得在貴莊住止行事最便了富翁便指點移船到莊邊來自家同丹客攜手步行來到莊門口門上一匾上寫涉趣園三字進得園來但見古木幹霄新篁夾徑榱題虛敞無非是月榭風亭棟宇幽深饒有那曲房邃室疊疊假山數仞可藏太史之書層層岩洞幾重疑有仙人之若還奏曲能招鳳在此觀棋必爛柯丹客觀玩園中景致欣然道好個幽雅去處正堪為修煉之所又好安頓小妾在下便可安心與吾丈做事了看來吾丈果是有福有緣的富翁就叫人接了那小娘子起來那小娘子喬妝了帶著兩個丫頭一個喚名春雲一個喚名秋月搖搖擺擺走到園亭上來富翁欠身回避丹客道而今是通家了就等小妾拜見不妨就叫那小娘子與富翁相見了富翁對面一看真個是沈魚落雁之容閉月羞花之貌天下凡是有錢的人再沒一個不貪財好色的富翁此時好像雪獅子向火不覺軟癱了半邊煉丹的事又是第二著了便對丹客道園中內室盡寬憑尊嫂揀個像意的房子住下了人少時學生還再去喚幾個婦女來伏侍丹客就同那小娘子去看內房了富翁急急走到家中取了一對金叉一雙金手鐲到園中奉與丹客道些小薄物奉為尊嫂拜見之儀望勿嫌輕鮮丹客一眼估去見是金的反推辭過承厚意只是黃金之物在下頗為易得老丈實為重費於心不安決不敢領富翁見他推辭一發不過意道也知吾丈不稀罕此些微之物只是尊嫂面上略表芹意望吾丈鑒其誠心乞賜笑留丹客道既然這等美情在下若再推託反是自外了只得權且收下容在下竭力煉成丹藥奉報厚惠笑嘻嘻走入內房叫個丫頭捧了進去又叫小娘子出來再三拜謝富翁多見得一番又破費這些東西也是心安意肯的口裏不説心中想道這個人有此丹法又有此美姬人生至此可謂極樂且喜他肯與我修煉丹成料已有日只是見放著這等美色在自家莊上不知可有些緣法否若一發鈎搭得上手方是心滿意足的事而今拚得獻些殷勤做工夫不著磨他去不要性急且一面打點燒煉的事便對丹客道既承吾丈不棄我們幾時起手丹客道只要有銀為母不論早晚可以起手富翁道先得多少母銀丹客道多多益善母多丹多省得再費手腳富翁道這等打點將二千金下爐便了今日且偏陪在家下料理明日學生搬過來一同做事是晚就具酌在園亭上款待過盡歡而散又送酒肴內房中去殷殷勤勤自不必説次日富翁準準兌了二千金將過園子裏來一應爐器家夥之類家裏一向自有只要搬將來富翁是久慣這事的頗稱在行鉛汞藥物一應俱備來見丹客丹客道足見主翁留心但在下尚有祕妙之訣與人不同煉起來便見富翁道正是祕妙之訣要求相傳丹客道在下此丹名為九轉還丹每九日火候一還到九九八十一日開爐丹物已成那時節主翁大福到了富翁道全仗提攜則個丹客就叫跟來一個家僮依法動手熾起爐火將銀子漸漸放將下去取出丹方與富翁看了將幾件希奇藥料放將下去燒得五色煙起就同富翁封住爐又喚這跟來幾個家人分付道我在此將有三個月日擔閣你們且回去回復老奶奶一聲再來這些人只留一二個慣燒爐的在此其餘都依話散去了從此家人日夜燒煉丹客頻頻到爐邊看火色卻不開爐間了卻與富翁清談飲