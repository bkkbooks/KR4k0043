此香於爐中看香煙那裏去就跟了去必然成事又將先前皮袋與他道有人頭盡納在此中仍舊隨煙歸來不要懼怕書生依言做去只見香煙嫋嫋行處有光牆壁不礙每到一處遇一惡少年煙繞頸三匝頭已自落其家不知不覺書生便將頭入皮袋中如此數處煙嫋嫋歸來書生已隨了來到家尚未三鼓恰如做夢一般事完香丸飛去侍兒已來取頭彈藥照前吃了對書生道主母傳語郎君這是畏關此關一過打點共做神仙便了後來不知所往這女子書生都不知姓名只傳得有香丸志那崔妾是唐貞元年間博陵崔慎思應進士舉京中賃房居住房主是個沒丈夫婦人年止三十余有容色慎思遣媒道意要納為妻婦人不肯道我非宦家之女門楣不對他日必有悔只可做妾遂隨了慎思二年生了一子問他姓氏只不肯説一日崔慎思與他同上了床睡至半夜忽然不見崔生疑心有甚姦情事了不勝忿怒遂走出堂前走來走去正自傍徨忽見婦人在屋上走下來白練纏身右手持匕首左手提一個人頭對崔生道我父昔年被郡守枉殺求報數年未得今事已成不可久留遂把宅子贈了崔生逾牆而去崔生驚惶少頃又來道是再哺孩子些乳去須臾出來道從此永別竟自去了崔生回房看看兒子已被殺死他要免心中記挂故如此所以説崔妾白練的話那俠嫗的事乃元雍妾修容自言小時裏中盜起有一老嫗來對他母親説道你家從來多陰德雖有盜亂不必驚怕吾當藏過你等袖中取出黑綾二尺裂作條子教每人臂上系著一條道但隨我來修容母子隨至一道院老嫗指一個神像道汝等可躲在他耳中叫修容母子閉了眼背了他進去小小神像他母子住在耳中卻像一間房子毫不窄隘老嫗朝夜來看飲食都是他送來這神像耳孔只有指頭大小但是飲食到來耳孔便大起來後來盜平仍如前負了歸家修容要拜為師誓修苦行報他恩德老嫗説仙骨尚微不肯收他後來不知那裏去了所以説俠嫗神耳的説話那賈人妻的與崔慎思妾差不多但彼是余幹縣尉王立調選流落遇著美婦道是元系賈人妻子夫亡十年頗有家私留王立為壻生了一子後來也是一日提了一人頭回來道有仇已報立刻離京去了復來説是再乳嬰兒以豁離恨撫畢便去回燈褰帳小兒身首已在兩處所以説賈妻斷嬰的話卻是崔妾也曾做過的那解洵是宋時武職官靖康之亂陷在北地孤苦零落親戚憐他替他另娶一婦為妻那婦人妝奩豐厚洵得以存活偶逢重陽日想起舊妻墜淚婦人問知欲歸本朝便替他備辦水陸之費畢具與他同行一路水宿山行防間營護皆得其力到家其兄解潛軍功纍積已為大帥相見甚喜贈以四婢解洵寵愛了與婦人漸疏婦人一日酒間責洵道汝不記昔年乞食魏時事乎非我已為餓殍今一旦得志便爾忘恩非大丈夫所為洵已有酒意聽罷大怒奮起拳頭連連打去婦人忍著冷笑洵又唾罵不止婦人忽然站起燈燭皆暗冷氣襲人四妾驚惶仆地少頃燈燭復明四妾才敢起來看時洵已被殺在地上連頭都沒了婦人及房中所有一些不見蹤影解潛聞知差壯勇三千人各處追捕並無下落這叫做解洵娶婦那三鬟女子因為潘將軍失卻玉念珠無處訪尋卻是他與朋儕作戲取來挂在慈恩寺塔院相輪上面後潘家懸重賞其舅王超問起他許取還時寺門方開塔戶尚鎖只見他勢如飛鳥已在相輪上舉手示超取了念珠下來王超自去討賞明日女子已不見了那車中女子又是怎説因吳郡有一舉子入京應舉有兩少年引他到家坐定只見門迎一車進內車中走出一女子請舉子試技那舉子只會著靴在壁上行得數步女子叫坐中少年各呈妙技有的在壁上行有的手撮椽子行輕捷卻像飛鳥舉子驚服辭去數日後復見前兩少年來借馬舉子只得與他明日內苑失物唯收得馱物的馬追問馬主捉舉子到內侍省勘問驅入小門吏自後一推倒落深坑數丈仰望屋頂七八丈唯見一孔才開一尺有多舉子苦楚間忽見一物如鳥飛下到身邊看時卻是前日女子把絹重系舉子膊訖絹頭系女子身上女子騰身飛出宮城去門數十裏乃下對舉子雲君且歸不可在此舉人乞食寄宿得達吳地這兩個女子便都有些盜賊意思不比前邊幾個報仇雪恥救難解危方是修仙正路然要曉世上有此一種人所以歷歷可紀不是脫空的説話而今再説一個有俠術的女子救著一個落難之人説出許多劍俠的議論從古未經人道的真是精絶有詩為證念珠取卻猶為戲若似車中便纍人試聽韋娘一席話須知正直乃為真話説徽州府有一商人姓程名德瑜表字元玉稟性簡默端重不妄言笑忠厚老成專一走川陝做客販貨大得利息一日收了貨錢待要歸家與帶去僕人收拾停當行囊豐滿自不必説自騎一匹馬僕人騎了牲口起身行路來過文階道中與一夥做客的人同落一個飯店買酒飯吃正吃之間只見一個婦人騎了驢兒也在店前下了走將進來程元玉擡頭看時卻是三十來歲的模樣面顔也盡標致只是裝束氣質帶些武氣卻是雄糾糾的飯店中的客人個個顛頭聳腦看他説他胡猜亂語只有程元玉端坐不瞧那婦人都看在眼裏吃罷了飯忽然舉起兩袖抖一抖道適才忘帶了錢來今飯多吃過了主人的卻是怎好那店中先前看他這些人都笑將起來有的道元來是個騙飯吃的有的道敢是真的忘了有的道看他模樣也是個江湖上人不像個本分的騙飯的事也有那店家後生見説沒錢一把扯住不放店主又發作道青天白日難道有得你吃了飯不還錢不成婦人只説不帶得來下次補還店主道誰認得你正難分解只見程元玉便走上前來説道看此娘子光景豈是要少這數文錢的必是真失帶了出來如何這等逼他就把手腰間去摸出一串錢來道該多少都是我還了就是店家才放了手算一算帳取了錢去那婦人走到程元玉跟前再拜道公是個長者願聞高姓大名好加倍奉還程元玉道些些小事何足挂齒還也不消還得姓名也不消問得那婦人道休如此説公去前面當有小小驚恐妾將在此處出些力氣報公所以必要問姓名萬勿隱諱若要曉得妾的姓名但記著韋十一娘便是程元玉見他説話有些尷尬不解其故只得把姓名説了婦人道妾在城西去探一個親眷少刻就到東來跨上驢兒加上一鞭飛也似去了程元玉同僕人出了店門騎了牲口一頭走一頭疑心細思適間之話好不蹊蹺隨又忖道婦人之言何足憑準況且他一頓飯錢尚不能預備就有驚恐他如何出力相報得以口問心行了幾裏只見途間一人頭帶氈笠身背皮袋滿身灰塵是個慣走長路的模樣或在前或在後參差不一時常撞見程元玉在馬上問他道前面到何處可以宿歇那人道此去六十裏有楊松鎮是個安歇客商的所在近處卻無宿頭程元玉也曉得有個楊松鎮就問道今日晏了些還可到得那裏麼那人擡頭把日影看了一看道我到得你到不得程元玉道又來好笑了我每是騎馬的反到不得你是步行的反説到得是怎的説那人笑道此間有一條小路斜抄去二十裏直到河水灣再二十裏就是鎮上若你等在官路上走迂迂曲曲差了二十多裏故此到不及程元玉道果有小路快便相煩指示同行到了鎮上買酒相謝那人欣然前行道這等都跟我來那程元玉只貪路近又見這廝是個長路人信著不疑把適間婦人所言驚恐都忘了與僕人策馬跟了那人前進那一條路來初時平坦好走走得一裏多路地上漸漸多是山根頑石驢馬走甚不便再行過去有陡峻高山遮在前面繞山走去多是深密林子仰不見天程元玉主仆俱慌埋怨那人道如何走此等路那人笑道前邊就平了程元玉不得已又隨他走再度過一個岡子一發比前崎嶇了程元玉心知中計叫聲不好不好急掣轉馬頭回走忽然那人呼哨一聲山前湧出一干人來猙獰相貌劣撅身軀無非月黑殺人不過風高放火盜亦有道大曾偷習儒者虛聲師出無名也會剽竊將家實用人間偶而呼為盜世上於今半是君程元玉見不是頭自道必不可脫慌慌忙忙下了馬躬身作揖道所有財物但憑太保取去只是鞍馬衣裝須留下做歸途盤費則個那一夥強盜聽了説活果然只取包裹來搜了銀兩去了程元玉急回身尋時那馬散了韁也不知那裏去了僕人躲避一發不知去向淒淒惶惶剩得一身揀個高岡立著四周一望不要説不見強盜出沒去處並那仆馬消息杳然無蹤四無人煙且是天色看看黑將下來沒個道理歎一聲道我命休矣正急得沒出豁只聽得林間樹葉價聲響程元玉回頭看時卻是一個人扳藤附葛而來甚是輕便走到面前是個女子程元玉見了個人心下已放下了好些驚恐正要開口問他那女子忽然走到程元玉面前來稽首道兒乃韋十一娘弟子青霞是也吾師知公有驚恐特教我在此等候吾師只在前地公可往會程元玉聽得説是韋十一娘又與驚恐之説相合心下就有些望他救答意思略放膽大些了隨著青霞前往行不到半裏那飯店裏遇著的婦人來了迎著道公如此大驚不早來相接甚是有罪公貨物已取來仆馬也在不必憂疑程元玉是驚壞了的一時答應不出十一娘道公今夜不可前去小庵不遠且到庵中一飯就在此寄宿罷了前途也去不得程元玉不敢違隨了去過了兩個岡子前見一山陡絶四周並無聯屬高峰插於雲外韋十一娘以手指道此是雲岡小庵在其上引了程元玉攀蘿附木一路走上到了陡絶處韋與青霞共來扶掖數步一歇程元玉氣喘當不得他兩個就如平地一般程元玉擡頭看高處恰似在雲霧裏及到得高處雲霧又在下面了約有十數裏方得石磴磴有百來級級盡方是平地有茅堂一所甚是清雅請程元玉坐了十一娘又另喚一女童出來叫做縹雲整備茶果山簌松醪請元玉吃又叫整飯意甚殷勤程元玉方才性定欠身道程某自不小心落了小人圈套若非夫人相救那討性命只是夫人有何法術制得他討得程某貨物轉來十一娘道吾是劍俠非凡人也適間在飯店中見公修雅不像他人輕薄故此相敬及看公面上氣色有滯當有憂虞故意假説乏錢還店以試公心見公頗有義氣所以留心在此相候以報公德適間鼠輩無禮已曾曉諭他過了程元玉見説不覺歡喜敬羡他從小頗看史鑒曉得有此一種法術便問道聞得劍術起自唐時到宋時絶了故自元朝到國朝竟不聞有此事夫人在何處學來的十一娘道此術非起于唐亦不絶于宋自黃帝受兵符于九天玄女便有此術其臣風後習之所以破得蚩尤帝以此術神奇恐人妄用且上帝立戒甚嚴不敢宣揚但揀一二誠篤之人口傳心授故此術不曾絶傳也不曾廣傳後來張良募來擊秦皇梁王遣來刺袁盎公孫述使來殺來岑李師道用來殺武元衡皆此術也此術既不易輕得唐之藩鎮羡慕仿效極力延致奇蹤異迹之人一時罔利之輩不顧好歹皆來為其所用所以獨稱唐時有此不知彼輩諸人實犯上帝大戒後來皆得慘禍所以彼時先師復申前戒大略不得妄傳人妄殺人不得替惡人出力害善人不得殺人而居其名此數戒最大故趙元昊所遣刺客不敢殺韓魏公苗傅劉天彥所遣刺客不敢殺張德元也是怕犯前戒耳程元玉道史稱黃帝與蚩尤戰不説有術張良所募力士亦不説術梁王公孫述李師道所遣皆説是盜如何是術十一娘道公言差矣此正吾道所謂不居其名也蚩尤生有異像且挾奇術豈是戰陳可以勝得秦始皇萬乘之主僕從儀衛何等威焰且秦法甚嚴誰敢擊他也沒有擊了他可以脫身的至如袁盎官居近侍來岑身為大帥武相位在台衡或取之萬衆之中直戕之輦轂之下非有神術怎做得成且武元衡之死並其顱骨也取了去那時慌忙中誰人能有此間工夫史傳元自明白公不曾詳玩其旨耳程元玉道史書上果是如此假如太史公所傳刺客想正是此術至荊軻刺秦王説他劍術生疏前邊這幾個刺客多是有術的了十一娘道史遷非也秦誠無道亦是天命真主縱有劍術豈可輕施至於專諸聶政諸人不過義氣所使是個有血性好漢原非有術若這等都叫做劍術世間拚死殺人自身不保的儘是術了程元玉道昆侖摩勒如何十一娘道這是粗淺的了聶隱娘紅線方是至妙的摩勒用形但能涉曆險阻試他矯健手段隱娘輩用神其機玄妙鬼神莫窺針孔可度皮郛可藏倏忽千里往來無迹豈得無術程元玉道吾看虯髯客傳説他把仇人之首來吃了劍術也可以報得私仇的十一娘道不然虯髯這事寓言非真也就是報仇也論曲直若曲在我也是不敢用術報得的程元玉道假如術家所謂仇必是何等為最十一娘道仇有幾等皆非私仇世間有做守令官虐使小民貪其賄又害其命的世間有做上司官張大威權專好諂奉反害正直的世間有做將帥只剝軍餉不勤武事敗壞封疆的世間有做宰相樹置心腹專害異己使賢姦倒置的世間有做試官私通關節賄賂徇私黑白混淆使不才僥幸才士屈抑的此皆吾術所必誅者也至若舞文的滑吏武斷的土豪自有刑宰主之忤逆之子負心之徒自有雷部司之不關我事程元玉曰以前所言幾等人曾不聞有顯受刺客劍仙殺戮的十一娘笑道豈可使人曉得的凡此之輩殺之之道非一重者或徑取其首領及其妻子不必説了次者或入其咽斷其喉或傷其心腹其家但知為暴死不知其故又或用術攝其魂使他顛蹶狂謬失志而死或用術迷其家使他醜穢疊出憤鬱而死其有時未到的但假託神異夢寐使他驚懼而已程元玉道劍可得試令吾一看否十一娘道大者不可妄用且怕驚壞了你小者不妨試試乃呼青霞縹雲二女童至吩咐道程公欲觀劍可試為之就此懸崖旋制便了二女童應諾十一娘袖中摸出兩個丸子向空一擲其高數丈才墜下來二女童即躍登樹枝梢上以手接著毫髮不差各接一丸來一拂便是雪亮的利刃程元玉看那樹枝帳曲倒懸下臨絶壑不可測試一俯瞰神魂飛蕩毛髮森豎滿身生起寒栗子來十一娘言笑自如二女童運劍為彼此擊刺之狀初時猶自可辨到得後來只如兩條白練半空飛繞並不看見有人有頓飯時候然後下來氣不喘色不變程元玉歎道真神人也時已夜深乃就竹榻上施衾褥命程在此宿臥仍加以鹿裘覆之十一娘與二女童作禮而退自到石室中去宿了時方八月天氣程元玉擁裘伏衾還覺寒冷蓋緣居處高了天未明十一娘已起身梳洗畢程元玉也梳洗了出來與他相見了謝他不盡十一娘道山居簡慢恕罪則個又供了早膳復叫青霞操弓矢下山尋野味作晝饌青霞去了一會無一件將來回説天氣早沒有再叫縹雲去坐談未久縹雲提了一雉一兔上山來十一娘大喜叫青霞快整治供客程元玉疑問道雉兔山中豈少何乃難得如此十一娘道山中元不少只是潛藏難求程元玉笑道夫人神術何求不得乃難此雉兔十一娘道公言差矣吾術豈可用來傷物命以充口腹乎不唯神理不容也如此小用不得雉兔之類原要挾弓矢盡人力取之方可程元玉深加歎服須臾酒至數行程元玉請道夫人家世願得一聞十一娘躇沈吟道事多可愧然公是忠厚人言之亦不妨妾本長安人父母貧攜妾寄寓平涼手藝營生父亡獨與母居又二年將妾嫁同裏鄭氏子母又轉嫁了人去鄭子佻達無度喜俠遊妾屢屢諫他遂至反目因棄了妾同他一夥無籍人到邊上立功去竟無音耗回來了伯子不良把言語調戲我我正色拒之一日潛走到我床上來我提床頭劍刺之著了傷走了我因思我是一個婦人既與夫不相得棄在此間又與伯同居不便且今傷了他住在此不得了曾有個趙道姑自幼愛我他有神術道我可傳得因是父母在不敢自由而今只索投他去次日往見道姑道姑欣然接納又道此地不可居吾山中有庵可往住之就挈我登一峰顛較此處還險峻有一團瓢在上就住其中教我法術至暮徑下山去只留我獨宿戒我道切勿飲酒及淫色我想道深山之中那得有此兩事口雖答應心中不然遂宿在團瓢中床上至更餘有一男子逾牆而入貌絶美我遽驚起問他不答叱他不退其人直前將擁抱我我不肯從其人求益堅我抽劍欲擊他他也出劍相刺他劍甚精利我方初學自知不及只得丟了劍哀求他道妾命薄久已灰心何忍亂我且師有明戒誓不敢犯其人不聽以劍加我頸逼要從他我引頸受之曰要死便死吾志不可奪其人收劍笑道可知子心不變矣仔細一看不是男子原來就是趙道姑作此試我的因此道我心堅盡把術來傳了我術已成彼自遠遊我便居此山中了程元玉聽罷愈加欽重日已將午辭了十一娘要行因問起昨日行裝仆馬十一娘道前途自有人送還放心前去出藥一囊送他道每歲服一丸可保一年無病送程下山直至大路方別才別去行不數步昨日群盜將行李仆馬已在路旁等候奉還程元玉將銀錢分一半與他死不敢受減至一金做酒錢也必不受問是何故群盜道韋家娘子有命雖千里之外不敢有違違了他的他就知道我等性命要緊不敢換貨用程元玉再三歎息仍舊裝束好了主仆取路前進此後不聞十一娘音耗已是十餘年一日程元玉復到四川正在棧道中行有一少年婦人從了一個秀士行走只管把眼來瞧他程元玉仔細看來也像個素相識的卻是再想不起不知在那裏會過只見那婦人忽然叫道程丈別來無恙乎還記得青霞否程元玉方悟是韋十一娘的女童乃與青霞及秀士相見青霞對秀士道此丈便是吾師所重程丈我也多曾與