利害原來趙尼曉得巫娘子不吃酒特地對付下這個糕乃是將糯米磨成細粉把酒漿和勻烘得極幹再研細了又下酒漿如此兩三度攪入一兩樣不按君臣的藥末起成糕一見了熱水藥力酒力俱發作起來就是做酒的酵頭一般別人且當不起巫娘子是吃糟也醉的人況且又是清早空心乘餓頭上又吃得多了熱茶下去發作上來如何當得真是由你姦似鬼吃了老娘洗腳水趙尼姑用此計較把巫娘子放番了那春花丫頭見家主婆睡著偷得浮生半日間小師父引著他自去吃東西頑耍去了那裏還來照管趙尼姑忙在暗處叫出蔔良道來雌兒睡在床上了憑你受用去不知怎麼樣謝我那卜良關上房門揭開帳來一看只見酒氣噴人巫娘子兩臉紅得可愛就如一朵醉海棠一般越看越標致了蔔良淫興如火先去親個嘴巫娘子一些不知就便輕輕去了褲兒露出雪白的下體來蔔良騰地爬上身去急將兩腿挨去把陽物插入牝中亂抽起來自誇道慚愧也有這一日也巫娘子軟得身體動彈不得朦朧昏夢中雖是略略有些知覺還錯認做家裏夫妻做事一般不知一個皂白憑他輕薄顛狂了一會到得興頭上巫娘子醉裏夢裏也哼哼卜良樂極緊緊抱住叫聲心肝肉我死也一泄如注行事已畢巫娘子自昏眠未醒蔔良一手搭在巫娘子身上做一頭偎著臉睡不多時巫娘子藥力已散有些醒來見是一個面生的人一同睡著吃了一驚驚出一身冷汗叫道不好了急坐起來那時把害的酒意都驚散了大叱道你是何人敢汙良人蔔良也自有些慌張了連忙跪下討饒道望娘子慈悲恕小子無禮則個巫娘子見褲兒脫下曉得著了道兒口不答應提起褲兒穿了一頭喊叫春花一頭跳下床便走蔔良恐怕有人見不敢隨來元在房裏躲著巫娘子開了門走出房又叫春花春花也為起得早了在小師父房裏打盹聽得家主婆叫響呵欠連天走到面前巫娘子罵道好奴才我在房裏睡了你怎不相伴我巫娘子沒處出氣狠狠要打趙尼姑走來相勸巫娘子見了趙尼姑一發惱恨將春花打了兩掌道快收拾回去春花道還要念經巫娘子道多嘴奴才誰要你管氣得面皮紫漲也不理趙尼姑也不説破一徑出庵一口氣同春花走到家裏開門進去隨手關了門悶悶坐著定性了一回問春花道我記得餓了吃糕如何在床上睡著春花道大娘吃了糕呷了兩口茶便自倒在椅子上是趙師父與小師父同扶上床去的巫娘子道你卻在何處春花道大娘睡了我肚裏也餓先吃了大娘剩的糕後到小師父房裏吃茶有些困倦打了一個盹聽得大娘叫就來了巫娘子道你看見有甚麼人走進房來春花道不見甚麼人無非只是師父們巫娘子默默無言自想睡夢中光景有些恍惚記得又將手摸摸自己陰處見是粘粘涎涎的歎口氣道罷了罷了誰想這妖尼如此姦毒把我潔淨身體與這個甚麼天殺的點汙了如何做得人噙著淚眼暗暗惱恨欲要自盡還想要見官人一面割捨不下只去對著自繡的菩薩哭告道弟子有恨在心望菩薩靈感報應則個禱罷哽哽咽咽思想丈夫哭了一場沒情沒緒睡了春花正自不知一個頭腦且不説這邊巫娘子煩惱那邊趙尼姑見巫娘子帶著怒色不別而行曉得蔔良到了手走進房來見蔔良還眠在床上把指頭咬在口裏呆呆地想著光景趙尼姑見此行徑惹起老騷連忙騎在蔔良身上道還不謝謝媒人連醶是醶將起來伸手去摸他陽物怎奈卜良方才泄得過不能再舉老尼極了把蔔良咬了一口道卻便宜了你倒急煞了我蔔良道感恩不盡夜間盡情陪你罷況且還要替你商量個後計趙尼姑道你説只要嘗味又有甚麼後計蔔良道既得隴復望蜀人之常情既嘗著滋味如何還好罷得方才是勉強的畢竟得他歡歡喜喜自情自願往來方為有趣趙尼姑道你好不知足方才強做了他他一天怒氣別也不別去了不知他心下如何怎好又想後會直等再看個機會他與我原不斷往來就有商量了蔔良道也是也是全仗神機妙算是夜蔔良感激老尼要奉承他歡喜躲在庵中與他縱其淫樂不在話下卻説賈秀才在書館中是夜得其一夢夢見身在家中一個白衣婦人走入門來正要上前問他見他竟進房裏秀才大踏步趕來卻走在壁間挂的繡觀音軸上去了秀才擡頭看時上面有幾行字仔細看了從頭念去上寫道口裏來的口裏去報仇雪恥在徒弟念罷掇轉身來見他娘子拜在地下他一把扯起撒然驚覺自想道此夢難解莫不娘子身上有些疾病事故觀音顯靈相示次日就別了主人家離了館門一路上來詳解夢語不出心下憂疑到得家中叩門春花出來開了賈秀才便問娘子何在春花道大娘不起來還眠在床上秀才道這早晚如何不起來春花道大娘有些不快活口口叫著官人啼哭哩秀才見説慌忙走進房來只見巫娘子望見官人來了一轂轆跳將起來秀才看時但見蓬頭垢面兩眼通紅走起來一頭哭一頭撲地拜在地上秀才吃了一驚道如何作此模樣一手扶起來巫娘子道官人與奴做主則個秀才道是誰人欺負你巫娘子打發丫頭竈下燒茶做飯去了便哭訴道奴與官人匹配以來並無半句口面半點差池今有大罪在身只欠一死只等你來説個明白替奴做主死也瞑目秀才道有何事故説這等不祥的話巫娘子便把趙尼姑如何騙他到庵念經如何哄他吃糕軟醉如何叫人乘醉姦他説了又哭倒在地秀才聽罷毛髮倒豎了起來喊道有這等異事便問道你曉得那個是何人娘子道我那曉得秀才把床頭劍拔出來在桌上一擊道不殺盡此輩何以為人但只是既不曉得其人若不精細必有漏脫還要想出計較來娘子道奴告訴官人已過奴事已畢借官人手中劍來即此就死更無別話秀才道不要短見此非娘子自肯失身這是所遭不幸娘子立志自明今若輕身一死有許多不便娘子道有甚不便也顧不得了秀才道你死了你娘家與外人都要問緣故若説了出來你落得死了醜名難免抑且我前程罷了若不説出來你家裏族人又不肯幹休於我我自身也理不直冤仇何時而報娘子道若要奴身不死除非妖尼姦賊多死得在我眼裏還可忍恥偷生秀才想了一會道你當時被騙之後見了趙尼如何説了娘子道奴著了氣一徑回來了不與他開口秀才道既然如此此仇不可明報若明報了須動官司口舌畢竟難掩真情衆口喧傳把清名點汙我今心思一計要報得無些痕迹一個也走不脫方妙低頭一想忽然道有了有了此計正合著觀世音夢中之言妙妙娘子道計將安出秀才道娘子你要明你心事報你冤仇須一一從我若不肯依我仇也報不成心事也不得明白娘子道官人主見奴怎敢不依只是要做得停當便好秀才道趙尼姑面前既是不曾説破不曾相爭他只道你一時含羞來了婦人水性未必不動心你今反要去賺得趙尼姑來便有妙計附耳低言道如此如此這般這般此乃萬全勝算巫娘子道此計雖好只是羞人今要報仇説不得了夫妻計議已定明日秀才藏在後門靜處巫娘子便叫春花到庵中去請趙尼姑來説話趙尼姑見了春花又見説請他便暗道這雌兒想是嘗著甜頭熬不過轉了風也搖搖擺擺同春花飛也似來了趙尼姑見了巫娘子便道日前得罪了大娘又且簡慢了休要見怪巫娘子叫春花走開了捏著趙尼姑的手輕問道前日那個是甚麼人趙尼姑見有些意思就低低道是此間極風流底卜大郎叫做蔔良有情有趣少年女娘見了無有不喜歡他的他慕大娘標致得緊日夜來拜求我我憐他一點誠心難打發他又見大娘孤單在家未免冷清少年時節便相處著個把也不虛度了青春故此做成這事那家貓兒不吃葷多在我老人家肚裏大娘不要認真落得便快活快活等那個人菩薩也似敬你寶貝也似待你有何不可巫娘子道只是該與我熟商量不該做作我而今事已如此不必説了趙尼姑道你又不曾認得他若明説你怎麼肯今已是一番過了落得圖個長往來好巫娘子道枉出醜了一番不曾看得明白模樣如何情性如何既然愛我你叫他到我家再會會看果然人物好便許他暗地往來也使得趙尼姑暗道中了機謀不勝之喜並無一些疑心便道大娘果然如此老身今夜就叫他來便了這個人物盡著看是好的巫娘子道點上燈時我就自在門內等他咳嗽為號領他進房趙尼姑千歡萬喜回到庵中把這消息通與蔔良那蔔良聽得頭顛尾顛恨不得金烏早墜玉兔飛升到得傍晚已自在賈家門首探頭探腦恨不得就將那話兒拿下來望門內撩了進去看看天晚只見撲的把門關上了卜良疑是尼姑搗鬼卻放心不下正在躊躇那門裏咳嗽一聲蔔良外邊也接應咳嗽一聲輕輕的一扇門開了蔔良咳嗽一聲裏頭也咳嗽一聲蔔良將身閃入門內門內數步就是天井星月光來朦朧看見巫娘子身軀蔔良上前當面一把抱住道娘子恩德如山巫娘子懷著一天憤氣故意不行推拒也將兩手緊緊摳著只當是抱住他蔔良急將口來親著將舌頭伸過巫娘子口中亂攪巫娘子兩手越摳得緊了咂吮他舌頭不住卜良興高了陽物翹然舌頭越伸過來巫娘子性起踔一口咬住不放蔔良痛極放手急掙已被巫娘子啃下五七分一段舌頭來蔔良慌了望外急走巫娘子吐出舌尖在手急關了門走到後門尋著了秀才道仇人舌頭咬在此了秀才大喜取了舌頭把汗巾包了帶了劍趁著星月微明竟到觀音庵來那趙尼姑料道卜良必定成事宿在賈家已自關門睡了聽見有人敲門那小尼是年紀小的倒頭便睡任人擂破了門也不會醒老尼心上有事想著卜良與巫娘子欲心正熾那裏就睡得去聽得敲門心疑蔔良了事回來忙呼小尼不見答應便自家爬起來開門才開得門被賈秀才攔頭一刀劈將下來老尼望後便倒鮮血直冒嗚呼哀哉了賈秀才將門關了提了劍走將進來尋人心裏還想道倘得那蔔良也在庵裏一同結果他見佛前長明燈有火點著四下裏一照不見一個外人只見小尼睡在房裏也是一刀氣便絶了連忙把燈掭亮即就燈下解開手巾取出那舌頭來將刀撬開小尼口將舌放在裏面打滅了燈火拽上了門竟自歸家對妻子道師徒皆殺仇已報矣巫娘子道這賊只損得舌頭不曾殺得秀才道不妨不妨自有人殺他而今已後只做不知再不消題起了卻説那觀音庵左右鄰看見日高三丈庵中尚自關門不見人動靜疑心起來走去推門門卻不拴一推就開了見門內殺死老尼吃了一驚又尋進去見房內又殺死小尼一個是劈開頭的一個是斫斷喉嚨的慌忙叫了地方坊長保正人等多來相視看驗好報官府地方齊來檢看時只見小尼牙關緊閉噙著一件物事取出來卻是人的舌頭地方人道不消説是姦情事了只不知凶身是何人且報了到縣裏再處於是寫下報單正值知縣升堂當堂遞了知縣説這要挨查凶身不難但看城內外有斷舌的必是下手之人快行各鄉各圖五家十家保甲一挨查就見明白出令不多時果然地方送出一個人來原來蔔良被咬斷舌頭情知中計心慌意亂一時狂走不知一個東西南北迷了去向恐怕人追著揀條僻巷躲去住在人家門簷下蹲了一夜天亮了認路歸家也是天理合該敗露只在這條巷內東認西認走來走去急切裏認不得大路又不好開口問得人街上看見這個人蹤迹可疑已自瞧科了幾分須臾之間喧傳尼庵事體縣官告示便有個把好事的人盤問他起來口裏含糊滿牙關多是血迹地方人一時鬧動走上了一堆人圍住他道殺人的不是他是誰不由分辨一索子捆住了拉到縣裏來縣裏有好些人認得他的道這個人原是個不學好的人眼見得做出事來縣官升堂衆人把蔔良帶到縣官問他只是口裏嗚哩嗚喇一字也聽不出縣官叫掌嘴數下要他伸出舌頭來看已自沒有舌尖了血迹尚新縣官問地方人道那狗才姓甚名誰衆人有平日恨他的把他姓名及平日所為姦盜詐偽事是長是短一一告訴出來縣官道不消説了這狗才必是謀姦小尼老尼開門時先劈倒了然後去強姦小尼小尼恨他咬斷舌尖這狗才一時怒起就殺了小尼有甚麼得講蔔良聽得指手劃腳要辨時那裏有半個字囫圇縣官大怒道如此姦人纍甚麼紙筆況且口不成語凶器未獲難以成招選大樣板子一頓打死罷喝教打一百那蔔良是個遊花插趣的人那裏熬得刑慣打至五十以上已自絶了氣了縣官著落地方責令尸親領尸尼姑尸首叫地方盛貯燒埋立宗文卷上批雲卜良吾舌安在知為破舌之緣尼姑好頸誰當遂作刎頸之契斃之足矣情何疑焉立案存照縣官發落公事了訖不在話下那賈秀才與巫娘子見街上人紛紛傳説此事夫妻兩個暗暗稱快那前日被騙及今日所行之事到底並無一個人曉得此是賈秀才識見高強也是觀世音見他虔誠顯此靈通指破機關既得報了仇恨亦且全了聲名那巫娘子見賈秀才幹事決斷賈秀才見巫娘子立志堅貞越相敬重後人評論此事雖則報仇雪恥不露風聲算得十分好了只是巫娘子清白身軀畢竟被汙外人雖然不知自心到底難過只為輕與尼姑往來以致有此有志女人不可不以此為鑒詩雲好花零落損芳香只為當春漏隙光一句良言須聽取婦人不可出閨房卷七唐明皇好道集奇人武惠妃崇禪鬥異法詩曰燕市人皆去函關馬不歸若逢山下鬼環上系羅衣這一首詩乃是唐朝玄宗皇帝時節一個道人李遐周所題那李遐周是一個有道術的開元年間玄宗召入禁中後來出住玄都觀內天寶末年安祿山豪橫遠近憂之玄宗不悟寵信反深一日遐周隱遁而去不知所往但見所居壁上題詩如此時人莫曉其意直至祿山反叛玄宗幸蜀六軍變亂貴妃縊死乃有應驗後人方解雲燕市人皆去者説祿山盡起燕薊之衆為兵也函關馬不歸者大將哥舒潼關大敗匹馬不還也若逢山下鬼者山下鬼是嵬字蜀中有馬嵬驛也環上系羅衣者貴妃小字玉環至馬嵬驛時高力士以羅巾縊之也道家能前知如此蓋因玄宗是孔升真人轉世所以一心好道一時有道術的如張果葉法善羅公遠諸仙異人皆來聚會往來禁內各顯神通不一而足那李遐周區區算術小數不在話下且説張果是帝堯時一個侍中得了胎息之道可以纍日不食不知多少年歲直到唐玄宗朝隱於恆州中條山中出入常乘一個白驢日行數萬里到了所在住了腳便把這驢似紙一般折疊起來其厚也只比張紙放在巾箱裏面若要騎時把水一豿即便成驢至今人説八仙有張果老騎驢正謂此也開元二十三年玄宗聞其名差一個通事舍人姓裴名晤馳驛到恆州來迎那裴晤到得中條山中看見張果老齒落發白一個搜老叟有些嫌他未免氣質傲慢張果早已知道與裴晤行禮方畢忽然一交跌去只有出的氣沒有入的氣已自命絶了裴晤看了忙道不爭你死了我這聖旨卻如何回話又轉想道聞道神仙專要試人或者不是真死也不見得我有道理便焚起一爐香來對著死尸跪了致心念誦把天子特差求道之意宣揚一遍只見張果漸漸醒轉來那裴晤被他這一驚曉得有些古怪不敢相逼星夜馳驛把上項事奏過天子玄宗愈加奇異道裴晤不了事另命中書舍人徐嶠齎了璽書安車奉迎那徐嶠小心謹慎張果便隨嶠到東都於集賢院安置行李乘轎入宮見玄宗玄宗見是個老者便問道先生既已得道何故齒發衰落如此張果道衰朽之年學道未得故見此形相可羞可羞今陛下見問莫若把齒發盡去了還好説罷就禦前把鬚髮一頓捋拔乾淨又捏了拳頭把口裏亂敲將幾個半殘不落的零星牙齒逐個敲落滿口血出玄宗大驚道先生何故如此且出去歇息一會張果出來了玄宗想道這老兒古怪即時傳命召來只見張果搖搖擺擺走將來面貌雖是先前的卻是一頭純黑頭發須髯如漆雪白一口好牙齒比少年的還好看些玄宗大喜留在內殿賜酒飲過數杯張果辭道老臣量淺飲不過二升有一弟子可吃得一鬥玄宗命召來張果口中不知説些甚的只見一個小道士在殿簷上飛下來約有十五六年紀且是生得標致上前叩頭禮畢走到張果面前打個稽首言詞清爽禮貌周備玄宗命坐張果道不可不可弟子當侍立小道士遵師言鞠躬旁站玄宗愈看愈喜便叫斟酒賜他杯杯滿盞盞幹飲勾一鬥弟子並不推辭張果便起身替他辭道不可更賜他加不得了若過了度必有失處惹得龍顔一笑玄宗道便大醉何妨恕卿無罪立起身來手持一玉觥滿斟了將到口邊逼他剛下口只見酒從頭頂湧出把一個小道士冠兒湧得歪在頭上跌了下來道士去拾起時腳步踉蹌連身子也跌倒了玄宗及在旁嬪禦一齊笑將起來仔細一看不見了小道士止有一個金在地滿盛著酒細驗這卻是集賢院中之物一止盛一鬥玄宗大奇明日要出咸陽打獵就請張果同去一看合圍既罷前驅擒得大角鹿一隻將付庖廚烹宰張果見了道不可殺不可殺此是仙鹿已滿千歲昔時漢武帝元狩五年在上林遊獵臣曾侍從生獲此鹿後來不忍殺舍放了玄宗笑道鹿甚多矣焉知即此鹿且時遷代變前鹿豈能保獵人不擒過留到今日張果道武帝舍鹿之時將銅牌一片扎在左角下為記試看有牌否玄宗命人驗看在左角下果得銅牌有二寸長短兩行小字已模糊黑暗辨不出了宗才信就問道元狩五年是何甲子到今多少年代了張果道元狩五年歲在癸亥武帝始開昆明池到今甲戌歲八百五十二年矣玄宗命宣太史官查推長曆果然不差於是曉得張果是個千來歲的人群臣無不欽服一日祕書監王回質太常少卿蕭華兩人同往賢院拜訪張果迎著坐下忽然笑對二人道人生娶婦娶了個公主好不怕人兩人見他説得沒頭腦兩兩相看不解其意正説之間只見外邊傳呼有詔書到張果命人忙排香案等著原來玄宗有個女兒叫做玉真公主從小好道不曾下降於人蓋婚姻之事民間謂之嫁皇家謂之降民間謂之娶皇家謂之尚玄宗見張果是個真仙出世又見女兒好道意思要把女兒下降張果等張果尚了公主結了仙姻仙眷又好等女兒學他道術可以雙修成仙計議已定頒下詔書中使齎了到集賢院張果處開讀已畢張果只是哈哈大笑不肯謝恩中使看見王蕭二公在旁因與他説天子要下降公主的意思叫他兩個攛掇二公方悟起初所説便道仙翁早已得知在此説過了的中使與二公大家相勸一番張果只是笑不止中使料道不成只得去回復聖旨玄宗見張果不允親事心下不悅便與高力士商量道我聞堇汁最毒飲之立死若非真仙必是下不得口好歹把這老頭兒試一試時值天大雪寒冷異常玄宗召張果進宮把堇汁下在酒裏叫宮人滿斟暖酒與仙翁敵寒張果舉觴便飲立盡三卮醺然有醉色四顧左右咂咂舌道此酒不是佳味打個呵欠倒頭睡下玄宗只是瞧著不作聲過了一會醒起來道有些古怪袖中取出小鏡子一照只見一口牙齒都焦黑了看見禦案上鐵如意命左右取來將黑齒逐一擊下隨收在衣帶內了取出藥一包來將少許擦在口中齒穴上又倒頭睡了這一覺不比先前且是睡得安穩有一個多時辰才爬起來滿口牙齒多已生完比先前更堅且白玄宗越加敬異賜號通玄先生卻是疑心他來歷其時有個歸夜光善能視鬼玄宗召他來把張果一看夜光並不見甚麼動靜又有一個邢和璞善算有人問他他把運算元一動便曉得這人姓名窮通壽夭萬不失一玄宗一向奇他便教道把張果來算算和璞拿了運算元撥上撥下撥個不耐煩竭盡心力耳根通紅不要説算他別的只是個壽數也算他不出其時又有一個道士葉法善也多奇術玄宗便把張果來私問他法善道張果出處只有臣曉得卻説不得玄宗道何故法善道臣説了必死故不敢説玄宗定要他説法善道除非陛下免冠跣足救臣臣方得活玄宗許諾法善才説道此是混沌初分時一個白蝙蝠精剛説得罷七竅流血未知性命如何已見四肢不舉玄宗急到張果面前免冠跣足自稱有罪張果看見皇帝如此也不放在心上慢慢的説道此兒多口過不謫治他怕敗壞了天地間事玄宗哀請道此朕之意非法善之罪望仙翁饒恕則個張果方才回心轉意叫取水來把法善一法善即時復活而今且説這葉法善表字道元先居處州松陽縣四代修道法善弱冠時曾遊括蒼白馬山石室內遇三神人錦衣寶冠授乙太上密旨自是誅蕩精怪掃馘凶妖所在救人入京師時武三思擅權法善時常察聽妖祥保護中宗相王及玄宗大為三思所忌流竄南海玄宗即位法善在海上乘白鹿一夜到京在玄宗朝凡有吉凶動靜法善必預先奏聞一日吐番遣使進寶函封甚固奏稱內有機密請陛下自開勿使他人知之廷臣不知來意真偽是何緣故面面相覷不敢開言惟有法善密奏道此是凶函宣令番使自開玄宗依奏降旨番使領旨不知好歹扯起函蓋函中弩發番使中箭而死乃是番家見識要害中華天子設此暗機於函中連番使也不知道卻被法善參透不中暗算反叫番使著了道兒開元初正月元宵之夜玄宗在上陽宮觀燈尚方匠人毛順心巧用心機施逞技藝結構彩樓三十余間樓高一百五十尺多是金翠珠玉鑲嵌樓下坐著望去樓上滿樓都是些龍鳳螭豹百般鳥獸之燈一點了火那龍鳳螭豹百般鳥獸盤旋的盤旋跳躑的跳躑飛舞的飛舞千巧萬怪似是神工不像人力玄宗看畢大悅傳旨速召葉尊師來同賞去了一會才召得個葉法善樓下朝見玄宗稱誇道好燈法善道燈盛無比依臣看將起來西涼府今夜之燈也差不多如此玄宗道尊師幾時曾見過來法善道適才在彼因蒙急召所以來了玄宗怪他説得詫異故意問道朕如今即要往彼看燈去得否法善道不難就叫玄宗閉了雙目叮囑道不可妄開開時有失玄宗依從法善喝聲道疾玄宗足下雲冉冉而起已同法善在霄漢之中須臾之間足已及地法善道而今可以開眼看了玄宗閃開龍目只見燈影連亙數十裏車馬駢闐士女紛雜果然與京師無異玄宗拍掌稱盛猛想道如此良宵恨無酒吃法善道陛下隨身帶有何物玄宗道止有鏤鐵如意在手法善便持往酒家當了一壺酒幾個碟來與玄宗對吃完了還了酒家傢夥玄宗道回去罷法善復令閉目騰空而起少頃已在樓下禦前去時歌曲尚未終篇已行千里有餘玄宗疑是道家幻術障眼法兒未必真到得西涼猛可思量道卻才把如意當酒這是實事可驗明日差個中使託名他事到涼州密訪鏤鐵如意果然在酒家説道正月十五夜有個道人拿了當酒吃的始信看燈是真是年八月中秋之夜月色如銀萬里一碧玄宗在宮中賞月笙歌進酒憑著白玉欄杆仰面看著浩然長想有詞為證桂花浮玉正月滿天街夜涼如洗風泛鬚眉透骨寒人在水晶宮裏蛇龍偃蹇觀闕嵯峨縹眇笙歌沸霜華滿地欲跨彩雲飛起調寄酹江月玄宗不覺襟懷曠蕩便道此月普照萬方如此光燦其中必有非常好處見説嫦娥竊藥奔在月宮既有宮殿定可遊觀只是如何得上去急傳旨宣召葉尊師法善應召而至玄宗問道尊師有道術可使朕到月宮一遊否法善道這有何難就請禦駕啓行説罷將手中板笏一擲現了一條雪鏈也似的銀橋來那頭直接著月內法善就扶著玄宗踱上橋去且是平穩好走隨走過處橋便隨滅走得不上一裏多路到了一個所在露下沾衣寒氣逼人面前有座玲瓏四柱牌樓擡頭看時上面有個大匾額乃是六個大金字玄宗認著是廣寒清虛之府六字便同法善從大門走進來看時庭前一株大桂樹扶疏遮蔭不知覆著多少裏數桂樹之下有無數白衣仙女乘著白鸞在那裏舞這邊庭階上又有一夥仙女也如此打扮各執樂器一件在那裏奏樂與舞的仙女相應看見玄宗法善走進來也不驚異也不招接吹的自吹舞的自舞玄宗呆呆的看著法善指道這些仙女名為素娥身上所穿白衣叫做霓裳羽衣所奏之曲名曰紫雲曲玄宗素曉音律將兩手按節把樂聲一一默記了後來到宮中傳與楊太真就名霓裳羽衣曲流於樂府為唐家希有之音這是後話玄宗聽罷仙曲怕冷欲還法善駕起兩片彩雲穩如平地不勞舉步已到人間路過潞州城上細聽樵樓更鼓已打三點那月色一發明朗如晝照得潞州城中纖毫皆見但只夜深人靜四顧悄然法善道臣侍陛下夜臨于此此間人如何知道適來陛下習聽仙樂何不於此試演一曲玄宗道甚妙甚妙只方才不帶得所用玉笛來法善道玉笛何在玄宗道在寢殿中法善道這個不難將手指了一指玉笛自雲中墜下玄宗大喜接過手來想著月中拍數照依吹了一曲又在袖中摸出數個金錢灑將下去了乘月回宮至今傳説唐明皇遊月宮正此故事那潞州城中有睡不著的聽得笛聲嘹亮似覺非凡有爬起來聽的卻在半空中吹響沒做理會次日又有街上拾得金錢的報知府裏府裏官員道是非常祥瑞上表奏聞十來日表到禦前玄宗看表道八月望夜有天樂臨城兼獲金錢此乃國家瑞兆萬千之喜玄宗心下明白不覺大笑自此敬重法善與張果一般時常留他兩人在宮中或下棋或鬥小法賭勝負為戲一日二人在宮中下棋玄宗接得鄂州刺史表文一道奏稱本州有仙童羅公遠廣有道術蓋因刺史迎春之日有個白衣人身長丈余形容怪異雜在人叢之中觀看見者多駭走旁有小童喝他道業畜何乃擅離本處驚動官司還不速去其人並不敢則聲提起一把衣服如飛走了府吏看見小童作怪一把擒住來到公燕之所具白刺史刺史問他姓名小童答道姓羅名公遠適見守江龍上岸看春某喝令回去刺史不通道怎見得是龍須得吾見真形方可信小童道請待後日至期於水邊作一小坑深才一尺去江岸丈餘引江水入來刺史與郡人畢集見有一白魚長五六寸隨流至坑中跳躍兩遍漸漸大了有一道青煙如線在坑中起一霎時黑雲滿空天色昏暗小童道快都請上了津亭正走間電光閃爍大雨如瀉須臾少定見一大白龍起于江心頭與雲連有頓飯時方滅刺吏看得真實隨即具表奏聞就叫羅公遠隨表來朝見帝玄宗把此段話與張葉二人説了就叫公遠與二人相見二人見了大笑道村童曉得些甚麼二人各取棋子一把捏著拳頭問道此有何物公遠笑道都是空手及開拳兩人果無一物棋子多在公遠手中兩人方曉得這童兒有些來歷玄宗就叫他坐在法善之下天氣寒冷團團圍爐而坐此時劍南出一種果子叫作日熟子一日一熟到京都是不鮮的張葉兩人每日用仙法遣使取來過午必至所以玄宗常有新鮮的到口是日至夜不來二人心下疑惑商量道莫非羅君有緣故盡注目看公遠元來公遠起初一到爐邊便把火箸插在灰中見他們疑心了才笑嘻嘻的把火箸提了起來不多時使者即到法善詰問為何今日偏遲使者道方欲到京火焰連天無路可過適才火息了然後來得衆人多驚伏公遠之法卻説當時楊妃未入宮之時有個武惠妃專寵玄宗雖崇奉道流那惠妃卻篤信佛教各有所好惠妃信的釋子叫做金剛三藏也是個奇人道術與葉羅諸人算得敵手玄宗駕幸功德院忽然背癢羅公遠折取竹枝化作七寶如意進入爬背玄宗大悅轉身對三藏道上人也能如此否三藏道公遠的幻化之術臣為陛下取真物袖中摸出一個七寶如意來獻上玄宗一手去接得來手中先所執公遠的如意登時仍化作竹枝玄宗回宮與武惠妃説了惠妃大喜玄宗要幸東洛就對惠妃説道朕與卿同行卻叫葉羅二尊師金剛三藏從去試他鬥法以決兩家勝負何如武惠妃喜道臣妾願隨往觀傳旨排鑾駕不則一日到了東洛時方修麟趾殿有大方梁一根長四五丈徑頭六七尺眠在庭中玄宗對法善道尊師試為朕舉起來法善受詔作法方木一頭揭起數尺一頭不起玄宗道尊師神力何乃只舉得一頭法善奏道三藏使金剛神衆押住一頭故舉不起原來法善故意如此説要武妃面上好看等三藏自逞其能然後勝他果然武妃見説暗道佛法廣大不勝之喜三藏也只道實話自覺有些快活惟羅公遠低著頭只是笑玄宗有些不服氣又對三藏道法師既有神力葉尊師不能及今有個澡瓶在此法師能咒得葉尊師入此瓶否三藏受詔置瓶叫葉法善依禪門法敷坐起來念動咒語未及念完法善身體就瓶念得兩遍法善已至瓶嘴邊翕然而入玄宗心下好生不悅過了一會不見法善出來又對三藏道法師既使其入瓶能使他出否三藏道進去煩難出來是本等法就念起咒來咒完不出三藏急了不住口一氣數遍並無動靜玄宗驚道莫不尊師沒了變起臉來武妃大驚失色三藏也慌了只有羅公遠扯開口一味笑玄宗問他道而今怎麼處公遠笑道不消陛下費心法善不遠三藏又念咒一會不見出來正無計較外邊高力士報道葉尊師進玄宗大驚道銅瓶在此卻在那裏來急召進問之法善對道寧王邀臣吃飯正在作法之際面奏陛下必不肯放恰好借入瓶機會到寧王家吃了飯來若不因法師一咒須去不得玄宗大笑武妃三藏方放下心了法善道法師已咒過了而今該貧道還禮隨取三藏紫銅鉢盂在圍爐裏面燒得內外都紅法善捏在手裏弄來弄去如同無物忽然雙手捧起來照著三藏光頭撲地合上去三藏失聲而走玄宗大笑公遠道陛下以為樂不知此乃道家末技葉師何必施逞玄宗道尊師何不也作一法使朕一快公遠道請問三藏法師要如何作法術三藏道貧僧請收固袈裟試令羅公取之不得是羅公輸取得是貧僧輸玄宗大喜一齊同到道場院看他們做作三藏結立法壇一所焚起香來取袈裟貯在銀盒內又安數重木函木函加了封鎖置於壇上三藏自在壇上打坐起來玄宗武妃葉師多看見壇中有一重菩薩外有一重金甲神人又外有一重金剛圍著聖賢比肩環繞甚嚴三藏觀守目不暫舍公遠坐繩床上言笑如常不見他作甚行徑衆人都注目看公遠公遠竟不在心上有好多一會玄宗道何太遲遲莫非難取公遠道臣不敢自誇其能也未知取得取不得只叫三藏開來看看便是玄宗聞言便叫三藏開函取袈裟三藏看見重重封鎖一毫未動心下喜歡及開到銀盒叫一聲苦已不知袈裟所向只是個空盒三藏嚇得面如土色半晌無言玄宗拍手大笑公遠奏道請令人在臣院內開匱取來中使領旨去取須臾袈裟取到了玄宗看了問公遠道朕見菩薩尊神如此森嚴卻用何法取出公遠道菩薩力士聖之中者甲兵諸神道之小者至於太上至真之妙非術士所知適來使玉清神女取之雖有菩薩金剛連形也不得見他的取若坦途有何所礙玄宗大悅賞賜公遠無數葉公三藏皆伏公遠神通玄宗欲從他學隱形之術公遠不肯道陛下乃真人降化保國安民萬乘之尊學此小術何用玄宗怒罵之公遠即走入殿柱中極口數玄宗過失玄宗愈加怒發令破柱取他柱既破又見他走入玉中就把玉破為數十片片片有公遠之形卻沒奈他何玄宗謝了罪忽然又立在面前玄宗懇求至切公遠只得許了雖則傳授不肯盡情玄宗與公遠同做隱形法時果然無一人知覺若是公遠不在玄宗自試就要露出些形來或是衣帶或是襆頭腳宮中人定尋得出玄宗曉得他傳授不盡多將金帛賞齎要他喜歡有時把威力嚇他道不盡傳立刻誅死公遠只不作準玄宗怒極喝令綁出斬首刀斧手得旨推出市曹斬訖隔得十來日有個內官叫做輔仙玉奉差自蜀道回京路上撞遇公遠騎驢而來笑對內官道官家作戲忒沒道理袖中出書一封道可以此上聞又出藥一包寄上説道官家問時但道是蜀當歸語罷忽然不見仙玉還京奏聞玄宗取書覽看上面寫是姓維名某一時不解仙玉退出公遠已至玄宗方悟道先生為何改了名姓公遠道陛下曾去了臣頭所以改了玄宗稽首謝罪公遠道作戲何妨走出朝門自此不知去向直到天寶末祿山之難玄宗幸蜀又於劍門奉迎鑾駕護送至成都拂衣而去後來肅宗即位靈武玄宗自疑不能歸長安肅宗以太上皇奉迎然後自蜀還京方悟蜀當歸之寄其應在此與李遐周之詩總是道家前知妙處有詩為證好道秦王與漢王豈知治道在經常縱然法術無窮幻不救楊家一命亡卷八烏將軍一飯必酬陳大郎三人重會詩曰每訝衣冠多盜賊誰知盜賊有英豪試觀當日及時雨千古流傳義氣高話説世人最怕的是個強盜二字做個罵人惡語不知這也只見得一邊若論起來天下那一處沒有強盜假如有一等做官的誤國欺君侵剝百姓雖然官高祿厚難道不是大盜有一等做公子的倚靠著父兄勢力張牙舞爪詐害鄉民受投獻窩贓私無所不為百姓不敢聲冤官司不敢盤問難道不是大盜有一等做舉人秀才的呼朋引類把持官府起滅詞訟每有將良善人家拆得煙飛星散的難道不是大盜只論衣冠中尚且如此何況做經紀客商做公門人役三百六十行中人盡有狼心狗行狠似強盜之人在內自不必説所以當時李涉博士遇著強盜有詩雲暮雨蕭蕭江上村緑林豪客夜知聞相逢何用藏名姓世上於今半是君這都是歎笑世人的話世上如此之人就是至親切友尚且反面無情何況一飯之恩一面之識倒不如水滸上説的人每每自稱好漢英雄偏要在緑林中掙氣做出世人難到的事出來蓋為這緑林中也有一貧無奈借此棲身的也有為義氣上殺了人借此躲難的也有朝廷不用淪落江湖因而結聚的雖然只是歹人多其間仗義疏財的到也盡有當年趙禮讓肥反得粟米之贈張齊賢遇盜更多金帛之遺都是古人實事且説近來蘇州有個王生是個百姓人家父親王三郎商賈營生母親李氏又有個嬸母楊氏卻是孤孀無子的幾口兒一同居住王生自幼聰明乖覺嬸母甚是愛惜他不想年紀七八歲時父母兩口相繼而亡多虧這楊氏殯葬完備就把王生養為己子漸漸長成起來轉眼間又是十八歲了商賈事體是件伶俐一日楊氏對他説道你如今年紀長大豈可坐吃山空我身邊有的家資並你父親剩下的盡勾營運待我湊成千來兩你到江湖上做些買賣也是正經王生欣然道這個正是我們本等楊氏就收拾起千金東西交付與他王生與一班為商的計議定了説南京好做生意先將幾百兩銀子置些蘇州貨物揀了日子雇下一隻長路的航船行李包裹多收拾停當別了楊氏起身到船燒了神福利市就便開船一路無話不則一日早到京口趁著東風過江到了黃天蕩內忽然起一陳怪風滿江白浪掀天不知把船打到一個甚麼去處天已昏黑了船上人擡頭一望只見四下裏多是蘆葦前後並無第二隻客船王生和那同船一班的人正在慌張忽然蘆葦裏一聲鑼響劃出三四隻小船來每船上各有七八個人一擁的跳過船來王生等喘做一塊叩頭討饒那夥人也不來和你説話也不來害你性命只把船中所有金銀貨物盡數卷虜過船叫聲聒噪雙槳齊發飛也似劃將去了滿船人驚到魂飛魄散目睜口呆王生不覺的大哭起來道我直如此命薄就與同行的商量道如今盤纏行李俱無到南京何干不如各自回家再作計較唧唧噥噥了一會天色漸漸明瞭那時已自風平浪靜撥