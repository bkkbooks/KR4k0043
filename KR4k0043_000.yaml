刻也是見成的了小娘子道晚間還是我到你書房來你到我臥房來富翁道但憑娘子主見小娘子道我處須有兩個丫頭同睡你來不便我今夜且瞞著他們自出來罷待我明日叮囑丫頭過了然後接你進來是夜果然人靜後小娘子走出堂中來富翁也在那裏伺候接至書房極盡衾枕之樂以後或在內或在外總是無拘無管富翁以為天下奇遇只願得其夫一世不來丹煉不成也罷了綢繆了十數宵忽然一日門上報説丹客到了富翁吃了一驚接進寒溫畢他就進內房來見了小娘子説了好些説話出外來對富翁道小妾説丹爐不動而今九還之期已過丹已成了正好開看今日匆匆明日獻過了神啓爐罷富翁是夜雖不得再望歡娛卻見丹客來了明日啓爐丹成可望還賴有此心下自解自樂到得明日請了些紙馬福物祭獻了畢丹客同富翁剛走進丹房就變色沈吟道如何丹房中氣色恁等的有些詫異便就親手啓開鼎爐一看跌足大驚道敗了敗了真丹走失連銀母多是糟粕了此必有做交感污穢之事觸犯了的富翁驚得面如土色不好開言又見道著真相一發慌了丹客懊怒咬得牙齒的響問燒火的道僮道此房中別有何人進來家僮道只有主翁與小娘子日日來看一次別無人敢進來丹客道這等如何得丹敗了快去叫小娘子來問家僮走去請了出來丹客厲聲道你在此看爐做了甚事丹俱敗了小娘子道日日與主翁來看爐是原封不動的不知何故丹客道誰説爐動了封你卻動了封了又問家僮道主翁與娘子來時你也有時節不在此麼家僮道止有一日是主翁憐我辛苦請去吃飯多飲了幾杯睡著在外邊了只這一日是主翁與小娘自家來的丹客冷笑道是了是了忙走去行囊裏抽出一根皮鞭來對小娘子道分明是你這賤婢做出事來了一鞭打去小娘子閃過了哭道我原説做不得的主人翁害了奴也富翁直著雙眼無言可答恨沒個地洞鑽了進去丹客怒目直視富翁道你前日受託之時如何説的我去不久就幹出這樣昧心的事來元來是狗彘不直的如此無行的人如何妄想燒丹煉藥是我眼裏不識人我只是打死這賤婢罷羞辱門庭要你怎的拿著鞭一趕趕來小娘子慌忙走進內房虧得兩個丫頭攔住勸道官人耐性每人接了一皮鞭卻把皮鞭摔斷了富翁見他性發沒收場只得跪下去道是小子不才一時幹差了事而今情願棄了前日之物只求寬恕罷丹客道你自作自受你幹壞了事走失了丹是應得的沒處怨悵我的愛妾可是與你解饞的受了你點汙卻如何處我只是殺卻了不怕你不償命富翁道小子情願贖罪罷即忙叫家人到家中拿了兩個元寶跪著討饒丹客只是佯著眼不瞧道我銀甚易豈在於此富翁只是磕頭又加了二百兩道如今以此數再娶了一位如夫人也勾了實是小子不才望乞看平日之面寬恕尊嫂罷丹客道我本不希罕你銀子只是你這樣人不等你損些己財後來不改前非我偏要拿了你的將去濟人也好就把三百金拿去裝在箱裏了叫齊了小娘子與家僮丫頭等急把衣裝行李盡數搬出下在昨日原來的船裏一徑出門口裏喃喃的罵道受這樣的恥辱可恨可恨罵詈不止開船去了富翁被他嚇得魂不附體恐怕弄出事來雖是折了些銀子得他肯去還自道僥幸至於爐中之銀真個認做觸犯了他丹鼎走敗但自悔道忒性急了些便等丹成了多留他住幾時再圖成此事豈不兩美再不然不要在丹房裏頭弄這事或者不妨也不見得多是自己莽撞了枉自破了財物也罷只是遇著真法不得成丹可惜可惜又自解自樂道只這一個絶色佳人受用了幾時也是風流話柄賞心樂事不必追悔了卻不知多是丹客做成圈套當在西湖時原是打聽得潘富翁上杭先裝成這些行徑來炫惑他的及至請他到家故意要延緩卻像沒甚要緊後邊那個人來報喪之時忙忙歸去已自先把這二千金提了罐去了留著家小使你不疑後來勾搭上場也都是他教成的計較把這堆狗屎堆在你鼻頭上等你開不得口只好自認不是沒工夫與他算帳了那富翁是破財星照墮其計中先認他是巨富之人必有真丹點化不知那金銀器皿都是些鉛錫為質金銀汁粘裹成的酒後燈下誰把試金石來試一時不辨都誤認了此皆神姦詭計也富翁遭此一騙還不醒悟只説是自家不是當面錯了越好那丹術不已一日又有個丹士到來與他談著爐火甚是投機延接在家告訴他道前日有一位客人真能點鐵為金當面試過他已此替我燒煉了後來自家有些得罪於他不成而去真是可惜這丹士道吾術豈獨不能便叫把爐火來試果然與前丹客無二些少藥末投在鉛汞裏頭盡化為銀富翁道好了好了前番不著這番著了又湊千金與他燒煉丹士呼朋引類又去約了兩三個幫手來做富翁見他銀子來得容易放膽大了一些也不防他豈知一個晚間提了罐走了次日又撈了個空富翁此時連被拐去手內已窘且怒且羞道我為這事費了多少心機弄了多少年月前日自家錯過指望今番是了誰知又遭此一閃我不問那裏尋將去他不過又往別家燒煉或者撞得著也不可知縱不然或者另遇著真正法術再煉成真丹也不見得自此收拾了些行李東遊西走忽然一日在蘇州閶門人叢裏劈面撞著這一夥人正待開口發作這夥人不慌不忙滿面生春卻像他鄉遇故知一般一把邀了那富翁邀到一個大酒肆中一副潔淨座頭上坐了叫酒保燙酒取嗄飯來殷勤謝道前日有負厚德實切不安但我輩道路如此足下勿以為怪今有一法與足下計較可以償足下前物不必別生異説富翁道何法丹士道足下前日之銀吾輩得來隨手費盡無可奉償今山東有一大姓也請吾輩燒煉已有成約只待吾師到來才交銀舉事奈吾師遠遊急切未來足下若權認作吾師等他交銀出來便取來先還了足下前物直如反掌之易不然空尋我輩也無幹足下以為何如富翁道尊師是何人物丹士道是個頭陀今請足下略剪去了些頭髮我輩以師禮事奉徑到彼處便了富翁急於得銀便依他剪發做一齊了彼輩殷殷勤勤直侍奉到山東引進見了大姓説道是他師父來了大姓致敬迎接到堂中略談爐火之事富翁是做慣了的亦且胸中原博高談闊論盡中機宜大姓深相敬服是夜即兌銀二千兩約在明日起火只管把酒相勸吃得酩酊扶去另在一間內書房睡著到得天明商量安爐富翁見這夥人科派自家曉得些也在裏頭指點當日把銀子下爐燒煉這夥人認做徒弟守爐大姓只管來尋師父去請教攀話飲酒不好卻得這些人看個空兒又提了罐各各走了單撇下了師父大姓只道師父在家不妨豈知早辰一夥都不見了就拿住了師父要去送在當官捉拿餘黨富翁只得哭訴道我是松江潘某原非此輩同黨只因性好燒丹前日被這夥人拐了路上遇見他説道在此間燒煉得來可以賠償又替我剪發叫我裝做他師父來的指望取還前銀豈知連宅上多騙了又撇我在此説罷大哭大姓問其來歷詳細説得對科果是松江富家與大姓家有好些年誼的知被騙是實不好難為得他只得放了一路無了盤纏倚著頭陀模樣沿途乞化回家到得臨清碼頭上只見一隻大船內簾下一美人揭著簾兒露面看著街上富翁看見好些面染仔細一認卻是前日丹客所帶來的妾與他偷情的疑道這人緣何在這船上走到船邊細細訪問方知是河南舉人某公子包了名娼到京會試的富翁心裏想道難道當日這家的妾畢竟賣了又疑道敢是面龐相像的不離船邊走來走去只管看忽見船艙裏叫個人出來問他道官艙裏大娘問你可是松江人富翁道正是松江又問道可姓潘否富翁吃了一驚道怎曉得我的姓只見艙裏人説叫他到船邊來富翁走上前去簾內道妾非別人即前日丹客所認為妾的便是實是河南妓家前日受人之托不得不依他囑咐的話替他搗鬼有負於君君何以流落至此富翁大慟把連次被拐今在山東回來之由訴説一遍簾內人道妾與君不能無情當贈君盤費作急回家此後遇見丹客萬萬勿可聽信妾亦是騙局中人深知其詐君能聽妾之言是即妾報君數宵之愛也言畢著人拿出三兩一封銀子來遞與他富翁感謝不盡只得收了自此曉得前日丹客美人之局包了娼妓做的今日卻虧他盤纏到得家來感念其言終身不信爐火之事卻是頭髮分披親友知其事者無不以為笑談奉勸世人好丹術者請以此為鑒丹術須先斷情欲塵緣豈許相馳逐貪淫若是望丹成陰溝洞裏天鵝肉卷十九李公佐巧解夢中言謝小娥智擒船上盜贊雲士或巾幗女或辨冕行不逾閾謨能致遠睹彼英英慚斯譾譾這幾句贊是贊那有智婦人賽過男子假如有一種能文的女子如班婕妤曹大家魚玄機薛校書李季蘭李易安朱淑真之輩上可以並駕班揚下可以齊驅盧駱有一種能武的女子如夫人城娘子軍高涼洗氏東海呂母之輩智略可方韓白雄名可賽關張有一種善能識人的女子如卓文君紅拂妓王渾妻鍾氏韋臯妻母苗氏之輩俱另具法眼物色塵埃有一種報仇雪恥女子如孫翊妻徐氏董昌妻申屠氏龐娥親鄒僕婦之輩俱中懷膽智力殲強梁又有一種希奇作怪女扮為男的女子如秦木蘭南齊東陽婁逞唐貞元孟嫗五代臨邛黃崇嘏俱以權濟變善藏其用竄身仕宦既不被人識破又能自保其身多是男子漢未必做得來的算得是極巧極難的了而今更説一個遭遇大難女扮男身用盡心機受盡苦楚又能報仇又能守志一個絶奇的女人真個是千古罕聞有詩為證俠概惟推古劍仙除凶雪恨只香煙誰知估客生奇女只手能翻兩姓冤這段話文乃是唐元和年間豫章郡有個富人姓謝家有巨産隱名在商賈間他生有一女名喚小娥生八歲母親早喪小娥雖小身體壯碩如男子形父親把他許了曆陽一個俠士姓段名居貞那人負氣仗義交遊豪俊卻也在江湖上做大賈謝翁慕其聲名雖是女兒尚小卻把來許下了他兩姓合為一家同舟載貨往來吳楚之間兩家弟兄子侄僮仆等衆約有數十餘人盡在船內貿易順濟輜重充盈如是幾年江湖上多曉得是謝家船昭耀耳目此時小娥年已十四歲方才與段居貞成婚未及一月忽然一日舟行至鄱陽湖口遇著幾隻江洋大盜的船各執器械團團圍住為頭的兩人當先跳過船來先把謝翁與段居貞一刀一個結果了性命以後衆人一齊動手排頭殺去總是一個船躲得在那裏間有個把慌忙奔出艙外又被盜船上人拿去殺了或有得跳在水中只好圖得個全尸湖水溜急總無生理謝小娥還虧得溜撒乘衆盜殺人之時忙自去攛在舵上一個失腳跌下水去衆盜席捲舟中財寶金帛一空將死尸盡拋在湖中棄船而去小娥在水中漂流恍惚之間似有神明護持流到一隻漁船邊漁人夫妻兩個撈救起來見是一個女人心頭尚暖知是未死拿幾件破衣破襖替他換下濕衣放在艙中眠著小娥口中泛出無數清水不多幾時醒將轉來見身在漁船中想著父與夫被殺光景放聲大哭漁翁夫婦問其緣故小娥把湖中遇盜父夫兩家人口盡被殺害情由説了一遍原來謝翁與段俠士之名著聞江湖上漁翁也多曾受他小惠過的聽説罷不勝驚異就權留他在船中調理了幾日小娥覺得身子好了他是個點頭會意的人曉得漁船上生意淡薄便想道我怎好攪擾得他不免辭謝了他我自上岸一路乞食再圖安身立命之處小娥從此別了漁翁夫婦沿途抄化到建業上元縣有個妙果寺內是尼僧有個住持尼淨悟見小娥言語伶俐説著遭難因由好生哀憐就留他在寺中心裏要留他做個徒弟小娥也情願出家道一身無歸畢竟是皈依佛門可了終身但父夫被殺之仇未復不敢便自落發且隨緣度日以待他年再處小娥自此日間在外乞化晚間便歸寺中安宿晨昏隨著淨悟做功果稽首佛前心裏就默禱祈求報應只見一個夜間夢見父親謝翁來對他道你要曉得殺我的人姓名有兩句謎語你牢牢記著車中猴門東草説罷正要再問父親撒手而去大哭一聲颯然驚覺夢中之語明明記得只是不解隔得幾日又夢見丈夫段居貞來對他説殺我的人姓名也是兩句謎語禾中走一日夫小娥連得了兩夢便道此是亡靈未泯故來顯應只是如何不竟把真姓名説了卻用謎語想是冥冥之中天機不可輕泄所以如此如今既有這十二字謎語必有一個解説雖然我自家不省得天下豈少聰明的人不問好歹求他解説出來遂走到淨悟房中説了夢中之言就將一張紙寫著十二字藏在身邊了對淨悟道我出外乞食逢人便拜求去淨悟道此間瓦官寺有個高僧法名齊物極好學問多與官員士大夫往來你將此十二字到彼求他一辨他必能參透小娥依言徑到瓦官寺求見齊公稽首畢便道弟子有冤在身夢中得十二字謎語暗藏人姓名自家愚懵參解不出拜求老師父解一解就將袖中所書一紙雙手遞與齊公齊公看了想著一會搖首道解不得解不得但老僧此處來往人多當記著在此逢人問去倘遇有高明之人解得當以相告小娥又稽首道若得老師父如此留心感謝不盡自此謝小娥沿街乞化逢人便把這幾句請問齊公有客來到便舉此謎相商小娥也時時到寺中問齊公消耗如此多年再沒一個人解得出説話的若只是這樣解不出那兩個夢不是枉做了看官不必性急凡事自有個機緣此時謝小娥機緣未到所以如此機緣到來自然遇著巧的卻説元和八年春有個洪州判官李公佐在江西解任扁舟東下停泊建業到瓦官寺遊耍僧齊公一向與他相厚出來接陪了登閣眺遠談説古今語話之次齊公道檀越博聞閎覽今有一謎語請檀越一猜李公佐笑道吾師好學何至及此稚子戲齊公道非是作戲有個緣故此間孀婦謝小娥示我十二字謎語每來寺中求解説道中間藏著仇人名姓老僧不能辨遍示來往遊客也多懵然已多年矣故此求明公一商之李公佐道是何十二字且寫出來我試猜看齊公就取筆把十二字寫出來李公佐看了一遍道此定可解何至無人識得遂將十二字念了又念把頭點了又點靠在窗檻上把手在空中畫了又畫默然凝想了一會拍手道是了是了萬無一差齊公速要請教李公佐道且未可説破快去召那個孀婦來我解與他齊公即叫行童到妙果寺尋將謝小娥來齊公對他道可拜見了此間官人此官人能解謎語小娥依言上前拜見了畢公佐開口問道你且説你的根由來小娥嗚嗚咽咽哭將起來好一會説話不出良久才説道小婦人父及夫俱為江洋大盜所殺以後夢見父親來説道殺我者車中猴門東草又夢見夫來説道殺我者禾中走一日夫自家愚昧解説不出遍問旁人再無人省悟歷年已久不識姓名報冤無路銜恨無窮説罷又哭李公佐笑道不須煩惱依你所言下官俱已審詳在此了小娥住了哭求明示李公佐道殺汝父者是申蘭殺汝夫者是申春小娥道尊官何以解之李公佐道車中猴車中去上下各一畫是申字申屬猴故曰車中猴草下有門門中有東乃蘭字也又禾中走是穿田過田出兩頭亦是申字也一日夫者夫上更一畫下一日是春字也殺汝父是申蘭殺汝夫是申春足可明矣何必更疑齊公在旁聽解罷撫掌稱快道數年之疑一旦豁然非明公聰鑒蓋世何能及此小娥愈加慟哭道若非尊官到底不曉仇人名姓冥冥之中負了父夫再拜叩謝就向齊公借筆來將申蘭申春四字寫在內襟一條帶子上了拆開裏面反將轉來仍舊縫好李公佐道寫此做甚小娥道既有了主名身雖女子不問那裏誓將訪殺此二賊以復其冤李公佐向齊公歎道壯哉壯哉然此事卻非容易齊公道天下無難事只怕有心人此婦堅忍之性數年以來老僧頗識之彼是不肯作浪語的小娥因問齊公道此間尊官姓氏宦族願乞示知以識不忘齊公道此官人是江西洪州判官李二十三郎也小娥再三頂禮念誦流涕而去李公佐閣上飲罷了酒別了齊公下船解纜自往家裏話分兩頭卻説小娥自得李判官解辨二盜姓名便立心尋訪自念身是女子出外不便心生一計將纍年乞施所得買了衣服打扮作男子模樣改名謝保又買了利刃一把藏在衣襟底下想道在湖裏遇的盜必是原在江湖上走方可探聽消息日逐在埠頭伺候看見船上有雇人的就隨了去傭工度日在船上時操作勤謹並不懈怠人都喜歡雇他他也不拘一個船上是雇著的便去商船上下往來之人看看多熟了水火之事小心謹祕並不露一毫破綻出來但是船到之處不論那裏上岸挨身察聽體訪如此年餘竟無消耗一日隨著一個商船到潯陽郡上岸行走見一家人家竹戶上有紙榜一張上寫道雇人使用願者來投小娥問鄰居之人此是誰家要雇用人鄰人答道此是申家家主叫做申蘭是申大官人時常要到江湖上做生意家裏止是些女人無個得力男子看守所以雇喚小娥聽得申蘭二字觸動其心心裏便道果然有這個姓名莫非正是此賊隨對鄰人説道小人情願投賃傭工煩勞引進則個鄰人道申家急缺人用一説便成的只是要做個東道謝我小娥道這個自然鄰人問了小娥姓名地方就引了他一徑走進申家只見裏邊踱出一個人來你道生得如何但見傴兜怪臉尖下頦生幾莖黃須突兀高顴濃眉毛壓一雙赤眼出言如虎嘯聲撼半天風雨寒行步似狼奔影搖千尺龍蛇動遠觀是喪船上方相近覷乃山門外金剛小娥見了吃了一驚心裏道這個人豈不是殺人強盜麼便自十分上心只見鄰人道大官人要雇人這個人姓謝名保也是我們江西人他情願投在大官人門下使喚申蘭道平日作何生理的小娥答應道平日專在船上趁工度日埠頭船上多有認得小人的大官人去問問看就是申蘭家離埠頭不多遠三人一同走到埠頭來問問各船上多説著謝保勤緊小心志誠老實許多好處申蘭大喜小娥就在埠頭一個認得的經紀家裏借著紙墨筆硯自寫了傭工文契寫鄰人做了媒人交與申蘭收著申蘭就領了他同鄰人到家裏來取酒出來請媒就叫他陪待小娥就走到廚下掇長掇短送酒送肴且是熟分申蘭取出二兩工銀先交與他了又取二錢銀子做了媒錢小娥也自己稱出二錢來送那鄰人鄰人千歡萬喜作謝自去了申蘭又領小娥去見了妻子藺氏自此小娥只在申蘭家裏傭工小娥心裏看見申蘭動靜明知是不良之人想著夢中姓名必然有據大分是仇人然要哄得他喜歡親近方好探其真確乘機取事故此千喚千應萬使萬當毫不逆著他一些事故也是申蘭冤業所在自見小娥便自分外喜歡又見他得用日加親愛時刻不離左右沒一句説話不與謝保商量沒一件事體不叫謝保營幹沒一件東西不托謝保收拾已做了申蘭貼心貼腹之人因此金帛財寶之類盡在小娥手中出入看見舊時船中掠去錦繡衣服寶玩器具等物都在申蘭家裏正是見鞍思馬睹物思人每遇一件常自暗中哭泣多時方才曉得夢中之言有準時刻不忘仇恨卻又怕他看出愈加小心又聽得他説有個堂兄弟叫做二官人在隔江獨樹浦居住小娥心裏想道這個不知可是申春否父夢既應夫夢也必不差只是不好問得姓名怕惹疑心如何得他到來便好探聽卻是小娥自到申蘭家裏只見申蘭口説要到二官人家去便去了經月方回回來必然帶好些財帛歸家便分付交與謝保收拾卻不曾見二官人到這裏來也有時口説要帶謝保同去走走小娥曉得是做私商勾當只推家裏脫不得身申蘭也放家裏不下要留謝保看家再不提起了但是出外去只留小娥與妻藺氏與同一兩個丫鬟看守小娥自在外廂歇宿照管若是藺氏有甚差遣無不遵依停當合家都歡喜他是個萬全可托得力的人了説話的你差了小娥既是男扮了申蘭如何肯留他一個寡漢伴妻子在家豈不疑他生出不伶俐事來看官又有一説申蘭是個強盜中人財物為重他們心上有甚麼閨門禮法況且小娥有心機申蘭平日畢竟試得他老實頭小心不過的不消慮得到此所以放心出去再無別説且説小娥在家多間乘空便去交結那鄰近左右之人時時買酒買肉破費錢鈔在他們身上這些人見了小娥無不喜歡契厚的若看見有個把豪氣的能事了得的更自十分傾心結納或周濟他貧乏或結拜弟兄總是做申蘭這些不義之財不著申蘭財物來得容易又且信託他的那裏來查他細帳落得做人情小娥又報仇心重故此先下工夫結識這些黨羽在那裏只為未得申春消耗恐怕走了風脫了仇人故此申蘭在家時幾番好下得手小娥忍住不動且待時至而行如此過了兩年有多忽然一日有人來説江北二官人來了只見一個大漢同了一夥拳長臂大之人走將進來問道大哥何在小娥應道大官人在裏面等謝保請出來小娥便去對申蘭説了申蘭走出堂前來道二弟多時不來了甚風吹得到此況且又同衆兄弟來到有何話説二官人道小弟申春今日江上獲得兩個二十斤來重的大鯉魚不敢自吃買了一壇酒來與大哥同享申蘭道多承二弟厚意如此大魚也是罕物我輩托神道福佑多年我意欲將此魚此酒再加些雞肉果品之類賽一賽神以謝覆庇然後我們同散福受飲方是不然只一味也不好下酒況列位在此無有我不破鈔反吃白食的二弟意下如何衆人都拍手道有理有理申蘭就叫謝保過來見了二官人道這是我家雇工極是老實勤緊可托的就分付他叫去買辦食物小娥領命走出一霎時就辦得齊齊整整擺列起來申春道此人果是能事怪道大哥出外放得家裏下元來有這樣得力人在這裏衆人都讚歎一番申蘭叫謝保把福物擺在一個養家神道前了申春道須得寫衆人姓名通誠一番我們幾個都識字不透這事卻來不得申蘭道謝保寫得好字申春道又會寫字難得難得小娥就走去將紙筆排頭寫來少不得申蘭申春為首其餘各報將名來一個個寫小娥一頭寫著一頭記著方曉得果然這個叫做申春獻神已畢就將福物收去整理一整理重新擺出來大家歡哄飲啖卻不提防小娥是有心的急把其餘名字一個個都記將出來寫在紙上藏好了私自歎道好個李判官精悟玄鑒與夢語符合如此此乃我父夫精靈不泯天啓其心今日仇人都在我志將就了急急走來伏侍只揀大碗頻頻斟與春二人二人都是酒徒見他如此殷勤一發喜歡大碗價只顧吃了那裏猜他有甚別意天色將晚衆賊俱已酣醉各自散去只有申春留在這裏過夜未散小娥又滿滿斟了熱酒奉與申春道小人謝保到此兩年不曾伏侍二官人今日小人借花獻佛多敬一杯又斟一杯與申蘭道大官人請陪一陪申春道好個謝保會説會勸申蘭道我們不要辜負他孝敬之意儘量多飲一杯才是又與申春説謝保許多好處小娥謙稱一句就獻一杯不幹不住兩個被他灌得十分酩酊元來江邊苦無好酒群盜只吃的是燒刀子這一壇是他們因要盡興買那真正滴花燒酒是極狠的況吃多了豈有不醉之理申蘭醉極苦熱又走不動了就在庭中袒了衣服眠倒了申春也要睡還走得動小娥就扶他到一個房裏床上眠好了走到裏面看時原來藺氏在廚下整酒時聞得酒香撲鼻因吃夜飯也自吃了碗把兩個丫鬟遞酒出來各各偷些嘗嘗女人家經得多少濃味一個個伸腰打盹卻像著了孫行者瞌睡蟲的小娥見如此光景想道此時不下手更待何時又想道女人不打緊只怕申春這廝未睡得穩卻是利害就拿把鎖把申春睡的房門鎖好了走到庭中衣襟內拔出佩刀把申蘭一刀斷了他頭欲待再殺申春終究是女人家見申春起初走得動只怕還未甚醉不敢輕惹他忙走出來鄰里間叫道有煩諸位與我出力拿賊則個鄰人多是平日與他相好的聽得他的聲音多走將攏來問道賊在那裏我們幫你去拿小娥道非是小可的賊乃是江洋殺人的大強盜贓證都在今被我灌醉鎖住在房中須賴衆力擒他小娥平日結識的好些好事的人在內見説是強盜都摩拳擦掌道是甚麼人小娥道就是小人的主人與他兄弟慣做強盜家中貨財千萬都是贓物內中也有的道你在他家中自然知他備細不差只是沒有被害失主不好鹵莽得小娥道小人就是被害失主小人父親與一個親眷兩家數十口都被這夥人殺了而今家中金銀器皿上還有我家名字記號須認得出一個老成的道此話是真那申家蹤迹可疑身子常不在家又不做生理卻如此暴富我們只是不查得他的實迹又怕他凶暴所以不敢發覺今既有謝小哥做證我們助他一臂擒他兄弟兩個送官等他當官追究為是小娥道我已手殺一人只須列位助擒得一個衆人見説已殺了一人曉得事體必要經官又且與小娥相好的多恨申蘭的也不少一齊點了火把望申家門裏進來只見申蘭已挺尸在血泊裏開了房門申春鼾聲如雷還在睡夢衆人把索子捆住申春還掙扎道大哥不要取笑衆人罵他強盜他兀自未醒衆人捆好了一齊闖進內房來那藺氏飲酒不多醒得快驚起身來見了衆人火把只道是強盜上了口裏道終日去打劫人今日卻有人來打劫了衆人聽得一發道是謝保之言為實喝道胡説誰來打劫你家你家強盜事發了也把藺氏與兩個丫環拴將起來藺氏道多是丈夫與叔叔做的事須與奴家無干衆人道説不得自到當官去對此時小娥恐人多搶散了贓物先已把平日收貯之處安頓好了鎖閉著明請地方加封告官起發鬧了一夜明日押進潯陽郡來潯陽太守張公升堂地方人等解到一干人犯小娥手執首詞首告人命強盜重情此時申春宿酒已醒明知事發見對理的卻是謝保曉得哥哥平日有海底眼在他手裏卻不知其中就裏亂喊道此是雇工背主假捏出來的事小娥對張太守指著申春道他兄弟兩個為首十年前殺了豫章客謝段二家數十人如何還要抵賴太守道你敢在他家傭工同做此事而今待你有些不是處你先出首了麼小娥道小人在他家傭工止得二年此是他十年前事太守道這等你如何曉得有甚憑據小娥道他家中所有物件還有好些是謝段二家之物即此便是憑據太守道你是謝家何人卻認得是小娥道謝是小人父家段是小人夫家太守道你是男子如何説是夫家小娥道爺爺聽稟小婦人實是女人不是男子只因兩家都被二盜所殺小婦人攛入水中遇救得活後來父夫托夢説殺人姓名乃是十二個字謎解説不出遍問識者無人參破幸有洪州李判官解得是申蘭申春小婦人就改妝作男子遍曆江湖尋訪此二人到得此郡有出榜雇工者問是申蘭小婦人有心就投了他家看見他出沒蹤迹又認識舊物明知他是大盜殺父的仇人未見申春不敢動手昨日方才同來飲酒故此小婦人手刃了申蘭叫破地方同擒了申春只此是實太守見説得希奇就問道那十二字謎語如何的小娥把十二字念了一遍太守連連點頭道是是是快哉李君明悟若此他也與我有交這事是真無疑但你既是女人扮作男子非止一日如何得不被人看破小娥道小婦人冤仇在身日夜提心吊膽豈有破綻露出在人眼裏若稍有泄漏冤仇怎報得成太守心中歎道有志哉此婦人也又喚地方人等起來問著事由地方把申家向來蹤迹可疑及謝保兩年前雇工昨夜殺了申蘭協同擒了申春並他家屬今日解府的話備細述了一遍太守道贓物何在小娥道贓物向托小婦人掌管昨夜跟同地方封好在那裏太守即命公人押了小娥與同地方到申蘭家起贓金銀財貨何止千萬小娥俱一一登有簿籍分毫不爽即時送到府堂太守見金帛滿庭知盜情是實把申春嚴刑拷打藺氏亦加拶指都抵賴不得一一招了太守又究餘黨申春還不肯説只見小娥袖中取出所抄的名姓呈上太守道這便是群盜的名了太守道你如何知得恁細小娥道是昨日叫小婦人寫了連名賽神的小婦人默自抄記一人也不差太守一發歎賞他能事便喚申春研問著這些人住址逐名注明了先把申春下在牢裏藺氏丫環討保官賣然後點起兵快登時往各處擒拿正似甕中捉鱉沒有一個走脫得的齊齊擒到俱各無詞太守盡問成重罪同申春下在死牢裏乃對小娥道盜情已真不必説了只是你不待報官擅行殺戮也該一死小娥道大仇已報立死無恨太守道法上雖是如此但你孝行可嘉志節堪敬不可以常律相拘待我申請朝廷討個明降免你死罪小娥叩首稱謝太守叫押出討保小娥稟道小婦人而今事迹已明不可復與男子混處只求發在尼庵聽候發落為便太守道一發説得是就押在附近尼庵討個收管一面聽候聖旨發落太守就將備細情節奏上內雲謝小娥立志報仇夢寐感通歷年乃得明系父仇又屬真盜不惟擅殺之條原情可免又且矢志之事核行可旌云云元和十二年四月明旨批下謝小娥節行異人準奏免死有司旌表其廬申春即行處斬不一日到潯陽郡府堂開讀了畢太守命牢中取出申春等死囚來讀了犯由牌押付市曹處斬小娥此時已復了女裝穿了一身素服法場上看斬了申春再到府中拜謝張公張公命花紅鼓樂送他歸本裏小娥道父死夫亡雖蒙相公奏請朝廷恩典花紅鼓樂之類決非孀婦敢領太守越敬他知禮點一官媼伴送他到家另自差人旌表此時哄動了豫章一郡小娥父夫之族還有親屬在家的多來與小娥相見問訊説起事由無不悲歎驚異裏中豪族慕小娥之名央媒求聘的殆無虛日小娥誓心不嫁道我混迹多年已非得已若今日嫁人女貞何在寧死不可爭奈來纏的人越多了小娥不耐煩分訴心裏想道昔年妙果寺中已願為尼只因冤仇未報不敢落發今吾事已畢少不得皈依三寶以了終身不如趁此落發絶了衆人之願小娥遂將剪子先將髻子剪下然後用剃刀剃淨了穿了褐衣做個行腳僧打扮辭了親屬出家訪道竟自飄然離了本裏裏中人越加歎誦不題且説元和十三年六月李公佐在家被召將上長安道經泗濱有善義寺尼師大德戒律精嚴多曾會過信步往謁大德師接入客座只見新來受戒的弟子數十人俱淨發鮮披威儀雍容列侍師之左右內中一尼仔細看了李公佐一回問師道此官人豈非是洪州判官李二十三郎師點頭道正是你如何認得此尼即泣下數行道使我得報家仇雪冤恥皆此判官恩德也即含淚上前稽首拜謝李公佐卻不認得驚起答拜道素非相識有何恩德可謝此尼道某名小娥即向年瓦官寺中乞食孀婦也尊官其時以十二字謎語辨出申蘭申春二賊名姓尊官豈忘之乎李公佐想了一回方才依稀記起卻記不全又問起是何十二字小娥再念了一遍李公佐豁然省悟道一向已不記了今見説來始悟前事後來果訪得有此二人否小娥因把扮男子投申蘭擒申春並餘黨數年經營艱苦之事從前至後備細告訴了畢又道尊官恩德無可以報從今惟有朝夕誦經保佑而已李公佐道今如何恰得在此處相會小娥道復仇已畢其時即剪發披褐訪道于牛頭山師事大士庵尼將律師苦行一年今年四月始受其戒於泗州開元寺所以到此豈知得遇恩人莫非天也李公佐道既已受戒是何法號小娥道不敢忘本只仍舊名李公佐歎息道天下有如此至心女子我偶然辨出二盜姓名豈知誓志不舍畢竟訪出其人復了冤仇又且傭保雜處無人識得是個女人豈非天下難事我當作傳以旌其美小娥感泣別了李公佐仍歸牛頭山扁舟泛淮雲遊南國不知所終李公佐為撰謝小娥傳流傳後世載入太平廣記詩雲匕首如霜鐵作心精靈萬載不銷沈西山木石填東海女子銜仇分外深又雲夢寐能通告化機天教達識剖玄微姓名一解終能報方信雙魂不浪歸卷二十李克讓竟達空函劉元普雙生貴子詩曰全婚昔日稱裴相助殯千秋慕範君慷慨奇人難屢見休將仗義望朝紳這一首詩單道世間人周急者少繼富者多為此達者便説只有錦上添花那得雪中送炭只這兩句話道盡世人情態比如一邊有財有勢那趨財慕勢的多隻向一邊去這便是俗語叫做一帆風又叫做鵓鴿子旺邊飛若是財利交關自不必説至於婚姻大事兒女親情有貪得富的便是王公貴戚自甘與團頭作對有嫌著貧的便是世家巨族不得與甲長聯親自道有了一分勢要兩貫浮財便不把人看在眼裏況有那身在青雲之上拔人於淤泥之中重捐己資曲全婚配恁般樣人實是從前寡見近世罕聞冥冥之中天公自然照察原來那夫妻二字極是鄭重極宜斟酌報應極是昭彰世人決不可戲而不戲胡作亂為或者因一句話上成就了一家兒夫婦或者因一紙字中拆散了一世的姻緣就是陷於不知因果到底不爽且説南直長洲有一村農姓孫年五十歲娶下一個後生繼妻前妻留下一個兒子一房媳婦且是孝順但是爹娘的説話不論好歹真假多應在骨裏的信從那老兒和兒子每日只是鋤田耙地出去養家過活婆媳兩個在家績麻拈苧自做生理卻有一件奇怪原來那婆子雖數上了三十多個年頭十分的不長進又道是婦人家入土方休見那老子是個養家經紀之人不恁地理會這些勾當所以間常也與人做了些不伶俐的身分幾番幾次漏在媳婦眼裏那媳婦自是個老實勤謹的只以孝情為上小心奉事翁姑那裏有甚心去捉他破綻誰知道無心人對著有心人那婆子自做了這些話把被媳婦每每沖著虛心病人自沒意思卻恐怕有甚風聲吹在老子和兒子耳朵裏頭顛倒在老子面前搬鬥又道是枕邊告狀一説便準那老子信了婆子的言語帶水帶漿的羞辱毀罵了兒子幾次那兒子是個孝心的人聽了這些話頭沒個來歷直擺布得夫妻兩口終日合嘴合舌甚不相安看官聽説世上只有一夫一妻一竹竿到底的始終有些正氣自不甘學那小家腔派獨有最狠毒最狡猾最短見的是那晚婆大概不是一婚兩婚人便是那低門小戶減剩貨與那不學好為夫所棄的這幾項人極是老唧溜也會得使人喜也會得使人怒弄得人死心塌地不敢不從元來世上婦人除了那十分貞烈的説著那話兒無不著緊男子漢到中年筋力漸衰那娶晚婆的大半是中年人做的事往往男大女小假如一個老蒼男子娶了水也似的一個嬌嫩婦人縱是千箱萬斛盡你受用卻是那話兒有些支吾不過自覺得過意不去隨你有萬分不是處也只得依順了他所以那家庭間每每被這等人炒得十清九濁這間話且放過如今再接前因話説吳江有個秀才蕭王賓胸藏錦繡筆走龍蛇因家貧在近處人家處館早出晚歸主家間壁是一座酒肆店主喚做熊敬溪店前一個小小堂子供著五顯靈官那王賓因在主家出入與熊店主廝熟忽一夜熊店主得其一夢夢見那五位神對他説道蕭狀元終日在此來往吾等見了坐立不安可為吾等築一堵短壁兒在堂子前遮蔽遮蔽店主醒來想道這夢甚是蹺蹊説甚麼蕭狀元難道便是在間壁處館的那個蕭秀才我想恁般一個寒酸措大如何便得做狀元心下疑惑卻又道除了那個姓蕭的卻又不曾與第二個姓蕭的識熟凡人不可貌相海水不可鬥量況是神道的言語寧可信其有不可信其無次日起來當真在堂子前面堆起一堵短牆遮了神聖卻自放在心裏不題隔了幾日蕭秀才往長洲探親經過一個村落人家只見一夥人聚在一塊在那裏喧嚷蕭秀才挨在人叢裏看一看只見衆人指著道這不是一位官人來得湊巧是必央及這官人則個省得我們村裏人去尋門館先生連忙請蕭秀才坐著將過紙筆道有煩官人寫一寫自當相謝蕭秀才道寫個甚麼且説個緣故只見一個老兒與一個後生走過來道官人聽説我們是這村裏人姓孫爺兒兩個一個阿婆一房媳婦叵耐媳婦十分不學好到終日與阿婆鬥氣我兩個又是養家經紀人一年到頭沒幾時住在家裏這樣婦人若留著他到底是個是非堆為此今日將他發還娘家任從別嫁他每衆位多是地方中見為是要寫一紙休書這村裏人沒一個通文墨見官人經過想必是個有才學的因此相煩官人替寫一寫蕭秀才道原來如此有甚難處便逞著一時見識舉筆一揮寫了一紙休書交與他兩個他兩個便將五錢銀子送秀才作潤筆資秀才笑道這幾行字值得甚麼我卻受你銀子再三不接拂著袖子撇開衆人徑自去了這裏自將休書付與婦人那婦人可憐勤勤謹謹做了三四年媳婦沒緣沒故的休了他咽著這一口怨氣扯住了丈夫哭了又哭號天拍地的不肯放手口裏説道我委實不曾甚歹心負了你你聽著一面之詞離異了我我生前無分辨處做鬼也要明白此事今世不能和你相見了便死也不忘記你這幾句話説得旁人俱各掩淚他丈夫也覺得傷心忍不住哭起來卻只有那婆子看著恐怕兒子有甚變卦流水和老兒兩個拆開了手推出門外那婦人只得含淚去了不題再説那熊店主重夢見五顯靈官對他説道快與我等拆了面前短壁攔著十分鬱悶店主夢中道神聖前日分付小人起造如何又要拆毀靈官道前日為蕭秀才時常此間來往他後日當中狀元我等見了他坐立不便所以教你築牆遮蔽今他於某月某日替某人寫了一紙休書拆散了一家夫婦上天鑒知減其爵祿今職在吾等之下相見無礙以此可拆那店主正要再問時一跳驚醒想道好生奇異難道有這等事明日待我問蕭秀才果有寫休書一事否便知端的明日當真先拆去了壁卻好那蕭秀才踱將來店主邀住道官人有句説話請店裏坐地入到裏面坐定吃茶店主動問道官人曾於某月某日與別人代寫休書麼秀才想了一會道是曾寫來你怎地曉得店主遂將前後夢中靈官的説話一一告訴一遍秀才聽罷目睜口呆懊悔不疊後來果然舉了孝廉只做到一個知州地位那蕭秀才因一時無心失誤上白送了一個狀元世人做事決不可不檢點曾有詩道得好人生常好事作者不自知起念埋根際須思決局時動止雖微渺干連已彌滋昏昏罹天網方知悔是遲試看那拆人夫婦的受禍不淺便曉得那完人夫婦的獲福非輕如今單説前代一個公卿把幾個他州外族之人認做至親骨肉撮合了才子佳人保全了孤兒寡婦又安葬了朽骨枯骸如此陰德又不止是完人夫婦了所以後來受天之報非同小可這話文出在宋真宗時西京洛陽縣有一官人姓劉名弘敬字元普曾任過青州刺史六十歲上告老還鄉繼娶夫人王氏年尚未滿四十廣有家財並無子女一應田園典鋪俱托內侄王文用管理自己只是在家中廣行善事仗義疏財揮金如土從前至後已不知濟過多少人了四方無人不聞其名只是並無子息日夜憂心時遇清明節屆劉元普分付王文用整備了牲酒醴往墳塋祭掃與夫人各乘小轎僕從在後相隨不逾時到了墳上澆奠已畢元普拜伏墳前口中説著幾句道堪憐弘敬年垂邁不孝有三無後大七十人稱自古稀殘生不久留塵界今朝夫婦拜墳塋他年誰向墳塋拜膝下蕭條未足悲從前血食何容艾天高聽遠實難憑一脈宗親須憫愛訴罷中心淚欲枯先靈不爽知何在當下劉元普説到此處放聲大哭旁人俱各悲淒那王夫人極是賢德的拭著淚上前勸道相公請免愁煩雖是年紀將暮筋力未衰妾身縱不能生育當別娶少年為妾子嗣尚有可望徒悲無益劉元普見説只得勉強收淚分付家人送夫人乘轎先回自己留一個家僮相隨間行散悶徐步回來將及到家之際遇見一個全真先生後執招牌上寫著風鑒通神元普見是相士正要蔔問子嗣便延他到家中來坐吃茶已畢元普端坐求先生細相先生仔細相了一回略無忌諱説道觀使君氣色非但無嗣壽亦在旦夕矣元普道學生年近古稀死亦非夭子嗣之事至此暮年亦是水中撈月了但學生自想生平雖無大德濟弱扶傾矢心已久不知如何罪業遂至殄絶祖宗之祀先生微笑道使君差矣自古道富者怨之叢使君廣有家私豈能一一綜理彼任事者只顧肥家不存公道大鬥小稱侵剝百端以致小民愁怨使君縱然行善只好功過酬耳恐不能獲福也使君但當悉杜其弊益廣仁慈多福多壽多男特易易耳元普聞言默然聽受先生起身作別不受謝金飄然去了元普知是異人深信其言遂取田園典鋪帳目一一稽查又潛往街市鄉間各處探聽盡知其實遂將衆管事人一一申飭並妻侄王文用也受了一番呵叱自此益修善事不題卻説汴京有個舉子李遜字克讓年三十六歲親妻張氏生子李彥青小字春郎年方十七本是西粵人氏只為與京師遠十分孤貧不便赴試數年前挈妻攜子流寓京師卻喜中了新科進士除授錢塘縣尹擇個吉日一同到了任所李克讓看見湖山佳勝宛然神仙境界不覺心中爽然誰想貧儒命薄到任未及一月犯了個不起之症正是濃霜偏打無根草禍來隻奔福輕人那張氏與春郎請醫調治百般無效看看待死一日李克讓喚妻子到床前説道我苦志一生得登黃甲死亦無恨但只是無家可奔無族可依教我撇下寡婦孤兒如何是了可痛可憐説罷淚如雨下張氏與春郎在旁勸住克讓想道久聞洛陽劉元普仗義疏財名傳天下不論識認不識認但是以情相求無有不應除是此人可以托妻寄子便叫娘子扶我起來坐了又叫兒子春郎取過文房四寶正待舉筆忽又停止心中好生躊躇道我與他從來無交難敘寒溫這書如何寫得疾忙心生一計分付妻兒取湯取水把兩個人都遣開了及至取得湯水來時已自把書重重封固上面寫十五字乃是辱弟李遜書呈洛陽恩兄劉元普親拆把來遞與妻兒收好説道我有個八拜為交的故人乃青州刺史劉元普本貫洛陽人氏此人義氣幹霄必能濟汝母子將我書前去投他料無阻拒可多多拜上劉伯父説我生前不及相見了隨分付張氏道二十載恩情今長別矣倘蒙伯父收留全賴小心相處必須教子成名補我未逮之志你已有遺腹兩月倘得生子使其仍讀父書若生女時將來許配良人我雖死亦瞑目又分付春郎道汝當事劉伯父如父事劉伯母如母又當孝敬母親勵精學業以圖榮顯我死猶生如違我言九原之下亦不安也兩人垂淚受教又囑付道身死之後權寄棺木浮丘寺中俟投過劉伯父徐圖殯葬但得安土埋藏不須重到西粵説罷心中哽咽大叫道老天老天我李遜如此清貧難道要做滿一個縣令也不能勾當時驀然倒在床上已自叫喚不醒了正是君恩新荷喜相隨誰料天年已莫追休為李君傷夭逝四齡已可傲顔回張氏春郎各各哭得死而復蘇張氏道撇得我孤孀二人好苦倘劉君不肯相容如何處置春郎道如今無計可施只得依從遺命我爹爹最是識人或者果是好人也不見得張氏即將囊橐檢點那曾還剩得分文元來李克讓本是極孤極貧的做人甚是清方到任又不上一月雖有些少已為醫藥廢盡了還虧得同僚相助將來買具棺木盛殮停在衙中母子二人朝夕哭奠過了七七之期依著遺言寄柩浮丘寺內收拾些少行李盤纏帶了遺書飢餐渴飲夜宿曉行取路投洛陽縣來卻説劉元普一日正在書齋間玩古典只見門上人報道外有母子二人口稱西粵人氏是老爺至交親戚有書拜謁元普心下著疑想道我那裏來這樣遠親便且教請進母子二人走到跟前施禮已畢元普道老夫與賢母子在何處識面實有遺忘伏乞詳示李春郎笑道家母小侄其實不曾得會先君卻是伯父至交元普便請姓名春郎道先君李遜字克讓母親張氏小侄名彥青字春郎本貫西粵人氏先君因赴試流落京師以後得第除授錢塘縣尹一月身亡臨終時憐我母子無依説有洛陽劉伯父是幼年八拜至交特命亡後齎了手書自任所前來拜懇故此母子造宅多有驚動元普聞言茫然不知就裏春郎便將書呈上元普看了封簽上面十五字好生詫異及至拆封看時卻是一張白紙吃了一驚默然不語左右想了一回猛可裏心中省悟道必是這個緣故無疑我如今不要説破只叫他母子得所便了張氏母子見他沈吟只道不肯容納豈知他卻是天大一場美意元普收過了書便對二人説道李兄果是我八拜至交指望再得相會誰知已作古人可憐可憐今你母子就是我自家骨肉在此居住便了便叫請出王夫人來説知來歷認為妯娌春郎以子侄之禮自居當時擺設筵席款待二人酒間説起李君靈柩在任所寺中元普一力應承殯葬之事王夫人又與張氏細談已知他有遺腹兩月了酒散後送他母子到南樓安歇傢夥器皿無一不備又撥幾個僮仆服侍每日三餐十分豐美張氏母子得他收留已自過望誰知如此殷勤心中感激不盡過了幾時元普見張氏德性溫存春郎才華英敏更兼謙謹老成愈加敬重又一面打發人往錢塘扶柩了忽一日正與王夫人間坐不覺掉下淚來夫人忙問其故元普道我觀李氏子儀容志氣後來必然大成我若得這般一個兒子真可死而無恨今年華已去子息杳然為此不覺傷感夫人道我屢次勸相公娶妾只是不允如今定為相公覓一側室管取宜男元普道夫人休説這話我雖垂暮你卻尚是中年若是天不絶我劉門難道你不能生育若是命中該絶縱使姬妾盈前也是無干説罷自出去了夫人這番卻主意要與丈夫娶妾曉得與他商量定然推阻便私下叫家人喚將做媒的薛婆來説知就裏又囑付道直待事成之後方可與老爺得知必用心訪個德容兼備的或者老爺才肯相愛薛婆一一應諾而去過不多日薛婆尋了幾頭來説領來看了沒一個中夫人的意薛婆道此間女子只好恁樣除非汴梁帝京五方雜聚去處才有出色女子恰好王文用有別事要進京夫人把百金密托了他央薛婆與他同去尋覓薛婆也有一頭媒事要進京兩得其便就此起程不題如今再表一段緣因話説汴京開封府祥符縣有一進士姓裴名習字安卿年登五十夫人鄭氏早亡單生一女名喚蘭孫年方二八儀容絶世裴安卿做了郎官幾年升任襄陽刺史有人對他説道官人向來清苦今得此美任此後只愁富貴不愁貧了安卿笑道富自何來每見貪酷小人惟利是圖不過使這幾家治下百姓賣兒貼婦充其囊橐此真狼心狗行之徒天子教我為民父母豈是教我殘害子民我今此去惟吃襄陽一杯淡水而已貧者人之常叨朝廷之祿不至凍餒足矣何求富為裴安卿立心要作個好官選了吉日帶了女兒起程赴任不則一日到了襄陽蒞任半年治得那一府物阜民安詞清訟簡民間造成幾句謠詞説道襄陽府前一條街一朝到了裴天臺六房吏書去打盹門子皂隸去砍柴光陰荏苒又早六月炎天一日裴安卿與蘭孫吃過午飯暴暑難當安卿命汲井水解熱霎時井水將到安卿吃了兩盅隨後叫女兒吃蘭孫飲了數口説道爹爹恁樣淡水虧爹爹怎生吃下偌多安卿道休説這般折福的話你我有得這水吃時也便是神仙了豈可嫌淡蘭孫道爹爹如何便見得折福這樣時候多少王孫公子雪藕調冰浮瓜沈李也不為過爹爹身為郡侯飲此一杯淡水還道受用也太迂闊了安卿道我兒不諳事務聽我道來假如那王孫公子倚傍著祖宗的勢耀頂戴著先人積攢下的錢財不知稼穡又無甚事業只圖快樂落得受用卻不知樂極悲生也終有馬死黃金盡的時節縱不然也是他生來有這些福氣你爹爹貧寒出身又叨朝廷民社之責須不能勾比他還有那一等人假如當此天道為將邊庭身披重鎧手執戈矛日夜不能安息又且死生朝不保暮更有那荷鍤農夫經商工役辛勤隴陌奔走泥塗雨汗通流還禁不住那當空日曬你爹爹比他不已是神仙了又有那下一等人一時過誤問成罪案困在囹圄受盡鞭捶還要肘手鐐足這般時節拘於那不見天日之處休説冷水便是泥汁也不能勾求生不得生求死不得死父娘皮肉痛癢一般難道偏他們受得苦起你爹爹比他豈不是神仙今司獄司中見有一二百名罪人吾意欲散禁他每在獄日給冷水一次待交秋再作理會蘭孫道爹爹未可造次獄中罪人皆不良之輩若輕鬆了他倘有不測受纍不淺安卿道我以好心待人人豈負我我但分付牢子緊守監門便了也是合當有事只因這一節有分教應死囚徒俱脫網施仁郡守反遭殃次日安卿升堂分付獄吏將囚人散禁在牢日給涼水與他須要小心看守獄卒應諾了當日便去牢裏松放了衆囚各給涼水牢子們緊緊看守不致疏虞過了十來日牢子們就懈怠了忽又是七月初一日獄中舊例每逢月朔便獻一番利市那日燒過了紙衆牢子們都去吃酒散福從下午吃起直吃到黃昏時候一個個酩酊爛醉那一干囚犯初時見獄中寬縱已自起心越牢內中有幾個有見識的密地教對付些利器暗藏在身邊當日見衆人已醉就便乘機發作約莫到二更時分獄中一片聲喊起一二百罪人一齊動手先將那當牢的禁子殺了打出牢門將那獄吏牢子一個個砍翻撞見的多是一刀一個有的躲在黑暗裏聽時只聽得喊道太爺平時仁德我每不要殺他直反到各衙門殺了幾個佐二官那正是清平時節城門還未曾閉衆人呐聲喊一哄逃走出城正是鼇魚脫卻金鈎去擺尾搖頭再不來那時裴安卿聽得喧嚷在睡夢中驚覺連忙起來早已有人報知裴安卿聽説卻正似頂門上失了三魂腳底下蕩了七魄連聲只叫得苦悔道不聽蘭孫之言以至於此誰知道將仁待人被人不仁一麵點起民壯分頭追捕多應是海底撈針那尋一個次日這樁事早報與上司知道少不得動了一本不上半月已到汴京奏章早達天聽天子與群臣議處若是裴安卿是個貪贓刻剝阿諛諂佞的朝中也還有人喜他只為平素心性剛直不肯趨奉權貴況且一清如水俸資之外毫不苟取那有錢財夤緣勢要所以無一人與他辨冤多道縱囚越獄典守者不得辭其責又且殺了佐二獨留刺史事屬可疑合當拿問天子準奏即便批下本來著法司差官扭解到京那時裴安卿便是重出世的召父再生來的杜母也只得低頭受縛卻也道自己素有政聲還有辨白之處叫蘭孫收拾了行李父女兩個同了押解人起程不則一日來到東京那裴安卿舊日住居已奉聖旨抄沒了僮仆數人分頭逃散無地可以安身還虧得鄭夫人在時與清真觀女道往來只得借他一間房子與蘭孫住下了次日青衣小帽同押解人到朝候旨奉聖旨下大理獄鞫審即刻便自進牢蘭孫只得將了些錢鈔買上告下去獄中傳言寄語擔茶送飯元來裴安卿年衰力邁受了驚惶又受了苦楚日夜憂虞飲食不進蘭孫設處送飯枉自費了銀子一日見蘭孫正到獄門首來便喚住女兒説道我氣塞難當今日大分必死只為為人慈善以致召禍纍了我兒雖然罪不及孥只是這死之後無路可投作婢為奴定然不免那安卿説到此處好如萬箭攢心長號數聲而絶還喜未及會審不受那三木囊頭之苦蘭孫跌腳捶胸哭得個發昏章第十一欲要領取父親尸首又道是朝廷罪人不得擅便當時蘭孫不顧死生利害闖進大理寺衙門哭訴越獄根由哀感旁人幸得那大理寺卿還是個有公道的人見了這般情狀惻然不忍隨即進一道表章上寫著大理寺卿臣某勘得襄陽刺史裴習撫字心勞提防政拙雖法禁多疏自幹天遣而反情無據可表臣心今已斃囹圄宜從寬貸伏乞速降天恩赦其遺尸歸葬以彰朝廷優待臣下之心臣某惶恐上言那真宗也是個仁君見裴習已死便自不欲苛求即批準了表章蘭孫得了這個消息算是黃連樹下彈琴苦中取樂了將身邊所剩餘銀買口棺木雇人擡出尸首盛殮好了停在清真觀中做些羹飯澆奠了一番又哭得一佛出世那裴安卿所帶盤費原無幾何到此已用得乾乾淨淨了雖是已有棺木殯葬之資毫無所出蘭孫左思右想道只有個舅舅鄭公見任西川節度使帶了家眷在彼卻是路途險遠萬萬不能搭救真正無計可施事到頭來不自由只得手中拿個草標將一張紙寫著賣身葬父四字到靈柩前拜了四拜禱告道爹爹陰靈不遠保奴前去得遇好人拜罷起身噙著一把眼淚抱著一腔冤恨忍著一身羞恥沿街喊叫可憐裴蘭孫是個嬌滴滴的閨中處子見了一個驀生人也要面紅耳熱的不想今日出頭露面思念父親臨死言詞不覺寸腸俱裂正是天有不測風雲人有旦夕禍福生來運蹇時乖只得含羞忍辱父兮桎梏亡身女兮街衢痛哭縱教血染鵑紅彼蒼不念煢獨又道是天無絶人之路正在街上賣身只見一個老媽媽走近前來欠身施禮問道小娘子為著甚事賣身又恁般愁容可掬仔細認認吃了一驚道這不是裴小姐如何到此地位元來那媽媽正是洛陽的薛婆鄭夫人在時薛婆有事到京常在裴家往來的故此認得蘭孫擡頭見是薛婆就同他走到一個僻靜所在含淚把上項事説了一遍那婆子家最易眼淚出的聽到傷心之處不覺也哭起來道原來尊府老爺遭此大難你是個宦家之女如何做得以下之人若要賣身雖然如此嬌姿不到得便為奴作婢也免不得是個偏房了蘭孫道今日為了父親就是殺身也説不得何惜其他薛婆道既如此小姐請免愁煩洛陽縣劉刺史老爺年老無兒夫人王氏要與他取個偏房前日曾囑付我在本處尋了多時並無一個中意的如今因為洛陽一個大姓央我到京中相府求一頭親事夫人乘便囑付親侄王文用帶了身價同我前來遍訪也是有緣遇著小姐王夫人原説要個德容兩全的今小姐之貌絶世無雙賣身葬父又是大孝之事這事十有九分了那劉刺史仗義疏財王夫人大賢大德小姐到彼雖則權時落後盡可快活終身未知尊意何如蘭孫道但憑媽媽主張只是賣身為妾玷辱門庭千萬莫説真情只認做民家之女罷了薛婆點頭道是隨引了蘭孫小姐一同到王文用寓所來薛婆就對他説知備細王文用遠遠地瞟去看那小姐已覺得傾國傾城便道有如此絶色佳人何怕不中姑娘之意正是踏破鐵鞋無覓處得來全不費工夫當下一邊是落難之際一邊是富厚之家並不消爭短論長已自一説一中整整兌足了一百兩雪銀子遞與蘭孫小姐收了就要接他起程蘭孫道我本為葬父故此賣身須是完葬事過才好去得薛婆道小娘子你孑然一身如何完得葬事何不到洛陽成親之後那時浼劉老爺差人埋葬何等容易蘭孫只得依從那王文用是個老成才幹的人見是要與姑夫為妾的不敢怠慢教薛婆與他作伴同行自己常在前後東京到洛陽只有四百里之程不上數日早已到了劉家王文用自往解庫中去了薛婆便悄悄地領他進去叩見了王夫人夫人擡頭看蘭孫時果然是脂粉不施有天然姿格梳妝略試無半點塵氛舉止處態度從容語言時聲音淒婉雙蛾顰蹙渾如西子入吳時兩頰含愁正似王嬙辭漢日可憐嫵媚清閨女權作追隨宦室人當時王夫人滿心歡喜問了姓名便收拾一間房子安頓蘭孫撥一個養娘服事他次日便請劉元普來從容説道老身今有一言相公幸勿嗔怪劉元普道夫人有話即説何必諱言夫人道相公你豈不聞人生七十古來稀今你壽近七十前路幾何並無子息常言道無病一身輕有子萬事足久欲與相公納一側室一來為相公持正不好妄言二來未得其人姑且隱忍今娶得汴京裴氏之女正在妙齡抑且才色兩絶願相公立他做個偏房或者生得一男半女也是劉門後代劉元普道老夫只恐命裏無嗣不欲耽誤人家幼女誰知夫人如此用心而今且喚他出來見我當下蘭孫小姐移步出房倒身拜了劉元普看見心中想道我觀此女儀容動止決不是個以下之人便開口問道你姓甚名誰是何等樣人家之女為甚事賣身蘭孫道妾乃汴京小民之女姓裴小名蘭孫父死無資故此賣身殯葬口中如此説不覺暗地裏偷彈淚珠劉元普相了相道你定不是民家之女不要哄我我看你愁容可掬必有隱情可對我一一直言與你作主分憂便了蘭孫初時隱諱怎當得劉元普再三盤問只得將那放囚得罪緣由從前至後細細説了一遍不覺淚如湧泉劉元普大驚失色也不覺淚下道我説不像民家之女夫人幾乎誤了老夫可惜一個好官遭此屈禍忙向蘭孫小姐連稱得罪又道小姐身既無依便住在我這裏待老夫選擇地基殯葬尊翁便了蘭孫道若得如此周全此恩惟天可表相公先受賤妾一拜劉元普慌忙扶起分付養娘好生服事裴家小姐不得有違當時走到廳堂即刻差人往汴京迎裴使君靈柩不多日扶柩到了卻好錢塘李縣令靈柩一齊到了劉元普將來共停在一個莊廳之上備了兩個祭筵拜奠張氏自領了兒子拜了亡夫元普也領蘭孫拜了亡父又延一個有名的地理師揀尋了兩塊好地基等待臘月吉日安葬一日王夫人又對元普説道那裴氏女雖然貴家出身卻是落難之中得相公救援他的若是流落地方不知如何下賤去了相公又與他擇地葬親此恩非小他必甘心與相公為妾的既是名門之女或者有些福氣誕育子嗣也不見得若得如此非但相公有後他也終身有靠未為不可望相公思之夫人不説猶可説罷只見劉元普勃然作色道夫人説那裏話天下多美婦人我欲取妾自可別圖豈敢汙裴使君之女劉弘敬若有此心神天鑒察夫人聽説自道失言頓口不語劉元普心裏不樂想了一回道我也太呆了我既無子嗣何不索性認他為女斷了夫人這點念頭便叫丫環請出裴小姐來道我叨長尊翁多年又同為刺史之職年華高邁子息全無小姐若不棄嫌欲待螟蛉為女意下何如蘭孫道妾蒙相公夫人收養願為奴婢早晚服事如此厚待如何敢當劉元普道豈有此理你乃宦家之女偶遭挫折焉可賤居下流老夫自有主意不必過謙蘭孫道相公夫人正是重生父母雖粉骨碎身無可報答既蒙不鄙微賤認為親女焉敢有違今日就拜了爹媽劉元普歡喜不勝便對夫人道今日我以蘭孫為女可受他全禮當下蘭孫插燭也似的拜了八拜自此便叫劉相公夫人為爹爹母親十分孝敬倍加親熱夫人又説與劉元普道相公既認蘭孫為女須當與他擇壻侄兒王文用青年喪偶管理多年才幹精敏也不辱莫了女兒相公何不與他成就了這頭親事劉元普微微笑道內侄繼娶之事少不得在老夫身上今日自有主意你只管打點妝奩便了夫人依言元普當時便揀下了一個成親吉日到期宰殺豬羊大排筵會遍請鄉紳親友並李氏母子內侄王文用一同來赴慶喜華筵衆人還只道是劉公納寵王夫人也還只道是與侄兒成婚正是萬丈廣寒難得到嫦娥今夜落誰家看看吉時將及只見劉元普教人捧出一套新郎衣飾擺在堂中劉元普拱手向衆人説道列位高親在此聽弘敬一言敬聞利人之色不仁乘人之危不義襄陽裴使君以王事系獄身死有女蘭孫年方及笄荊妻欲