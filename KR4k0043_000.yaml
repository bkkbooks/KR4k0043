分的事體來卻也不愛去打家劫舍也不愛去殺人放火他愛吃的是牛馬肉又無錢可買思量要與莫賀咄外邊偷盜去每夜黃昏後便兩人合伴直走去五十裏外遇著牛即執其兩角翻負在背上背了家來遇馬騾將繩束其頸也負在背到得家中投在地上都是死的又於堂中崛地埋幾個大甕在內安貯牛馬之肉皮骨剝剔下來納在堂後大坑或時把火焚了初時只圖自己口腹暢快後來偷得多起來便叫莫賀咄拿出城市換米來吃賣錢來用做得手滑日以為常當做了是他兩人的生計了亦且來路甚遠脫膊又快自然無人疑心再也不弄出來仲任性又好殺日裏沒事得做所居堂中弓箭羅網叉彈滿屋多是千方百計思量殺生害命出去走了一番再沒有空手回來的不論獐鹿獸兔烏鳶鳥雀之類但經目中一見畢竟要算計弄來吃他但是一番回來肩擔背負手提足系無非是些飛禽走獸就堆了一堂屋角兩人又去舞弄擺布思量巧樣吃法就是帶活的不肯便殺一刀打一下死了吧畢竟多設調和妙法或生割其肝或生抽其筋或生斷其舌或生取其血道是一死便不脆嫩假如取得生鱉便將繩縛其四足繃住在烈日中曬著鱉口中渴甚即將鹽酒放在他頭邊鱉只得吃了然後將他烹起來鱉是裏邊醉出來的分外好吃取驢縛於堂中面前放下一缸灰水驢四圍多用火逼著驢口幹即飲灰水須臾尿溺齊來把他腸胃中污穢多蕩盡了然後取酒調了椒鹽各味再復與他他火逼不過見了只是吃性命未絶外邊皮肉已熟裏頭調和也有了一日拿得一刺蝟他渾身是硬刺不便烹宰仲任與莫賀咄商量道難道便是這樣罷了不成想起一法來把泥著些鹽在內跌成熟團把刺蝟團團泥裹起來火裏煨著燒得熟透了除去外邊的泥只見蝟皮與刺皆隨泥脫了下來剩的是一團熟肉加了鹽醬且是好吃凡所作為多是如此有詩為證捕飛逐走不曾停身上時常帶血腥且是烹穀多有術想來手段會調羹且説仲任有個姑夫曾做鄆州司馬姓張名安起初看見仲任家事漸漸零落也要等他曉得些苦辣收留他去勸化他回頭做人家及到後來看見他所作所為越無人氣時常規諷只是不聽張司馬憐他是妻兄獨子每每挂在心上怎當他氣類異常不是好言可以諭解只得罷了後來司馬已死一發再無好言到他耳中只是逞性胡為如此十多年忽一日家僮莫賀咄病死仲任沒了個幫手只得去尋了個小時節乳他的老婆婆來守著堂屋自家仍去獨自個做那些營生過得月餘一日晚正在堂屋裏吃牛肉忽見兩個青衣人直闖將入來將仲任套了繩子便走仲任自恃力氣欲待打掙不知這時力氣多在那裏去了只得軟軟隨了他走正是有指爪劈開地面會騰雲飛上青霄若無入地升天術目下災殃怎地消仲任口裏問青衣人道拿我到何處去青衣人道有你家家奴扳下你來須去對理仲任茫然不知何事隨了青衣人來到一個大院廳事十餘間有判官六人每人據二間仲任所對在最西頭二間判官還不在青衣人叫他且立堂下有頃判官已到仲任仔細一認叫聲阿呀如何在這裏相會你道那判官是誰正是他那姑夫鄆州司馬張安那司馬也吃了一驚道你幾時來了引他登階對他道你此來不好你年命未盡想為對事而來卻是在世為惡無比所殺害生命千千萬萬冤家多在今忽到此有何計較可以相救仲任才曉得是陰府心裏想著平日所為有些懼怕起來叩頭道小侄生前不聽好言不信有陰間地府妄作妄行今日來到此處望姑夫念親戚之情救拔則個張判官道且不要忙待我與衆判官商議看因對衆判官道仆有妻侄屈突仲任造罪無數今召來與奴莫賀咄對事卻是其人年命亦未盡要放他去了等他壽盡才來只是既已到了這裏怕被害這些冤魂不肯放他怎生為仆分上商量開得一路放他生還麼衆判官道除非召明法者與他計較張判官叫鬼卒喚明法人來只見有個碧衣人前來參見張判官道要出一個年命未盡的罪人有路否明法人請問何事張判官把仲任的話對他説了一遍明法人道仲任須為對莫賀咄事而來固然陽壽未盡卻是冤家太廣只怕一與相見群至遝來不由分説恣行食啖此皆宜償之命冥府不能禁得料無再還之理張判官道仲任既系吾親又命未合死故此要開生路救他若是壽已盡時自作自受我這裏也管不得了你有何計可以解得此難明法人想了一會道唯有一路可以出得卻也要這些被殺冤家肯便好若不肯也沒幹張判官道卻待怎麼明法人道此諸物類被仲任所殺者必須償其身命然後各去托生今召他每出來須誘哄他每道屈突仲任今為對莫賀咄事已到此間汝輩食啖了畢即去托生汝輩餘業未盡還受畜生身是這件仍做這件牛更為牛馬更為馬使仲任轉生為人還依舊吃著汝輩汝輩業報無有了時今查仲任未合即死須令略還叫他替汝輩追造福因使汝輩各舍畜生業盡得人身再不為人殺害豈不至妙諸畜類聞得人身必然喜歡從命然後小小償他些夙債乃可放去若説與這番説話不肯依時就再無別路了張判官道便可依此而行明法人將仲任鎖在廳事前房中了然後召仲任所殺生類到判官庭中來庭中地可有百畝仲任所殺生命聞召都來一時填塞皆滿但見牛馬成群雞鵝作隊百般怪獸盡皆舞爪張牙千種奇禽類各舒毛鼓翼誰道賦靈獨蠢記冤仇且是分明謾言稟質偏殊圖報復更為緊急飛的飛走的走早難道天子上林叫的叫嗥的嗥須不是人間樂土説這些被害衆生如牛馬驢騾豬羊獐鹿雉兔以至刺蝟飛鳥之類不可悉數凡數萬頭共作人言道召我何為判官道屈突仲任已到説聲未了物類皆咆哮大怒騰振蹴踏大喊道逆賊還我債來還我債來這些物類忿怒起來個個身體比常倍大豬羊等馬牛馬